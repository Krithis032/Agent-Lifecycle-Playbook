templates:
  - slug: agent-charter
    name: "Agent Project Charter"
    description: "Define scope, objectives, team, and success criteria for an agent project."
    phase_slug: ideation
    fields:
      - key: project_name
        label: "Project Name"
        type: text
        required: true
        section: "Project Identity"
        helpText: "A clear, descriptive name for the agent project (e.g., Customer Support Triage Agent)"
      - key: project_code
        label: "Project Code"
        type: text
        required: false
        section: "Project Identity"
        placeholder: "e.g., AGT-001"
        helpText: "An internal tracking code for reference across systems"
      - key: owner
        label: "Project Owner"
        type: text
        required: true
        section: "Project Identity"
        helpText: "The person accountable for delivery and outcomes of this project"
      - key: date
        label: "Charter Date"
        type: date
        required: true
        section: "Project Identity"
        helpText: "The date this charter was created or last revised"
      - key: status
        label: "Status"
        type: select
        required: true
        section: "Project Identity"
        options: ["Draft", "Under Review", "Approved"]
        helpText: "Current approval status of this charter document"
      - key: problem_statement
        label: "Problem Statement"
        type: textarea
        required: true
        section: "Problem & Opportunity"
        helpText: "What problem does this agent solve? Who experiences it?"
      - key: current_process
        label: "Current Process"
        type: textarea
        required: true
        section: "Problem & Opportunity"
        helpText: "How is this handled today without the agent?"
      - key: opportunity
        label: "Opportunity"
        type: textarea
        required: true
        section: "Problem & Opportunity"
        helpText: "What improvement does the agent enable? Quantify if possible."
      - key: architecture_pattern
        label: "Architecture Pattern"
        type: select
        required: true
        section: "Agent Design"
        options: ["Single Agent", "Pipeline", "Supervisor-Workers", "Hierarchical", "Collaborative Swarm", "State Machine"]
        helpText: "The multi-agent topology. Single Agent for simple tasks, Pipeline for sequential, Supervisor-Workers for delegated workflows."
      - key: framework
        label: "Framework"
        type: select
        required: true
        section: "Agent Design"
        options: ["LangGraph", "CrewAI", "AutoGen", "Claude Agent SDK", "Semantic Kernel", "Phidata"]
        helpText: "The agent orchestration framework to build with. Use the Evaluate module to compare options."
      - key: model_strategy
        label: "Model Tier Strategy"
        type: select
        required: true
        section: "Agent Design"
        options: ["Haiku Only", "Sonnet Only", "Opus Only", "Mixed (Haiku+Sonnet)", "Mixed (Sonnet+Opus)", "Full Tiered (Haiku+Sonnet+Opus)"]
        helpText: "Which LLM tiers to use. Haiku for speed/cost, Sonnet for balanced, Opus for complex reasoning. Mixed tiers route by task complexity."
      - key: autonomy_level
        label: "Target Autonomy Level"
        type: select
        required: true
        section: "Agent Design"
        options: ["L0 - Manual", "L1 - Assistive", "L2 - Collaborative", "L3 - Supervised Autonomous", "L4 - Highly Autonomous", "L5 - Fully Autonomous"]
        helpText: "L0=human does everything. L5=fully autonomous. Most production agents start at L2-L3."
      - key: tools_required
        label: "Tools & Integrations"
        type: textarea
        required: false
        section: "Agent Design"
        helpText: "List MCP servers, APIs, databases, file systems the agent needs access to"
      - key: success_metrics
        label: "Success Metrics"
        type: textarea
        required: true
        section: "Success Criteria"
        helpText: "KPIs that define success. Include targets (e.g., 90% task completion, <5s latency, 50% cost reduction)."
      - key: acceptance_criteria
        label: "Acceptance Criteria"
        type: textarea
        required: true
        section: "Success Criteria"
        helpText: "What must be true for the project to be considered complete?"
      - key: risk_classification
        label: "Risk Classification"
        type: select
        required: true
        section: "Success Criteria"
        options: ["Automate (Low Stakes)", "Accelerate (Medium Stakes)", "Augment (High Stakes)", "Advise Only (Critical Stakes)"]
        helpText: "Low stakes = automate freely. Critical stakes = agent advises, human decides. Matches the 4A Framework."
      - key: team_members
        label: "Team Members"
        type: textarea
        required: true
        section: "Team & Timeline"
        helpText: "Name, role, hours/week for each team member"
      - key: timeline
        label: "Estimated Timeline"
        type: text
        required: true
        section: "Team & Timeline"
        placeholder: "e.g., 6 weeks"
        helpText: "End-to-end timeline from kickoff to production deployment"
      - key: budget
        label: "Budget Estimate"
        type: text
        required: false
        section: "Team & Timeline"
        helpText: "Estimated total cost including compute, API usage, personnel, and tooling"

  - slug: adr
    name: "Architecture Decision Record"
    description: "Document one or more architecture choices with alternatives, rationale, and consequences. Supports multiple decisions per record."
    phase_slug: architecture
    fields:
      - key: adr_number
        label: "ADR Number"
        type: text
        required: true
        section: "Record Header"
        placeholder: "ADR-001"
        helpText: "Unique identifier for this ADR (e.g., ADR-001). Used for cross-referencing between decisions."
      - key: record_title
        label: "Record Title"
        type: text
        required: true
        section: "Record Header"
        helpText: "A high-level title for this ADR record. If it covers multiple decisions, use a theme (e.g., Agent Architecture Decisions - Phase 1)."
      - key: date
        label: "Date"
        type: date
        required: true
        section: "Record Header"
        helpText: "Date this ADR was created or last updated"
      - key: overall_status
        label: "Record Status"
        type: select
        required: true
        section: "Record Header"
        options: ["Draft", "Under Review", "Accepted", "Deprecated", "Superseded"]
        helpText: "Overall status of this ADR record. Individual decisions may have their own status."
      - key: authors
        label: "Authors"
        type: text
        required: true
        section: "Record Header"
        helpText: "Who authored and is responsible for this record"
      - key: stakeholders
        label: "Stakeholders & Reviewers"
        type: textarea
        required: false
        section: "Record Header"
        helpText: "People who reviewed or approved these decisions. Include role and sign-off status."

      - key: decision_1_title
        label: "Decision 1 — Title"
        type: text
        required: true
        section: "Decision 1"
        helpText: "A concise title for this decision (e.g., Use LangGraph for agent orchestration)"
      - key: decision_1_status
        label: "Decision 1 — Status"
        type: select
        required: true
        section: "Decision 1"
        options: ["Proposed", "Accepted", "Deprecated", "Superseded"]
        helpText: "Current status of this specific decision"
      - key: decision_1_context
        label: "Decision 1 — Context & Problem"
        type: textarea
        required: true
        section: "Decision 1"
        helpText: "What is the issue that motivates this decision? What forces are at play (technical, business, team, cost)?"
      - key: decision_1_decision
        label: "Decision 1 — Decision"
        type: textarea
        required: true
        section: "Decision 1"
        helpText: "State the decision clearly and unambiguously. Start with 'We will...' or 'We chose...'"
      - key: decision_1_rationale
        label: "Decision 1 — Rationale"
        type: textarea
        required: true
        section: "Decision 1"
        helpText: "Why was this option chosen over alternatives? Include key criteria that drove the choice."
      - key: decision_1_alternatives
        label: "Decision 1 — Alternatives Considered"
        type: textarea
        required: true
        section: "Decision 1"
        helpText: "List each alternative with a brief explanation of why it was not chosen"
      - key: decision_1_consequences_positive
        label: "Decision 1 — Positive Consequences"
        type: textarea
        required: true
        section: "Decision 1"
        helpText: "Benefits and advantages of this decision (e.g., faster iteration, better observability)"
      - key: decision_1_consequences_negative
        label: "Decision 1 — Negative Consequences / Trade-offs"
        type: textarea
        required: true
        section: "Decision 1"
        helpText: "Downsides, risks, or trade-offs accepted (e.g., vendor lock-in, steeper learning curve)"

      - key: decision_2_title
        label: "Decision 2 — Title"
        type: text
        required: false
        section: "Decision 2"
        helpText: "Title for a second decision in this ADR. Leave blank if not applicable."
      - key: decision_2_status
        label: "Decision 2 — Status"
        type: select
        required: false
        section: "Decision 2"
        options: ["Proposed", "Accepted", "Deprecated", "Superseded"]
        helpText: "Current status of this specific decision"
      - key: decision_2_context
        label: "Decision 2 — Context & Problem"
        type: textarea
        required: false
        section: "Decision 2"
        helpText: "What is the issue that motivates this decision?"
      - key: decision_2_decision
        label: "Decision 2 — Decision"
        type: textarea
        required: false
        section: "Decision 2"
        helpText: "State the decision clearly"
      - key: decision_2_rationale
        label: "Decision 2 — Rationale"
        type: textarea
        required: false
        section: "Decision 2"
        helpText: "Why was this chosen over alternatives?"
      - key: decision_2_alternatives
        label: "Decision 2 — Alternatives Considered"
        type: textarea
        required: false
        section: "Decision 2"
        helpText: "List alternatives and why they were not chosen"
      - key: decision_2_consequences_positive
        label: "Decision 2 — Positive Consequences"
        type: textarea
        required: false
        section: "Decision 2"
        helpText: "Benefits and advantages of this decision"
      - key: decision_2_consequences_negative
        label: "Decision 2 — Negative Consequences / Trade-offs"
        type: textarea
        required: false
        section: "Decision 2"
        helpText: "Downsides, risks, or trade-offs accepted"

      - key: decision_3_title
        label: "Decision 3 — Title"
        type: text
        required: false
        section: "Decision 3"
        helpText: "Title for a third decision. Leave blank if not applicable."
      - key: decision_3_status
        label: "Decision 3 — Status"
        type: select
        required: false
        section: "Decision 3"
        options: ["Proposed", "Accepted", "Deprecated", "Superseded"]
        helpText: "Current status of this specific decision"
      - key: decision_3_context
        label: "Decision 3 — Context & Problem"
        type: textarea
        required: false
        section: "Decision 3"
        helpText: "What is the issue that motivates this decision?"
      - key: decision_3_decision
        label: "Decision 3 — Decision"
        type: textarea
        required: false
        section: "Decision 3"
        helpText: "State the decision clearly"
      - key: decision_3_rationale
        label: "Decision 3 — Rationale"
        type: textarea
        required: false
        section: "Decision 3"
        helpText: "Why was this chosen over alternatives?"
      - key: decision_3_alternatives
        label: "Decision 3 — Alternatives Considered"
        type: textarea
        required: false
        section: "Decision 3"
        helpText: "List alternatives and why they were not chosen"
      - key: decision_3_consequences_positive
        label: "Decision 3 — Positive Consequences"
        type: textarea
        required: false
        section: "Decision 3"
        helpText: "Benefits and advantages of this decision"
      - key: decision_3_consequences_negative
        label: "Decision 3 — Negative Consequences / Trade-offs"
        type: textarea
        required: false
        section: "Decision 3"
        helpText: "Downsides, risks, or trade-offs accepted"

      - key: related_adrs
        label: "Related ADRs"
        type: text
        required: false
        section: "Cross-References"
        placeholder: "e.g., ADR-003, ADR-005"
        helpText: "Other ADRs that are related, superseded, or depend on decisions in this record"
      - key: implementation_notes
        label: "Implementation Notes"
        type: textarea
        required: false
        section: "Cross-References"
        helpText: "Any technical notes, links to PRs, or implementation guidance for the decisions above"

  - slug: eval-report
    name: "Agent Evaluation Report"
    description: "Record evaluation results and recommendation."
    phase_slug: prototype
    fields:
      - key: agent_name
        label: "Agent / System Name"
        type: text
        required: true
        section: "Header"
        helpText: "The agent or system being evaluated"
      - key: eval_date
        label: "Evaluation Date"
        type: date
        required: true
        section: "Header"
        helpText: "When this evaluation was conducted"
      - key: evaluator
        label: "Evaluator"
        type: text
        required: true
        section: "Header"
        helpText: "Person or team who performed the evaluation"
      - key: eval_type
        label: "Evaluation Type"
        type: select
        required: true
        section: "Header"
        options: ["Framework Selection", "Architecture Selection", "Agent Performance", "Custom"]
        helpText: "What kind of evaluation this is. Use the Evaluate module for weighted matrix comparisons."
      - key: executive_summary
        label: "Executive Summary"
        type: textarea
        required: true
        section: "Summary"
        helpText: "1-2 paragraph high-level summary for stakeholders. Include key finding and recommendation."
      - key: recommendation
        label: "Recommendation"
        type: textarea
        required: true
        section: "Summary"
        helpText: "Your recommended course of action based on the evaluation results"
      - key: confidence_level
        label: "Confidence Level"
        type: select
        required: true
        section: "Summary"
        options: ["High", "Medium", "Low"]
        helpText: "How confident you are in the recommendation. Low confidence suggests more testing is needed."
      - key: methodology
        label: "Evaluation Methodology"
        type: textarea
        required: true
        section: "Details"
        helpText: "Describe how the evaluation was conducted (test scenarios, data sources, environment)"
      - key: criteria_used
        label: "Criteria & Weights"
        type: textarea
        required: true
        section: "Details"
        helpText: "What criteria were used and their relative importance (e.g., accuracy 30%, latency 25%, cost 20%)"
      - key: results
        label: "Detailed Results"
        type: textarea
        required: true
        section: "Details"
        helpText: "Quantitative and qualitative results per option. Include scores, latency numbers, error rates."
      - key: risks_tradeoffs
        label: "Risks & Trade-offs"
        type: textarea
        required: true
        section: "Details"
        helpText: "What risks come with the recommendation? What trade-offs are being accepted?"
      - key: next_steps
        label: "Next Steps"
        type: textarea
        required: true
        section: "Details"
        helpText: "Concrete actions to take after this evaluation (e.g., prototype build, pilot plan, stakeholder review)"

  - slug: pilot-runbook
    name: "Pilot Runbook"
    description: "Operational plan for pilot deployment."
    phase_slug: pilot
    fields:
      - key: pilot_name
        label: "Pilot Name"
        type: text
        required: true
        section: "Overview"
        helpText: "Name of this pilot deployment (e.g., Customer Support Triage Pilot - APAC)"
      - key: start_date
        label: "Start Date"
        type: date
        required: true
        section: "Overview"
        helpText: "Planned start date of the pilot"
      - key: end_date
        label: "End Date"
        type: date
        required: true
        section: "Overview"
        helpText: "Planned end date of the pilot"
      - key: pilot_scope
        label: "Pilot Scope"
        type: textarea
        required: true
        section: "Overview"
        helpText: "What users/processes are included? What is excluded?"
      - key: success_criteria
        label: "Pilot Success Criteria"
        type: textarea
        required: true
        section: "Overview"
        helpText: "Measurable criteria that define whether the pilot is successful (e.g., >85% accuracy, <3s response time)"
      - key: deployment_steps
        label: "Deployment Steps"
        type: textarea
        required: true
        section: "Operations"
        helpText: "Step-by-step instructions to deploy the agent into the pilot environment"
      - key: monitoring_plan
        label: "Monitoring Plan"
        type: textarea
        required: true
        section: "Operations"
        helpText: "What metrics are tracked? Where? Alert thresholds?"
      - key: rollback_plan
        label: "Rollback Plan"
        type: textarea
        required: true
        section: "Operations"
        helpText: "How to quickly revert to the previous state if the pilot fails. Include kill switch location."
      - key: escalation_path
        label: "Escalation Path"
        type: textarea
        required: true
        section: "Operations"
        helpText: "Who to contact for each severity level. Include on-call rotation and contact info."
      - key: feedback_mechanism
        label: "Feedback Collection"
        type: textarea
        required: true
        section: "Evaluation"
        helpText: "How will pilot users provide feedback? (surveys, interviews, in-app feedback)"
      - key: go_nogo_criteria
        label: "Go/No-Go Decision Criteria"
        type: textarea
        required: true
        section: "Evaluation"
        helpText: "Specific thresholds that determine whether to proceed to production, extend pilot, or abort"
      - key: stakeholders
        label: "Stakeholders & Sign-off"
        type: textarea
        required: true
        section: "Evaluation"
        helpText: "Who must sign off before the pilot starts and before moving to production?"

  - slug: prod-checklist
    name: "Production Readiness Checklist"
    description: "Pre-production sign-off checklist."
    phase_slug: production
    fields:
      - key: system_name
        label: "System Name"
        type: text
        required: true
        section: "System"
        helpText: "Name of the agent system being reviewed for production readiness"
      - key: review_date
        label: "Review Date"
        type: date
        required: true
        section: "System"
        helpText: "Date of this production readiness review"
      - key: reviewer
        label: "Reviewer"
        type: text
        required: true
        section: "System"
        helpText: "Person conducting the production readiness review"
      - key: performance_tested
        label: "Performance/Load Testing Done"
        type: checkbox
        required: true
        section: "Technical Readiness"
        helpText: "Confirm load/stress testing has been completed with acceptable results"
      - key: security_reviewed
        label: "Security Review Completed"
        type: checkbox
        required: true
        section: "Technical Readiness"
        helpText: "Confirm security review including threat modeling and vulnerability scan"
      - key: monitoring_active
        label: "Monitoring & Alerting Active"
        type: checkbox
        required: true
        section: "Technical Readiness"
        helpText: "Confirm monitoring dashboards and alerting are configured and tested"
      - key: rollback_tested
        label: "Rollback Procedure Tested"
        type: checkbox
        required: true
        section: "Technical Readiness"
        helpText: "Confirm rollback has been tested and can be executed within acceptable time"
      - key: guardrails_active
        label: "Input/Output Guardrails Active"
        type: checkbox
        required: true
        section: "Technical Readiness"
        helpText: "Confirm input validation, output filtering, and content safety filters are live"
      - key: hitl_gates
        label: "HITL Gates Configured"
        type: checkbox
        required: true
        section: "Technical Readiness"
        helpText: "Confirm Human-in-the-Loop gates are active for high-stakes decisions"
      - key: governance_passed
        label: "Governance Assessment Passed"
        type: checkbox
        required: true
        section: "Governance Readiness"
        helpText: "Confirm TRiSM governance assessment has been completed with passing score"
      - key: compliance_checked
        label: "Compliance Checklist Completed"
        type: checkbox
        required: true
        section: "Governance Readiness"
        helpText: "Confirm all applicable compliance requirements (GDPR, SOC2, etc.) are met"
      - key: data_privacy_reviewed
        label: "Data Privacy Impact Assessed"
        type: checkbox
        required: true
        section: "Governance Readiness"
        helpText: "Confirm data privacy impact assessment has been completed"
      - key: bias_audited
        label: "Bias Audit Completed"
        type: checkbox
        required: true
        section: "Governance Readiness"
        helpText: "Confirm bias testing has been performed across demographic groups"
      - key: runbook_available
        label: "Operations Runbook Available"
        type: checkbox
        required: true
        section: "Operational Readiness"
        helpText: "Confirm an operations runbook with troubleshooting guides exists"
      - key: oncall_assigned
        label: "On-call Rotation Assigned"
        type: checkbox
        required: true
        section: "Operational Readiness"
        helpText: "Confirm on-call engineers are assigned and trained"
      - key: incident_plan
        label: "Incident Response Plan in Place"
        type: checkbox
        required: true
        section: "Operational Readiness"
        helpText: "Confirm incident response plan with severity definitions and escalation paths"
      - key: stakeholders_signed
        label: "Stakeholder Sign-off Obtained"
        type: checkbox
        required: true
        section: "Operational Readiness"
        helpText: "Confirm all required stakeholders have approved production deployment"
      - key: notes
        label: "Notes / Blockers"
        type: textarea
        required: false
        section: "Notes"
        helpText: "Any outstanding issues, blockers, or conditions that must be resolved before go-live"

  - slug: incident-plan
    name: "Incident Response Plan"
    description: "Incident classification and response procedures."
    phase_slug: operations
    fields:
      - key: system_name
        label: "Agent System Name"
        type: text
        required: true
        section: "Overview"
        helpText: "The agent system this incident plan covers"
      - key: version
        label: "Plan Version"
        type: text
        required: true
        section: "Overview"
        helpText: "Version number of this plan (increment on each major revision)"
      - key: last_updated
        label: "Last Updated"
        type: date
        required: true
        section: "Overview"
        helpText: "When this plan was last reviewed and updated"
      - key: owner
        label: "Plan Owner"
        type: text
        required: true
        section: "Overview"
        helpText: "The person responsible for maintaining this plan"
      - key: severity_definitions
        label: "Severity Levels & Definitions"
        type: textarea
        required: true
        section: "Classification"
        helpText: "Define SEV1 (critical) through SEV4 (informational) with response times"
      - key: incident_types
        label: "Incident Types"
        type: textarea
        required: true
        section: "Classification"
        helpText: "e.g., Hallucination, Data Leak, Guardrail Bypass, Performance Degradation, Bias Detected"
      - key: detection
        label: "Detection Mechanisms"
        type: textarea
        required: true
        section: "Response Procedures"
        helpText: "How incidents are detected: monitoring alerts, user reports, automated checks"
      - key: triage_steps
        label: "Triage Steps"
        type: textarea
        required: true
        section: "Response Procedures"
        helpText: "Initial assessment steps to classify severity and scope of the incident"
      - key: containment
        label: "Containment Actions"
        type: textarea
        required: true
        section: "Response Procedures"
        helpText: "Kill switch location, traffic diversion, fallback mode"
      - key: communication_plan
        label: "Communication Plan"
        type: textarea
        required: true
        section: "Response Procedures"
        helpText: "Who to notify at each severity level and through which channels"
      - key: recovery_steps
        label: "Recovery Steps"
        type: textarea
        required: true
        section: "Response Procedures"
        helpText: "Steps to restore normal service after containment"
      - key: post_mortem_template
        label: "Post-Mortem Template"
        type: textarea
        required: false
        section: "Post-Incident"
        helpText: "Template or checklist for conducting post-incident reviews"
      - key: escalation_contacts
        label: "Escalation Contacts"
        type: textarea
        required: true
        section: "Post-Incident"
        helpText: "Contact list with names, roles, phone numbers, and escalation order"

  - slug: use-case-assessment
    name: "Use Case Assessment"
    description: "Evaluate whether a problem is suited for agentic AI vs simpler automation."
    phase_slug: ideation
    fields:
      - key: use_case_name
        label: "Use Case Name"
        type: text
        required: true
        section: "Overview"
        helpText: "A descriptive name for the use case being assessed"
      - key: date
        label: "Assessment Date"
        type: date
        required: true
        section: "Overview"
        helpText: "Date this assessment was performed"
      - key: assessor
        label: "Assessor"
        type: text
        required: true
        section: "Overview"
        helpText: "Person conducting the assessment"
      - key: current_workflow
        label: "Current Workflow Description"
        type: textarea
        required: true
        section: "Current State"
        helpText: "Map the end-to-end workflow with bottlenecks and handoffs"
      - key: cost_of_status_quo
        label: "Cost of Status Quo"
        type: textarea
        required: true
        section: "Current State"
        helpText: "Person-hours, error rates, customer wait times, compliance gaps"
      - key: requires_multi_step
        label: "Requires Multi-Step Reasoning"
        type: checkbox
        required: true
        section: "Agent-Fit Criteria"
        helpText: "Does the task require chaining multiple reasoning steps to reach a conclusion?"
      - key: requires_tool_use
        label: "Requires Tool Use"
        type: checkbox
        required: true
        section: "Agent-Fit Criteria"
        helpText: "Does the task require calling APIs, querying databases, or using external tools?"
      - key: requires_adaptive_decisions
        label: "Requires Adaptive Decision-Making"
        type: checkbox
        required: true
        section: "Agent-Fit Criteria"
        helpText: "Does the agent need to adjust its approach based on intermediate results?"
      - key: has_feedback_loop
        label: "Has Reason-Act-Observe Loop"
        type: checkbox
        required: true
        section: "Agent-Fit Criteria"
        helpText: "Does the task involve a cycle of reasoning, taking action, and observing outcomes?"
      - key: agent_fit_score
        label: "Agent-Fit Score (1-10)"
        type: select
        required: true
        section: "Agent-Fit Criteria"
