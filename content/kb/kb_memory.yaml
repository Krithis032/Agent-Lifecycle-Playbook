  agentic_rag:
    description: Agent-controlled RAG where the agent decides WHEN to retrieve, WHAT to retrieve, and HOW MANY TIMES to retrieve.
      Goes beyond traditional one-shot retrieval.
    core_concepts:
    - concept_name: Agentic RAG vs Traditional RAG
      definition: 'Traditional RAG: retrieve once statically. Agentic RAG: agent controls retrieval decisions dynamically.'
      agent_control: Agent decides search queries, evaluates results, determines if more retrieval needed
    - concept_name: Key capabilities
      definition: Agent autonomously decides when retrieval is necessary, what queries to use, and how many iterations needed
      example: 'Instead of one fixed retrieval: "Agent mentions X, needs more details -> decides to search -> gets results
        -> evaluates -> decides if another search needed"'
    - concept_name: Iterative retrieval
      definition: Agent can perform multiple retrieve-and-reason cycles, refining queries based on previous results
      workflow: Think -> Retrieve (when needed) -> Reason about results -> Decide if more info needed -> Retrieve again if
        needed
    - concept_name: Real-world example
      definition: Perplexity.ai iteratively searches the web during response generation, deciding when more information is
        needed
      comparison: Like a librarian who researches iteratively rather than grabbing one book upfront
    sources:
    - 'B05: AI Agents Learning Guide - Chapter 4'
    - 'Deep-Dive: AI Agents Learning Guide - Chapter 4 Agentic RAG'
    real_world_analogies:
    - analogy: Librarian doing iterative research
      explanation: 'Traditional RAG is like a librarian bringing one book. Agentic RAG is like the librarian researching iteratively:
        "This mentions X, let me also check Y..." The agent controls its own search process.'
      source: AI Agents Learning Guide Ch4
    definition: Retrieval-Augmented Generation specifically designed for agent workflows — where agents autonomously decide
      when to retrieve, what to query, how to filter results, and when to re-retrieve based on initial findings.
  vector_database:
    description: Storage system for embeddings (numerical representations of meaning). Enables semantic similarity search
      for RAG and memory retrieval.
    core_concepts:
    - concept_name: Vector database definition
      definition: Database designed to store and search numerical vectors (embeddings) by semantic similarity
      purpose: Enable fast retrieval of semantically related content
    - concept_name: How it works
      definition: Content is converted to embeddings; stored in database; queries converted to embeddings; similarity computed;
        most similar results returned
      process: Document -> Embedding -> Store in vector DB. Query -> Embedding -> Find similar vectors -> Return documents
    - concept_name: Common vector databases
      examples: Pinecone, Chroma, Weaviate, Milvus, FAISS
      use_in_agents: Store agent memory, documentation, knowledge bases for RAG
    - concept_name: Difference from traditional DB
      definition: Traditional DBs search by exact match or keywords. Vector DBs search by semantic meaning.
      example: Query "How do I save a file?" would match documents about persistence, storage, file I/O despite different
        exact words
    - concept_name: Vector Embeddings Fundamentals
      definition: Numerical representations of text/images in high-dimensional space where semantic similarity maps to geometric
        proximity. Generated by models like text-embedding-3, e5, or sentence-transformers. Enable semantic search beyond
        keyword matching.
      source_book: B07
    - concept_name: Similarity Search Mechanisms
      definition: 'Algorithms for finding semantically similar vectors: cosine similarity, L2 distance, inner product. Enables
        retrieval of relevant documents from large collections (millions+) efficiently using approximate nearest neighbor
        (ANN) indices (HNSW, IVF, LSH).'
      source_book: B07
    - concept_name: Retrieval-Augmented Generation (RAG) Enhancement
      definition: 'Architecture combining retrievers (vector DB queries) with generators (LLMs). Agent workflow: receive query
        → retrieve relevant documents → augment LLM context → generate response grounded in retrieved facts. Reduces hallucination
        by grounding generation.'
      source_book: B07
    - concept_name: Chunking Strategies for Vector Stores
      definition: 'Methods for breaking documents into indexable units: fixed-size chunks, semantic-aware chunking, recursive
        splitting. Impacts retrieval quality — wrong chunking loses context or creates orphaned fragments. Critical preprocessing
        step.'
      source_book: B07
    - concept_name: Anomaly Detection with Vector Databases
      definition: Using vector stores to identify outliers and anomalies. Embeddings cluster normal patterns; vectors far
        from clusters indicate anomalies (fraud, system failures, policy violations). Enables real-time monitoring and alerting.
      source_book: B07
    - concept_name: Embedding Model Selection
      definition: 'Choosing embeddings based on task: general-purpose (text-embedding-3, e5), domain-specific (medical, legal),
        multimodal (text+image). Quality impacts retrieval effectiveness. Trade-offs: accuracy vs latency vs cost.'
      source_book: B07
    - concept_name: Vector Database Architecture Types
      definition: 'Two approaches: (1) Specialized vector DBs (Pinecone, Weaviate, Milvus) optimized for vector operations.
        (2) Integrated solutions (PostgreSQL+pgvector, Elasticsearch) embedding vectors in relational/document DBs. Specialized
        = better for scale; integrated = better for hybrid queries.'
      source_book: B07
    - concept_name: Scalability and Indexing for Vector Search
      definition: 'Techniques for searching billions of vectors efficiently: approximate nearest neighbor (ANN) indices (HNSW,
        IVF, LSH), quantization (reduce vector dimensionality), sharding (distribute across nodes). Enables sub-millisecond
        latency at enterprise scale.'
      source_book: B07
    - concept_name: Knowledge Base Integration
      definition: Indexing organizational knowledge (documents, FAQs, product catalogs, policies) into vector stores. Enables
        agents to autonomously retrieve and reason over proprietary knowledge. Requires metadata tagging, access control,
        freshness management.
      source_book: B07
    - concept_name: Training Data Management via Vectors
      definition: 'Using vector similarity to curate and manage training datasets: identify duplicates, find underrepresented
        groups, detect data drift. Enables continuous dataset quality improvement.'
      source_book: B07
    - concept_name: Vector Database Selection Checklist
      definition: 'Evaluation criteria: (1) Scale (vector count, dimensions) (2) Latency requirements (3) Availability/redundancy
        needs (4) Integration with existing stack (5) Cost (6) Data privacy/compliance (7) Community/support. Comprehensive
        assessment guides selection.'
      source_book: B07
    - concept_name: Hybrid Search (Dense + Sparse)
      definition: Combining semantic search (vector similarity) with keyword search (BM25, TF-IDF). Captures both semantic
        and lexical relevance. Particularly effective for technical queries where exact terminology matters.
      source_book: B07
    - concept_name: Metadata Filtering in Vector Search
      definition: 'Tagging vectors with metadata (source, timestamp, category, access level) enabling filtered searches. Example:
        "Find documents about revenue from Q4 2024 in finance domain." Combines semantic search with structured filtering.'
      source_book: B07
    - concept_name: Real-Time Vector Index Updates
      definition: 'Challenges and solutions for keeping vector indices fresh: batch updates (daily/hourly) vs streaming updates.
        Trade-offs between consistency and performance. Critical for time-sensitive applications (news, financial data).'
      source_book: B07
    - concept_name: Cost Optimization for Vector Stores
      definition: 'Strategies to reduce costs: dimensionality reduction (quantization), tiered storage (hot/warm/cold), batch
        operations, efficient indexing. Large-scale vector stores can be expensive; optimization is essential.'
      source_book: B07
    sources:
    - 'B05: AI Agents Learning Guide - Chapter 4'
    - 'B07 Ch6: Vector embeddings, similarity search, RAG enhancement'
    - 'B07 Ch6: Chunking strategies, anomaly detection, embedding model selection'
    - 'B07 Ch6: Vector database architecture (specialized vs integrated)'
    - 'B07 Ch6: Scalability, indexing (ANN, quantization), knowledge base integration'
    - 'B07 Ch6: Training data management, selection checklist, hybrid search'
    - 'B07 Ch6: Metadata filtering, real-time updates, cost optimization'
    definition: Vector databases enable semantic search and retrieval-augmented generation (RAG) for agentic systems. Store
      embeddings of unstructured data (documents, images, code), enabling agents to retrieve contextually relevant information.
      Support similarity search, anomaly detection, and knowledge augmentation. Critical infrastructure for enterprise AI
      requiring access to large knowledge bases.
  embedding:
    description: Numerical representation of the meaning of text. Converts words/documents into vectors that capture semantic
      meaning.
    core_concepts:
    - concept_name: Embedding definition
      definition: Numerical vector that represents the semantic meaning of text. Similar meanings = nearby vectors.
      mechanism: ML models trained to encode text into vector space where distance reflects semantic similarity
    - concept_name: How embeddings work
      definition: Text is encoded to high-dimensional vectors; vectors preserve semantic relationships; similar texts have
        similar embeddings
      example: Embedding("king") - Embedding("man") + Embedding("woman") ≈ Embedding("queen")
    - concept_name: Use in RAG and memory
      definition: Documents and queries converted to embeddings; similarity computed via vector distance; enables semantic
        search
      process: Document corpus -> embed all docs -> store in vector DB. Query -> embed query -> find similar embeddings ->
        retrieve matching docs
    - concept_name: Common embedding models
      examples: OpenAI text-embedding-ada-002, Sentence-BERT, Cohere embeddings
      quality_matters: Better embedding models -> better semantic retrieval -> better RAG performance
    sources:
    - 'B05: AI Agents Learning Guide - Chapter 4'
    definition: Vector embedding techniques for representing text, code, and structured data in dense vector spaces — enabling
      semantic search, similarity matching, and efficient knowledge retrieval for agent memory systems.
  context_window_optimization:
    core_concepts:
    - concept_name: Latency Budgeting in Context Design
      definition: Allocating available latency (response time budget) across context assembly, planning, execution, and output.
        Balances context richness against response speed.
      principle: 'Operational realities: latency and stochasticity are constraints; context design must account for real-world
        timing'
      technique: Profile each phase; allocate latency budget; use context reduction to stay within budget
      source_book: B12
    - concept_name: Context Bloat Prevention
      definition: Techniques to prevent context from growing unchecked, which increases latency and costs. Summarizer agent,
        micro-context engineering, and pruning of redundant information.
      risk: Each agent pass adds context; without management, context window fills quickly and response time degrades
      solution: Proactive reduction between phases; preserve only decision-critical information
      source_book: B12
    - concept_name: Information Routing in Multi-Agent Context
      definition: Strategic decision about what information each agent needs. Not all context goes to all agents; each receives
        minimally sufficient context for its role.
      benefit: Reduces per-agent context size; improves focus; lowers costs
      mechanism: Router/Librarian decides what context to pass to each specialist based on task requirements
      source_book: B12
    sources:
    - 'B12: Context Engineering for Multi-Agent Systems (Denis Rothman, 2025)'
    definition: Strategies for maximizing the utility of limited LLM context windows including summarization, compression,
      priority-based truncation, and dynamic context assembly.
  memory_systems:
    core_concepts:
    - concept_name: Context Window as Memory
      definition: Use of the model's input context window as a temporal memory store for recent conversation history and state
      source_book: B11
      chapter: Ch 6
      examples:
      - Token-based history
      - Sliding window
      - Conversation tracking
      related_concepts: []
    - concept_name: Semantic Search for Memory Retrieval
      definition: Technique using vector embeddings and similarity search to retrieve relevant past information based on semantic
        meaning
      source_book: B11
      chapter: Ch 6
      examples:
      - Vector databases
      - Embedding-based retrieval
      - Semantic relevance
      related_concepts: []
    - concept_name: Retrieval-Augmented Generation (RAG)
      definition: Architecture combining document retrieval with generation, using relevant retrieved documents to augment
        prompt context
      source_book: B11
      chapter: Ch 6
      examples:
      - Document augmentation
      - Knowledge injection
      - Context enrichment
      related_concepts: []
    - concept_name: GraphRAG
      definition: Enhanced RAG approach using knowledge graphs to structure relationships between entities and concepts for
        richer retrieval
      source_book: B11
      chapter: Ch 6
      examples:
      - Knowledge graphs
      - Entity relationships
      - Structured retrieval
      related_concepts: []
    - concept_name: Working Memory
      definition: Short-term memory representation for active tasks, using whiteboards, note-taking, or explicit state tracking
      source_book: B11
      chapter: Ch 6
      examples:
      - Scratchpads
      - Intermediate state
      - Active problem solving
      related_concepts: []
    - concept_name: Keyword-Based Memory Indexing
      definition: Simple memory retrieval using keyword matching and sparse indexing for quick access to relevant information
      source_book: B11
      chapter: Ch 6
      examples:
      - BM25 retrieval
      - Keyword matching
      - Sparse indexes
      related_concepts: []
    - concept_name: Long-Term Agent Memory
      definition: Persistent storage of agent experiences, learned patterns, and historical decisions for cross-session learning
      source_book: B11
      chapter: Ch 6-7
      examples:
      - Experience logs
      - Decision history
      - Cross-session learning
      related_concepts: []
    - concept_name: Memory System Selection Framework
      definition: Decision framework for choosing appropriate memory approaches based on task requirements, latency, and context
        size
      source_book: B11
      chapter: Ch 6
      examples:
      - Trade-off analysis
      - Context vs latency
      - Cost vs recall
      related_concepts: []
    sources:
    - 'B16: Managing Memory for AI Agents'
    - 'B12: Context Engineering for Multi-Agent Systems'
    definition: Comprehensive architectures for agent memory combining working memory (current task state), episodic memory
      (past experiences), semantic memory (learned knowledge), and procedural memory (learned skills).
