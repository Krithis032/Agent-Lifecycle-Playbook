    real_world_analogies:
    - analogy: Desk space
      explanation: 'The context window is like your desk — it can only hold so many papers before you need to file some away.
        Everything competes for space: system prompts, conversation history, retrieved docs.'
      source: AI Agents Learning Guide Ch4
    common_misconceptions:
    - misconception: The context window IS the agent memory
      reality: The context window is only WORKING memory — temporary and limited. True memory systems include long-term storage
        that persists across sessions.
      source: Illustrated Guide Ch4 Deep Dive
    - misconception: Bigger context window equals unlimited memory
      reality: Even 1 million tokens fills up quickly with agent loops. Each tool call, observation, and reasoning step adds
        tokens. A 100-step task can easily exceed any context limit.
      source: Illustrated Guide Ch4 Deep Dive
    - misconception: The model remembers everything in context equally
      reality: Research shows LLMs struggle with information in the middle of long contexts (lost-in-the-middle phenomenon).
        Position matters.
      source: Illustrated Guide Ch4 Deep Dive
    - misconception: More context equals better memory
      reality: Bigger context windows help but are not free. They cost more, can be slower, and the model may struggle to
        find relevant info in a sea of text. Smart memory management matters more than raw size.
      source: Illustrated Guide Ch4 Deep Dive
  long_term_memory:
    definition: Persistent memory that survives beyond a single conversation or session. Implemented via external storage
      (vector databases, knowledge graphs, databases) with retrieval mechanisms. Enables agents to remember user preferences,
      past interactions, learned facts, and accumulated experience across sessions.
    core_concepts:
    - concept_name: Vector Store Memory
      explanation: Store memories as embeddings in a vector database (Pinecone, Chroma, Weaviate). Retrieve relevant memories
        via semantic similarity search. Good for fuzzy, meaning-based recall. Foundation of RAG-based memory systems.
    - concept_name: Knowledge Graph Memory
      explanation: Store memories as entities and relationships in a graph structure. Enables precise, structured queries
        and relationship traversal. Better for factual recall and reasoning about connections between concepts.
    - concept_name: Database-Backed Memory
      explanation: Traditional database storage for structured agent memory (conversation logs, user profiles, task history).
        SQL or NoSQL backends for transactional, queryable storage.
    - concept_name: Memory Indexing and Retrieval
      explanation: 'The mechanism by which stored memories are found and brought into working memory. Methods: embedding similarity
        (vector search), keyword matching, recency weighting, importance scoring, or hybrid approaches.'
    - concept_name: MemoryBank (Ebbinghaus Forgetting Curve)
      explanation: Memory management inspired by human psychology. Uses the Ebbinghaus Forgetting Curve and spaced repetition
        to determine which memories to retain, strengthen, or let fade. Frequently accessed memories are strengthened; unused
        memories gradually decay.
    - concept_name: A-MEM (Zettelkasten-Inspired Memory)
      explanation: 'Agentic memory system inspired by the Zettelkasten note-taking method. Three principles: atomicity (each
        memory is a single, self-contained unit), hypertextual (memories are interconnected via links/references), personalization
        (memory structure adapts to the agent''s specific use patterns and domain).'
    - concept_name: Memory Consolidation and Archival Tiers
      definition: 'Hierarchical storage: short-term, long-term, and archival storage tiers; Selective promotion: agents decide
        what to promote to long-term storage based on importance; Automatic cleanup: time-to-live (TTL) features prevent accumulation
        of irrelevant data; Checkpointing: periodic snapshots of agent state and learned patterns for persistence; Version
        control: rollback capability and historical analysis of agent memory evolution; REM sleep analogy: compress short-term
        memory to long-term during consolidation phases'
      source_book: B16
    - concept_name: LangGraph Long-Term Memory System
      definition: 'Namespace organization: memory stored as JSON documents with unique identifiers; Semantic facts layer:
        supports factual knowledge, user preferences, episodic examples, procedural prompts; LangMem SDK: tools for extracting
        information from conversations; Prompt optimization: maintains persistent memory across sessions; Document-centric
        approach: simplicity with namespace-based organization; Graph-based extension: Mem0g adds relationship mapping between
        entities'
      source_book: B16
    - concept_name: Mem0 (Memory-Zero) Framework
      definition: 'Key fact extraction: maintains concise entries instead of full chat histories; Graph-based relationships:
        Mem0g extension maps entity relationships for additional context; Selective updates: only relevant facts stored and
        updated from interactions; Memory reduction: reduces token usage and improves retrieval speed; Fast retrieval: optimized
        for rapid fact lookup and recall; Scalable abstraction: handles increasing memory size efficiently'
      source_book: B16
    - concept_name: Redis Semantic Caching and LangCache
      definition: 'Configurable search criteria: REST API with user-specific security features; Semantic caching layer: uses
        Redis for fast repeated query handling; In-memory performance: leverages Redis ubiquity for caching mechanisms; Private
        preview: LangCache available with broader public release planned; Repetitive query optimization: caches semantically
        similar queries; Integration with LangGraph: seamless cache integration in agent workflows'
      source_book: B16
    - concept_name: ADK MemoryService (Google Agent Development Kit)
      definition: 'BaseMemoryService interface: two primary functions for adding sessions and searching; InMemoryService option:
        RAM-based keyword search for rapid prototyping; VertexAIMemoryBankService: persistent semantic search in Google Cloud;
        Enterprise-grade reliability: clear interfaces with Vertex AI integration; Multicloud limitation: coupled to Google
        ecosystem; Flexible backends: choose between performance (RAM) or persistence (Vertex)'
      source_book: B16
    - concept_name: Vector Database Alternatives for Memory Storage
      definition: 'Pinecone: managed service excellent for scale, no infrastructure overhead; Weaviate: open-source with hybrid
        search capabilities; Qdrant: high-performance with advanced filtering; ChromaDB: lightweight and developer-friendly;
        Pgvector (PostgreSQL): leverages familiar PostgreSQL tooling; Redis: uses RedisSearch for indexing and search capabilities;
        Choice implications: impacts memory architecture and system design'
      source_book: B16
