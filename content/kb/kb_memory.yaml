memory_and_context:
  working_memory:
    definition: The agent's immediate, active memory — the context window (conversation history) that the LLM can process
      at any given moment. Working memory is limited by the model's context length, so agents must carefully manage what goes
      in. Every message, tool call result, and observation consumes working memory tokens.
    core_concepts:
    - concept_name: Context Window as Working Memory
      explanation: An agent's 'working memory' IS its context window — the conversation history it can actively process. This
        is limited (e.g., 128K tokens), so agents must carefully manage what goes in. Like a desk that can only hold so many
        papers before you need to file some away.
    - concept_name: Scratchpad Patterns
      explanation: Using designated sections of the context window as a scratchpad for intermediate reasoning, tool call results,
        and working notes. Keeps the agent's thinking organized within limited space.
    - concept_name: Conversation Buffer
      explanation: The full conversation history maintained as working memory. Each tool call adds assistant (tool_calls field)
        and tool (content with output) role messages to the buffer. This IS the agent's experience of the current task.
    - concept_name: Messages Structure for Tool Use
      explanation: 'Working memory includes structured tool interaction: assistant messages with tool_calls field (the agent''s
        intent to call a tool) and tool role messages with content field (the tool''s output). The LLM processes these to
        generate the final answer. This message history is how the agent ''remembers'' what tools it has called and what results
        it got.'
    - concept_name: CoALA Framework (B04)
      explanation: 'Cognitive Architectures for Language Agents (CoALA) — a framework that structures agent memory into: (1)
        Short-Term Memory (STM) — current conversation context, tool results, active plan state. Maps to the agent''s working
        memory / context window. (2) Long-Term Memory (LTM) — persistent storage split into episodic (past experiences), semantic
        (facts/knowledge), and procedural (learned skills/strategies). CoALA provides a cognitive science-grounded vocabulary
        for designing agent memory.'
    - concept_name: Semantic Caches (B04)
      explanation: 'Caching layer that stores and retrieves previous LLM responses based on semantic similarity of queries
        (not exact match). When a new query is semantically similar to a cached one, the cached response is returned without
        an LLM call. Reduces latency and cost. Implementation: embed queries, store in vector DB, similarity search on new
        queries with a threshold.'
    - concept_name: Temporal Decay in Memory (B04)
      explanation: Memory relevance decreases over time — recent memories are weighted more heavily than older ones. Implemented
        via decay functions (exponential or linear) applied to memory retrieval scores. Prevents stale information from dominating
        agent decisions. Similar to Ebbinghaus forgetting curve concept from MemoryBank (B09) but applied at the retrieval-scoring
        level.
    - concept_name: Context Window Management Strategies
      definition: 'FIFO pruning: earliest information deprioritized in long conversations; Intelligent pruning: removes superfluous
        information while preserving critical details; Retrieval-Augmented Generation (RAG): limits corpus of documents, forces
        LLM to return sourced info; FlashAttention: addresses quadratic scaling of transformer self-attention with context
        size; Multi-store search: cascade through semantic cache, then vector DB, then scoring/ranking; Context assembly:
        merge short-term and long-term memory respecting token limits'
      source_book: B16
    - concept_name: Semantic Caching for Repeated Queries
      definition: 'Relative context retention: semantic caching maintains context of frequently accessed information; Cost
        reduction: 20% cost reduction observed in semantic cache implementations; Single-shot vs multiturn tradeoff: semantic
        caching works best for single-shot questions, breaks in multiturn conversations; Query analysis phase: extract entities
        and generate embeddings for cache lookup; Multi-store search: check cache first before vector similarity search'
      source_book: B16
    - concept_name: Named Entity Recognition (NER) for Memory Accuracy
      definition: 'Entity extraction phase: identifies people, places, organizations, dates with confidence scores; Memory
        storage enhancement: stores entities as structured metadata alongside embeddings; Entity-centric retrieval: query
        by specific entities, filter results by entity type; Knowledge graph construction: NER-enhanced pipelines build relationship
        graphs between entities over time; Pronoun resolution: reduces ambiguity (Apple company vs apple fruit) through entity
        linking; Metadata indexing: creates entity-centric memory indexes for precise filtered retrieval'
      source_book: B16
    - concept_name: Query Analysis and Embedding Generation
      definition: 'Input processing: analyze query to extract intent and entities; Named entity recognition: identify and
        tag important nouns (people, topics, concepts); Query vector embedding: generate semantic representation for similarity
        search; Importance scoring: calculate relevance based on recency, frequency, entity match; Token limit awareness:
        maintain strict context window constraints while maximizing information density'
      source_book: B16
    - concept_name: Context Window Budget Breakdown
      definition: 'Typical 200K token budget: system prompt ~2K (1%), tool definitions ~3K (1.5%), conversation history ~50K
        (25%), retrieved documents ~40K (20%), scratch space ~5K (2.5%), response generation ~100K (50%). Approximately 100K
        tokens available for actual work content.'
      source_book: Deep-Dive Materials
      deep_dive_source: Illustrated Guide Ch4 Concept 2
    how_it_works:
    - step: 1
      description: User query enters working memory as first message
    - step: 2
      description: LLM processes full context window (all messages) to decide next action
    - step: 3
      description: Tool calls and results are appended as assistant/tool role messages
    - step: 4
      description: As context grows, older or less relevant information may need compression or eviction
    - step: 5
      description: Context engineering techniques (summarization, selection, compression) manage the limited space
    design_decisions:
      when_to_use:
      - Every agent interaction (working memory is always active)
      - Short tasks within context window limits
      when_to_avoid:
      - Long-running tasks that exceed context limits (need long-term memory)
      - Multi-session tasks requiring persistence
      trade_offs:
      - 'Context size vs cost: larger context = more tokens = higher cost per LLM call'
      - 'Completeness vs relevance: keeping everything vs selecting what matters'
      - 'Raw history vs summarized: full fidelity vs space efficiency'
