  memory_management_strategies:
    definition: Techniques and systems for managing how agents store, retrieve, update, and forget information across their
      memory systems. Includes both cognitive-inspired approaches (forgetting curves, spaced repetition) and engineering approaches
      (vector indexing, knowledge graphs, hybrid retrieval).
    core_concepts:
    - concept_name: Memory Consolidation
      explanation: ''
    - concept_name: Forgetting Strategies
      explanation: ''
    - concept_name: Memory Pruning
      explanation: ''
    - concept_name: Importance Scoring
      explanation: ''
    - concept_name: Memory Tiering
      explanation: ''
    - concept_name: Four Memory Types Taxonomy (B09)
      explanation: 'B09 identifies four memory types for agents: (1) Working Memory — current context (context window), what
        you are thinking now. (2) Episodic Memory — past experiences (your last vacation). (3) Semantic Memory — facts/knowledge
        (Paris is in France). (4) Procedural Memory — how to do things (riding a bike). Each serves a different purpose in
        agent architecture.'
    - concept_name: Parametric Memory
      explanation: Knowledge encoded in the model's weights during training. The model 'knows' things without explicit retrieval.
        Complemented by non-parametric memory (RAG, vector stores) for up-to-date or domain-specific knowledge.
    - concept_name: Search-o1 (Search in Reasoning Traces)
      explanation: Uses special tokens to trigger search within the reasoning trace of thinking LLMs. The model can pause
        its reasoning, issue a search query, receive results, and continue reasoning — all within the thinking process. Related
        to Tool-Integrated Reasoning (TIR).
    - concept_name: Full Memory Taxonomy (B03)
      explanation: 'B03 provides the complete cognitive memory taxonomy mapped to agent systems: Sensory Memory (Iconic/visual,
        Echoic/auditory, Haptic/touch) → Short-term/Working Memory (current context window) → Long-term Explicit Memory: Episodic
        (past experiences) + Semantic (facts/knowledge) → Long-term Implicit/Procedural Memory (how-to skills, learned behaviors).
        This extends the B09 4-type model with the sensory and explicit/implicit distinction.'
    - concept_name: Memory Augmentation Workflow (B03)
      explanation: 'Process for enriching agent context with stored memories: User input → Memory function (LLM extracts key
        facts as JSON statements) → Embed facts → Store in vector DB → At query time: Embed query → Vector DB search → Augmented
        prompt → LLM response. Semantic memory augmentation adds an extra step: LLM converts input into memory-type-specific
        questions for more relevant retrieval (e.g., "what facts do I know about X?").'
    - concept_name: Memory/Knowledge Compression (B03)
      explanation: 'Three-step process to prevent memory bloat: (1) Cluster memories via k-means on dimensionality-reduced
        embeddings. (2) Compress each cluster via LLM summarization (condense many memories into few). (3) Re-embed compressed
        items and store in vector DB. Maintains semantic richness while dramatically reducing storage and retrieval noise.'
    - concept_name: Conversational Memory Function (B03)
      explanation: A prompt-based approach where the LLM summarizes conversation turns into structured JSON statements that
        capture key facts, decisions, and context. These statements are embedded and stored, enabling semantic retrieval of
        past conversation content without retaining full transcripts.
    - concept_name: LangMem (B04)
      explanation: LangChain's memory management library that provides tools for agents to manage their own long-term memory.
        The agent can explicitly create, update, search, and delete memory entries. Integrates with LangGraph for stateful
        memory across conversation sessions. Supports both semantic search and structured memory operations.
    - concept_name: Mem0 (B04)
      explanation: 'Standalone memory layer for AI applications that provides persistent, user-scoped memory across sessions.
        Key features: automatic memory extraction from conversations, user-level memory isolation, hybrid storage (vector
        + graph), and a simple API (add, search, get_all). Designed as a drop-in memory solution that works across different
        LLM providers and frameworks.'
    - concept_name: LeTTA/MemGPT (B04)
      explanation: An operating-system-inspired memory management system for LLM agents. Treats the LLM's context window as
        "main memory" (RAM) and external storage as "disk." The agent explicitly manages what information is loaded into context
        vs stored externally, using memory management functions analogous to OS page-in/page-out. Enables effectively unlimited
        memory by intelligently swapping relevant information in and out of the context window. Originally called MemGPT,
        rebranded as LeTTA.
    - concept_name: Proactive Context Reduction via Summarizer Agent
      definition: Specialized agent that dynamically compresses and optimizes information passed between agents. Reduces token
        overhead while preserving semantic meaning and intent.
      purpose: Cost management (fewer tokens = lower API costs) and reasoning stability by maintaining context continuity
      mechanism: Extracts key information, removes redundancy, preserves decision-critical details
      implementation: Integrated into multi-agent workflow; runs between major execution phases
      source_book: B12
    - concept_name: Micro-Context Engineering
      definition: Fine-grained context design for minimal, focused prompts. Constructs the smallest sufficient context that
        maintains semantic correctness and task alignment.
      benefit: Reduces token costs while improving reasoning focus; prevents context bloat
      technique: Extract only essential semantic roles, decision drivers, and action requirements
      use_case: Cost optimization in at-scale multi-agent systems without sacrificing output quality
      source_book: B12
    - concept_name: Glass-Box Architecture for Transparent Context Management
      definition: Fully observable, auditable context engine where every transformation, compression, and routing decision
        is logged and traceable. Opposite of black-box approaches.
      transparency_benefit: Enables debugging, validation, and verification of AI reasoning; supports compliance and governance
      components: Execution traces, decision logs, context provenance tracking, separation of responsibilities
      source_book: B12
    - concept_name: Production-Level Context Management
      definition: Enterprise-ready context handling including dependency injection, modularization, structured logging, and
        proactive resource management.
      principles: Modularity, testability, observability, scalability; designed for real-world deployment constraints
      hardening_techniques: Centralized setup functions, parametric configuration, error recovery paths
      source_book: B12
    - concept_name: Importance Scoring for Memory Prioritization
      definition: 'Recency weighting: recent information weighted more heavily (0.3 weight); Frequency of reference: how often
        information accessed (0.2 weight); Entity relevance: importance of mentioned entities in context (0.4 weight); User
        engagement metrics: user reactions and interest levels (0.1 weight); Combined scoring: weighted combination of multiple
        factors; Dynamic adjustment: scores updated as new interactions occur'
      source_book: B16
    - concept_name: Forgetting and Memory Decay Strategies
      definition: 'Temporal decay: information becomes less relevant over time (Ebbinghaus forgetting curve); Selective forgetting:
        intentional removal of low-importance information; Summarization-based forgetting: compress old information into abstractions;
        TTL (time-to-live): automatic expiration of memory after specified duration; Accuracy loss: summarization incurs information
        loss (acknowledged trade-off); Intelligent pruning: remove detail while preserving semantic essence'
      source_book: B16
    - concept_name: Cascading Memory Systems
      definition: 'Agent autonomy in promotion: agents decide what moves to long-term storage; Hierarchical tiers: working
        memory, long-term storage, archival systems; Automatic consolidation: periodic promotion of frequently accessed short-term
        items; Cost optimization: reduces token usage by selective promotion; Efficiency gains: fast retrieval from cache,
        slower from archives; Flexibility: agents adapt memory structure to task requirements'
      source_book: B16
    - concept_name: Multi-Agent Memory Consistency and Synchronization
      definition: 'Cross-agent knowledge sharing: discoveries by one agent benefit entire system; Version control: rollback
        and historical analysis of agent memories; Synchronization protocols: ensure consistency across distributed agent
        memories; Conflict resolution: handle divergent memories from multiple agents; Shared knowledge base: central repository
        for organizational memory; Integration challenges: scaling consistency across many agents'
      source_book: B16
    - concept_name: Retrieval Precision vs Ambiguity Management
      definition: 'Cosine similarity search: fuzzy semantic matching in vector space; Euclidean distance: alternative similarity
        metric with different properties; TF-IDF: classic term frequency-inverse document frequency weighting; Multiple metrics
        trade-off: speed vs accuracy in retrieval algorithms; Disambiguation: entity-based retrieval with type filtering;
        Confidence scoring: ranks results by relevance confidence'
      source_book: B16
    - concept_name: Memory Economics and Token Cost Optimization
      definition: 'Per-token pricing: every stored and retrieved token incurs cost; Context window constraint: limited space
        for context in LLM; Marginal benefit vs marginal cost: economically optimal memory size; Scaling dynamics: costs grow
        with usage volume; Semantic caching ROI: 20% cost reduction possible with smart caching; Architecture impact: choice
        of framework affects cost structure fundamentally'
      source_book: B16
    - concept_name: Transactive Memory Systems (TMS) for Teams
      definition: 'Group-level knowledge sharing: knowing what other team members know; Collective intelligence hub: synthesis
        of strategic thinking and creative innovation; Knowledge dissemination: best practices shared from experts to novices;
        Contextual preservation: why decisions were made, alternatives considered; Productivity gains: novice workers improved
        34% with AI-captured expert knowledge; Organizational resilience: preserves knowledge beyond individual tenure'
      source_book: B16
    - concept_name: Dynamic Knowledge Graphs and Zettelkasten
      definition: 'A-MEM framework: Agentic Memory implementing Zettelkasten principles; Interconnected notes: contextual
        descriptions, keywords, and tags; Web of related information: new entries generate comprehensive notes; Relationship
        preservation: maintains connections between memory items; Progressive organization: emerges from individual memory
        entries; Scalability: supports increasing memory without degradation'
      source_book: B16
    - concept_name: Checkpointing for Persistence and Recovery
      definition: 'State snapshots: periodic save of agent internal state and learned patterns; Session restoration: context
        recoverable across sessions or long conversations; Memory portability: agent memories transferable between different
        systems; Automatic cleanup: prevents accumulation of irrelevant old data; Retrieval optimization: makes state both
        persistent and practical; Business continuity: protects against data loss and enables recovery'
      source_book: B16
    - concept_name: Hybrid Memory Architectures
      definition: 'Multi-tier storage: combines different storage technologies optimally; Semantic caching layer: fast retrieval
        for repeated queries; Vector database backend: semantic similarity search at scale; Entity metadata store: structured
        facts alongside embeddings; Retrieval pipeline: query analysis, multi-store search, scoring, assembly; Adaptive promotion:
        items promoted between tiers based on access patterns'
      source_book: B16
    - concept_name: Vector Database Indexing and Search Optimization
      definition: 'Embedding generation: convert text to vector representations; Index construction: build data structures
        for fast similarity search; Similarity metrics: cosine, Euclidean, and other distance measures; Filtering support:
        pre-filter by metadata before vector search; Hybrid search: combine vector and keyword matching; Performance tuning:
        trade-offs between index size and query speed'
      source_book: B16
    - concept_name: System 1 vs System 2 Thinking in Memory Management
      definition: 'System 1: fast, automatic judgment using cached/familiar patterns; System 2: deliberate, effortful reasoning
        requiring conscious effort; Chain-of-thought prompting: forces model into System 2 mode; Cost implications: System
        2 thinking more computationally expensive; Early exit inference: exit after System 1 if confidence sufficient; Speculative
        decoding: approximate System 2 quality with lower cost'
      source_book: B16
