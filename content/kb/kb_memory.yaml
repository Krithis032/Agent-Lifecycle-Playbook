  episodic_memory:
    definition: 'Memory of past experiences and specific interactions — the ''what happened'' memory. Stores concrete episodes:
      tasks attempted, tools used, results obtained, errors encountered. Like remembering your last vacation — specific, contextual,
      time-stamped. Essential for Reflexion (storing reflective experiences from past attempts).'
    core_concepts:
    - concept_name: Experience Replay
      explanation: Storing and replaying past interaction episodes to inform current decisions. Agent can recall similar past
        tasks and their outcomes.
    - concept_name: Trajectory Storage
      explanation: Storing complete thought-action-observation sequences from ReAct loops. Used in Reflexion for long-term
        reflective memory.
    - concept_name: Success/Failure Logs
      explanation: Categorized storage of past attempts with outcomes. Enables the agent to learn from both successes and
        failures across sessions.
    - concept_name: Episodic Memory in Distributed SQL
      explanation: 'B06 frames episodic memory (storing past events and outcomes) as a first-class data type in distributed
        SQL. Event sequences are persisted as immutable, timestamped rows with metadata (action, result, context). Agents
        query historical episodes for pattern recognition: "what happened last time I tried this?" Time-sensitive retrieval
        surfaces recent episodes while allowing aggregation across longer horizons. Enables agents to learn from experience
        systematically rather than losing context between interactions.'
    - concept_name: Episodic Memory Storage and Retrieval
      definition: 'Specific past experiences: stores particular events, conversations, and interactions; Retrieval-Augmented
        Generation: extracts relevant chunks instead of keeping full histories; Few-shot example prompting: learns from past
        sequences of events and actions; Structured logging: key events, actions, and outcomes recorded in formats; Context
        richness: maintains what happened, when, and why decisions were made; Event extraction: structured recording of events,
        actions, and outcomes'
      source_book: B16
    - concept_name: RAG Systems for Conversation History Management
      definition: 'Selective chunk extraction: keeps relevant pieces instead of full conversation history; Reduces memory
        footprint: compression through selective storage; Improves retrieval speed: smaller corpus enables faster searches;
        Query-specific relevance: retrieves only information pertinent to current question; Industry standard: common approach
        across multiple agentic frameworks; Token efficiency: careful balance between detail retention and context constraints'
      source_book: B16
    - concept_name: Temporal Knowledge Graphs (Zep)
      definition: 'Temporal dimension: tracks how information changes over time; Interaction tracking: records team interactions
        and business data evolution; Preference persistence: maintains user preferences across sessions; Knowledge dissemination:
        enables best practices sharing from top performers to novices; Organizational memory: preserves institutional knowledge
        beyond individual tenure; Dynamic update: comprehensive notes with contextual descriptions and keywords'
      source_book: B16
    - concept_name: Event Logging and Structured Formats
      definition: 'Structured event storage: keys events, actions, and outcomes in defined formats; Metadata enrichment: timestamps,
        actors, context, and results captured; Query support: enables rich filtering by date, actor, event type, outcome;
        Relationship tracking: links related events across conversations and sessions; Provenance tracking: maintains chain
        of how information was derived; Audit capability: historical record supports analysis and learning'
      source_book: B16
