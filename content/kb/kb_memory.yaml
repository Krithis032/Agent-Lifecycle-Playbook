    - misconception: Agents remember everything automatically
      reality: Most agents today are stateless by default. Memory requires explicit engineering — deciding what to store,
        how to index it, when to retrieve it, and when to forget.
      source: Illustrated Guide Ch4 Deep Dive
    - misconception: Memory and knowledge are the same thing
      reality: Knowledge (semantic memory) is facts. Memory also includes experiences (episodic), skills (procedural), and
        active thought (working). An agent needs all four.
      source: Illustrated Guide Ch4 Deep Dive
  semantic_memory:
    definition: Memory of facts, knowledge, and general information — the 'what I know' memory. Stores learned facts, domain
      knowledge, user preferences, and world knowledge. Like knowing that Paris is the capital of France — factual, context-independent.
      Typically implemented via RAG with vector databases or knowledge graphs.
    core_concepts:
    - concept_name: Knowledge Bases
      explanation: ''
    - concept_name: Fact Storage and Retrieval
      explanation: ''
    - concept_name: Ontologies for Agents
      explanation: ''
    - concept_name: Semantic Memory Architectures
      definition: 'Structured factual knowledge: facts, definitions, rules maintained separately from experiences; Knowledge
        base approaches: symbolic AI or vector embeddings for semantic storage; User/entity profiles: extraction and insertion
        into system prompts for future reference; Entity-based organization: facts organized around key entities (people,
        organizations, concepts); Influence on responses: system prompts updated with retrieved semantic facts; Domain abstraction:
        enables reasoning about relationships and properties'
      source_book: B16
    - concept_name: Knowledge Graph and Entity-Based Retrieval
      definition: 'Entity extraction: NER identifies all named entities (people, places, organizations); Relationship mapping:
        knowledge graphs connect entities with typed relationships; Entity-centric queries: retrieve all facts related to
        specific entities; Type filtering: queries filtered by entity type (PERSON, ORGANIZATION, LOCATION, etc.); Disambiguation
        support: knowledge graphs resolve homonyms (Apple company vs fruit); Contextual relationships: tracks how entities
        interact and relate over time'
      source_book: B16
    - concept_name: Vector Embeddings vs Symbolic Storage
      definition: 'Vector representation: semantic meaning captured in continuous space; Similarity metrics: cosine similarity,
        Euclidean distance for relevance ranking; Trade-offs: fuzzy matching vs exact match semantics; Hybrid approaches:
        combine symbolic metadata with vector embeddings; Dense retrieval: vector search provides approximate rather than
        guaranteed matches; Context sensitivity: embeddings capture nuanced meaning variations'
      source_book: B16
    - concept_name: Procedural Memory Integration
      definition: 'Learned behaviors: skills and rules extracted from successful patterns; System prompt updates: agents update
        their own prompts through reflection; Metaprompting: agents generate instructions for future similar tasks; Hybrid
        storage: combines LLM weights, agent code, and system prompts; Consolidation mechanism: reflects on experiences to
        update procedures; REM cycle analogy: compresses procedural knowledge during consolidation phases'
      source_book: B16
