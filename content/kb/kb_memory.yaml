  context_passing:
    definition: Techniques for propagating relevant context between agent steps, across tool calls, and between agents — including
      state objects, message history, and structured context windows.
    core_concepts:
    - concept_name: Shared State
      explanation: ''
    - concept_name: Context Serialization
      explanation: ''
    - concept_name: Handoff Protocols
      explanation: ''
    - concept_name: Context Summarization for Handoff
      explanation: ''
    - concept_name: Context Librarian Agent Pattern
      definition: Specialized agent responsible for retrieving and assembling contextual blueprints from a context library.
        Serves procedural/instructional context to other agents. Part of dual RAG architecture separating factual retrieval
        from procedural instruction.
      role_in_mas: Dynamically retrieves semantic blueprints and style-based context to guide subsequent agents
      integration: Communicates via MCP with Researcher and Writer agents, passing structured context blueprints
      source_book: B12
    - concept_name: Dual RAG Architecture for Multi-Agent Context
      definition: 'Separates two types of context: procedural RAG (context library for how to do things) and factual RAG (knowledge
        base for what is true). Enables agents to reason and write using both knowledge and style-based context.'
      architectural_benefit: Procedural context drives reasoning discipline and output structure; factual context ensures
        accuracy. They can be updated independently.
      agent_workflow: Context Librarian handles procedural; Researcher handles factual; Writer synthesizes both
      source_book: B12
    - concept_name: Structured Context Validation in Multi-Agent Workflows
      definition: Validating MCP messages and context structures before passing between agents. Ensures data type consistency,
        required field presence, and semantic correctness.
      purpose: Prevents context corruption, ensures error recovery and factual accuracy in multi-agent systems
      implementation: Agent specialization controls, validation loops, message format contracts
      source_book: B12
    - concept_name: Context Continuity in Multi-Agent Pipelines
      definition: Maintaining semantic coherence and state information as context moves between specialized agents. Each agent
        receives sufficient context history to understand prior decisions and constraints.
      challenge: Token overhead increases as context expands; must balance completeness with efficiency
      solution: Proactive context reduction (Summarizer agent) and temporal decay mechanisms
      source_book: B12
