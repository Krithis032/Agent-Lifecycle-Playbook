  context_engineering:
    definition: 'The discipline of optimizing what goes into an agent''s context window to maximize performance within limited
      token budgets. Involves four key operations: tracking (what information exists), selection (what''s relevant now), compression
      (summarizing to save space), and ordering (arranging for optimal attention). Critical for long-running agents where
      context accumulates rapidly.'
    core_concepts:
    - concept_name: Context Optimization Pipeline
      explanation: 'Four operations: (1) Tracking — monitor all available information. (2) Selection — choose what is relevant
        for the current task. (3) Compression — summarize/condense to save tokens. (4) Ordering — arrange information for
        optimal LLM attention (important info first/last, not buried in the middle due to lost-in-the-middle effect).'
    - concept_name: MMR (Maximal Marginal Relevance)
      explanation: Retrieval technique that balances relevance to the query with diversity of results. Prevents redundant
        context by penalizing retrieved items that are too similar to each other.
    - concept_name: Context Rot
      explanation: Degradation of agent performance as context grows with irrelevant or outdated information. Long conversations
        accumulate noise that reduces the signal-to-noise ratio in the context window.
    - concept_name: Lost-in-the-Middle Effect
      explanation: LLMs pay more attention to information at the beginning and end of the context, with reduced attention
        to the middle. Context engineering must account for this by placing critical information at the boundaries.
    - concept_name: NIAH/RULER Benchmarks
      explanation: Needle-in-a-Haystack (NIAH) and RULER benchmarks test how well models retrieve specific information from
        within large context windows. Used to evaluate context engineering effectiveness.
    - concept_name: Five Levels of Context Complexity
      definition: 'Progressive framework for engineering context from zero context (basic prompt) through semantic blueprints
        (fully architected context). Level 1: basic prompt (zero context) produces generic outputs. Level 2: linear context
        adds factual accuracy. Level 3: goal-oriented context aligns responses with explicit goals. Level 4: role-based context
        assigns explicit roles and conflict. Level 5: semantic blueprint provides precise, unambiguous plans using semantic
        roles for engineering-grade control.'
      key_insight: Each level transforms output from random guesses into structured, goal-driven responses. Semantic blueprints
        convert creativity into reliable, repeatable engineering processes.
      source_book: B12
    - concept_name: Semantic Blueprint Architecture
      definition: Precise, structured format for context that specifies scene goals, participants with roles, descriptions,
        actions to complete, agents, and patients. Uses semantic role labeling (SRL) to encode who does what to whom, when,
        and why in JSON or structured format.
      key_insight: Semantic blueprints eliminate ambiguity by converting creative tasks into closed environments where the
        LLM executes a defined plan. This is engineering, not guessing.
      implementation: JSON structure with scene_goal, participants (name, role, description), action_to_complete (predicate,
        agent, patient)
      source_book: B12
    - concept_name: Semantic Role Labeling (SRL) for Context Design
      definition: Linguistic technique that reveals who (agent) did what (predicate/action) to whom (patient), when, and why.
        Used to transform linear text sequences into multidimensional semantic structures suitable for LLM context.
      key_insight: SRL bridges the gap between natural language and machine-readable semantic structures, enabling precise
        context encoding.
      application: Meeting transcripts, narrative construction, multi-step workflows, semantic parsing
      source_book: B12
    - concept_name: Context Chaining
      definition: Multi-step workflow technique where context flows between sequential operations, each building on previous
        outputs. Each step receives structured context about what was accomplished, why, and what to do next.
      key_insight: Enables complex reasoning workflows where each stage refines and builds upon prior context without losing
        information or intent.
      use_case: Meeting analysis (scope -> investigation -> action), decision workflows, multi-phase analysis
      source_book: B12
    - concept_name: Context Engineering as Agent Skill
      definition: As agent loops get longer, managing context becomes critical. Context engineering involves summarizing,
        compressing, and prioritizing information to maximize limited context space. Like taking meeting notes — you capture
        key decisions, not everything said.
      source_book: Deep-Dive Materials
      deep_dive_source: AI Agents Learning Guide Ch4
