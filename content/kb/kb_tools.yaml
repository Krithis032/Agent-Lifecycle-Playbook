  tool_learning_methods:
    description: 'Three distinct approaches for LLMs to learn how and when to use tools: in-context learning, supervised fine-tuning,
      and reinforcement learning.'
    core_concepts:
    - concept_name: In-context learning
      definition: LLM learns to use tools through examples in the prompt. No model training required.
      mechanism: Provide example tool calls in prompt context; LLM learns pattern and generalizes
      advantages: Fast, flexible, no retraining needed
      limitations: Context window bounded; examples take up space
    - concept_name: Supervised fine-tuning
      definition: Train model on dataset of (prompt, tool-call-sequence) pairs. Model learns tool-use patterns from data.
      mechanism: Create training dataset of correct tool calls for various tasks; fine-tune model on this data
      advantages: Scalable, model internalizes patterns, improves base capabilities
      limitations: Requires training data; expensive to create; static once trained
    - concept_name: Reinforcement learning
      definition: Train model through trial-and-error with reward signals. Model learns which tool sequences achieve goals.
      mechanism: Agent tries tool calls; receives reward for success; updates model to prefer rewarded actions
      advantages: Can discover novel tool combinations; learns goal-directed behavior; adapts dynamically
      limitations: Complex to implement; requires reward function design; slow training
    - concept_name: 'Analogy: Learning an app'
      definition: In-context = watching a tutorial. Supervised = taking a course. Reinforcement = experimenting and learning
        from results.
      learning_curve: In-context is fastest but limited. Supervised is medium. Reinforcement can achieve deepest understanding.
    - concept_name: Tool-Integrated Reasoning (TIR)
      definition: Modern reasoning LLMs can call tools DURING their thinking process, not just at the end. This allows gathering
        information as part of the reasoning chain. Like reaching for a calculator mid-thought rather than computing everything
        in your head first.
      source_book: Deep-Dive Materials
      deep_dive_source: AI Agents Learning Guide Ch5
    sources:
    - 'B05: AI Agents Learning Guide - Chapter 5'
    - 'Deep-Dive: Chapter 5 Deep Dive - Three Methods of Tool Learning'
    - 'Deep-Dive: AI Agents Learning Guide Ch5'
    real_world_analogies:
    - analogy: Learning an app
      explanation: 'Three methods: watching a tutorial (in-context learning with examples), taking a course (supervised fine-tuning
        on datasets), or just experimenting (reinforcement learning with trial and error)'
      source: AI Agents Learning Guide Ch5
    definition: Approaches for agents to learn how to use new tools — including tool documentation parsing, few-shot tool
      examples, tool creation from natural language, and self-supervised tool practice.
