tools_and_integration:
  tool_calling:
    definition: 'The mechanism by which agents invoke external functions, APIs, and services. The LLM generates a STRING representing
      its intention to call a tool (not actual execution) — an external system (orchestrator) parses and executes it. Follows
      a 5-step pipeline: Tool Creation → Tool Definition → Tool Selection → Tool Calling → Output Processing.'
    core_concepts:
    - concept_name: Five-Step Tool Calling Pipeline
      explanation: '(1) Tool Creation: developer builds the function/API. (2) Tool Definition: describe the tool via JSON
        Schema (name, description, parameters). (3) Tool Selection: LLM reasons about which tool to use. (4) Tool Calling:
        LLM generates structured output to invoke the tool (a string, not execution). (5) Output Processing: results fed back
        to LLM for final response.'
    - concept_name: JSON Schema Tool Definitions
      explanation: 'Tools are described to LLMs using JSON schemas with type/function/name/description/parameters objects.
        Passed via the `tools` API parameter or embedded in the system prompt within XML tags. Two methods to share: Learning
        (fine-tuned into the model) or Prompting (structured prompts at inference). Quality of definitions directly impacts
        agent performance.'
    - concept_name: Tool Selection Logic
      explanation: Reasoning LLMs "think" about which tool to use within their thinking traces. For agents with many tools,
        use RAG with a vector database to discover relevant tool schemas rather than passing all schemas in the prompt. Reduces
        cognitive load on the LLM.
    - concept_name: Tool Result Processing
      explanation: 'After tool execution, results return via the messages structure: assistant message (with tool_calls field
        containing function name and arguments) followed by tool message (with content containing the output). The LLM processes
        these to generate the final answer or decide the next action.'
    - concept_name: Parallel Tool Calls
      explanation: Agent can call multiple independent tools simultaneously (e.g., get weather + get calendar + get news).
        Sequential tool calls are used when each result informs the next (search web → extract info → write summary → send
        email).
    - concept_name: Tool Types Taxonomy
      explanation: 'Five categories: (1) Information Retrieval — web search, database queries, knowledge bases. (2) Code Execution
        — Python interpreter, sandboxed environments. (3) API Integration — REST/GraphQL calls to external services. (4) Data
        Processing — file manipulation, format conversion. (5) Communication — email, messaging, notifications.'
    - concept_name: Tool Anatomy — Three Components (B04)
      explanation: 'B04 defines every agent tool as having 3 components: (1) Name — unique identifier the LLM uses to select
        the tool. (2) Description — natural language explanation of what the tool does, crucial for LLM tool selection (acts
        as the tool''s "documentation" for the LLM). (3) Core Logic — the actual implementation code that executes when the
        tool is called. The quality of the description directly impacts the LLM''s ability to select and use the tool correctly.'
    - concept_name: Hardcoded vs Semantic Functions (B04)
      explanation: 'Two categories of agent functions: (1) Hardcoded functions — deterministic code with fixed logic (API
        calls, database queries, calculations). Always produce the same output for the same input. (2) Semantic functions
        — LLM-powered functions defined by prompt templates. Output varies based on LLM reasoning. Semantic Kernel (Microsoft)
        pioneered this distinction. Best practice: use hardcoded for reliability-critical operations, semantic for creative/reasoning
        tasks.'
    - concept_name: API Type Taxonomy (B04)
      explanation: 'B04 classifies 4 types of APIs agents commonly interact with: (1) RESTful APIs — resource-oriented, HTTP
        methods (GET/POST/PUT/DELETE), most common. (2) GraphQL APIs — query language allowing clients to request exactly
        the data they need, reduces over-fetching. (3) WebSocket APIs — bidirectional real-time communication, used for streaming
        and live updates. (4) Backend Function APIs — direct function calls within the same codebase, lowest latency, used
        for internal tool implementations.'
    - concept_name: Sync vs Async Tool Calls (B04)
      explanation: 'Two execution modes for agent tool invocations: (1) Synchronous — agent waits for tool result before proceeding,
        simpler but blocks execution. (2) Asynchronous — agent fires tool call and continues other work, results arrive later.
        Async is critical for: parallel tool execution, long-running operations (web scraping, complex queries), and multi-agent
        coordination where agents shouldn''t block on each other''s tool calls.'
    - concept_name: Local Tool
      definition: Self-contained tools that execute computations or logic internally without external dependencies, such as
        mathematical calculations or rule-based decisions
      source_book: B11
      chapter: Ch 4
      examples:
      - Rule-based decision making
      - Mathematical calculations
      - Local data retrieval
      related_concepts: []
    - concept_name: API-Based Tool
      definition: Tools enabling agents to interact with external services and data sources through standard API protocols
      source_book: B11
      chapter: Ch 4
      examples:
      - Weather data fetching
      - Stock price lookups
      - Third-party service integration
      related_concepts: []
    - concept_name: Model Context Protocol (MCP) Tool
      definition: Standardized protocol for passing structured external context directly into the model's reasoning process
        without separate tool invocations
      source_book: B11
      chapter: Ch 4-5
      examples:
      - User profile injection
      - Conversation history
      - Real-time state awareness
      related_concepts: []
    - concept_name: Tool Modularity
      definition: Design principle ensuring each tool is self-contained and can be independently updated or replaced without
        system-wide changes
      source_book: B11
      chapter: Ch 4
      examples:
      - Plugin architecture
      - Incremental enhancement
      - Tool substitution
      related_concepts: []
    - concept_name: Generative Tool Selection
      definition: Method where the agent uses language model generation to determine which tools to use based on task context
      source_book: B11
      chapter: Ch 5
      examples:
      - LLM-based decision making
      - Context-aware tool selection
      - Emergent tool discovery
      related_concepts: []
    - concept_name: Semantic Tool Selection
      definition: Selection method using semantic similarity between task description and tool specifications to match appropriate
        tools
      source_book: B11
      chapter: Ch 5
      examples:
      - Embedding-based matching
      - Description similarity
      - Semantic retrieval
      related_concepts: []
    - concept_name: Hierarchical Tool Selection
      definition: Multi-level tool organization where agents navigate a hierarchy to find appropriate tools for specific subtasks
      source_book: B11
      chapter: Ch 5
      examples:
      - Tool taxonomy
      - Category-based selection
      - Two-stage retrieval
      related_concepts: []
    - concept_name: Machine-Learned Tool Selection
      definition: Learned models that predict appropriate tool selection based on historical usage patterns and task features
      source_book: B11
      chapter: Ch 5
      examples:
      - Policy networks
      - Reward-based learning
      - Behavior cloning
      related_concepts: []
    - concept_name: Tool Chain Topology
      definition: Sequential arrangement of tools where output from one tool feeds into the next in a linear chain
      source_book: B11
      chapter: Ch 5
      examples:
      - Pipeline execution
      - Sequential processing
      - Step-by-step workflows
      related_concepts: []
    - concept_name: Tool Tree Topology
      definition: Hierarchical tree structure where tools branch based on decision points and conditional logic
      source_book: B11
      chapter: Ch 5
      examples:
      - Decision trees
      - Branching logic
      - Conditional execution
      related_concepts: []
    - concept_name: Tool Graph Topology
      definition: Complex interconnected graph structure where tools can have multiple dependencies and feedback loops
      source_book: B11
      chapter: Ch 5
      examples:
      - DAG execution
      - Complex workflows
      - Feedback loops
      related_concepts: []
    - concept_name: Incremental Execution Planning
      definition: Strategy for planning tool use by incrementally determining next steps based on current state
      source_book: B11
      chapter: Ch 5
      examples:
      - Reactive planning
      - Step-by-step refinement
      - Adaptive execution
      related_concepts: []
    - concept_name: Zero-Shot Tool Planning
      definition: Planning strategy where the agent determines tool use without prior examples or demonstrations
      source_book: B11
      chapter: Ch 5
      examples:
      - Prompt-based planning
      - Direct execution
      - First-attempt success
      related_concepts: []
    - concept_name: Few-Shot Tool Planning
      definition: Planning approach using a small number of examples to guide tool selection and orchestration
      source_book: B11
      chapter: Ch 5
      examples:
      - Example-based guidance
      - In-context learning
      - Demonstration learning
      related_concepts: []
    - concept_name: ReAct (Reasoning and Acting) Planning
      definition: Framework combining reasoning (thought chains) with tool actions in an interleaved manner
      source_book: B11
      chapter: Ch 5
      examples:
      - Thought-action loops
      - Explicit reasoning
      - Interleaved execution
      related_concepts: []
    - concept_name: Tool Integration and Modularity
      principle: Each tool designed as self-contained module; can be easily integrated, updated, replaced
      benefit: Enables iterative enhancement without overhauling core system (e.g., start with basic FAQs, add dispute resolution
        later)
      agent_types: Local tools (internal logic/computation), API-based tools (external services), MCP tools (structured context
        injection)
    - concept_name: Tool Use Best Practices
      definition: 'Five best practices: (1) Write clear descriptions — LLM relies on them to choose correctly, (2) Use JSON
        Schema for strict parameter validation, (3) Implement error handling — tools can fail, agents must recover, (4) Limit
        tool count to reduce cognitive load for the LLM, (5) Validate outputs before using tool results'
      source_book: Deep-Dive Materials
      deep_dive_source: Ch5 Tool Use Infographic
    how_it_works:
    - step: 1
      description: User sends message to LLM with tool schemas available
    - step: 2
      description: LLM analyzes query and decides tool is needed
    - step: 3
      description: LLM generates structured tool call (JSON with function name + arguments)
    - step: 4
      description: External application/orchestrator parses and executes the function call
    - step: 5
      description: Result returned to LLM as tool role message
    - step: 6
      description: LLM continues reasoning — generates final answer or calls another tool
    design_decisions:
      when_to_use:
      - Agent needs to interact with external systems (APIs, databases, web)
      - Tasks requiring real-time data not in training data
      - Tasks requiring computation (math, code execution)
      - Multi-step workflows involving multiple external services
      when_to_avoid:
      - Simple factual Q&A within model knowledge
      - Tasks where tool overhead exceeds direct LLM response value
      - When tool reliability/availability cannot be guaranteed
      trade_offs:
      - More tools = more capable but harder for LLM to select correctly
      - Quality of tool definitions directly impacts success rate
      - Each tool call = additional latency + potential failure point
      - 'Tool scope: narrow tools are easier to use correctly, broad tools are more flexible'
    implementation:
      reference_architecture: JSON Schema definition → tools API parameter → LLM generates tool_calls → regex/parser extracts
        function call from XML tags (<tool_call>) → orchestrator executes → result as tool role message → LLM processes
      pseudocode: "tools = [{'type': 'function', 'function': {'name': 'search', 'description': '...', 'parameters': {'type':\
        \ 'object', 'properties': {...}}}}]\nresponse = llm.chat(messages=messages, tools=tools)\nif response.tool_calls:\n\
        \    for call in response.tool_calls:\n        result = execute(call.function.name, call.function.arguments)\n   \
        \     messages.append({'role': 'tool', 'content': result})\n    final = llm.chat(messages=messages, tools=tools)"
      code_scaffold: ''
      libraries_and_tools:
      - OpenAI API (function calling)
      - Anthropic API (tool use)
      - LangChain (tool abstraction)
      - LangGraph (tool nodes in graph)
      configuration: 'Best practices: document extensively with descriptions/examples, minimize number of tools, minimize
        scope of each tool, implement error handling, validate outputs before using'
    real_world_applications: []
    relationships:
      depends_on:
      - architecture_and_patterns.structured_output_and_parsing
      enables:
      - architecture_and_patterns.react_pattern
      compare_with: []
