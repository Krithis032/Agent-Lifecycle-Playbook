      source: AI Agents Learning Guide Ch5
  mcp_protocol:
    definition: 'Model Context Protocol — an open standard developed by Anthropic that standardizes how LLMs connect to external
      tools and data sources. Solves the N×M integration problem: instead of N LLMs × M tools requiring N×M custom integrations,
      each LLM implements MCP once and each tool implements MCP once, requiring only N+M connections. Called the ''USB-C port
      of AI.'' Uses JSON-RPC 2.0 specification for communication.'
    core_concepts:
    - concept_name: MCP Architecture (4 Components)
      explanation: '(1) MCP Server: lightweight program that exposes APIs and tools via the MCP standard (e.g., a GitHub MCP
        server connects to GitHub''s API). (2) MCP Host: the LLM application that uses tools (ChatGPT, Claude, Cursor) — the
        "brain" that initiates communication. (3) MCP Client: lives inside the Host, maintains one-to-one connections with
        MCP servers, handles connection management and tool discovery. (4) Resources: the actual tools, data, or services
        provided locally or remotely.'
    - concept_name: MCP 12-Step Flow
      explanation: (1) User sends prompt to Host. (2) Host asks Client to list available tools. (3) Client queries MCP Server.
        (4) Server returns available tools (e.g., /list_commits, /create_pr). (5) Host sends prompt + tools to LLM. (6) LLM
        selects tool (e.g., /list_commits). (7) Client forwards request to Server. (8) Server executes the API call. (9) Results
        return through Server to Client to Host. (10) Host sends results to LLM. (11) LLM generates final summary. (12) Response
        displayed to user.
    - concept_name: MCP vs A2A (Agent-to-Agent)
      explanation: MCP standardizes how LLMs connect to tools (agent ↔ tool). Google's Agent-to-Agent (A2A) protocol standardizes
        how agents communicate with each other (agent ↔ agent). MCP is about agents using tools; A2A is about agents collaborating.
        Both are important emerging standards in the AI ecosystem.
    - concept_name: N×M to N+M Problem
      explanation: 'Before MCP: N different LLMs and M different tools required N×M custom integrations. With MCP: each LLM
        implements MCP once, each tool implements MCP once = N+M connections total. This is why MCP is transformative — it
        turns tool integration from a quadratic to a linear problem.'
    - concept_name: JSON-RPC 2.0
      explanation: MCP uses JSON-RPC 2.0 specification for client-server communication. Standardized message format for requests,
        responses, and notifications.
    - concept_name: MCP Server Capability Types (B04)
      explanation: 'MCP servers expose 3 types of capabilities, each with specific schemas: (1) Tools — executable functions
        with schema: {name, description, inputSchema (JSON Schema)}. (2) Resources — data/content the agent can read, schema:
        {uri, name, description, mimeType}. (3) Prompts — reusable prompt templates, schema: {name, description, arguments[]}.
        This 3-type model gives agents structured access to actions, data, and pre-built reasoning templates.'
    - concept_name: FastMCP (B04)
      explanation: A Python utility/SDK for rapidly creating MCP servers. Simplifies the boilerplate of implementing the MCP
        specification. Developers define tools as decorated Python functions, and FastMCP handles JSON-RPC communication,
        capability discovery, and schema generation automatically.
    - concept_name: MCP Authentication (B04)
      explanation: 'MCP supports multiple authentication mechanisms: (1) OAuth 2.0 — standard web authorization flow for third-party
        tool access. (2) Token-based authentication — API keys or bearer tokens. (3) RBAC (Role-Based Access Control) — granular
        permissions determining which tools/resources each client can access. Authentication is critical for production MCP
        deployments where tools access sensitive data or perform privileged operations.'
    - concept_name: MCP Error Codes (B04)
      explanation: 'MCP uses JSON-RPC 2.0 error codes: 32700 (Parse Error — malformed JSON), 32600 (Invalid Request — missing
        required fields), 32601 (Method Not Found — unknown tool/resource), 32602 (Invalid Params — wrong parameter types/values),
        32603 (Internal Error — server-side failure). Custom application errors use codes above 32000. Proper error handling
        enables graceful degradation in agent tool use.'
    - concept_name: MCP Fault Tolerance (B04)
      explanation: 'Production MCP deployments implement fault tolerance through: (1) Intelligent Fallback — when a primary
        MCP server fails, route to backup servers or alternative tools. (2) Error Thresholds — track failure rates per server,
        trigger fallback after threshold exceeded. (3) Automated Model/Server Switching — dynamically switch to backup LLM
        providers or MCP servers based on availability and error rates. Ensures agent reliability despite individual component
        failures.'
    - concept_name: MCP Actor Model
      definition: 'Five actors in MCP flow: User (initiates and receives), Host (AI app like Claude Desktop, orchestrates),
        Client (maintains 1:1 connection with server), MCP Server (exposes tools and resources, executes calls), LLM (selects
        tools and generates responses)'
      source_book: Deep-Dive Materials
      deep_dive_source: MCP 12-Step Flow v2 Infographic
    - concept_name: MCP Transport Layer
      definition: 'MCP supports two transport mechanisms: stdio (standard input/output for local servers) and HTTP SSE (Server-Sent
        Events for remote servers). Both enable the Client-Server communication channel.'
      source_book: Deep-Dive Materials
      deep_dive_source: Chapter 5 Concept Map
    how_it_works:
    - step: 1
      description: MCP Server starts up and registers its available tools/resources
    - step: 2
      description: MCP Host (LLM app) initializes Client which connects to Server(s)
    - step: 3
      description: Client discovers available tools via Server handshake
    - step: 4
      description: User sends query to Host, which forwards tools list + query to LLM
    - step: 5
      description: LLM selects and invokes tool(s) via structured output
    - step: 6
      description: Client routes tool call to appropriate Server for execution
    - step: 7
      description: Server executes, returns results through Client to Host to LLM
    - step: 8
      description: LLM processes results and generates final response
    design_decisions:
      when_to_use:
      - Building tool integrations that should work across multiple LLM platforms
      - Organizations with many tools that multiple AI applications need to access
      - When standardization reduces maintenance burden (N+M vs N×M)
      - When tools need to be shared across teams and applications
      when_to_avoid:
      - Single LLM + single tool integrations where MCP overhead is unnecessary
      - Extremely latency-sensitive applications where the extra abstraction layer matters
      - When tools require custom authentication flows not well-supported by MCP
      trade_offs:
      - 'Standardization vs flexibility: MCP constrains how tools are exposed'
      - 'Abstraction overhead vs integration simplicity: extra layer but easier to maintain'
      - 'Ecosystem dependency: relies on MCP adoption by both tool and LLM providers'
