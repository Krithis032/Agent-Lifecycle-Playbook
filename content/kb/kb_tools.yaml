  rag_for_agents:
    definition: Retrieval-Augmented Generation adapted for agentic workflows. Traditional RAG retrieves once before generation;
      Agentic RAG lets the agent control when, what, and how many times to retrieve, making retrieval part of the agent's
      reasoning loop rather than a fixed preprocessing step.
    core_concepts:
    - concept_name: Embedding and Retrieval Pipeline
      explanation: ''
    - concept_name: Chunking Strategies
      explanation: ''
    - concept_name: Reranking
      explanation: ''
    - concept_name: Hybrid Search
      explanation: ''
    - concept_name: Agentic RAG
      explanation: ''
    - concept_name: Self-RAG
      explanation: ''
    - concept_name: Traditional RAG Pipeline
      explanation: 'Fixed pipeline: Embed documents → Store in vector database → Retrieve relevant chunks → Augment prompt
        → Generate response. Single retrieval step before generation. Like a librarian who grabs one book before answering
        your question.'
    - concept_name: RAG for Tool Discovery
      explanation: When an agent has access to many tools, use RAG with a vector database to discover relevant tool schemas
        based on the current query. Embed tool descriptions, retrieve the most relevant tools for the current task. Avoids
        overwhelming the LLM with all tool schemas at once.
    - concept_name: LangChain RAG Pipeline (B03)
      explanation: 'Six-stage RAG pipeline: Source → Load → Transform (split/chunk) → Embed → Store (vector DB) → Retrieve.
        Document splitting options: RecursiveCharacterTextSplitter (character-based, simpler) vs CharacterTextSplitter.from_tiktoken_encoder
        (token-based, better for LLM context management). Vector store: ChromaDB via Chroma.from_documents(documents, OpenAIEmbeddings()).
        Token-based splitting is preferred as it aligns chunk sizes with actual LLM token consumption.'
    - concept_name: Unified Semantic-Transactional Retrieval
      explanation: B06 advances beyond traditional RAG by enabling vector similarity search AND relational filters to coexist
        in a single query on distributed SQL. Agents can retrieve semantically similar documents while enforcing transactional
        constraints (e.g., "only from active customers"). Hybrid approach improves precision and ensures retrieval results
        are operationally valid, not just semantically interesting.
    - concept_name: Retrieval Latency Guarantees
      explanation: 'B06 emphasizes that retrieval infrastructure (not application code) must guarantee millisecond-level response
        bounds. Requires: (1) fast indexes + in-memory access, (2) tail latency mitigation (speculation, isolation), (3) cold
        path optimization (prefetching), (4) cross-node optimization (locality, coplacement), (5) non-blocking index updates.
        Enables real-time agentic decision-making without application-level caching or ad hoc optimizations.'
    - concept_name: Governance in Retrieval Infrastructure
      explanation: 'Access control and compliance cannot be application middleware — they must be embedded in the retrieval
        layer itself. B06 advocates: (1) standardized metadata (source, timestamp, principal, provenance) on every request,
        (2) role-based access control (RBAC) enforced at the database boundary, (3) immutable audit logs. Prevents policy
        divergence across services and ensures consistent governance at scale.'
    - concept_name: Accuracy via Continuous Feedback Loops
      explanation: B06 argues that retrieval relevance must be measured and improved continuously at the system level. Instrumentation
        captures metrics (precision, recall, MRR, NDCG). Feedback loops convert signals (user corrections, relevance judgments,
        model disagreements when LLM revises/declines context) into corrective adjustments (reranker tuning, embedding updates,
        ranking weight refinement). Results in "living indexing" — adaptive retrieval that learns from mistakes.
    - concept_name: Vector Search Integration with Distributed SQL
      explanation: 'Modern distributed SQL platforms integrate vector search either natively or via extensions, enabling agents
        to issue unified queries: filter by vector similarity AND apply relational predicates AND aggregate analytical measures
        — all in one distributed transaction. Approximate nearest-neighbor indexes combined with time-based eviction keep
        latency and memory predictable. Vectors version alongside schemas, supporting schema evolution and data branching
        for agent experimentation.'
    - concept_name: Citation-Backed Reasoning with Source Metadata
      definition: High-fidelity RAG that attaches source metadata (document ID, page, timestamp, confidence) to every fact.
        Enables citation-backed responses and verifiability.
      trust_benefit: Users can verify claims by checking sources; supports regulatory compliance and academic rigor
      implementation: Each fact retrieved includes provenance; Writer references sources in output
      source_book: B12
    - concept_name: Defense Layer Against Data Poisoning
      definition: Multi-stage approach to prevent malicious or incorrect data from entering the knowledge base and corrupting
        reasoning. Includes ingestion validation, source verification, and anomaly detection.
      stages: Source vetting, ingestion validation, semantic consistency checks, output validation against known-good facts
      source_book: B12
    - concept_name: Input Sanitization for Prompt Injection Defense
      definition: Preprocessing user input to detect and neutralize prompt injection attempts before context assembly. Removes
        or flags suspicious patterns.
      technique: Pattern matching, entropy analysis, semantic consistency checks, safe parsing
      goal: Prevent adversarial input from hijacking agent behavior or leaking context
      source_book: B12
    - concept_name: NASA-Inspired Research Assistant Pattern
