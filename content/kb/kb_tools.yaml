  tool_learning_and_creation:
    definition: 'How LLMs learn to use tools effectively through three progressively sophisticated methods: in-context learning
      (few-shot prompting), supervised fine-tuning (Toolformer), and reinforcement learning (ToolRL, Search-R1). Also includes
      HuggingGPT as an example of in-context tool orchestration, and Tool-Integrated Reasoning (TIR) where tools are called
      during the thinking process itself.'
    core_concepts:
    - concept_name: In-Context Learning for Tools
      explanation: 'Simplest approach: provide examples of correct tool usage directly in the prompt (few-shot). The LLM learns
        the pattern and applies it to new queries. Uses fake message history showing prior tool calls and outputs. Simple
        but consumes context window space.'
    - concept_name: HuggingGPT (In-Context Tool Orchestration)
      explanation: 'LLM orchestrator that uses HuggingFace AI models as tools, using only prompting and in-context learning.
        Four-step pipeline: (1) Task Planning — specification-based instruction + demonstration-based parsing to decompose
        query into tasks. (2) Model Selection — Top-K models by downloads from HuggingFace Hub. (3) Task Execution — parallel
        execution when possible via dependency tracking between tasks. (4) Response Generation — LLM synthesizes all results.
        Demonstrates how far you can go without any training.'
    - concept_name: Toolformer (SFT for Tool Use)
      explanation: 'Embeds tool calls directly into the generated text using special tokens: [ (start tool call), → (execute),
        ] (end + output). Tool output becomes part of the generated text itself, not separate messages. Trained via SFT on
        auto-generated dataset: few-shot prompt → sample outputs → filter by correctness/loss. Effective but sensitive to
        exact wording and prompt format.'
    - concept_name: ToolRL (RL for Tool-Integrated Reasoning)
      explanation: 'Uses GRPO with two reward types: (1) Correctness reward (0.7-1.0) — did it call the right tool with right
        parameters? (2) Format reward (binary 0/1) — did it use proper <think>/<tool_call>/<answer> tokens? Trained on 4,000
        TIR samples on Qwen2.5 models. Key finding: longer reasoning traces don''t consistently improve tool use. RL produces
        more generalizable tool-use behavior than SFT.'
    - concept_name: Search-R1 (RL for Search-Integrated Reasoning)
      explanation: 'RL framework for integrating search into reasoning traces. Special tokens: <think>/<search>/<information>/<answer>.
        Uses PPO/GRPO with accuracy-only outcome reward (no format reward needed for Qwen-2.5). Key innovation: Loss Masking
        for Retrieved Tokens — masks search engine output tokens from loss calculation during training, so the model does
        not try to control what search returns. Open-source DeepResearch alternative.'
    - concept_name: Tool-Integrated Reasoning (TIR)
      explanation: Traditional tool use happens BETWEEN reasoning steps (think → call tool → think again). TIR embeds tool
        calls DURING the thinking process itself. The model can reach for a calculator mid-thought while solving a math problem
        — tool calls as natural parts of the reasoning trace. Particularly powerful for reasoning LLMs with extended thinking.
        Represents the convergence of reasoning and tool use.
    - concept_name: Three Methods Comparison
      explanation: 'In-Context Learning: simple, uses context space, like watching a tutorial. Supervised Fine-Tuning (Toolformer):
        effective but sensitive to wording, like taking a course. Reinforcement Learning (ToolRL/Search-R1): most generalizable
        but complex to set up, like learning by experimenting and getting feedback.'
    - concept_name: Benefits of TIR
      definition: Information gathering becomes part of reasoning chain; enables iterative problem solving; reduces speculation
      example: Like reaching for a calculator mid-thought rather than computing everything in your head first
    - concept_name: Integration with reasoning LLMs
      definition: TIR works especially well with o1/DeepSeek-R1 where tool calls can happen during extended thinking phase
      synergy: Reasoning models can decide when to call tools as part of problem-solving process
    how_it_works:
    - step: 1
      description: 'Tool Creation: developer builds function with docstring, stored in dictionary for string-based lookup'
    - step: 2
      description: 'Tool Definition: describe via JSON Schema (name, description, parameters) — through Learning (fine-tuning)
        or Prompting'
    - step: 3
      description: 'Tool Selection: LLM reasons in thinking traces; for many tools, RAG discovers relevant schemas'
    - step: 4
      description: 'Tool Calling: LLM outputs a string (intent to call), regex extracts JSON from XML tags, external system
        executes'
    - step: 5
      description: 'Output Processing: tool result fed back via messages structure, LLM processes to generate final answer'
