architecture_and_patterns:
  react_pattern:
    definition: 'ReAct (Reasoning + Acting) interleaves thought traces with tool-grounded actions in an alternating loop.
      Mathematically: context c_t evolves as c_{t+1} = (c_t, â_t) where â_t is sampled from an augmented action space  = A
      ∪ L (physical actions A plus language/thought actions L). The policy π(a_t|c_t) maps context to actions. In LangGraph,
      implemented as a conditional-edge state machine: agent_node → should_continue → (tool_node → agent_node | END).'
    core_concepts:
    - concept_name: Thought-Action-Observation Loop
      explanation: 'Each iteration: Thought (LLM reasons about what to do) → Action (tool call) → Observation (tool result
        appended to context). The thought trace is visible in messages, enabling debugging and auditability. Loop continues
        until halting condition met.'
    - concept_name: Grounding Reasoning in Actions
      explanation: Unlike pure CoT which only reasons, ReAct grounds reasoning in real tool outputs. This reduces hallucination
        because each reasoning step is validated by actual data. The interleaving prevents the model from 'reasoning in a
        vacuum.'
    - concept_name: Halting Condition
      explanation: 'Agent must decide when to stop. Common patterns: (1) no tool_calls in last response, (2) explicit ''FINAL
        ANSWER'' token, (3) max iteration count reached. In LangGraph: should_continue checks last_message.tool_calls — if
        empty, route to END.'
    - concept_name: Mathematical Formulation
      explanation: 'c_t = (o_1, a_1, ..., o_{t-1}, a_{t-1}, o_t) — full interaction history. Â = A ∪ L where A = tool/API
        actions, L = language/thought actions. Policy π(a_t|c_t) conditions on full context. Context grows: c_{t+1} = (c_t,
        â_t, o_{t+1}).'
    - concept_name: ReAct Component Roles (B09)
      explanation: 'Thought: reasoning step about current situation (what the agent is thinking). Action: executing a tool
        call (search, calculator, etc). Observation: result returned from the environment after the action. The agent cycles
        Thought→Action→Observation until reaching a predefined goal or deciding to stop. This is what transforms a static
        LLM into an autonomous agent.'
    - concept_name: Three Ways to Build ReAct Agents
      explanation: '(1) Prompting: few-shot examples of thought-action-observation cycles in the prompt. Easy to set up but
        uses many tokens and depends on prompt quality. (2) Fine-Tuning (FireAct): train a smaller LLM on ReAct trajectories
        generated by GPT-4. No few-shot needed at inference, more efficient. Uses LoRA for parameter-efficient training. (3)
        Reinforcement Learning (ETO): SFT for base behavior, then iterative exploration + DPO on success/failure trajectory
        pairs. Agent learns from its own experience, not just imitation.'
    - concept_name: 'FireAct: SFT for ReAct'
      explanation: 'Two-step method: (1) Generate diverse trajectories using GPT-4 with CoT, ReAct, and Reflexion prompts,
        keep only correct trajectories, convert all to ReAct format. (2) Fine-tune smaller model (Llama 2) using full fine-tuning
        or LoRA. Result: smaller model with ReAct behavior baked in, no few-shot examples needed at inference. LoRA is particularly
        effective for this.'
    - concept_name: 'ETO: Exploration-Based Trajectory Optimization'
      explanation: 'RL approach that goes beyond imitation learning. Step 1 (Behavior Cloning): SFT on successful ReAct trajectories
        to create base agent (Llama-2-7B Chat on ALFWorld). Step 2 (Iterative Explore + Train): agent explores environment
        generating both successful and failed trajectories, paired up for DPO (contrastive learning) to prefer successful
        paths. Key insight: agent learns from its own trial-and-error, not just mimicking expert behavior. Authors call SFT
        "behavior cloning" / "imitation learning".'
    how_it_works:
    - step: 1
      description: User query enters as initial message in AgentState
    - step: 2
      description: 'call_model node: LLM processes state, returns response with potential tool_calls'
    - step: 3
      description: 'should_continue edge: checks if response contains tool_calls'
    - step: 4
      description: 'If tool_calls present: route to tool_node, execute tools, append results to state, loop to step 2'
    - step: 5
      description: 'If no tool_calls: route to END, return final response'
    design_decisions:
      when_to_use: []
      when_to_avoid: []
      trade_offs: []
    implementation:
      reference_architecture: 'LangGraph StateGraph: START → agent → conditional(should_continue) → tools → agent (loop) |
        END'
      pseudocode: "while True:\n  response = llm.invoke(state.messages)\n  if response.tool_calls:\n    results = [execute(tc)\
        \ for tc in response.tool_calls]\n    state.messages.extend(results)\n  else:\n    return response.content"
      code_scaffold: "class AgentState(TypedDict):\n    messages: Annotated[Sequence[BaseMessage], add_messages]\n\ndef call_model(state:\
        \ AgentState):\n    response = model.invoke(state['messages'])\n    return {'messages': [response]}\n\ndef should_continue(state:\
        \ AgentState) -> Literal['tools', 'end']:\n    last_message = state['messages'][-1]\n    if not last_message.tool_calls:\n\
        \        return 'end'\n    return 'tools'\n\nworkflow = StateGraph(AgentState)\nworkflow.add_node('agent', call_model)\n\
        workflow.add_node('tools', ToolNode(tools=[...]))\nworkflow.add_edge(START, 'agent')\nworkflow.add_conditional_edges('agent',\
        \ should_continue, {'tools': 'tools', 'end': END})\nworkflow.add_edge('tools', 'agent')"
      libraries_and_tools:
      - langgraph
      - langchain-core
      - langchain-openai
      configuration: 'Requires: model with tool_calling support, ToolNode with registered tools'
    real_world_applications: []
    relationships:
      depends_on:
      - foundations.cognitive_architectures
      enables:
      - tools_and_integration.tool_calling
      compare_with:
      - architecture_and_patterns.plan_and_execute
      - architecture_and_patterns.reflexion
    sources:
    - 'B02 Ch2: ReAct mathematical formulation (Â = A ∪ L, policy π, context evolution), LangGraph implementation'
    - 'B02 Ch1: FSM mapping of ReAct to LangGraph conditional edges'
    - 'B09 Ch6: ReAct Thought→Action→Observation loop, stopping mechanisms, three building methods'
    - 'B09 Ch6: FireAct — SFT for ReAct using GPT-4 generated trajectories, LoRA fine-tuning'
    - 'B09 Ch6: ETO — exploration-based trajectory optimization, SFT then iterative DPO on trajectory pairs'
    - 'B18: Deep dive ReAct component table, FireAct 2-step process, ETO behavior cloning + explore'
    - 'Deep-Dive: AI Agents Learning Guide - Chapter 6'
    - 'Deep-Dive: Chapter 6 Deep Dive'
    real_world_analogies:
    - analogy: Detective investigating a case
      explanation: 'Thought: "Key evidence might be in filing cabinet" → Action: Opens cabinet → Observation: "I see financial
        records..." → Thought: "These show irregular payments" → continues iterating'
      source: AI Agents Learning Guide Ch6
  chain_of_thought:
    definition: Chain of Thought (CoT) is structured step-by-step reasoning that serves as control flow for agents — not merely
      a prompting trick. The chain of thought IS the agent's reasoning trace that determines what actions to take. Different
      CoT prompt patterns optimize for different task types.
    core_concepts:
    - concept_name: CoT as Agent Control Flow
      explanation: In agentic systems, CoT isn't just 'think step by step' — it structures the agent's entire decision-making
        process. The reasoning chain determines tool selection, action ordering, and termination decisions. It's the 'program'
        the agent executes.
    - concept_name: Scenario-Specific CoT Prompts
      explanation: Step-by-step for math/logic. Pro/con analysis for decisions. Checklist for QA/validation. Explain-then-answer
        for complex analysis. Summarize-then-decide for long documents. The prompt pattern should match the task's cognitive
        demands.
    - concept_name: Tree of Thoughts (ToT)
      explanation: 'Extension of CoT with branching search. Multiple solution paths are explored in parallel. Smaller model
        proposes options (breadth), stronger model evaluates/selects (depth). LangGraph implementation: propose_options →
        reflect_and_select → research_with_tools → draft. Enables systematic exploration of solution space.'
    - concept_name: Self-Consistency
      explanation: Sample multiple CoT paths, then take majority vote on the final answer. Reduces variance and improves reliability
        on reasoning-heavy tasks.
    - concept_name: Tree-of-Thoughts (ToT)
      explanation: Instead of linear CoT, ToT explores multiple possible reasoning paths simultaneously (like a tree with
        branches). Uses Beam Search or Monte Carlo Tree Search with reward models to evaluate and select the best path. Best
        for complex multi-path problems where a single reasoning chain may go astray.
    - concept_name: Least-to-Most (LtM) Prompting
      explanation: 'Two-stage process that explicitly separates decomposition from solving: (1) Problem Reduction: break the
        original problem into a set of manageable subtasks. (2) Sequentially Solve: solve each subtask one by one, feeding
        the previous answer into the next subtask''s prompt. Key difference from CoT: in LtM, each subtask''s solution is
        explicitly fed back into the LLM''s prompt when solving the next. Best for multi-step problems with dependencies.'
    - concept_name: Plan-and-Solve Prompting
      explanation: 'Zero-shot extension of CoT. Instead of "think step-by-step," ask the LLM to "first devise a plan, then
        solve step-by-step." Two stages: (1) Prompting for Reasoning Generation (devise plan + solve), (2) Answer Extraction.
        No few-shot examples needed. Best for zero-shot planning tasks.'
    how_it_works: []
    design_decisions:
      when_to_use: []
      when_to_avoid: []
      trade_offs: []
    implementation:
      reference_architecture: 'For ToT: LangGraph with 4 nodes — propose (small LLM) → reflect (judge LLM) → research (tools)
        → draft (writer). propose_options generates multiple candidates, reflect_and_select picks the best with reasoning.'
      pseudocode: "# CoT agent with tool use\nfor step in range(max_steps):\n  thought = llm('Think about: ' + context)\n\
        \  action = llm('Based on thought, what tool to use?')\n  result = execute_tool(action)\n  context += thought + action\
        \ + result"
      code_scaffold: "# Tree of Thought in LangGraph (from B02 Ch2)\nfrom langchain_openai import ChatOpenAI\n\nsmall_llm\
        \ = ChatOpenAI(model='gpt-4o-mini')  # proposer\njudge_llm = ChatOpenAI(model='gpt-4o')        # evaluator\n\ndef\
        \ propose_options(state):\n    # Small model generates multiple approach candidates\n    options = small_llm.invoke('Generate\
        \ 3 approaches for: ' + state['task'])\n    return {'options': options}\n\ndef reflect_and_select(state):\n    # Strong\
        \ model evaluates and selects best approach\n    selected = judge_llm.invoke('Evaluate these approaches and pick best:\
        \ ' + state['options'])\n    return {'selected_approach': selected}\n\n# Wire: START → propose → reflect → research\
        \ → draft → END"
      libraries_and_tools:
      - langgraph
      - langchain-openai
      configuration: 'ToT requires at least 2 models: smaller for breadth (proposing), larger for depth (evaluating)'
    real_world_applications: []
    relationships:
      depends_on:
      - foundations.llm_as_agent_backbone
      enables:
      - architecture_and_patterns.react_pattern
      compare_with: []
    sources:
    - 'B02 Ch2: CoT as control flow, scenario-specific prompts, ToT with branching search'
    - 'B02 Ch3: Test-time compute scaling, MCTS as advanced ToT'
    - 'B09 Ch6: Self-Consistency (multiple CoT paths + majority vote), ToT (branching search)'
    - 'B09 Ch6: Least-to-Most (decompose then sequential solve), Plan-and-Solve (zero-shot planning)'
    - 'B18: Technique comparison table — CoT/Self-Consistency/ToT/LtM/Plan-and-Solve with best-for'
    - 'Deep-Dive: AI Agents Learning Guide - Chapter 6'
    real_world_analogies:
    - analogy: Planning a vacation
      explanation: 'CoT naturally produces task decomposition: first dates, then destination, then flights, then hotels. The
        model reasoning trace becomes the plan.'
      source: AI Agents Learning Guide Ch6
  plan_and_execute:
    definition: Separates the planning phase (decomposing a goal into ordered subtasks) from the execution phase (carrying
      out each subtask). Enables upfront strategic planning with dynamic re-planning when execution encounters unexpected
      results. Maps naturally to supervisor-worker architectures.
    core_concepts:
    - concept_name: Upfront Planning
      explanation: ''
    - concept_name: Plan Decomposition
      explanation: ''
    - concept_name: Dynamic Re-Planning
      explanation: ''
    - concept_name: Hierarchical Task Networks
      explanation: ''
    - concept_name: Task Decomposition (B09)
      explanation: Breaking complex queries into smaller, manageable subtasks with possible sub-tasks. Tasks may describe
        which tools to use. Foundation of all planning in AI agents. CoT can serve as a task decomposition technique (zero-shot
        "think step-by-step" or few-shot examples).
    - concept_name: Action Sequencing
      explanation: Agents determine the right sequence of actions to transition from current state to a goal state, continuously
        updating the plan based on intermediate results. Unlike static decomposition, action sequencing is dynamic — the agent
        adapts its plan after each observation. ReAct is the primary implementation of action sequencing.
    - concept_name: Planning Without vs With Feedback (B03)
      explanation: 'B03 categorizes planning into two types: WITHOUT feedback — (a) basic planning, (b) automatic reasoning
        + tool use, (c) sequential planning. WITH feedback — (a) environmental feedback (from tool results), (b) human feedback
        (HITL), (c) LLM feedback (self-evaluation or second-model judge), (d) adaptive constructive feedback (iteratively
        refining the plan based on accumulated feedback).'
    - concept_name: Sequential Planner Architecture (B03)
      explanation: 'A planner that generates a JSON plan of ordered subtasks from a goal, then executes locally. Process:
        Goal + planning prompt (with [AVAILABLE FUNCTIONS] and [GOAL] sections) → LLM generates JSON plan with subtasks array
        → Plan executor runs each subtask locally (API calls, code) → Results assembled → sent to LLM with chat history for
        summarization → Final output to user. Key design: plan built in isolation (no context history) to save tokens; execution
        done locally, not by LLM.'
    - concept_name: Iterative vs Sequential Execution (B03)
      explanation: 'Iterative execution is the default LLM behavior — the model executes one tool/action, returns results
        to user, and waits for "continue." Sequential (planned) execution is standard in GPT Assistants and Claude — all tasks
        performed internally by the agent without user intervention. The key difference: sequential planning aggregates results
        internally and handles dependent action chains autonomously.'
    - concept_name: Tool Minimization Principle (B03)
      explanation: 'Provide only the actions an agent needs to complete its goal. Fewer tools is better because: (1) More
        actions confuse agents into deciding which to use. (2) APIs have limits on tool count. (3) Agents may use tools in
        unintended ways. (4) Safety/security risk increases with more capabilities. Rogue agent behavior (downloading files,
        deleting data, infinite tool loops) is a real risk.'
    - concept_name: Application Matrix for Agentic Components (B03)
      explanation: 'B03 Ch11 provides a comprehensive matrix (Tables 11.1-11.4) mapping 4 agentic components (Planning, Reasoning,
        Evaluation, Feedback) across 6 application types: Personal Assistant, Customer Service Bot, Autonomous Agent, Collaborative
        Workflows, Game AI, Research. Each cell specifies: where implemented, environment, purpose, timing, and configuration.
        Key insights: (1) Customer service bots need minimal planning/reasoning. (2) Autonomous agents need all 4 components
        at maximum. (3) Evaluation is almost always external. (4) Feedback is hardest to implement but has long-term payoff.
        (5) As LLMs evolve, components currently external will be integrated into models (Strawberry/o1 already does this
        for reasoning+planning).'
    how_it_works:
    - step: 1
      description: 'GOAL INTAKE: User submits a natural language goal to the agent.'
    - step: 2
      description: 'PLAN GENERATION: Planning prompt (template with [SPECIAL FUNCTIONS], [AVAILABLE FUNCTIONS], [GOAL], few-shot
        examples) sent to LLM with NO history/context (saves tokens). LLM returns JSON plan with ordered subtasks.'
    - step: 3
      description: 'PLAN EXECUTION: Local executor parses JSON, runs each subtask sequentially — calling APIs, executing code,
        querying databases. Results stored in context dict, passed to subsequent steps.'
    - step: 4
      description: 'SUMMARIZATION: Assembled execution context + original goal sent to LLM with chat history for final summarization
        and response to user.'
    - step: 5
      description: 'FEEDBACK (optional): If results incorrect, feedback can be generated by providing correct answer and asking
        model to self-critique, producing reusable guidance for future prompts.'
    design_decisions:
      when_to_use: []
      when_to_avoid: []
      trade_offs: []
    implementation:
      reference_architecture: ''
      pseudocode: ''
      code_scaffold: ''
      libraries_and_tools: []
      configuration: ''
    real_world_applications: []
    relationships:
      depends_on:
      - foundations.cognitive_architectures
      enables:
      - multi_agent_systems.orchestrator_worker
      compare_with:
      - architecture_and_patterns.react_pattern
    sources:
    - 'B02 Ch2: Plan-and-execute as distinct from ReAct, supervisor-mediated execution'
    - 'B09 Ch6: Task decomposition as foundation of planning, CoT as decomposition technique'
    - 'B09 Ch6: Action sequencing — dynamic plan adaptation, current-state-to-goal-state transitions'
    - 'B03 Ch1: Planning without feedback (basic, automatic, sequential) vs with feedback (environmental, human, LLM, adaptive)'
    - 'B03 Ch11: Sequential planner architecture — JSON plan, local execution, isolation from context'
    - 'B03 Ch11: Iterative vs sequential execution — default LLM vs planned agent behavior'
    - 'B03 Ch11: Tool minimization principle — fewer tools = better agent performance'
    - 'B03 Ch11: Application matrices (Tables 11.1-11.4) — Planning/Reasoning/Evaluation/Feedback across 6 app types'
  reflexion:
    definition: 'Advanced reasoning and learning patterns that enable agents to improve through experience. Includes: RL for
      agents (GRPO, GSPO, ART), test-time compute scaling (MCTS, AB-MCTS), and self-evaluation (RULER). These patterns transform
      agents from static instruction-followers to systems that learn, search, and refine their own behavior.'
    core_concepts:
    - concept_name: RL for Agent Training (GRPO/GSPO)
      explanation: 'Group Relative Policy Optimization: samples G rollouts per prompt, normalizes rewards within the group
        (no critic model needed), applies token-level policy updates. GSPO extends to sequence-level with length normalization.
        KL divergence = ''learning on a leash'' — prevents policy from drifting too far from reference model.'
    - concept_name: ART (Agent Reinforcement Training)
      explanation: 'Complete framework for RL-training tool-using agents. Pipeline: (1) art.TrainableModel wraps the model,
        (2) rollout function runs create_react_agent episodes, (3) deterministic + RULER judges score trajectories, (4) hybrid
        reward combines both, (5) model.train(hybrid_groups) updates policy. iterate_dataset + art.gather_trajectory_groups
        handles batching across dataset.'
    - concept_name: MCTS for Agent Reasoning
      explanation: 'Monte Carlo Tree Search applied to LLM reasoning. Phases: Selection (UCT formula to pick node), Expansion
        (generate new reasoning branch), Evaluation/Simulation (LLM judge scores), Backpropagation (update ancestor scores).
        UCT = Q/N + c*sqrt(ln(N_parent)/N) balances exploitation vs exploration.'
    - concept_name: AB-MCTS (Adaptive Branching)
      explanation: 'Extension of MCTS with two node types: GEN (generate new answer) and CONT (refine existing). Thompson
        sampling decides whether to branch or refine. Two variants: AB-MCTS-M (model-based prior) and AB-MCTS-A (fully adaptive).
        TreeQuest library: tq.ABMCTSA(), algo.step(search_tree, {''LLM-Refine'': generate}).'
    - concept_name: Test-Time Compute Scaling
      explanation: 'Scaling thinking time at inference rather than model size at training. Methods: reasoning models with
        thinking budgets, MCTS search over solution space, self-consistency (multiple samples + voting). Spending more compute
        during inference can match or exceed the benefit of larger models.'
    - concept_name: rLLM Framework
      explanation: Framework for post-training agentic workflows via RL. Workflow base class defines agentic programs, integrates
        with GRPO/GSPO training loops. Enables training agents on custom environments and reward signals.
    - concept_name: Self-Refine (NOT Agentic)
      explanation: 'Prompting framework where a single LLM acts as its own editor: generate initial output → self-critique
        (feedback) → refine → repeat until stopping criterion. KEY DISTINCTION: Self-Refine is NOT an agentic system — it
        has no tools, no environment interaction, and no memory. It is purely an LLM improving its own text output through
        self-critique. However, the self-feedback idea is a building block for the more sophisticated Reflexion framework.'
    - concept_name: Reflexion Framework (3-LLM Architecture)
      explanation: 'Takes self-feedback and applies it to full agentic systems using three specialized LLMs: (1) Actor LLM:
        a ReAct agent that executes actions and interacts with the environment (the "brain"). (2) Evaluator LLM: scores the
        Actor''s trajectory and output ("How well did the Actor do?"), produces scalar reward. (3) Self-Reflection LLM: receives
        trajectory + Evaluator score, generates nuanced verbal feedback about what went wrong and how to improve. Two memory
        types: short-term (current trajectory) and long-term (accumulated reflective experiences from past attempts). Continues
        until Evaluator deems correct.'
    - concept_name: Self-Refine vs Reflexion Comparison
      explanation: 'Self-Refine: 1 LLM, no environment, no memory, self-critique only, improves text output. Reflexion: 3
        specialized LLMs, full environment interaction, short-term + long-term memory, Evaluator + Self-Reflection + Environment
        feedback, improves agentic behavior. Reflexion is what happens when you add agentic capabilities to the self-feedback
        concept.'
    - concept_name: CRITIC Pattern
      explanation: Agent generates initial output, then revises it through external tool use (e.g., search engines to verify
        facts). Unlike Self-Refine which uses only self-critique, CRITIC grounds revision in external evidence.
    - concept_name: TTRL (Test-Time Reinforcement Learning)
      explanation: 'Updates model parameters at inference time using RL without labeled data. Four steps: (1) Sample: generate
        16 candidate outputs at high temperature for diversity. (2) Vote: select most common answer via majority voting. (3)
        Reward: assign reward of 1 to outputs matching majority vote, 0 otherwise. (4) Train: use GRPO to update model. "Lucky
        Hits" concept: even when majority is wrong, the few correct answers among mostly wrong ones still get positive reward
        (relative to the negative overall signal), guiding the model to explore different strategies.'
    - concept_name: R-Zero (Self-Evolving via Challenger-Solver Co-Evolution)
      explanation: 'Two models initialized from the same base (Qwen3/Llama-3.1) co-evolve: Challenger generates increasingly
        difficult queries, Solver solves them. Challenger rewards: Uncertainty (fraction matching most common answer) minus
        Repetition Penalty (diversity) plus Format reward (proper question tags). Composite = max(0, uncertainty - repetition).
        Solver reward: simple binary 0/1 for correctness. Asymmetric rewards allow Challenger to explore difficulty space
        while Solver maintains precision. Both trained with GRPO.'
    - concept_name: Training Paradigm Evolution
      explanation: 'Three eras: (1) Non-reasoning LLMs: Pre-training → SFT → RL, requires labeled data. (2) Reasoning LLMs:
        add test-time compute at inference (thinking longer). (3) Test-time Training LLMs: add RL at inference with unlabeled
        data (TTRL, R-Zero). Each era adds a new dimension of learning capability.'
    - concept_name: Automated Design of Agentic Systems (ADAS)
      definition: Framework for automating agent development; agents design, evaluate, and iteratively improve themselves
      approach: 'Meta-Agent Search (MAS): meta-agent writes code to create new agents, tests against tasks, refines via feedback
        loops'
      mechanism: Foundation models as meta-agent base; agents generate code for new agents; evaluation on validation data;
        archiving high performers
      innovation: Agents designed through ADAS tend to exhibit cross-domain transferability (generalize beyond training domain)
    - concept_name: Meta-Agent Search (MAS)
      cycle:
      - 'Generate: Meta-agent creates agent design description'
      - 'Implement: Write agent code (forward function)'
      - 'Reflect: Apply Reflexion for refinement (self-criticism)'
      - 'Evaluate: Test on validation data; compute fitness score'
      - 'Archive: Store successful agents with performance metrics'
      - 'Iterate: 25-30 generations balancing exploration (novel designs) vs exploitation (proven patterns)'
      key_insight: Evaluation function easier than generation; simple scoring loop powerful without learning
      cross_domain_transfer: MAS-designed agents maintain high performance when applied to new domains/models
    - concept_name: Self-Refine Pattern
      definition: Agent generates an answer, then asks "what is wrong?" and produces a better version. Iterative self-improvement
        without external feedback — the agent is both writer and critic.
      source_book: Deep-Dive Materials
      deep_dive_source: AI Agents Learning Guide Ch6
    how_it_works: []
    design_decisions:
      when_to_use: []
      when_to_avoid: []
      trade_offs: []
    implementation:
      reference_architecture: 'ART pipeline: TrainableModel → rollout_fn → judge_fn → gather_groups → train'
      pseudocode: "# ART training loop\nmodel = art.TrainableModel(name='model', backend=LocalBackend(...))\nfor batch in\
        \ iterate_dataset(dataset):\n    groups = art.gather_trajectory_groups(batch, rollout_fn, G=num_rollouts)\n    hybrid\
        \ = [_combine(g, alpha=0.5, beta=0.5) for g in groups]\n    model.train(hybrid)"
      code_scaffold: "import art\nfrom art import TrainableModel, LocalBackend, Trajectory, TrajectoryGroup\n\n# Model setup\n\
        model = art.TrainableModel(\n    name='agent_model',\n    backend=LocalBackend(model_name='Qwen/Qwen3-32B', device='cuda')\n\
        )\n\n# Rollout function\ndef rollout_fn(prompt, model):\n    agent = create_react_agent(model.as_langchain(), tools=tools)\n\
        \    result = agent.invoke({'messages': [HumanMessage(content=prompt)]})\n    return art.Trajectory(steps=result['messages'],\
        \ prompt=prompt)\n\n# Judges\ndef deterministic_judge(trajectory):\n    return 1.0 if verify_answer(trajectory) else\
        \ 0.0\n\ndef ruler_judge(group):\n    return ruler_score_group(group, model_id='gpt-4o')\n\n# Hybrid reward\ndef _combine(groups,\
        \ alpha=0.5, beta=0.5):\n    det_scores = [deterministic_judge(t) for t in groups]\n    ruler_scores = ruler_judge(groups)\n\
        \    return [alpha * d + beta * r for d, r in zip(det_scores, ruler_scores)]\n\n# Training loop\nfor batch in iterate_dataset(dataset):\n\
        \    groups = art.gather_trajectory_groups(batch, rollout_fn, G=8)\n    hybrid_groups = [_combine(g) for g in groups]\n\
        \    model.train(hybrid_groups)\n\n# MCTS with TreeQuest\nimport treequestas tq\nalgo = tq.ABMCTSA()\nsearch_tree\
        \ = tq.SearchTree(root_prompt=problem)\nfor _ in range(num_iterations):\n    algo.step(search_tree, {'LLM-Refine':\
        \ generate_fn})"
      libraries_and_tools:
      - art (Agent Reinforcement Training)
      - treequestas tq (AB-MCTS implementation)
      - rLLM (RL framework for agentic workflows)
      - langgraph (for rollout agents)
      configuration: 'ART: G=8 rollouts per prompt, alpha/beta for hybrid reward weighting. MCTS: exploration constant c in
