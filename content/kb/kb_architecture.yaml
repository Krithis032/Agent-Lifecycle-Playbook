  prompt_engineering_for_agents:
    definition: Strategic design of prompts as a managed enterprise capability for agentic AI systems. Prompt engineering
      encompasses tiered frameworks (1-10), role-based personas, ethical guardrails, performance measurement, and governance
      structures. In enterprises, PE transitions from ad-hoc experimentation to systematic, auditable practices with measurable
      business impact on accuracy, efficiency, and scalability.
    core_concepts:
    - concept_name: System Prompt Design
      explanation: ''
    - concept_name: Role Definition
      explanation: ''
    - concept_name: Behavioral Constraints
      explanation: ''
    - concept_name: Output Formatting
      explanation: ''
    - concept_name: Few-Shot Examples for Agents
      explanation: ''
    - concept_name: Defensive Prompting
      explanation: ''
    - concept_name: Grounding (B03)
      explanation: How well a response aligns with a rubric's specific criteria and standards. Grounding is the baseline expectation
        of a prompt/profile output — the measurable anchor that determines whether output meets quality standards. Essential
        for evaluation systems.
    - concept_name: LLM-as-Judge Pattern (B03)
      explanation: 'Using a second LLM prompt to automatically evaluate the first LLM''s output against a rubric. Best practice:
        use a different model for grounding/evaluation than for generation. Same model is OK when comparing profiles against
        each other (relative evaluation). Implementation: evaluation prompt (e.g., Jinja2 template) that scores output on
        rubric criteria.'
    - concept_name: Prompt Variations (B03)
      explanation: 'Six axes for systematically varying prompts during evaluation: (1) Jinja2 prompt template (structure/wording),
        (2) LLM model, (3) Temperature, (4) Max tokens, (5) Advanced parameters (top_p, presence_penalty, frequency_penalty,
        logit_bias), (6) Function calls (tool availability). Varying along these axes reveals which factors most impact output
        quality.'
    - concept_name: Planning Prompt Template Structure (B03)
      explanation: 'Structured prompt for plan generation with sections: [SPECIAL FUNCTIONS] (e.g., for-each iterator), [AVAILABLE
        FUNCTIONS] (auto-populated from agent actions with descriptions and args), [GOAL] (user goal injection), [OUTPUT]
        (where LLM places the JSON plan). Includes few-shot examples (3+) showing goal-to-plan transformations. Template uses
        variable injection ({{$available_functions}}, {{$goal}}) similar to Jinja2/Handlebars/Mustache.'
    - concept_name: Semantic Blueprint Prompt Assembly
      definition: Method for constructing prompts from structured semantic blueprints rather than natural language. Assembles
        JSON/structured context specifying scene goals, participants, roles, and actions.
      advantage: Eliminates ambiguity, enables repeatable engineering processes, reduces hallucinations from vague instructions
      structure: Task specification + semantic blueprint (scene_goal, participants array, action_to_complete) + sentence completion
        or generation target
      reliability: Produces consistent, goal-aligned outputs across multiple runs and model variations
      source_book: B12
    - concept_name: Role-Based Context Design
      definition: Explicit assignment of semantic roles (Agent, Patient, Source_of_Threat, etc.) to entities in context. Enables
        the LLM to understand conflict, motivation, and narrative structure.
      mechanism: Each participant gets a role, description, and relationship to the action and goal
      output_effect: Narratively intelligent responses that follow conflict and character motivation
      example_roles: Agent (performs action), Patient (affected by action), Source_of_Threat, Goal-actor, Instrument
      source_book: B12
    - concept_name: Goal-Oriented Context Design
      definition: Context that explicitly specifies what the LLM should achieve (scene goal, narrative goal, output goal).
        First true milestone in context engineering.
      vs_prompting: Prompts ask questions; goal-oriented context tells the LLM what to accomplish and measures success against
        that goal
      integration: Goals guide all subsequent role assignments, action selection, and evaluation criteria
      source_book: B12
    - concept_name: Context Assembly Pipeline Architecture
      definition: 'Systematic process for assembling final context from multiple sources: semantic blueprints, factual data,
        procedural instructions, historical context, and validation rules.'
      phases: Blueprint retrieval (Librarian) -> Data enrichment (Researcher) -> Context assembly -> Validation -> Execution
      modularity: Each phase is independent and composable; can be mixed for different task types
      transparency: All assembly decisions logged for audit and debugging
      source_book: B12
    - concept_name: Sentinel Phrases and Context Anchors
      definition: Structured markers in context that guide the LLM to specific behaviors (e.g., "Complete this sentence:"
        or "Continue from this point:"). Acts as semantic anchors.
      purpose: Reduces hallucination by constraining where the model should focus generation
      mechanism: Defines boundaries and starting points for generation, preventing model drift
      example: Using "He then played with the..." to guide completion from specific narrative point
      source_book: B12
    - concept_name: Prompt Engineering as Enterprise Capability
      definition: Organizational practice of designing, testing, and optimizing prompts as a strategic asset. Moves beyond
        individual prompts to systematic governance, documentation, version control, and cross-functional ownership. Includes
        template libraries, peer review processes, and governance frameworks for compliance and quality assurance.
      source_book: B07
    - concept_name: Tiered Framework for Enterprise Prompting (1-10)
      definition: Scalable framework that classifies prompts by sophistication, from Tier 1 (simple, commodity tasks) to Tier
        10 (complex, mission-critical, multi-step agentic reasoning). Each tier defines requirements for testing, governance,
        documentation, and audit trails. Enables resource allocation and risk-based oversight — high-tier prompts require
        more rigorous governance.
      source_book: B07
    - concept_name: Role-Based Personas in Prompts
      definition: Technique where prompts assign personas to agents (e.g., "Act as a senior financial analyst"). Personas
        shape reasoning style, terminology, and decision-making patterns. Enables tailoring outputs to specific audiences
        and use cases without retraining models.
      source_book: B07
    - concept_name: Ethical Guardrails in Prompts
      definition: 'Embedding ethical constraints directly into prompts to guide agent behavior without post-hoc filters. Examples:
        fairness criteria, bias mitigation, compliance rules, domain-specific ethical boundaries. Enables governance at design
        time rather than enforcement time.'
      source_book: B07
    - concept_name: Prompt Performance Metrics
      definition: 'Measurable dimensions for evaluating prompt quality: accuracy (correctness of outputs), efficiency (tokens
        used, latency), consistency (reproducibility), safety (adherence to constraints), and user satisfaction. Enables continuous
        improvement and data-driven prompt optimization.'
      source_book: B07
    - concept_name: Iterative Prompt Refinement
      definition: Systematic process of testing prompts against diverse scenarios, collecting feedback, identifying failure
        modes, and updating prompts. Uses A/B testing, user feedback loops, and automated evaluation frameworks. Treats prompts
        as living artifacts requiring ongoing maintenance.
      source_book: B07
    - concept_name: Prompt Template Libraries
      definition: Organizational repository of vetted, reusable prompt templates for common tasks. Each template includes
        usage guidelines, expected performance ranges, domain applicability, and version history. Enables consistency, reduces
        reinvention, and accelerates deployment.
      source_book: B07
    - concept_name: Governance Frameworks for Prompts
      definition: Organizational policies for prompt creation, review, approval, deployment, and monitoring. Includes change
        management, audit trails, stakeholder reviews (legal, compliance, ethics), and rollback procedures. Ensures prompts
        meet governance requirements before production use.
      source_book: B07
    - concept_name: Prompt Injection Risks and Mitigation
      definition: 'Security concerns where malicious inputs override prompt instructions. Mitigation strategies: input validation,
        instruction hierarchies, conversation-level analysis, prompt templating with separation of static instructions from
        variable content. Critical for enterprise security.'
      source_book: B07
    - concept_name: Industry-Specific Prompt Applications
      definition: Domain-tailored prompt designs for healthcare (medical terminology, privacy), finance (regulatory language,
        risk frameworks), legal (precedent reasoning), customer service (tone, empathy). Each domain requires specialized
        prompts reflecting domain constraints and expectations.
      source_book: B07
    - concept_name: Prompt Versioning and Change Management
      definition: Systematic approach to tracking prompt changes, versions, and deployments. Includes semantic versioning,
        change logs, rollback procedures, and impact analysis. Enables auditing and rapid response to prompt-related issues.
      source_book: B07
    - concept_name: Cost Optimization Through Prompt Design
      definition: 'Techniques to reduce token usage and API costs: instruction compression, few-shot example optimization,
        output format constraints, early stopping signals. Better prompts = fewer tokens = lower costs without sacrificing
        quality.'
      source_book: B07
