  agent_loops_and_control_flow:
    definition: 'The mechanics of how agents iterate, decide when to stop, handle errors, and manage execution budgets. In
      LangGraph, control flow is expressed through graph topology: nodes = processing steps, edges = transitions, conditional_edges
      = dynamic routing. The graph IS the control flow.'
    core_concepts:
    - concept_name: Agentic Loop Structure
      explanation: 'LangGraph graph: nodes execute computations, edges define flow, conditional_edges implement branching
        logic. State (TypedDict) carries data between nodes. The `add_messages` annotation enables message accumulation across
        turns.'
    - concept_name: Termination Conditions
      explanation: 'should_continue function checks: (1) presence of tool_calls → continue, (2) absence of tool_calls → end.
        Additional patterns: max iteration counter, timeout, explicit END token in response, confidence threshold met.'
    - concept_name: Checkpointing and State Recovery
      explanation: 'MemorySaver enables automatic state snapshots at each node execution. Supports: resuming interrupted workflows,
        human-in-the-loop review at any point, branching from any historical state, time-travel debugging.'
    - concept_name: Subgraphs for Modularity
      explanation: LangGraph subgraphs encapsulate agent teams as reusable units. A subgraph has its own internal state and
        graph, but communicates with the parent through defined interfaces. Enables hierarchical agent architectures.
    - concept_name: Command Pattern
      explanation: LangGraph Command(goto=target, update=state_patch) enables dynamic routing — a node can specify where control
        goes next AND what state updates to apply, without the parent graph needing static conditional edges.
    - concept_name: Behavior Trees (B03)
      explanation: 'Hierarchical control structures for agent decision-making, widely used in game AI and now adapted for
        LLM agents. Node types: Actions (leaf — execute tasks), Conditions (leaf — check state), Sequences (composite — AND,
        all children must succeed), Selectors (composite — OR, first success wins), Decorators (modify child behavior), Parallel
        (run children concurrently). Each node returns SUCCESS, FAILURE, or RUNNING. Advantages over FSMs: modularity/reusability,
        scalability, flexibility/extensibility, easier debugging/visualization, decoupled decision logic.'
    - concept_name: Agentic Behavior Trees (ABTs) (B03)
      explanation: 'Behavior Trees where actions and conditions are driven by LLM prompts rather than deterministic code.
        Also called stochastic behavior trees (due to non-deterministic LLM outputs). Patterns: (1) Siloed — new thread per
        assistant, file-based communication. (2) Conversational — shared thread for feedback loops. (3) Hybrid — combine both.
        Design via Back Chaining (5 steps): identify goal → determine actions backwards → identify conditions → determine
        communication mode (siloed/conversational/hybrid) → construct tree.'
    - concept_name: Three-Level Agent Hierarchy (B04)
      explanation: 'B04 defines a 3-level hierarchy for agent systems: (1) Single Agent — one agent with tools and memory,
        handles straightforward tasks. (2) Multi-Agent — multiple specialized agents collaborating, each with distinct roles/tools.
        (3) Swarm — large-scale decentralized agent collectives with emergent behavior, minimal central coordination. Higher
        levels increase capability but also complexity, latency, and coordination overhead.'
    - concept_name: Five Multi-Agent Workflow Types (B04)
      explanation: 'B04 expands multi-agent patterns into 5 workflow types: (1) Network — fully connected peers, any agent
        can communicate with any other, maximum flexibility but coordination challenge. (2) Reflection — self-evaluating loop
        where an agent generates then critiques its own output iteratively. (3) Sequential — linear pipeline where each agent''s
        output feeds the next, simple and predictable. (4) Hierarchical — manager-subordinate tree structure, manager delegates
        and synthesizes. (5) Hybrid — combines multiple patterns (e.g., hierarchical with reflection loops at each level).'
    - concept_name: Agent-as-Tool Pattern (B04)
      explanation: 'Wrapping an entire agent as a callable tool for another agent. The outer agent treats the inner agent
        as a black-box function: invokes it with a task description, receives a result. Enables: modular composition of agent
        capabilities, hierarchical delegation, and reuse of pre-built agent specializations. In LangGraph, implemented by
        wrapping a compiled agent graph as a tool function. Analogous to microservices architecture in traditional software.'
