      f3_what_are_generative_ai_models:
        source_file: "3. What are Generative AI Models?.txt"
        content: |
          Over the past couple of months, large language models, or LLMs, such as ChatGPT, have taken the world by storm. Whether it's writing poetry or helping plan your upcoming vacation, we are seeing a step change in the performance of AI and its potential to drive enterprise value. My name's Kate Soule. I'm a Senior Manager of Business Strategy at IBM Research, and today I'm going to give a brief overview of this new field of AI that's emerging, and how it can be used in a business setting to drive value. Now, large language models are actually a part of a different class of models called foundation models. Now, the term foundation models was actually first coined by a team from Stanford. When they saw that the field of AI was converging to a new paradigm where before AI applications were being built by training maybe a library of different AI models where each AI model was trained on very task-specific data to perform very specific task. They predicted that we were going to start moving to a new paradigm where we would have a foundational capability or a foundation model that would drive all of these same use cases and applications. So the same exact applications that we're envisioning before with conventional AI, and the same model could drive any number of additional applications. The point is that this model could be transferred to any number of tasks. That gives this model the superpower to be able to transfer to multiple different tasks and perform multiple different functions, is that it's been trained on a huge amount in an unsupervised manner on unstructured data. What that means in the language domain is basically I'll feed a bunch of sentences and I'm talking terabytes of data here to train this model. The start of my sentence might be, no use crying over spilled, and the end of my sentence might be milk. I'm trying to get my model to predict the last word of the sentence based off of the words that it saw before. It's this generative capability of the model predicting and generating the next word based off of previous words that it's seen beforehand. That is why that foundation models are actually a part of the field of AI called Generative AI. Because we're generating something new. In this case, the next word in a sentence. And even though these models are trained to perform at its core a generation task, predicting the next word in the sentence, we actually can take these models and if you introduce a small amount of label data to the equation, you can tune them to perform traditional NLP tasks, things like classification or named entity recognition, things that you don't normally associate as being a generative based model or capability. This process is called tuning, where you can tune your foundation model by introducing a small amount of data, you update the parameters of your model, and now I can perform a very specific natural language task. If you don't have data or have only very few data points, you can still take these foundation models and they actually work very well in low label data domains. In a process called prompting or Prompt Engineering, you can apply these models for some of those same exact tasks. So an example of prompting a model to perform a classification task might be you could give the model a sentence, and then ask it a question. Is this sentence have a positive sentiment or negative sentiment? The model is going to try and finish generating words in that sentence, and the next natural word in that sentence would be the answer to your classification problem, so it would respond either positive or negative, depending on where it estimated the sentiment of the sentence would be. These models work surprisingly well when applied to these new settings and domains. Now, this is a lot of where the advantages of foundation models come into play. So if we talk about the advantages, the chief advantage is the performance. These models have seen so much data. Again, data with a capital D, terabytes of data, that by the time that they're applied to small tasks, they can drastically outperform a model that was only trained on just a few data points. The second advantage of these models are the productivity gains. So just like I said earlier, through prompting or tuning, you need far less labeled data to get to a task-specific model than if you had to start from scratch, because your model is taking advantage of all the unlabeled data that it saw in its pre-training when we created this generative task. With these advantages, there are also some disadvantages that are important to keep in mind. And the first of those is the compute costs. So the penalty for having this model see so much data is that they're very expensive to train, making it difficult for smaller enterprises to train a foundation model on their own. They're also expensive by the time they get to a huge size, a couple billion parameters, they're also very expensive to run inference. You might require multiple GPUs at a time just to host these models and run inference, making them a more costly method than traditional approaches. The second disadvantage of these models is on the trustworthiness side. So just like data is a huge advantage for these models, they've seen so much unstructured data, it also comes at a cost, especially in the domain like language. A lot of these models are trained basically off of language data that's been scraped from the Internet. And there's so much data that these models have been trained on. Even if you had a whole team of human annotators, you wouldn't be able to go through and actually bet every single data point to make sure that it wasn't biased, didn't contain hate speech or other toxic information. And that's just assuming you actually know what the data is. Often we don't even know for a lot of these open source models that have been posted, what the exact data sets are that these models have been trained on leading to trustworthiness issues. So IBM recognizes the huge potential of these technologies. But my partners in IBM Research are working on multiple different innovations to try and improve also the efficiency of these models, and the trustworthiness and reliability of these models to make them more relevant in a business setting. All of these examples that I've talked through so far have just been on the language side. But the reality is, there are a lot of other domains that foundation models can be applied towards. Famously, we've seen foundation models for vision, looking at models such as DALLL E2, which takes text data and that's then used to generate a custom image. We've seen models for code with products like Copilot that can help complete code as it's being authored. And IBM's innovating across all of these domains. So whether it's language models that we're building into products like Watson Assistant and Watson Discovery, vision models that we're building into products like Maximo Visual Inspection, or Ansible code models that we're building with our partners at Red Hat under Project Wisdom. We're innovating across all of these domains and more. We're working on chemistry. So for example, we just published and released Moleformer, which is a foundation model to promote molecule discovery for different targeted therapeutics. And we're working on models for climate change. Building earth science foundation models using geospatial data to improve climate research. I hope you found this video both informative and helpful. If you're interested in learning more, particularly how IBM is working to improve some of these disadvantages, making foundation models more trustworthy and more efficient, please take a look at the links below. Thank you.

      f4_what_is_nlp_natural_language_processing:
        source_file: "4. What is NLP (Natural Language Processing).txt"
        content: |
          What is natural language processing? Well, you're doing it right now. You're listening to the words and the sentences that I'm forming and you are forming some sort of comprehension from it. And when we ask a computer to do that, that is NLP or natural language processing. My name is Martin Keene. I'm a master inventor at IBM and I've utilized NLP in a good number of my invention disclosures. NLP really has a really high utility value in all sorts of AI applications. Now, NLP starts with something called unstructured text. What is that? Well, that's just what you and I say. That's how we speak. So for example, some unstructured text is, add eggs and milk to my shopping list. Now, you and I understand exactly what that means, but it is unstructured, at least to a computer. So what we need to do is to have a structured representation of that same information that a computer can process. Now that might look something a bit more like this, where we have a shopping list element and then it has sub elements within it, like an item for eggs and an item for milk. That is an example of something that is structured. Now, the job of natural language processing is to translate between these two things. So NLP sits right in the middle here, translating between unstructured and structured data. And when we go from unstructured here to structured this way, that's called NLU, or Natural Language Understanding. And when we go this way from structured to unstructured, that's called Natural Language Generation, or NLG. We're going to focus today primarily on going from unstructured to structured in natural language processing. Now, let's think of some use cases where NLP might be quite handy. First of all, we've got machine translation. Now, when we translate from one language to another, we need to understand the context of that sentence. It's not just a case of taking each individual word from, say, English and then translating it into another language. We need to understand the overall structure and context of what's being said. And my favourite example of this going horribly wrong is if you take the phrase, "the spirit is willing, but the flesh is weak", and you translate that from English to Russian, and then you translate that Russian translation back into English, you're going to go from the spirit is willing, but the flesh is weak, to something a bit more like the vodka is good, but the meat is rotten, which is really not the intended context of that sentence whatsoever. So NLP can help with situations like that. Now, the second kind of use case that I like to mention relates to virtual assistants, and also to things like chatbots. Now, a virtual assistant, that's something like Siri or Alexa on your phone, that is taking human utterances and deriving a command to execute based upon that. And a chatbot is something similar except in written language, and that's taking written language and then using it to traverse a decision tree in order to take an action. NLP is very helpful there. Another use case is for sentiment analysis. Now, this is taking some text, perhaps an email message or a product review, and trying to derive the sentiment that is expressed within it. So, for example, is this product review a positive sentiment or a negative sentiment? Is it written as a serious statement or is it being sarcastic? We can use NLP to tell us. And then, finally, another good example is spam detection. So this is a case of looking at a given email message and trying to derive, is this a real email message or is it spam? And we can look for pointers within the content of the message. So things like overused words or poor grammar or an inappropriate claim of urgency can all indicate that this is actually perhaps spam. So those are some of the things that NLP can provide, but how does it work? Well, the thing with NLP is it's not like one algorithm. It's actually more like a bag of tools, and you can apply these bag of tools to be able to resolve some of these use cases. Now, the input to NLP is some unstructured text, so either some written text or spoken text that has been converted to written text through a speech-to-text algorithm. Once we've got that, the first stage of NLP is called tokenization. This is about taking a string and breaking it down into chunks. So if we consider the unstructured text we've got here, add eggs and milk to my shopping list, that's eight words, that could be eight tokens. And from here on in, we are going to work one token at a time as we traverse through this. Now, the first stage, once we've got things down into tokens that we can perform, is called stemming. And this is all about deriving the word stem for a given token. So for example, running, runs, and ran, the word stem for all three of those is run. We're just kind of removing the prefix and the suffixes and normalizing the tense, and we're getting to the word stem. But stemming doesn't work well for every token. For example, universal and university, well, they don't really stem down to universe. For situations like that, there is another tool that we have available, and that is called lemmatization. And lemmatization takes a given token and learns its meaning through a dictionary definition, and from there it can derive its root or its lem. So take better, for example. Better is derived from good, so the root or the lem of better is good. The stem of better would be bet. So you can see that it is significant whether we use stemming or we use lemmatization for a given token. Now, next thing we can do is we can do a process called part of speech tagging. And what this is doing is, for a given token, it's looking where that token is used within the context of a sentence. So take the word make, for example. If I say I'm going to make dinner, make is a verb. But if I ask you what make is your laptop, well, make is now a noun. So where that token is used in the sentence matters. Part of speech tagging can help us derive that context. And then finally, another stage is named entity recognition. And what this is asking is, for a given token, is there an entity associated with it? So, for example, a token of Arizona has an entity of a U.S. state, whereas a token of Ralph has an entity of a person's name. And these are some of the tools that we can apply in this big bag of tools that we have for NLP in order to get from this unstructured human speech through to something structured that a computer can understand. And once we've done that, then we can apply that structured data to all sorts of AI applications. Now, there's obviously a lot more to it than this, and I've included some links in the description if you'd like to know more. But hopefully this made some sense, and that you were able to process some of the natural language that I've shared today. Thanks for watching.

