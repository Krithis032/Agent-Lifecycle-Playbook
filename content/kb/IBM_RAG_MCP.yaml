      f65_introduction_to_multimodal_retrieval_augmented_generation_mm_rag:
        source_file: "65. Introduction to Multimodal Retrieval-Augmented Generation (MM-RAG).txt"
        content: |
          Hello, and welcome to this video on Introduction to
          Multimodal Retrieval Augmented Generation, or MM-RAG. After watching this video, you will be able to
          explain how AI systems retrieve and generate information across multiple data types, demonstrate
          the integration of diverse data modalities into retrieval processes, and design a generative
          model that incorporates multimodal context. Imagine an AI that can not only read text, but
          also understand images, retrieve relevant information from vast databases, and generate accurate responses. That's the power of MM-RAG, a cutting-edge approach combining
          multimodal understanding with retrieval augmented generation. Let's first understand what MM-RAG means. Multimodal refers to systems that work with
          multiple types of data, or modalities, typically combining visual information, such as images and videos, with text. Retrieval augmented refers to enhancing LLM responses by
          retrieving relevant information from a database or knowledge store. Generation is where this retrieved information is
          used to generate detailed, accurate responses that combine the strengths of both modalities. While today's advanced vision models like
          Llama4, GPT-4o, or Claude 3 can see images, they don't have access to your specific
          knowledge bases or databases. RAG bridges this gap by retrieving relevant information to enhance
          the model's response with your proprietary or domain-specific data. The typical MM-RAG pattern follows three steps. The first step is retrieving relevant information
          across various modalities using specialized retrievers capable of processing text documents,
          images, audio recordings, and videos. The second step uses contrastive learning to train
          models that link related data from different types. For example, a picture of a cat and the phrase,
          a domestic feline, would be mapped to similar representations, helping the system connect images and text more easily. The final step is to use the retrieved multimodal
          data as context for generative models, enabling them to produce outputs grounded in a richer array of information. Let's look at the steps to implement MM-RAG. First is data indexing. Here, various data types are converted into
          embeddings and indexed in a vector database. This process involves transforming unstructured
          data, like text, images, audio, video, into a structured format that can be efficiently searched and retrieved. The second is data retrieval. When a user query, whether it's text, an
          image, or both, is received, it is converted into an embedding and searched in the vector database
          for semantically relevant data across all modalities. Step three is augmentation, where you combine
          the retrieved multimodal data with the original user query to provide comprehensive context for the generative model. The final step is response generation, where you
          input the augmented query into a multimodal generative model to produce a response that integrates
          information from the various retrieved modalities. Now, let's examine the practical implementation of the multimodal
          RAG through an example application called Style Finder. This system enables users to upload images
          of complete outfits and, using an external dataset, returns detailed information about
          the clothing items, along with purchase links. Let's break down the application's core components and explore
          the code that powers this multimodal fashion analysis tool. The first step in the pipeline is image encoding. It involves converting an upload image into a feature representation
          that can be mathematically compared with other images. This is achieved using a pre-trained ResNet50 model from torchvision. Each image is transformed into a feature vector and a Base64 string. This vector serves as the foundation for
          similarity matching in the retrieval step. After obtaining the image embedding, the
          next step is performing a similarity search. Here, the system compares the obtained image
          against a dataset of pre-encoded vectors to identify the most visually similar fashion item. In the code, cosine similarity is used to quantify visual closeness. The highest-scoring match is selected and used to retrieve
          all items that appeared with the same outfit image. To provide relevant context for the language
          model, the system retrieves structured data related to the matched outfit, including product names, prices, and URLs. This structured data will be formatted and included
          in the prompt sent to the language model. Next, the application sends the structured prompt and the
          Base64-encoded image to the Llama Vision Instruct model. The prompt is carefully engineered to include a
          professional context for catalog-style analysis, instructions to describe materials, patterns,
          and colors, a section for either item details or similar items, depending on the similarity score. The model then returns a structured, markdown-compatible response
          that combines visual reasoning with the retrieved metadata. In this video, you learned that MM-RAG combines
          multimodal inputs, such as text plus images or videos, with retrieval-augmented generation,
          fetching relevant data to enhance LLM responses. MM-RAG pattern follows three steps. First, multimodal data retrieval. Second, contrastive learning for embeddings. And third, generative models informed by multimodal context. The MM-RAG pipeline has four steps. In data indexing, diverse data, such as text,
          images, audio, and video, is converted into embeddings and stored in a vector database for efficient retrieval. In data retrieval, the user query is embedded
          and semantically relevant multimodal data is fetched from the vector database. Augmentation is where retrieved data is combined with
          the original query to enrich the context for generation. Finally, in response generation, a multimodal
          response is generated using the augmented input, blending information from all modalities.

      f66_multimodal_chatbots_and_qa_systems:
        source_file: "66. Multimodal Chatbots and QA Systems.txt"
        content: |
          Hello, and welcome to the video on multimodal chatbots and QA systems. After watching this video, you will be able to define multimodal AI systems and explain their impact on human-computer interaction, identify practical applications, and analyze real-world examples of multimodal AI, and demonstrate basic implementation concepts using frameworks like IBM Watson X. Imagine asking your phone to find a recipe, not just with words, but by showing it a picture of ingredients in your fridge. It understands your voice, the images you show, and even asks follow-up questions. This isn't sci-fi, it's the power of multimodal AI in action. So what are multimodal chatbots and QA, or question-answering systems? These are advanced AI applications that can process, understand, and generate responses based on multiple types of data inputs, such as text, images, audio, and sometimes video. Unlike traditional chatbots that only process text, these systems can see, read, and understand the world more like humans do. The block diagram shows the architecture of a multimodal AI system. The system accepts multiple input modalities, including text that includes queries, commands, conversations, etc., images, including photos, diagrams, etc., audio, such as voice commands and ambient sounds, and video, which is motion-based visual content. In the block diagram, you can see that the system is taking multiple inputs as images and text. The system processes each input modality separately, then fuses them across modalities to build a unified understanding. For example, answering a question about an image combines text and visual analysis to generate a context-aware response. Finally, based on the integrated understanding, the system generates appropriate responses, ranging from text answers and suggestions to action prompts or even image generation. Now let's look at a basic implementation of a multimodal QA system using the LLAMA 3.2 90B Vision Instruct model through IBM's Watson X platform. Before building your multimodal chatbot, the first step is to bring in all the necessary tools through Python libraries. The following code can be used for that purpose. You'll begin by establishing a connection to the AI service and configuring your chosen model. First, you'll create a credentials object with your URL and API key for authentication. The API client uses these credentials to establish a secure connection to IBM services. Next, specify which AI model you want to use through the model ID parameter. In this case, Meta's LLAMA 3.2 Vision model is being used. You'll also provide a project ID, which helps organize the API usage within IBM's platform. You'll initialize text chat parameters with default settings. You may customize parameters like temperature to control how creative or deterministic the model's responses should be. Finally, bring all these components together by creating a model inference object, which serves as your interface to the model. Before image analysis, convert images into formats that the model can process. Since AI can't see like humans, it needs numerical or text-based representations. Create two functions to handle this conversion, based on the image source. The prepareImage function handles local image files stored on your system. It opens the image file in binary mode, reads the raw data, and then converts this binary information into a Base64 encoded string. This encoding transforms the image into a lengthy text string that preserves all the visual information while making it compatible with text-based APIs. For images available online, create a prepareImageFromURL function that first downloads the image using an HTTP request and then performs the same Base64 encoding. This approach gives you the flexibility to work with images regardless of whether they're stored locally or online. At the core of your implementation is the queryMultimodalModel function, which combines text and images into a format the model can process together. This function creates a specific message structure expected by the API, with each message containing both text and image elements carefully arranged. When you call model chat with a structured message, both text and image are sent together. The model processes them in context, enabling it to reference visual details directly in response to your question. After processing, extract just the text response from a potentially more complex return object, providing a clear answer to present to the user. With all the components in place, you're now ready to use your multimodal question answering system. You'll start by preparing an image using one of the encoding functions from step 3. This gives you the Base64 encoded string representation of your image that the model can process. Next, craft a specific question about the image. This could be a general inquiry like, what can you see in this image? Or something more specific like, is there anything unsafe in this workplace photo? The question guides the model's attention to particular aspects of the image that interest us. To further shape how the model approaches your question, you can create a system prompt. This optional text sets the context for how the model should respond. For instance, telling it to act as an expert nutritionist analyzing food will produce very different responses than, act as a fashion consultant giving style advice, even when looking at the same image. This prompt essentially gives the model a role or perspective to adopt. You'll then call your function with all three components, the encoded image, your specific question, and the system prompt. The model processes this combined input and returns a natural language response that addresses your question, based specifically on what it sees in the image. The result is a contextually relevant answer that seamlessly blends an understanding of both the visual content and the textual query. In this video, you learned that multimodal chatbots and QA systems are advanced AI systems that process and respond to multiple data types, such as text, images, audio, and video. Unlike traditional text chatbots, these systems can see, read, and understand the world more like humans do. Multimodal chatbots' key features include multiple input modalities, integrated understanding, and contextual response generation. The basic implementation steps of a multimodal QA system are setting up the environment and importing libraries, initializing the model, preparing an image for processing, creating the multimodal query function, and using the multimodal QA function.


  mcp_ai_agents:
    description: "Course 6 - Build AI Agents using MCP"
    concepts:
      f67_what_is_mcp:
        source_file: "67. What is MCP?.txt"
        content: |
          If you're building AI agents, you've probably
          heard about MCP, or Model Context Protocol. MCP is a new open-source standard to connect your
          agents to data sources such as databases or APIs. MCP consists of multiple components. The most important ones are the host, the client, and the server. So let's break it down. At the very top, you would have your MCP host. Your MCP host will include an MCP client,
          and it could also include multiple clients. The MCP host could be an application such as
          a chat app, it could also be a code assistant in your IDE, and much more. The MCP host will connect to an MCP server. It can actually connect to multiple MCP servers as well. It doesn't matter how many MCP servers
          you connect to your MCP host or client. The MCP host and servers will connect
          over each other through the MCP protocol. The MCP protocol is a transport layer in the middle. Whenever your MCP host or client needs a
          tool, it's going to connect to the MCP server. The MCP server will then connect to, for example,
          a database, and it doesn't matter if this is a relational database or a NoSQL database. It could also connect to APIs, and also
          the API standard doesn't really matter. Finally, it could also connect to data sources
          such as a local file type or maybe code. This is especially useful when you're building
          something like a code assistant in your IDE. Let's look at an example of how to use MCP in practice. We still have the three components. We would have our MCP host and client. Of course, we also have a large language model. And finally, we have our MCP servers. And these could be multiple MCP servers or just a single one. Let's assume our MCP client and host is a chat app. And you ask a question such as what is the
          weather like in a certain location or how many customers do I have? The MCP host will need to retrieve tools from the MCP server. The MCP server will then conclude and tell which tools are available. From the MCP host, you would then have to
          connect to the large language model and send over your question plus the available tools. If all is well, the LLM will reply and tell you which tools to use. Once the MCP host and client knows which
          tools to use, it knows which MCP servers to call. So when it calls the MCP server in order
          to get a tool result, the MCP server will be responsible for executing something that goes
          to a database, to an API, or a local piece of code. And of course, there could be subsequent calls to MCP servers. The MCP server will reply with a response
          which you can send back to the LLM. And finally, you should be able to get your
          final answer based on the question that you asked in the chat application. If you are building agents, I would really
          advise you to look at MCP Protocol. The MCP Protocol is a new standard which
          will help you to connect your data sources via MCP server to any agent. Even though you might not be building
          agents, your client might be building agents.

      f68_why_mcp:
        source_file: "68. Why MCP?.txt"
        content: |
          Welcome to the Why MCP video. After watching this video, you'll be able to explain the importance of standardization to developers, describe the key benefits that MCP provides, and discuss some common use cases for MCP. As you should already know, the Model Context Protocol, or MCP, is an open protocol that allows developers to build an MCP server using any language, including JavaScript, C Sharp, Python, Java, and others. It standardizes the connections between AI applications, large language models or LLMs, and any available external data and service. There are two main needs for an LLM application, that is to say, an AI agent. The first is to provide context in the form of contextual data, such as documents, database entries, or articles. And the second is to provide tools and tool capabilities for AI agents to perform actions or execute tools, such as performing a web search, calling an external service to book a reservation, or performing a complex calculation. So, using MCP, an AI agent can query an MCP server to determine what capabilities are available to it, and then employ those capabilities in a standardized manner. MCP behaves like a universal layer to enable developers to build tools that interact with any resource in a uniform and standardized manner. But why is this standardization so important to developers, and what are the key benefits? First is extendability. Standardization makes it far easier to add functionality or tools in the future without affecting the existing environment. Next is interoperability. Standardization allows developers to build applications across platforms and vendors. Then there is consistency. Standardization means that developers' tools will behave in the same manner regardless of the model being used. Next there is reusability. Standardization allows developers to build smarter agentic AI systems by using tools that they can reuse across multiple different projects. So, they can build once and reuse everywhere. And lastly, there is rapid development. This standardization and reusability means that there is no need for developers to reinvent the wheel and create custom integrations for every project. Let's now discuss each of the key benefits of MCP itself. The first of these is standardized integration. MCP negates the need for developers to write copious amounts of code to call various functions and tools, specify tool metadata, and enable third-party API integration. MCP gives developers a common protocol to make connections between models and external data and services, which simplifies and speeds up the development process. This means they no longer have to develop custom connections on a case-by-case basis. Next up is MCP's architecture. MCP employs a simple client-server plug-and-play architecture. This architecture makes it easy to establish connections and therefore makes the setup and deployment of such an environment fast and easy to scale up. Then there is the interoperability of MCP. MCP supports diverse and mixed development environments. This allows developers to work across different platforms, models, and frameworks, such as OpenAI or Azure OpenAI in Langchain or Llama Index, for example. Next is improved security. MCP uses the industry-standard OAuth 2.0 authorization protocol and token-based authentication. This provides enhanced security and access. And your MCP environment can also be further enhanced by adding end-to-end encryption for data and communication traffic through the use of either the Transport Layer Security or TLS or Secure Sockets Layer or SSL protocol standards. The next benefit is related to the amount of AI hallucinations that can occur. Generative AI LLMs are trained to use their own internal learned data to find the relevant information and provide the best answer possible from that limited information. This can mean that if they don't have the required information to provide the best or even simply a correct answer, then they will still attempt to provide a positive response as best they can. These kinds of responses are commonly referred to as AI hallucinations. However, MCP supplies its own external sources of training data, such as external databases, which have the most up-to-date and comprehensive factual information. This greatly reduces the occurrence of AI hallucinations and decreases the likelihood of incorrect or outdated information in responses. MCP also provides agentic workflow support. This means that one AI agent can talk to another AI agent, and in turn, that agent can talk to another agent, and so on, to reach the best possible result. This agentic workflow support means that you can perform more complex tasks that consist of multiple steps, boosting the opportunity for automation. LLMs are somewhat limited in terms of the relevance of data they provide. This is because they are only trained up to a certain point in time and therefore, more recent, up-to-date data may not yet be available to them. MCP servers can fetch the most recently available data from their connections to external data sources, thereby increasing the relevance of the information returned. Here is a table summarizing those key MCP benefits we just discussed. So now that we know more about the benefits of MCP, let's discuss a few examples of how MCP might be used in the real world. In terms of enterprise organizations, some common tasks might include connecting to internal systems, such as databases, customer relationship management or CRM systems, and ticketing platforms and services. There are also huge opportunities to use MCP for things like workflow automation and report generation. MCP can also provide organizations with access to live information, such as stocks and share prices, current weather reporting, and the latest up-to-the-minute news. In terms of agentic AI, MCP can be used to enable models to use autonomous reasoning to determine what tool to select based on the goals of the user. And agents powered by MCP can use multiple data sources to help deliver more enhanced context to make quicker and more informed decisions. There are also a multitude of potential uses in the areas of DevOps, NetOps, and SecOps. For DevOps, these include CICD pipeline automation, code management for repos, such as GitHub, infrastructure automation, and automated incident response solutions. For NetOps, uses might include network management and performance monitoring, router and firewall configuration, and anomaly detection and issue remediation. And for SecOps, MCP could be beneficial in proactive threat mitigation and response systems, real-time incident orchestration, and automated identification and management of security vulnerabilities. Bear in mind that MCP is a relatively new technology, and therefore, we are only just discovering all the possible ways we can use it to our advantage. Going forward, there will likely be many more potential uses discovered. Imagine you're an AI engineer building a Retrieval Augmented Generation, or RAG, system for a bank that has over 100,000 documents. Your goal is to retrieve only a few relevant pieces of text from this massive collection and feed them into your Large Language Model, or LLM, to answer questions or generate insights. To implement this, you'd typically need to store all 100,000 documents along with their vector embeddings. You could use a vector database for this, but managing and scaling such an infrastructure would be quite complex and time-consuming. So, instead, imagine having a dedicated server that does everything you need. When your LLM receives a query, it sends a prompt to the MCP server. The server then performs the retrieval, RAG step, i.e., determining which documents are most relevant, and then returns only those relevant chunks of text. That's exactly what an MCP server can do for you. In this video, you learned that Model Context Protocol is an open protocol that allows developers to build an MCP server using any language. MCP standardizes the connections between AI applications, LLMs, and the available external data and services. MCP behaves like a universal layer to enable developers to build tools that interact with any resource in a uniform manner. The key benefits of standardization to developers are extensibility, interoperability, consistency, reusability, and rapid development. The benefits of MCP are standardized integration, simple architecture, interoperability, enhanced security, minimized AI hallucinations, support for agentic workflows, and data relevance. And there are numerous use cases for MCP in the areas of common enterprise tasks, agentic AI tasks, and DevOps, NetOps, and SecOps tasks.

      f69_mcp_vs_api_simplifying_ai_agent_integration_with_external_data:
        source_file: "69. MCP vs API_Simplifying AI Agent Integration with External Data.txt"
        content: |
          For large language models to be truly useful, they often need to interact with external data sources and services and tools, and until recently, that was typically done with Application Programming Interfaces, or APIs. Now, in late 2024, Anthropic introduced a new Open Standard Protocol, that's Model Context Protocol, or MCP, and it has already made quite the splash, and it standardizes how applications provide context to LLMs. So let's define these two terms, MCP and API, and take a look at their similarities and differences. Now, a good metaphor for MCP is that it's kind of like a USB-C port for your AI applications, and that's because it standardizes connections between AI applications, LLMs, and external data sources. So if you think about just your standard laptop that you might be using, well, that probably has a set of USB-C ports attached to it. It's a really old one, and in those ports, well, you can plug in all sorts of cables, and they all use the USB-C standard to interface with all sorts of peripherals. So perhaps you've plugged one of these things into a monitor, another one is connected to an external disk drive, and perhaps you've also added in a power supply for the third one. It really doesn't matter who makes the peripherals, they all work together using this common standard. Well, MCP is kind of like that. So if we take a look at really what's in it, there is an MCP host, and that also runs a number of MCP clients. Now, each client opens a JSON RPC 2.0 session using the protocol that comes with MCP, so the MCP protocol, and that connects to external MCP servers. So we have a client-server relationship here. Now, servers, those expose capabilities. So perhaps we've got a server for access to a database, maybe we've got another one which gives us access to a code repository, and then maybe we have another server that gives us access to an email server. So if we go back to the USB-C analogy, we can think of the laptop as being kind of like the MCP host, the MCP protocol, this is really what's signified by the USB-C connection, and then the drive and the monitor and the power supply, we can think of those really as MCP servers. Okay, so that's the architecture, but what are the capabilities of MCP? Well, it addresses two main needs of LLM applications, and when I say LLM applications, I particularly mean AI agents. And those two needs, one is to provide context in the form of contextual data, and the other is to enable tools and the usage of tools by these AI agents. So it provides a standard way for an AI agent to retrieve external context, which means things like documents and knowledge base entries and database records, that sort of thing. And it can also execute actions or tools like maybe run a web search or call an external service or perform some calculations. Now that's all done through this MCP server that I mentioned, and that advertises a bunch of primitives. So let's take a look at three of them. Now one of the primitives is called tools, and tools are discrete actions or functions the AI can call. So a weather service that might expose a get weather tool, or a calendar service that might expose a create event tool. Now the server name advertises each tool's name, its description, the input and output schema in its capabilities listing as well. Now when an LLM uses an MCP client to invoke a tool, the MCP server executes the underlying function. So that's tools. Now another primitive is resources, and resources are read-only data items or documents the server can provide, which the client can then retrieve on demand. So text files, database schema, file contents, that sort of thing. And then we also have as an additional primitive prompt templates, and those are predefined templates providing suggested prompts. Now not every MCP server will use all three primitives. In fact, many just focus on tools currently. But the important thing to understand here is an AI agent can query an MCP server at runtime to discover what primitives are available, and then invoke those capabilities in a uniform way. Because every MCP server publishes a machine-readable catalog, so tools slash list, and resources slash list, and prompts slash list, agents can discover and then use new functionality without redeploying code. Okay, so that's MCPs. What about APIs? Well, APIs are another way of letting one system access another system's functionality or data. And application programming interfaces define a set of rules or protocols describing how to request information or services. And by using APIs, developers can integrate capabilities from external systems instead of building everything from scratch. So an e-commerce site can use a payment API to process credit card payments, for example. Now the API acts as an abstraction layer. So we have the requesting application, the client. Well, that doesn't need to know the internal details of the service that it wants to invoke, the server. It's all kind of abstracted away from it. Because the server processes the request, and the only thing we need to know is how to format the requests and understand the responses using the API. That's really all there is to it. Now, there are a lot of different API styles, but one of the most ubiquitous is the RESTful API style. You can kind of think of that as really essentially the web default API. And a RESTful API communicates over HTTP. So this call here is an HTTP call with RESTful API, where clients interact using standard HTTP methods. So they might use GET, for example, to retrieve data. They might use POST to create data, PUT to update data, and DELETE to remove data. So for example, a REST API for a library system might have an endpoint that looks something like GET, and then we say slash books, slash 1, 2, 3, if we want to fetch book number 1, 2, 3's details. Or we might use a POST and say POST slash loans if we want to borrow a book. Each such endpoint returns data, often in a JSON format representing the result. And in fact, many commercial large language models are offered over REST. Send a JSON prompt, get a JSON completion back. AI agents might also use REST APIs to perform a web search or interact with a company's internal REST services.

      f70_mcp_application_demo:
        source_file: "70. MCP Application Demo.txt"
        content: |
          Welcome to this MCP application demo video. This video explores a practical MCP server integration example built around Context 7, which is used to provide verified documentation to AI coding assistants. You'll see how Context 7 connects to popular AI IDEs such as Cursor and Windsurf to support reliable, source-driven development workflows. Before building MCP servers, you'll begin by examining how a popular MCP server is implemented and used in practice with two different clients. The MCP server highlighted here is Context 7. Context 7 provides up-to-date documentation for LLMs and AI code editors. It consolidates documentation for frameworks such as Next.js and Supabase into well-structured markdown that LLMs can easily interpret. The focus here is on the installation instructions for the MCP server. The two clients demonstrated are Cursor and Windsurf, both widely used AI IDEs or integrated development environments. This is Windsurf, which includes Cascade, an AI assistant that supports real-time code editing across local directories. And this is Cursor, which offers similar AI-driven development capabilities. Both tools support MCP integration, and Context 7 can be connected to each of them. Start with Cursor. Integration can occur in two ways, through a remote server connection or a local server connection. For now, use the remote server connection. Copy the configuration snippet, open Cursor settings, navigate to MCP, and select Add a Custom MCP. This opens the MCP.json configuration file. If no servers exist, paste the Context 7 configuration and ensure that the URL parameter is included as it is required. The Context 7 API key header can be removed because it is only needed for extended rate limits. Once configured, Cursor will expose two tools from Context 7. ResolveLibraryID and GetLibraryDocs. ResolveLibraryID parses the user's prompt to identify the relevant framework or library. It searches Context 7's indexed documentation set and returns the matching library ID. That ID is then passed to GetLibraryDocs, which retrieves the associated documentation and code snippets. For example, if the user asks, how can I create a Langraph React agent? The chat client processes the request and calls ResolveLibraryID. The JSON tool call displays the detected library name, which is Langraph, along with metadata such as library IDs, description, and trust scores. The most appropriate match is selected based on trust score. And GetLibraryDocs is then invoked. This returns a large, unstructured output containing detailed documentation, which the LLM uses to generate a working Langraph agent example. Next, integrate Context 7 in Windsurf. Again, two connection modes are available, remote and local. This time, use the local server connection. In Windsurf settings, select Cascade, then Manage MCPs and paste the local configuration. The API key flag can be removed if no key is being used. Unlike Cursor's remote configuration, this setup installs and accesses the MCP server locally through standard input-output. This illustrates the key difference between HTTP-based remote connections and local STDIO connections. The course will explore these differences in more detail later. After saving the configuration, Windsurf exposes the same two MCP tools – ResolveLibraryID and GetLibraryDocs. In Cascade code, ask the same question – how can I create a Langraph React agent? Windsurf again issues the tool call, retrieves the structured documentation, and uses it to construct a Langraph-based agent. This ensures reliable, source-based responses instead of hallucinated snippets. This demonstration shows how the Context 7 MCP server integrates cleanly with both Cursor and Windsurf, enabling AI-assisted development workflows powered by verified documentation. Thank you for watching.

      f71_agentic_ai_protocols:
        source_file: "71. Agentic AI Protocols.pdf"
        content: |
          08/04/2026, 09:22 about:blank
          Reading: Agentic AI Protocols
          Estimated time needed: 10 minutes
          What are AI agent protocols?
          AI agent protocols establish standards of communication among artificial intelligence agents and between AI agents and other systems. These protocols specify the
          syntax, structure and sequence of messages, along with communication conventions such as the roles agents take in conversations and when and how they respond to
          messages.
          Agent-based AI systems often run in silos. They're built by different providers using diverse AI agent frameworks and employing distinct agentic architectures. Real-
          world integration becomes a challenge, and coupling these fragmented systems requires tailored connectors for all possible types of agent interaction.
          This is where protocols come in. They turn disparate multi-agent systems into an interlinked ecosystem where AI-powered agents share a way of discovering,
          understanding and collaborating with each other.
          Although agentic protocols are part of AI agent orchestration, they don't act as orchestrators. They standardize communication but don't manage agentic workflow
          coordination, execution and optimization.
          Examples of AI agent protocols
          Many protocols are still in their early stages, so they have yet to be widely used or applied on a large scale. This lack of maturity means that organizations must be
          prepared to act as early adopters, adjusting to breaking changes and evolving specifications.
          As agentic technology evolves, new protocols might emerge. Here are some current common AI agent protocols:
          Agent Communication Protocol (ACP)
          Agent Network Protocol (ANP)
          Agent-User Interaction (AG-UI) Protocol
          Agent2Agent (A2A) Protocol
          Model Context Protocol (MCP)
          Agent Payments Protocol (AP2)
          Agent Communication Protocol (ACP)
          ACP is an open standard for agent-to-agent communication. With this protocol, we can transform our current landscape of siloed agents into interoperable agentic
          systems with easier integration and collaboration.
          With ACP, originally introduced by IBM's BeeAI, AI agents can collaborate freely across teams, frameworks, technologies and organizations. It's a universal protocol
          that transforms the fragmented landscape of today's AI agents into interconnected teammates and this open standard unlocks new levels of interoperability, reuse and
          scale. As the next step following the Model Context Protocol (MCP), an open standard for tool and data access, ACP defines how agents operate and communicate.
          For more information, visit https://www.ibm.com/think/topics/agent-communication-protocol#1190488334.
          Note: In case you are unable to access the link, right-click and open it in a new tab.
          Agent Network Protocol (ANP)
          The Agent Network Protocol (ANP) is an open-source communication framework created specifically for intelligent agents. It functions much like HTTP but is
          tailored for a future where agents are the primary entities operating online. ANP allows these agents to locate, connect with, and interact across the internet, fostering
          an open and secure environment for collaboration between agents.
          ANP addresses a core challenge in the AI ecosystem: the lack of a standardized, secure, and efficient method for agent-to-agent communication. By offering a unified
          protocol, ANP lays the groundwork for seamless interaction among agents in the evolving landscape of the AI-driven internet.
          For more information, visit https://www.agent-network-protocol.com/guide/.
          Agent-User Interaction (AG-UI) Protocol
          AG-UI is a streamlined, open protocol based on events, designed to standardize the connection between AI agents and user-facing applications.
          It emphasizes ease of use and adaptability, providing a consistent structure for the exchange of agent state, user interface intents, and user interactions between your
          agent and front-end applications. This enables developers to quickly build and deploy agent-driven features that are stable, easy to debug, and user-friendly—without
          needing to rely on complex, custom integrations, allowing them to focus on core application functionality.
          For more information, visit: https://docs.ag-ui.com/introduction.
          Agent2Agent (A2A) Protocol
          The A2A protocol is an open standard for AI agent communication initially launched by Google and now managed under the Linux Foundation. It follows a client-
          server model setup with a three-step workflow:
          1. Discovery occurs when an entity (a human user or another AI agent) initiates a task request to a client agent, which then looks up remote agents to determine
          the best fit.
          2. Once the client agent identifies a remote agent capable of fulfilling the task, it then goes through authentication. The remote agent is responsible for
          authorization and granting access control permissions.
          3. Communication proceeds with the client agent sending the task and the remote agent processing it. Agent-to-agent communication happens over HTTPS for
          secure transport, with JSON-RPC (Remote Procedure Call) 2.0 as the format for data exchange.
          For more information, visit https://www.ibm.com/think/topics/agent2agent-protocol#1509394338.
          Note: In case the link doesn't open, please right-click and open the link in a new tab.
          about:blank 1/3
          
          08/04/2026, 09:22 about:blank
          Model Context Protocol (MCP)
          Introduced by Anthropic, the Model Context Protocol (or MCP) provides a standardized way for AI models to get the context they need to carry out tasks. In the
          agentic realm, MCP acts as a tier for AI agents to connect and communicate with external services and tools, such as APIs, databases, files, web searches and other
          data sources.
          MCP encompasses these three key architectural elements:
          The MCP host contains orchestration logic and can connect each MCP client to an MCP server. It can host multiple clients.
          An MCP client converts user requests into a structured format that the protocol can process. Each client has a one-to-one relationship with an MCP server.
          Clients manage sessions, parse and verify responses and handle errors.
          The MCP server converts user requests into server actions. Servers are typically GitHub repositories available in various programming languages and provide
          access to tools. They can also be used to connect LLM inferencing to the MCP SDK through AI platform providers such as IBM and OpenAI.
          In the transport layer between clients and servers, messages are transmitted in JSON-RPC 2.0 format using either standard input/output (stdio) for lightweight,
          synchronous messaging or HTTP for remote requests.
          For more information, visit https://www.ibm.com/think/topics/model-context-protocol#179371084.
          Note: In case the link doesn't open, please right-click and open the link in a new tab.
          The diagram below shows a simplified example of these last three protocols working together in a typical multi-agent environment.
          Agent Payments Protocol (AP2)
          In September 2025, Google unveiled a new standard called Agent Payments Protocol (or AP2). It is built in collaboration with leading players in the payments and
          technology sectors. AP2 is designed to enable secure, cross-platform transactions, initiated by AI agents. It can also function as an extension to existing protocols
          such as Agent2Agent (A2A) and the Model Context Protocol (MCP).
          Unlike traditional payment systems that rely on a person clicking a 'Buy Now' button, AP2 is designed for scenarios where autonomous agents make purchases on
          behalf of users.
          To support this, a system is needed that can:
          Reflect the user's intent
          Allow the agent to operate within defined boundaries
          Guarantee that transactions are traceable and secure
          AP2 addresses this using a concept called 'Mandates', which are cryptographically signed digital instructions.
          There are two types of mandates; Intent Mandates and Cart Mandates, and they support the two main ways users interact with agents while shopping.
          User-involved purchases: These are real-time purchases made with a human present, such as requesting an agent to "Buy me the cheapest available return ticket to
          Bali in October."
          That purchase request is recorded as an Intent Mandate. It captures the context of your request in a verifiable way, forming the foundation for the transaction. Once
          the agent shows you a cart with selected items, your confirmation creates a Cart Mandate. This step finalizes the transaction with a secure, tamper-proof record of
          exactly what you approved—items, price, and terms—ensuring transparency and trust.
          Delegated purchases: These are purchases where the user is not present and involved at the time of the transaction itself. For example, your request might be to
          "Buy me two of the best available theatre tickets as soon as they become available, up to a maximum spend of $250."
          about:blank 2/3
          
          08/04/2026, 09:22 about:blank
          In this scenario, you provide a pre-signed Intent Mandate ahead of time. This mandate outlines specific criteria such as spending caps, timings, and other
          restrictions. It acts as proof of your authorization and gives the agent permission to proceed. Once the mandate's criteria are met, the agent can autonomously
          generate and sign a Cart Mandate to complete the purchase on your behalf.
          These two mandate types enable agents to make payments safely on behalf of users, while also providing merchants and payment providers with assurance that each
          transaction is properly authorized and trustworthy.
          For more information, visit https://cloud.google.com/blog/products/ai-machine-learning/announcing-agents-to-payments-ap2-protocol, and see the YouTube video at
          https://www.youtube.com/watch?v=yLTp3ic2j5c.
          Note: In case the link doesn't open, please right-click and open the link in a new tab.
          How do the A2A, MCP, and AP2 protocols work together for agentic commercial transactions?
          The A2A, MCP, and AP2 protocols work together to form the framework of agentic commercial transactions.
          To understand how these three protocols work together in agentic commercial transactions, let's look at a simple example:
          1. User request: "Order me a new pair of wireless headphones with noise cancellation, under $250."
          2. A2A at work: The shopping agent communicates with a retailer's product agent and a payment service agent to manage the process.
          3. MCP at work: The agent gathers product details, user preferences, and past purchase history via the Model Context Protocol.
          4. AP2 at work: After selecting a suitable product, the agent creates a Cart Mandate. Once the user reviews and approves it, the payment agent securely
          processes the transaction.
          Criteria for choosing an AI agent protocol
          With the lack of benchmarks for standardized evaluation, enterprises must conduct their own appraisal of the protocol that best fits their business needs. They might
          need to start with a small and controlled use case combined with thorough and rigorous testing.
          Here are a few aspects to keep in mind when assessing agent protocols:
          Efficiency
          Reliability
          Scalability
          Security
          Efficiency
          Ideally, protocols are designed to limit latency, resulting in swift data transfer and rapid response times. Although some communication overhead is expected, it must
          be kept to a minimum.
          Reliability
          AI agent protocols must be able to handle changing network conditions throughout agentic workflows, with mechanisms in place to manage failures or disruptions.
          For instance, ACP is designed with asynchronous communication as the default, which suits complex or long-running tasks. Meanwhile, A2A supports real-time
          streaming using SSE for large or long outputs or continuous status updates.
          Scalability
          Protocols must be robust enough to cater to growing agent ecosystems without compromising performance. Evaluating scalability can include increasing the number
          of agents or links to external tools over a period of time, either gradually or suddenly, to observe how a protocol operates in those conditions.
          Security
          Maintaining security is paramount, and agent protocols are increasingly incorporating safety guardrails. These include authentication, encryption and access control.
          Summary
          In this reading, you learned that:
          AI agent protocols establish standards for communication among AI agents and between agents and external systems, defining message structure, syntax, roles,
          and response conventions.
          Many AI agents operate in isolated silos with different frameworks, making real-world interoperability difficult without standardized protocols.
          Protocols enable discovery, understanding, and collaboration among agents, forming an interconnected ecosystem.
          Common agent communication protocols include ACP (Agent Communication Protocol), ANP (Agent Network Protocol), AG-UI (Agent-User Interaction
          Protocol), A2A (Agent2Agent Protocol), MCP (Model Context Protocol), and AP2 (Agent Payments Protocol).
          Commercial and transaction protocols such as A2A, MCP, and AP2 facilitate agent-based transactions.
          A2A protocol manages discovery, authentication, and secure task communication between agents; MCP provides standardized access to external tools, APIs,
          and data for agents; AP2 enables autonomous, agent-initiated, secure payments with digitally signed mandates.
          A typical integration workflow of a user request would be that A2A handles the communication, MCP gathers the context, and AP2 manages the secure
          payment, enabling seamless multi-protocol collaboration.
          Enterprises selecting protocols must assess efficiency, reliability, scalability, and security, and might need to pilot use cases due to evolving standards, lack of
          benchmarks, and ongoing technical improvements.
          about:blank 3/3

      f72_mcp_architecture:
        source_file: "72. MCP Architecture.txt"
        content: |
          Welcome to the MCP Architecture video. After watching this video, you will be able to Describe the core components of the MCP Client-Server model Explain the core primitives that an MCP server can offer Describe the layers of a typical MCP architecture And describe the two main transport mechanisms for MCP The MCP Client-Server model consists of three core architectural components. First is the MCP Host, which is the AI application responsible for coordinating and managing one or more MCP clients. The host component might take the form of a chatbot, an IDE-based code assistant, or a desktop application. Next is the MCP Client, which maintains a connection to an MCP server and retrieves context for use by the MCP host. And lastly, there is the MCP Server, which serves as the location of the tools providing connectivity to databases, APIs, and local files and carrying out the tasks the agent must perform. It supplies contextual information to MCP clients. Let's take a look at each of these components in a little more detail. Your MCP Host application is the component where your AI operates and interacts with people. This could take the form of a standalone desktop application, such as Claw Desktop or Visual Studio Code, or a more specialized AI-powered Integrated Development Environment IDE tool such as Cursor or Windsurf. Regardless of its form, the host application acts as the bridge between the user and the underlying AI model. It is responsible for capturing user input, whether that input is text, commands, or files, sending it to the AI for processing, and then presenting the AI's response in a clear, usable way. In addition, the host often handles important supporting functions, such as managing conversations, maintaining context, applying interface controls, and integrating with other tools or systems. In essence, although the AI model provides the intelligence, the host application provides the structure, interface, and user experience that make that intelligence accessible and practical to use. In the MCP ecosystem, all communication between the host and the server is mediated by a client. This MCP client runs within the host application and is responsible for translating user requests into a structured, standardized format that the open protocol can understand and process. The MCP client can be viewed as a unified gateway for communication. Instead of the host making separate, direct API calls to each external service, it sends structured MCP requests to the client using the JSON RPC protocol, allowing all interactions to be routed through a single, consistent interface. In addition, clients interpret server responses, perform error handling, and ensure that returned information is contextually relevant, accurate, and appropriate for the user's current interaction. Beyond simply relaying requests and responses, MCP clients also play a critical role in managing the session lifecycle. They handle interruptions, timeouts, reconnections, and clean session termination. Though a single MCP host can support multiple clients, each individual client maintains a one-to-one relationship with a specific MCP server. Well-known examples of MCP clients include IBM's BAI, Microsoft's Copilot Studio, Claw Desktop, Claw.ai, Cursor.ai, Windsurf Editor, Klein, and LibreChat. These are just a few of the many available on the market. The MCP server is an external service that supplies context to the LLM by translating user requests into concrete server-side actions. Examples of MCP integrations include Slack, GitHub, Git, Docker, or Websearch. These servers are typically GitHub repositories available in various programming languages, including C Sharp, Java, TypeScript, Python, and others. And they provide access to MCP tools. MCP servers can also act as a bridge between LLM interface, provided by AI platforms such as IBM and OpenAI, and the MCP SDK. By doing this, they enable the creation of reusable MCP services that clients can access as standardized chat tools. MCP servers are highly flexible, as they can integrate with both internal systems and external resources or tools. MCP primitives are the core concept of MCP, defining what servers and clients can provide for one another. They determine the kinds of contextual information that can be shared with AI applications and the actions that can be carried out. In MCP, servers can expose three types of core primitives as follows. First, there are tools which offer functions that AI apps can invoke to perform activities such as calculations, sending messages, file operations, database calls, or data retrieval via API calls. Next are resources, which provide AI apps with access to contextual information from internal or external data sources. Resources return data only, such as file contents, database records, or API responses, and do not carry out actions or perform calculations. And thirdly are prompts, which are reusable templates and workflows that structure and streamline communication and interactions between the LLM and the server. MCP is structured into two layers. The inner layer is the data layer, and it defines a JSON-RPC-based client-server protocol, encompassing lifecycle management and core primitives. Surrounding this is the transport layer between clients and servers, which is responsible for two-way communication channels and authentication between clients and servers. It handles connection establishment, message framing, and secure communication between MCP nodes. In the client-to-server stream, MCP protocol messages are converted into JSON-RPC format, allowing for the transport of different data structures and their processing rules. In the reverse, server-to-client stream, the returned responses in JSON-RPC format are converted back into MCP protocol messages. The three JSON-RPC message types include requests, responses, and notifications. Requests require a response from the server, whereas notifications do not. Surrounding clients and servers, the MCP transport layer defines two primary transport mechanisms, both transporting messages in JSON-RPC 2.0 format. The first is Standard Input-Output, or STDIO. This mechanism is particularly effective for integrating local resources, as it provides simple, lightweight, synchronous message exchange with systems, such as local file systems, databases, and local APIs. The second is Streamable HTTP. This mechanism facilitates client-to-server communication over HTTP post, with optional support for server-sent events to enable streaming. It is designed for remote server interactions and accommodates standard HTTP authentication methods such as bearer tokens, API keys, and custom headers. The MCP standard advises using OAuth authorization framework to obtain authentication tokens. In this video, you learned that. The MCP client-server model consists of three core architectural components – the host, the client, and the server. The host application acts as the bridge between the user and the underlying AI model. The MCP client runs within the host application and is responsible for translating user requests into a structured, standardized format. The MCP server is an external service that supplies context to the LLM by translating user requests into server-side actions. MCP primitives define what clients and servers can provide for one another and consist of tools, resources, and prompts. MCP is structured into two layers – the data layer and the transport layer. The data layer defines a JSON-RPC-based client-server protocol which encompasses lifecycle management and fundamental primitives. The transport layer is responsible for two-way communication channels and authentication between clients and servers. The MCP transport layer defines two primary transport mechanisms, both transmitting messages in JSON-RPC 2.0 format. The STDIO transport mechanism is particularly effective for integrating local resources. And the streamable HTTP transport mechanism facilitates client-to-server communication over HTTP post and is designed for remote server interactions.

      f73_mcp_in_action:
        source_file: "73. MCP in Action.txt"
        content: |
          [MUSIC] In 2025, the way we build applications has fundamentally shifted. And that's thanks to Model Context Protocol, or MCP for short. MCP is the protocol that finally lets us retire our collection of duct tape, baling wire, and hand-rolled JSON glue code. Instead of writing yet another custom integration every time an AI model needs to talk to an API, MCP standardizes the whole thing, like a universal interface spec for your LLMs. So it's basically a USB-C for AI agents. One connector to rule them all. Plug your AI models into corepositories, communication platforms, mapping services, or any tool you need and watch the magic happen. No more bespoke adapters. No more SDK bingo. And here's how it works: The user sends a prompt to the MCP client. Here's the prompt, going to the MCP host with the client. The client figures out what the user wants. So let's say, "Do a price comparison on organic chicken breast, and have Google Maps send me to the cheapest grocery store on my way home from the gym. It then picks the right tools through the MCP server, right over here. It then calls any external APIs it needs and collects and processes the results and then sends everything back to the user. All of this is happening behind the scenes. Now the MCP host is where the main app runs. This is everything running right in the center. It includes the MCP client and connects to all the tools and data the AI needs to do its job. The MCP client, think of this as the middleman. It sits inside the host and talks to one or more MCP servers. So here we have one server, but we could have several more. What they can do is find the right function to call and handle the back and forth to get the answers the AI needs. The MCP server is where all the tools live. The server connects to external systems and offers up three things. First, we have tools. These are functions that the AI can call. Second, we have resources. So this is where all the data comes from. And last, the prompts. As you know, prompts are predefined, preset instructions that help guide the AI's behavior. Now that we understand how MCP works under the hood, let's take a look at some real-world use cases, starting with my personal favorite because I work with it all the time. And that's GitHub. Inside the GitHub MCP server, you connect your AI agent directly to the GitHub's API. This means the AI can automatically handle tasks like managing repositories, issues, pull requests, branches, and releases, all while taking care of authentication and error handling for you. But what does this actually mean for you? Instead of manually reviewing every pull request or constantly checking for issues, the AI can do the following. It can review pull requests automatically and flag potential problems. It helps spot bugs earlier by analyzing code changes. It helps enforce consistent coding standards across your team. But it goes even further. It can sort and prioritize incoming issues so your team knows exactly what to work on and what's really most important. It keeps your dependencies up to date without you having to lift a finger. And lastly, it scans for security vulnerabilities and alerts you early, so no more nasty surprises later. But why, you ask, is this a big deal? Well, if you're managing multiple repositories or even just one really busy one, MCP takes care of a lot of the routine work that normally eats up developer time. Instead of spending hours on maintenance, your team gets to really focus on what's most important. For example, everyone has time to focus on actual development. For fewer bugs, slipping through the cracks, or maybe even no bugs at all. And you can guarantee for cleaner and more consistent codebases. Now let's take a look at another real-world MCP use case. Here's the situation. You run a company that provides online software. Your customers often need help. For example, password resets. We all know it, it's annoying. Billing questions. Bug reports. Technical troubleshooting of all sorts. The problem is that normally you'd need a big support team answering emails, looking up customer data, checking logs, and sometimes escalating the issues to the engineer. Here's the solution to this. With MCP, you connect your agent to all the tools your support team normally uses. The customer database to find user info. The billing system to check payments. The server logs to analyze issues. The knowledge base to find help articles. The ticketing system to create or update support tickets. Because MCP defines a standard way for the AI to talk to all these tools, you don't have to build a custom connection every single time to connect them. It's much easier. The AI can see all the data it needs, call the right functions, and handle most support cases automatically. So for example, a customer writes, "Hi, I can't log in. It says my subscription expired, but I just paid." The AI, using MCP, can then look up the customer's account, check billing records, verify payment status, update the subscription if needed, and then reply, "Thanks for reaching out. I've confirmed your payment and reactivated your account. You should be able to log in now." The benefit is that you have faster support for your customers, less work for your human support team, fewer mistakes because AI always checks all systems the same way, and it's much easier to scale as your company grows. So in simple terms, MCP lets your AI talk to your company's systems like a real support agent, but faster, 24-7, and without needing custom code for every system. So what these two real-life examples of MCP have shown us is that MCP really is a game changer. Those teams who build their applications using MCP will take their applications to a new level. [MUSIC]

      f74_run_existing_mcp_servers:
        source_file: "74. Run Existing MCP Servers.txt"
        content: |
          Welcome to the Run Existing MCP Servers video. After watching this video, you'll be able to create a client to connect to MCP servers, describe the two main transports for communicating with MCP servers, and explore and call tools from an MCP server. Fast MCP servers behave like remote function libraries. Instead of importing locally, you connect to services anywhere. Here we have a simple MCP server to perform mathematical calculations. The client is your code that connects to an MCP server and is represented by a Python object. Each server has tools, like add and multiply. The server can run anywhere. Your code talks to it over the network. We call tools using the tool name and parameters. The tool name is add, and we pass parameters a and b with values 1 and 2. The parameters are set, the add tool is selected, and the result 3 is transmitted back via the transport. The rest of this video will show how the MCP server communicates with the client via a transport mechanism. The first transport is STDIO, which stands for Standard Input Output. This is used to communicate with a server running on your own system. The client uses STDIN, which stands for Standard Input, which sends messages to the MCP server. And the server uses STDOUT or Standard Output to communicate back to the client. STDIO is ideal for testing in applications that don't need network connectivity. The second transport is HTTP, which stands for Hypertext Transfer Protocol. This is used to communicate with a server over a network connection, rather than just your own system. The client sends HTTP requests to the MCP server, and the server responds with HTTP responses. The HTTP transport is suited for remote setups, where the client and server may run on different machines or across the internet. It enables MCP servers to integrate with web tools and cloud services. In the rest of the video, we'll focus on constructing the transport as shown in the image, a Python object that acts as a bridge between your client and application and the MCP server. We'll cover the main two transports in detail, STDIO and HTTP. Later, we'll also introduce several other transport options. Context 7 provides up-to-date code documentation and API references formatted specifically for LLMs. You input library names, search queries, or requests, and the output it returns can be up-to-date code snippets and documentation formatted in Markdown for LLMs, library trust scores and compatibility details, or API references and function descriptions. When we access the MCP server, we input the tool we want, in this case, resolve library ID and parameters with the library name. The tool then selects the appropriate documentation, in this case, a list of library names with a lot of other info, in this case, scikit-learn. The second tool is getLibraryDocs. The parameter is the output from before. The MCP server will select the tool and send the appropriate docs. First, let's see how to use the STDIO transport. We need to import some libraries. First, we import client from fastmcp and stdio-transport from the fastmcp.client.transports module. The client library handles our connection to the MCP server, and the stdio-transport library enables communication with servers running locally on your system using standard input-output. We need to create an stdio-transport object to establish the connection with the client. It connects your Python code to the MCP server via the stdin and stdout transports. The arguments include the npx command that downloads and runs the context 7 MCP server – think about it like a PIP install for JavaScript. It also includes the args command with the dash y flag to auto-confirm installation prompts. At upstash or context-7 mcp is the name of the server package we discussed earlier. We pass the stdio-transport object into the client constructor to create the stdio-client object. We use the stdio-client object to communicate with the MCP server. As shown in the diagram, the stdio-client encapsulates the connection with the box around the client and transport. Since communication between stdio-client and the MCP server can take some time, Python uses async methods to prevent freezing, which allows other tasks to run concurrently. The async with stdio-client as client command creates a context manager that automatically handles connection setup and cleanup after the code in the indent has run. The client.list-tools command requests available tools from the server. And the await keyword pauses this task until the server responds, while allowing other tasks to continue. The tools variable stores the list of available functions we discovered that we can call. The MCP server will send a list of tool objects as shown in the image. We show it as a list, but what is actually transmitted depends on the protocol used. Let's examine the tools list that contains the two tool objects returned by the MCP server. The number of tools corresponds to the list length. To access info for the first tool, we use the first element of the list and examine the tool attribute .name. We get resolve-library-id, which searches for library identifiers. Similarly, for the second element, we use the name attribute to get get-library-docs, which retrieves actual documentation. We can access detailed tool information by examining the first element of the tools list using the description attribute. This tool resolves package names to context 7 compatible library IDs, analyzes queries for relevance, and returns the most suitable library match based on name similarity, documentation coverage, and trust scores. The input schema is the second attribute and defines the required parameters for this tool. For example, this tool requires a library name parameter of the string type and a description explaining what the tool does. In this case, the description is, library name to search for and retrieve a context 7 compatible library ID. You can also see that library name is listed as a required parameter. Let's call the resolve-library-id tool on the FastMCP library. We'll use the client.call-tool method to actually access the MCP server. When calling the call-tool method with an async context manager, we call the method with three arguments, the tool name, resolve-library-id, the library name parameter, and the library we want, which is FastMCP. Printing the output shows tool documentation for resolve-library-id. It converts library names to context 7 IDs and returns matching options with trust scores. In this example, we searched for FastMCP and got multiple FastMCP library results to choose from. Using the context 7 compatible library ID from the previous tool, we can obtain documentation. Using the call-tool method with async, we use the get-library-docs tool. The tool takes input parameters, the library ID, slash punkpi slash fastmcp, and a token limit of 5,000 to control output length. We can print out the response, which displays code snippets with titles, descriptions, and source links for working with FastMCP. So far, we've seen how to use the stdio transport. Now, let's see how to use the HTTP transport instead. The code for using HTTP transport is almost identical to the one we saw previously for stdio. So again, we start by importing the streamable HTTP transport library from the fastmcp.client.transports module. We create a transport layer using the streamable HTTP transport object, HTTP underscore transport. The parameter URL connects to the MCP server's HTTP endpoint at the specified URL. This enables bidirectional communication over standard web protocols anywhere. The HTTP transport object is used as input for the client constructor, creating an HTTP underscore client. Once the HTTP underscore client is set up, it's just like the stdio client. We use async with HTTP underscore client as a client pattern. The client.list underscore tools method returns identical tool objects. We use client.call underscore tool, resolve library ID, to find library IDs and search for FastMCP options. And we use client.call underscore tool, get library docs, to retrieve code snippets using the library ID. Only the transport differs, the rest is identical. Here's a concise summary of the other MCP transports that can be used. Server Sent Events, or SSE, is a legacy transport for HTTP communication and is now replaced by the streamable HTTP transport. It uses asymmetrical channel communication. In-memory transport establishes a direct connection within the same Python process, eliminating network overhead. It employs direct function calls between the different components and is primarily used for development and testing purposes. But the bottom line is, you shouldn't need to use these as stdio and HTTP cover most real-world MCP use cases. When clients receive tools, they are structured by MCP. Essentially, this means that clients require some sort of adaptation to MCP to understand and use the tools. For example, LangChain has an MCP adapters library to convert MCP tools into LangChain-structured tools compatible with LangChain and LangGraph. MCP is a standard that requires clients to conform to its specifications to both access and invoke its capabilities. Remember that the term tool is used across different agentic frameworks and protocols, it doesn't fit to a singular ecosystem. There are different clients that adapt tools to different scenarios. So you'll see the other ways of instantiating clients as you progress in the course. In this video, you learned that MCP servers act as a bridge between LLMs and external tools or services. They support two main transports, stdio, used to connect with local servers via subprocesses, and HTTP, used to reach remote servers over the internet. The same client API works across both transports, making integration consistent and portable. Context 7 provides LLM-ready documentation that models can consume directly. Client connections use the async-await pattern, enabling non-blocking communication with servers. And MCP servers are the foundation for the next generation of LLM capabilities.

      f75_build_an_mcp_application_with_python:
        source_file: "75. Build an MCP Application with Python.txt"
        content: |
          Welcome to the "Build an MCP Application with Python" video. After watching this video, you'll be able to Create MCP servers using both STDIO and HTTP transports Use the MultiServer MCP Client class to configure sessions to multiple MCP servers Build a Langraph React agent powered by GPT-5 And create a looping CLI tool to talk to a session persistent agent You've already seen how to connect, create a client, and set up a transport for an MCP server. This video walks through the concepts and steps discussed in the upcoming lab. The next step is to build your first MCP application. Remember that the transport is how MCP servers and MCP clients communicate. Building an MCP application starts by integrating your MCP server with an agent, allowing the agent to use your server tools, data, or capabilities within a larger workflow. Let's say we want the MCP server to process X and give us Y. The agent receives a prompt that requires an MCP tool. The agent selects which MCP tool to use and extracts the parameter X and sends it to the MCP server via the client and transport. The MCP server processes X and produces Y. The MCP server sends the result back to the LLM on the agent via the transport and client. The agent processes the response and provides the final output. You should be able to recall that there are two main MCP server subtypes, and each uses its own transport layer – HTTP for remote MCP servers and STDIO for local MCP servers. In the lab, we'll use Multi-Server MCP Client, which can connect to and update multiple MCP servers simultaneously. It supports both HTTP and STDIO MCP servers at the same time. There's no documented hard limit on how many MCP servers you can connect to with the Multi-Server MCP Client. All you provide is a list, or dictionary, of the servers. In practice, the limit is based on your resources and design, not an enforced cap. The big win for you is that it handles the low-level transport details on your behalf so you can focus on application logic. Using Multi-Server MCP Client, our application will connect to two real-world MCP servers. The MetMuseum-MCP server provides access to the Metropolitan Museum of Art's collection database – over 400,000 artworks with metadata, images, and historical information. The Context 7 server offers LLM-optimized documentation search across major frameworks and libraries, returning documentation that AI can understand and use directly. The agent selects the best MCP tool based on the prompt. For example, if you ask, what's the best place to see art in NYC? The agent will select a tool from the MetMuseum server to search their collection. But if you ask, what is scikit-learn? The agent will select a tool from the Context 7 server to fetch documentation about the library. Next, we'll look at how to code the application. First, we import Multi-Server MCP Client. Then we create the Multi-Server MCP Client client object. The Context 7 key contains the values required for connecting to the Context 7 HTTP server. And the MetMuseum key contains the information needed for the STDIO server using NPX. Next, we'll import the components for our agent system. Create_react_agent builds a React agent and a language model for powering the agent's reasoning. In-Memory Saver provides conversation memory, allowing the agent to remember context across multiple exchanges. Asyncio enables asynchronous execution for non-blocking MCP server communication. The agent needs to know what functions it can call. So, we fetch tools from all connected servers using the get_tool method. The output is a list which we can print. The first element is the output of the library documentation for Resolve library ID. The agent will use this to call the ideal tool. The second element is the output for the library documentation for the MetMuseum server. Let's create the agent and everything we need. First, we'll initialize the LLM object. Before we create the agent, the agent needs to remember previous messages in the conversation. Therefore, we'll create a Memory Saver object. We then set the configuration with a thread_id. This is useful if you have more than one conversation happening simultaneously. It acts like a session identifier. Finally, we create the agent. To create the chatbot, we start by prompting the agent. This includes setting the agent's role, asking the agent to provide an introduction of its capabilities and available tools, and then printing out the response. The agent responds with a text introduction explaining its capabilities and available tools. This includes describing how it can help users access software documentation by resolving library IDs and retrieving documents, and how it can help explore the MetMuseum collection by listing departments, searching for museum objects, and getting detailed object data and images. We then create a basic chatbot to prompt the user, starting with a while loop. We ask the user to provide 1 to ask a question or 2 to exit. If the choice is 1, we prompt the user for their question, and we feed the user prompt into the agent using a invoke. We then print the agent's response. If the choice is 2, we print goodbye and break out of the loop. The chatbot displays the menu, and the user selects option 1 to ask a question. The user enters what is the Met, and the agent responds with detailed information about the Metropolitan Museum of Art, including its location, founding date, and collections. Depending on whether we use a .py file or notebook, we wrap the code in an async main function and use async.io in parentheses main with this check to run the asynchronous code. In this video, you learned that there are two main MCP server subtypes, and each uses its own transport layer. HTTP transport is used for remote MCP servers. STDIO transport is used for local MCP servers. Multi-server MCP client can connect to and update multiple MCP servers simultaneously. Multi-server MCP client supports both HTTP and STDIO MCP servers at the same time. There is no documented technical hard limit on how many MCP servers you can connect to with multi-server MCP client. The InMemorySaver object provides conversation memory, allowing the agent to remember context across multiple exchanges. Asyncio enables asynchronous execution for non-blocking MCP server communication. And when using a .py file, we wrap the code in an async main function and use asyncio.run in parentheses main to run the asynchronous code.

      f76_getting_started_with_mcp:
        source_file: "76. Getting Started with MCP.pdf"
        content: |
          08/04/2026, 11:33 about:blank
          Cheat Sheet: Getting Started with MCP
          Estimated time needed: 10 minutes
          This module explored the basics of creating and configuring MCP servers. Use this cheat sheet to quickly review and refresh the concepts you learned.
          MCP basics
          Topic Description
          Model Context Protocol (MCP) is an open-source standard for enabling AI applications with the capabilities of external systems. Using MCP, large
          What is
          language models (LLMs) like ChatGPT can execute tasks (e.g., sending an email), retrieve data (e.g., call information from the local file system), and
          MCP?
          perform specialized workflows (e.g., iterative code review).
          A simple analogy for MCP is to think of it like a USB port for AI applications. MCP provides a standardized interface that lets AI applications
          Analogy
          connect with external systems, just like how USB offers a universal way for devices to connect and communicate.
          Standardized integration: Set a standard/protocol for connecting AI to external systems, consistent and simple development patterns improve
          Why understandability and scalability.Interoperability: Wide support for different clients and AI models, and it is modular.Security: Uses OAuth 2.0 and
          MCP? token-based authentication.Minimizes hallucinations: Connects to external systems that are kept up-to-date, ensuring clean, accurate data, which
          reduces incorrect responses.Agentic workflow support: Enables AI agents for multi-step, dynamic tasks.
          MCP architecture
          Topic Description
          Three-layer MCP uses bidirectional communication using three message types in JSON-RPC 2.0 (Communication format). These messages are sent over
          architecture STDIO or HTTP, transports you will learn in the next module.
          1. InitializationClient sends an initialize request with protocol version and capabilities.Server responds with its capabilities.Client sends
          initialized notification to complete the handshake.2. OperationBidirectional communication begins.Client discovers and invokes tools,
          Initialization
          resources, and prompts provided by the server.The server can send notifications, logging messages, and other requests to the client.3.
          ShutdownClient sends a shutdown request, server responds and closes the connection.
          Multi-server The host process manages multiple MCP client instances.Each client handles its own sessions with a server (lifecycles and capabilities).The host
          client process aggregates capabilities and routes tool results to the correct client.
          Interaction with an MCP server
          Use the FastMCP library to create a simple Client that can call tools from an MCP server. First, import the client and the transport classes.
          from fastmcp import Client
          from fastmcp.client.transports import StreamableHttpTransport, StdioTransport
          Then, create the transports. You can use either STDIO or HTTP:
          stdio_transport = StdioTransport(
          command = "npx",
          args=["-y", "@upstash/context7-mcp"]
          )
          http_transport = StreamableHttpTransport(
          url="https://mcp.context7.com/mcp"
          )
          Here, you’ll connect each transport to the same Context7 MCP Server. The transports are easily configurable to connect to any MCP server that supports that type of
          transport.
          Then create a client for each transport:
          stdio_client = Client(stdio_transport)
          http_client = Client(http_transport)
          about:blank 1/2
          
          08/04/2026, 11:33 about:blank
          Finally, you can open an asynchronous context manager for the client and call the tools using client.list_tools()
          This lists all tools with their name, description, and metadata (includes input schema).
          You can also use the client.call_tool("tool_name", {"key": "value"}) method to call a tool with input parameters.
          async with stdio_client as client:
          # List of tools the server provides
          tools = await client.list_tools()
          # Call the tool with the given parameter(s)
          response = await client.call_tool("resolve-library-id", {
          "libraryName": "fastmcp"
          })
          You can also use the HTTP client:
          async with http_client as client:
          # List of tools the server provides
          tools = await client.list_tools()
          # Call the tool with the given parameter(s)
          response = await client.call_tool("resolve-library-id", {
          "libraryName": "fastmcp"
          })
