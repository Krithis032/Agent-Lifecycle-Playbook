      f77_hello_world_of_mcp_servers:
        source_file: "77. Hello World of MCP Servers.txt"
        content: |
          Welcome to the Hello World of MCP Servers video. After watching this video, you'll be able to Create MCP servers in STDIO and HTTP transports using FastMCP Register custom tools, resources, and prompts to an MCP server Test MCP servers with client connections and manual tool calling And create a multi-server client and ReAct agent FastMCP servers work like remote function libraries. Previously, you saw how to build a client and create a simple MCP application using an agent. In this video, we'll build a calculator MCP server and explore three concepts – tools, resources, and prompts. The transport is how MCP servers communicate. We'll integrate your MCP server with an agent and introduce a more complex client and transport layer for working with these agents. We'll create a FastMCP server object. Name will identify the MCP server. And instructions will define the natural language documentation LLMs use to determine when the tools apply. Creating an MCP tool is exactly like creating a tool in LangChain. Just like the at-tool decorator in LangChain, here we use the at-mcp.tool decorator. Also like a LangChain tool, we have a function. In this case, a function to add two integers together. And we have a dog string. Remember, the agent needs this to determine what the function does. It's how the LLM decides when to use this tool. We use type hints for the inputs a and b plus the return value. In addition, we create a subtraction tool following the same pattern. Resources are like filing cabinets that AI systems can access. Here we define a resource with at-mcp.resource and a URI template of file colon forward slash forward slash forward slash endpoint forward slash name. The name is a path parameter and is also an input to the function. When a client requests this resource, the name value is extracted from the URI, passed into the function as the name parameter, and the function returns the result. For example, when we call the resource with the parameter dog, the client sends a request to file colon forward slash forward slash forward slash endpoint forward slash dog. The string dog gets passed into the function, and it returns document contents of dog. And this result is sent back to the client. The resource returns a file. The name parameter is used in the URI pattern extracted from the URI. That same parameter is then passed to the function, which uses it to construct the file path path forward slash name, and load the text from disk in the server assuming the file exists. Prompts are reusable templates for common tasks. Instead of writing the same instructions over and over, you can save them once and the AI can call them by name. We pass in the parameter value, for example, code equals n equals 1. The output of the server is, please review this code, n equals 1. In-memory transport is a fast way to test your MCP server. We import client from fastmcp and instantiate it by passing in our MCP server object. This creates an in-memory connection, the simplest way to test when your client and server are in the same process. Now let's call our MCP tool to test it. We create an async function that wraps the client connection. The async with client command establishes the connection to the MCP server. The async context manager automatically handles opening and closing the connection. With await client dot call underscore tool, we call the tool by name, which is add, and pass the parameter as dictionary. The await keyword waits for the server's response without blocking. When we call call underscore add underscore tool for 5, we get back a response object with multiple ways to access the result of 9. Next we'll test resources. We create an async function that calls a resource with client dot read underscore resource. Next we call the function, and we get a response. Let's create an HTTP MCP server. We call the run underscore HTTP underscore async method on our MCP object passing in the port number. This starts the MCP server as an HTTP server running on port 8000 forward slash MCP. The server can be located anywhere, but as long as you have access to the URL, you can find it. Now we need to configure how the client will communicate with our HTTP server. We create a transport object using streamable HTTP transport. This tells the client to use HTTP as a communication protocol. The URL parameter specifies the location of the server. Finally, we create the client using the transport underscore HTTP object as input to the constructor. Our application will use this client to communicate with the MCP server. Next we'll test our MCP client. Our test function takes three parameters, the client, and two integers, with client as a parameter now, making the function reusable with different clients. Inside async with client opens the connection, and await client dot call underscore tool invokes the add tool. The client sends integers 4 and 5 to the server. Remember, the server can be located anywhere, on your own machine or on another continent. The two numbers are added on the server and the result is 9. This result is sent back to the client. We'll now import the essential components for creating our MCP HTTP powered agent. First, we import create underscore react underscore agent and chat open AI, and then define chat open AI as our large language model. Then we import load underscore MCP underscore tools, which converts MCP tools to lang chain format. Finally, we import the client session and streamable HTTP underscore client components. Next, we connect our HTTP powered agent to the MCP server using async methods. Streamable HTTP underscore client establishes the HTTP connection and returns three parameters, read, write, and underscore sid. The streams for receiving and sending data, plus a session ID. These streams are passed to client session, which manages the MCP protocol communication. We initialize the session with await session dot initialize. This performs the MCP handshake. And we load the MCP tool using load underscore MCP underscore tools passing in the active session. We create a ReAct agent, passing in our LLM and the converted tools. Finally, we invoke the agent with a prompt. The agent can now discover and use our MCP tools to respond. The agent extracts the numbers from the text, in this case, 1 and 2. These integers are sent to the MCP server. The result is calculated and sent back to the agent. The LLM converts it into a natural language response. For the STDIO transport, the server runs on your own system. The client launches the server as a child process and communicates via stdin slash stdout pipes, unlike HTTP, where you connect to an already running server. This is done via the Python file stdio underscore server dot py. This is the Python file. If you're using Jupyter, you'll need to save it as a dot py file. The code is identical to before, except we add mcp dot run at the end to start the server on stdin slash stdout. Next, we'll configure the STDIO transport. To do this, we run the Python file stdio underscore server dot py. Then we create the STDIO client with stdio underscore transport underscore client. This will spawn the server process when we connect. Next, we'll test the STDIO MCP client. The client sends the integers 4 and 5 to the server using the STDIO transport client. The two numbers are added on the server, and the result is 9. The result is sent back to the client. Using STDIO with an LLM is identical to using HTTP, except for the transport configuration. However, instead of streamable HTTP underscore client, we use stdio underscore client with stdio server parameters to launch the server as a child process. The rest is the same. Create the session, initialize, load the tools, build the agent, and invoke the agent. We can connect multiple MCP servers using multi-server MCP client. The input is a dictionary where each key is a server name, and the value specifies the server type and transport configuration. For STDIO, we specify the Python file that runs the server. For HTTP, it's simply the URL. Using multi-server MCP client, we can use the client directly for tool use. We obtain the tool list from all connected servers. We create the agent with those tools, then we invoke it to get a response. All using simple await calls. In this video, you learned that The transport is how MCP servers communicate. Creating an MCP tool is exactly like creating a tool in LangChain. Services are like filing cabinets that AI systems can access. Prompts are reusable templates for common tasks. In-memory transport is a fast way to test your MCP server. With the HTTP transport, the MCP server can be located anywhere as long as you have access to the URL. With STDIO transport, the server runs on your own system. Using STDIO transport with an LLM is identical to using HTTP except for the transport configuration. And, you can connect to multiple MCP servers using multi-server MCP client.

      f78_build_an_enhanced_mcp_server:
        source_file: "78. Build an Enhanced MCP Server.txt"
        content: |
          Welcome to the Build an Enhanced MCP Server video. After watching this video, you'll be able to Set up the workspace and MCP server. Use MCP context to log processes, report progress, and elicit user inputs. And create tools, resources, and prompts for their individual use cases. This video walks you through the key steps you will perform in the upcoming lab to build an enhanced MCP server. In the lab, you will also get to build a simple but extensible MCP client with a CLI menu to interact with your MCP server and a Claude chatbot. The first thing we'll need to do in the lab is set up the workspace. The first command will clone the project template from a GitHub repository. Next we'll use the PIP package manager to create a Python virtual environment to contain our development workspace. We'll call this .venv. Then we'll activate the virtual environment. And finally, we'll navigate to the project root in the virtual environment and install the dependencies. These dependencies are listed in the requirements.txt file. Once we have the workspace set up, we'll build our MCP server. We need to open the server.py file, and then import the required dependencies that we installed previously. Next, we'll define a global variable for the base directory path, a schema for user elicitation which we'll use later, and the MCP server object. Finally, we'll create a helper function that returns the
          absolute path from BASE_DIR when given a relative path. After we complete the workspace and server setup, we will move on to implementing the MCP server's capabilities, also commonly known as primitives. The three most common primitives are tools, resources, and prompts. And these MCP server primitives might require access to underlying MCP session or advanced MCP server capabilities. The context object from the FastMCP library provides a clean interface for accessing these features and capabilities. Such features include logging, progress reporting, and user elicitation. The first of the MCP server primitives is tools. In the server.py file, we will create two tools to interact with the files in the project directory. The first tool is a function that creates a file given the file path name and contents. The function standardizes the relative path using the get_path helper function. It then creates the parent directory if it doesn't exist and writes the content into the file path. The function tool writes to the file in chunks and uses context to report progress. And it uses context for logging and error messages. The second tool deletes files instead of creating them. Like the previous tool, which used write underscore file, it standardizes the relative path to an absolute path before performing any actions. This tool uses delete underscore file to check if the path is a file and deletes it. However, if it is not, such as if it's a directory, it raises an error. Again, context is used for logging and error messages. Resources are used to fetch and expose typically static, sometimes dynamic information. This can be from a database, remote repository, or files local to the MCP server itself. If the fetch process is the main purpose of the resource, which is true more often than not, you are better off using a tool. For example, if you're fetching from remote repositories that require special configuration, just make a tool with an input for the information you want. MCP resources use a unique Uniform Resource Identifier URI system. In the header, when defining an MCP resource, you define the path to the resource wanted, which can be parameterized. This allows for structured and organized resource identification. The static portion of URIs can be anything, for example, dir:// or docs:// and are chosen by MCP server developers. This makes resources hard-coded, in the sense that clients would need to know the specific URIs associated with their wanted resource. All in all, resources are best for passive data access of readily available information, whereas tools are better for active operations, such as calls to a database. Resources that have parameterized URIs are known as resource templates. They serve the same function as normal resources, but function a bit differently, as they have a dynamic URI. So next, in the server.py file, we'll create a resource template for fetching a file relative to the current directory. As before, we'll start by getting the standardized path with get_path. Then we check if the path is a valid existing file and return its contents, or an error message if it's not. There is a caveat to mention here. The URI file:/// has three forward slashes because file:// with just two forward slashes, is a reserved URI that expects a host. Our host is the local directory, so we put an extra forward slash. We'll then create another resource, which will return a list of files and directories in the current directory. The path we provide is a simple dot, which denotes the current directory. We then collect all the directory items, including their metadata. A list of items is created and returned in a JSON object in the items field. Prompts are structured templates that return a prompt message with the given parameters filled out. Prompts are designed to be user-controlled, meaning users can choose a prompt based on their situation and fill out the parameters accordingly. Next, we'll create a prompt to perform a code review and quality evaluation on a given code file. First, we check that the target file for code review exists. This logic should usually not be handled inside the prompt, but it's fine in this case. Then, the content and language of the file are extracted. This information is then placed inside a long message, which is returned as the final prompt. Prompts templates can be filled out via simple function inputs that can be handled by the client as we've just seen, or we can use user elicitation. The user elicitation feature uses MCP context to allow servers to request structured inputs from users during prompt building or tool execution. It requires a special handler function in the client. We will build this part later in the lab. User elicitation can be used in a wide range of scenarios. For missing parameters, to get unknown information that is required. For clarification requests, to get user confirmation for ambiguous situations. And for progressive disclosure, to collect information gradually. Here we'll use elicitation to create a prompt to generate a separate documentation file of a given file. Rather than using the function inputs, this prompt uses the elicit method from context to get both the file to generate documentation on and the new documentation file name. Again, there are checks that the file exists before extracting its content and language. Finally, the prompt is built with the extracted results and the elicited new file name. Before we finish with the server.py file, we have to create an entry point. This entry point starts the MCP server when the script is run. This ensures that the server runs and listens for MCP client connections via standard input-output STDIO. In this video, you learned that MCP is a universal protocol that lets LLMs interact with their environment not just generate text. MCP provides a standard structure for extending LLM capabilities through tools, resources, and prompts. Tools let models take action, such as creating or deleting files. Resources give models controlled access to data, such as reading files or listing directories. Prompts define reusable workflows, guiding the model through structured tasks. The context system adds logging, progress updates, and user input elicitation for richer interaction. And MCP servers expose these capabilities, and MCP clients connect and coordinate them with an LLM.

      f79_enchanced_mcp_server_cheet_sheet:
        source_file: "79. Enchanced MCP Server Cheet Sheet.pdf"
        content: |
          08/04/2026, 13:14 about:blank
          Cheat Sheet: MCP Server
          Estimated time needed: 10 minutes
          This module covered the basics of creating and configuring MCP Servers. Use this cheat sheet to quickly review and refresh the concepts you learned.
          Transports
          Overview
          In MCP, the client and transport work together to carry messages between the AI application and the MCP server. The client acts as the translator and coordinator. It
          understands what the application needs, formats those requests correctly, and interprets the responses it receives. It also knows the MCP rules and ensures
          communication follows them.
          The transport, on the other hand, is simply the path or communication channel that messages travel through, such as a WebSocket or a pipe. It does not understand
          the meaning of the messages. It simply delivers them back and forth reliably.
          So, the client handles the logic and protocol, while the transport manages the low-level message delivery.
          The Model Context Protocol (MCP) communicates using the JSON-RPC format. But how does this information travel between the client and the server? MCP
          supports two standardized transports: STDIO and HTTP.
          STDIO
          JSON-RPC messages are exchanged over the system's stdin (standard input) and stdout (standard output) streams.
          These streams are the data "pipes" of a program handled by the operating system.
          STDIO doesn't require a network connection, which makes it ideal for local implementation and development.
          Think of it as a direct "plug-in" connection between the client and server that uses standard input and output streams for communication.
          The client writes requests to the server's stdin, and the server sends responses back through stdout.
          HTTP
          JSON-RPC messages are exchanged using HTTP requests and responses — HTTP is the protocol used by web browsers to send and request information.
          The client sends a JSON-RPC request in the body of an HTTP POST request, and the server replies with a JSON-encoded response.
          This method allows communication over a network (e.g., between machines, across the Internet), making it ideal for remote MCP servers with support for
          authentication, encryption, and routing.
          Think of it as sending and receiving structured "letters" over the Internet — each "letter" is an HTTP request containing a JSON-RPC message in its body.
          The client acts as the sender, wrapping the message with HTTP headers (like the envelope's address and stamp).
          The server acts as the recipient, reading the request, processing it, and sending back an HTTP response (another JSON "letter") with its own headers
          and body.
          This request–response cycle follows standard web rules, allowing messages to travel over the web.
          SSE (deprecated)
          Server-Sent Events (SSE) is a deprecated transport used for streaming messages from the server to the client over HTTP.
          It used a unidirectional connection, meaning the client could receive continuous updates but couldn't send data the same way.
          SSE relied on the server keeping an open HTTP connection to push updates.
          It has been deprecated in favor of simpler and more reliable transports (STDIO and HTTP), which support full two-way communication.
          Think of it as an old "radio broadcast" style — the server could talk, but the client could only listen.
          Main components
          MCP Servers provide three main components, also known as primitives, to clients: tools, resources, and prompts.
          Tools
          Tools enable interactions with external systems; they are active functions that perform actions.
          When something needs to do work or cause a change, use tools.
          e.g., Query a database, call an API, perform computations
          Tools have unique name identifiers and metadata (description, parameters) that the client can read to understand their usage.
          Tools have defined input and output schemas to ensure safe, consistent, and predictable behavior.
          Tools are designed to be model-controlled; this means that LLMs discover and invoke tools automatically based on their contextual understanding (metadata)
          and the user's prompting.
          Resources
          Resources provide passive access to data; they expose structured information that the model can read, reference, or observe, but not directly modify.
          Example: Reading from a document, fetching stored configuration data, or accessing project files.
          Active data access is better handled by a tool.
          Each resource follows a Uniform Resource Identifier (URI) convention (e.g., mcp://resource/secret), allowing it to be uniquely identified and referenced
          by clients or tools.
          Resource templates define patterns for generating multiple related resources (e.g., mcp://resource/{userId}/settings).
          about:blank 1/4
          
          08/04/2026, 13:14 about:blank
          Resources are designed to be application-driven, meaning that host applications determine how to incorporate them based on its needs.
          e.g., The application has set triggers to call a resource.
          Prompts
          Prompts are templates that define reusable instructions, workflows, or conversation starters for the model.
          Example: "Summarize this document," "Generate a report outline," or "Draft an email reply."
          Prompts contain structured input parameters that users or systems can fill in to guide the model's behavior.
          Clients can discover available prompts, retrieve their contents, and fill them in with custom parameters.
          Prompts are designed to be user-controlled; they focus on guiding model reasoning rather than performing actions.
          Context
          MCP Context provides access to the active MCP session and its capabilities. This allows MCP primitives to interact with the server during execution. In Module 2,
          you encountered these three features of MCP Context:
          Logging: Record informational messages, warnings, or errors from within tools and resources for debugging or monitoring.
          Progress reporting: Communicate task progress or completion status back to the client in real time.
          User elicitation: Prompt the user for input or confirmation when additional information is needed during execution.
          There are more capabilities of the MCP Context that you will explore in later modules.
          FastMCP implementation
          Instantiate your server object:
          from fastmcp import FastMCP
          mcp = FastMCP("MCP Server Name")
          Define primitive MCP components (tools, resources, prompts):
          @mcp.tool()
          async def mcp_tool(input_parameter: str):
          # do something
          return "Return something"
          @mcp.resource("uri://uniform/resource/identifier/{parameter}")
          async def mcp_resource(parameter: str):
          # get resource
          return "The resource"
          @mcp.prompt()
          async def mcp_prompt(input_parameter: str):
          return f"Prompt template with {input_parameter}"
          Use MCP Context:
          from fastmcp import Context
          from pydantic import BaseModel
          class ElicitSchema(BaseModel):
          field: str
          @mcp.tool()
          async def context_tool(ctx: Context):
          await ctx.info("Logging message")
          await ctx.warning("Warning message")
          await ctx.error("Error message")
          await ctx.elicit(
          message="Please provide information",
          response_type=ElicitSchema
          )
          return "Tool return"
          STDIO Manual Tool Calling:
          from fastmcp.client.transport import StdioTransport
          from fastmcp import Client
          about:blank 2/4
          
          08/04/2026, 13:14 about:blank
          transport_stdio = StdioTransport(
          command="python",
          args=["path/to/server/script"]
          )
          stdio_transport_client = Client(transport_stdio)
          async with client:
          tools = await client.list_tools()
          result = await client.call_tool("tool_name", {"tool_param": "param_value"})
          OR using lower-level library mcp:
          from mcp.client.stdio import stdio_client
          from mcp import ClientSession, StdioServerParameters
          server_params = StdioServerParameters(
          command="python",
          args=["path/to/server/script"]
          )
          async with stdio_client(server_params) as (read, write):
          async with ClientSession(read, write) as session:
          await session.initialize()
          tools = await session.list_tools()
          result = await session.call_tool(
          name="tool_name",
          arguments={"tool_param": "param_value"},
          )
          HTTP Manual Tool Calling:
          from fastmcp.client.transport import StreamableHttpTransport
          from fastmcp import Client
          transport_http = StreamableHttpTransport(
          url="url_of_http_mcp_server/mcp"
          )
          http_transport_client = Client(transport_http)
          async with client:
          tools = await client.list_tools()
          result = await client.call_tool("tool_name", {"tool_param": "param_value"})
          OR using lower-level library mcp:
          from mcp.client.streamable_http import streamablehttp_client
          from mcp import ClientSession
          async with streamablehttp_client("url_of_http_mcp_server/mcp") as (read, write, _sid):
          async with ClientSession(read, write) as session:
          await session.initialize()
          tools = await session.list_tools()
          result = await session.call_tool(
          name="tool_name",
          arguments={"tool_param": "param_value"},
          )
          Author(s)
          Joshua Zhou | Data Scientist Intern @ IBM
          Joseph Santarcangelo | Data Scientist @ IBM
          about:blank 3/4
          
          08/04/2026, 13:14 about:blank
          about:blank 4/4

      f80_mcp_client_architecture_and_fundamentals:
        source_file: "80. MCP Client Architecture and Fundamentals.txt"
        content: |
          Welcome to the MCP Client Architecture and Fundamentals video. After watching this video, you'll be able to Describe the three-layer architecture of the Modeled Context Protocol Understand the fundamentals of MCP Client Communications, Lifecycle Phases, and Capability Negotiation Describe the MCP Server Primitives and the basics of the STDIO Transport Explain how MCP supports a multi-server client architecture Describe the difference between TypeScript and Python's SDKs for MCP And test and validate MCP Clients The Modeled Context Protocol defines a three-layer architecture. The host process orchestrates everything, managing client instances, enforcing security policies, and aggregating context from multiple servers. MCP Clients are protocol translators. Each client instance maintains a dedicated one-to-one connection with exactly one server. The key principle, if your application needs to connect to three servers, your host creates three separate client instances. Multiple applications can connect to the same server simultaneously. Each gets their own client-server connection. MCP servers expose specialized capabilities through three primitives. Resources for data, tools for action, and prompts for templates. MCP is built on JSON RPC 2.0, providing three message types. Requests expect responses. They have an ID and await a result or an error. Responses contain either a result or an error object. And Notifications are fire and forget. They have no ID and no response is expected. This foundation enables bidirectional communication. Clients call server methods such as list underscore tools and call underscore tool, while servers can send sampling requests to clients. All messages are JSON objects transported over STDIO or streamable HTTP. Every MCP connection follows three mandatory phases. Phase 1 is the initialization phase. In this phase, the client sends an initialized request with protocol version and client capabilities. The server responds with its capabilities and protocol version. And then, the client must send an initialized notification to complete the handshake. This negotiation ensures both sides agree on supported features for the connection. Phase 2 is the operation phase. In this phase, bidirectional communication begins. Clients discover capabilities through list underscore tools, list underscore resources, and list underscore prompts. Clients invoke tools, read resources, and get prompts. Servers can request sampling during this phase. Phase 3 is the shutdown phase. In this phase, the client sends a shutdown request. The server responds, and then the connection closes with a cleanup process. During initialization, clients and servers declare their capabilities. Client capabilities include experimental features, sampling support, and routes for file system access. Server capabilities advertise available features, tools, resources, prompts, and whether they support list underscore changed notifications. Both sides examine capabilities to determine what operations are possible. For example, if a server doesn't advertise tools capability, the client knows not to call list underscore tools. This negotiation enables graceful feature degradation and protocol evolution. MCP defines three core primitives. Tools are server-exposed functions that clients can invoke, such as read underscore file, query underscore database, or fetch underscore API. Servers define tool schemas with name, description, and input schema using JSON schema. Resources are data sources with URIs. Servers expose file colon forward slash forward slash or custom colon forward slash forward slash URIs that clients can read. Resources can be static or dynamically generated. Prompts are reusable templates for LLM interactions. Servers define prompt templates with arguments and message structures. Client's call a get underscore prompt function with arguments to receive formatted messages ready for LLM consumption. The STDIO transport is MCP's simplest transport mechanism. It's perfect for local development and command-line tools. The client spawns a server process and communicates through standard input and output. Messages are newline-delimited JSON. The server writes responses to stdout and error logs to stderr. The STDIO transport is process-based. When the client terminates, the server process ends. STDIO is secure for local-only scenarios. No network exposure, no authentication needed. It's the default transport for local MCP servers like filesystem, git, or database connectors. Production clients typically connect to multiple servers simultaneously. The host process creates one client instance per server connection. Each client independently manages its own lifecycle, initialization, capability negotiation, and operation. The host aggregates capabilities across all connected servers, combining tool lists, resource URIs, and available prompts. When the LLM needs to call a tool, the host routes the request to the correct client based on tool name. Both of the official MCP Software Development Kits, or SDKs, offer complete feature parity. TypeScript SDK uses Node.js with event-driven I.O., provides native HTTP and SSE support, integrates naturally with web frameworks, and includes the official reference implementation. Python SDK leverages AsyncIO for asynchronous operations, has excellent STDIO transport support, integrates with FastMCP for rapid server development, and works seamlessly with data science tools such as Jupyter Notebooks. Both SDKs are fully cross-compatible. Python clients work with TypeScript servers and vice versa. Therefore, you should choose which SDK to use based on your existing stack and deployment environment. You need to test your MCP client implementation systematically. Test servers are built into the official SDKs. Verify the initialization handshake completes with proper capability negotiation. Test all three phases – initialization, operation, and shutdown. Validate JSON RPC message formatting – all requests must have IDs, notifications must not. Verify transport layer, STDIO process management or HTTP connection handling. Test error handling for malformed responses and timeouts. Test capability detection – ensure your client respects server capabilities. And finally, use the MCP Inspector for debugging – it visualizes message flow and validates protocol compliance. In this video, you learned that MCP defines a three-layer architecture with one-to-one client-to-server connections. JSON RPC 2.0 provides the message foundation. Every connection has three phases – initialization with capability negotiation, operation with tools, resources, and prompts, and shutdown. The STDIO transport enables local development. Multi-Server hosts aggregate capabilities and route requests. And both TypeScript and Python SDKs are production-ready and fully compatible. In the first upcoming hands-on lab, you'll implement your first MCP client, connect to a local STDIO server, and invoke tools to see these concepts in action.

      f81_streamable_http_roots_and_sampling:
        source_file: "81. Streamable HTTP, Roots, and Sampling.txt"
        content: |
          Welcome to the Streamable HTTP, Roots and Sampling video. After watching this video, you'll be able to Understand the main difference between the STDIO and Streamable HTTP transports Describe the message flow for the Streamable HTTP transport Implement the Streamable HTTP transport for an MCP client Explain the sampling feature in MCP Implement the roots feature in an MCP environment Describe multi-transport session management in MCP MCP supports two transport mechanisms STDIO transport spawns a local server subprocess and communicates through STDIN and STDOUT with newline-delimited JSON RPC messages The server lifecycle is tied to the client process, perfect for local tools such as file system servers and Git interactions Streamable HTTP transport enables remote servers over networks The client connects to an HTTP endpoint using bidirectional streaming The server runs independently and can handle multiple clients simultaneously, each with its own connection Streamable HTTP replaced the deprecated SSE transport in March 2025, offering full bidirectional communication through a single endpoint The key difference is that STDIO is process-local with low latency, whereas Streamable HTTP is network-remote and production-ready Here's a quick comparison of the two transports for reference Streamable HTTP uses a single endpoint with bidirectional communication The client connects to the server's slash MCP endpoint, fastMCP's default path Both client and server can send messages through this connection at any time Unlike the deprecated SSE approach with separate POST and GET channels, Streamable HTTP provides a unified bidirectional stream The client sends JSON RPC requests, and the server responds with results The server can also initiate requests, such as sampling for LLM capabilities, and the client responds Notifications flow in both directions without expecting responses This bidirectional pattern mirrors STDIO's STDIN, STDOUT, but uses modern HTTP protocols with better reliability and resumability features The key benefits of Streamable HTTP are It is a single endpoint for all communication It uses fully bidirectional messaging It has better reliability than the deprecated SSE mechanism It provides built-in resumability support And it offers simple implementation Implementing Streamable HTTP in your MCP client is straightforward with the official SDK You start by importing the Streamable HTTP underscore client from the MCP SDK Then you connect your server URL with the slash MCP endpoint, which is the default fastMCP convention The client then returns three values, readStream, writeStream, and sessionInfo You use these streams to create a client session with the MCP SDK's session manager The session handles all protocol details Initialization handshake, capability negotiation, message routing, and bidirectional communication You call initialize to negotiate capabilities and send the initialized notification and then you're ready for operation The client automatically handles message framing, error recovery, and connection management This code snippet shows the client implementation pattern Sampling is an MCP feature that lets servers request LLM capabilities from the client during tool execution The workflow is as follows The server executes a tool and determines it needs LLM reasoning, perhaps to analyze code, summarize findings, or generate content The server sends a sampling slash create message request with messages array, system prompt, model preferences, and generation parameters such as temperature and max tokens The client receives this request and prompts the user for approval This is critical for security and cost control Only after approval does the client invoke the LLM The LLM response flows back through the client to the server which incorporates it into the tool result Sampling is optional Clients declare support and capabilities during initialization Servers must handle cases where sampling isn't available Here's an example of sampling request schema Roots are an MCP primitive for defining file system security boundaries During capability negotiation, clients can advertise roots support When a client supports roots, it declares specific URLs that define allowed file system paths such as these The MCP specification defines roots as the allowed directories for server file system access Servers that respect roots will only access files within declared root paths The client enforces these boundaries and before any file operation, it validates that the canonical path falls within a declared root Canonical path resolution is critical It can help resolve symlinks, normalize paths, and it checks the actual location to prevent traversal attacks such as accessing the etc slash password folder directly Roots implement the principle of least privilege meaning that servers only access what they explicitly need This enables sandboxing for development environments, multi-tenant isolation where different users have different root paths, and clear security audit trails showing which roots were declared and used This diagram shows the typical algorithm used for path validation And this code snippet shows the capability negotiation mechanism used with roots Roots can change dynamically during a session When a client's roots list changes, perhaps the user grants access to a new directory or revokes access The client sends a notifications slash roots slash list underscore changed notification to all connected servers Servers that declared roots capability with list changed support will respond by calling roots slash list to fetch the updated root list This enables dynamic security such as adding temporary roots for specific tasks, revoking roots when tasks are complete, and responding to user security preferences in real time The notification is fire and forget, no response is expected Servers that receive it should immediately call roots slash list to refresh their understanding of allowed paths This is an example of the notification schema for list changed notifications Some of the common use cases for roots list changed notifications are A user grants temporary access for a specific task A user revokes access after a task has completed A system admin adjusts the permissions in a multi-user system Or a security policy change requires root updates Production MCP clients often manage multi-server connections across both transports simultaneously The architecture uses a session manager that maintains registry mapping server identifiers to transport specific connections Each entry contains transport type, STDIO or streamable HTTP, connection state, connecting, ready, error, closed, and the active session instance When the application needs to call a tool, the request router looks up which servers provide that tool, retrieves the corresponding session, and dispatches the request through the appropriate transport This architecture enables flexible deployment topologies All STDIO for pure local development All streamable HTTP for cloud deployments Hybrid architectures with local file system servers via STDIO And remote API servers via streamable HTTP The key is the abstraction layer that makes transport differences transparent to application logic This code snippet shows the implementation of the session manager interface In this video, you learned that Streamable HTTP provides full bidirectional communication through a single endpoint MCP's streamable HTTP transport replaced the deprecated SSE transport mechanism in March of 2025 STDIO is for local processes, whereas streamable HTTP is for remote servers Sampling enables servers to request LLM capabilities with user approval Routes define file system security boundaries that clients enforce through path validation Dynamic routes with list underscore changed notifications enable real-time security adjustments In multi-transport scenarios, the session manager interface maintains registry mapping server identifiers for each connection And multi-transport session management enables flexible deployment topologies

      f82_mcp_security_with_permissions_and_elicitation:
        source_file: "82. MCP Security with Permissions and Elicitation.txt"
        content: |
          Welcome to this video on MCP security with permissions and elicitation. After watching this video, you will be able to explain how MCP uses permissions and elicitation, apply client-side policies using permissions.json, implement interactive approval workflows, and analyze audit logs and enforce effective permission management. As AI systems progress from answering questions
          to executing tools and interacting with real systems, security becomes critical. A single unchecked action can expose sensitive data or trigger unintended outcomes. MCP addresses this by introducing structured controls that ensure that actions are intentional, visible, and accountable. MCP security relies on two mechanisms, permissions
          and elicitation. Permissions are client-side policies that control tool execution, determining
          which tools run automatically, require approval, or are blocked. MCP defines three policies, allow, deny, and ask. These checks happen on the client before any server communication. Elicitation is server-initiated structured input. When extra confirmation or data is needed, the server sends a JSON schema defining fields, types, and validation rules. The client
          presents this to the user, validates the input, and returns structured data. Together, permissions control execution while elicitation ensures informed consent and validated
          input. This diagram shows how client-side permissions and server-initiated elicitation work
          together in an MCP application, highlighting where policy checks, user approvals, and structured input validation take place. MCP permissions rely on three client-enforced policies. Allow executes a tool immediately without user interaction, typically for safe,
          read-only operations, and the action is logged. Deny blocks the tool entirely for dangerous or restricted operations, with the request rejected before contacting the server. Ask requires illicit user approval for actions that modify data or have side effects. The client shows tool details and arguments and proceeds only after approval. Policies can be global per tool or argument-specific. For example, a client may allow reading test.txt but require approval for production.yaml. Policies are stored in a permissions.json file that users can edit, ensuring that security rules travel with the client rather than the server. Here is a simple guide for choosing the right permission policy. Use allow for safe, read-only actions with no side effects, such as reading files or listing directories. Use deny for dangerous, disabled, or unauthorized operations, such as deleting databases or exposing secrets. Use ask for actions that modify data, cost money, or have side effects, such as writing files, sending emails, or making API calls. Permission enforcement happens entirely on the client before any server interaction. First, the LLM decides to call a tool and generates the function call with arguments. For allow policies, the client immediately calls the server tool and logs the operation.
          For deny policies, the client returns an error to the LLM without contacting the server and logs the denial. For ask policies, the client prompts the user with full details, tool name, arguments, and risk level. When a server needs additional information to complete an operation, it doesn't just ask a freeform question. It sends an elicitation request with a formal JSON schema defining exactly what data is needed. Once the user completes the form, the client validates the entire structure against the schema. Only valid data gets sent back to the server. The user can accept with data, decline the request, or cancel the operation entirely. Here is an example of a JSON schema for the above example. Elicitation use cases include multi-step workflows,
          destructive operations, missing parameters, compliance documentation, and security acknowledgments.
          Schemas clearly define what information is needed and how it is validated, ensuring consistent behavior across environments. There are numerous benefits, including structured
          validation, audit trail with context, reusability across servers, version control, and compliance readiness. Here is an example of a JSON schema for a destructive operation. Even MCP clients classify operations by risk.
          Critical actions involve system-level control, such as executing commands or modifying security
          settings. These default to deny unless explicitly overridden with multiple approval gates. High-risk actions are destructive, such as deleting files or dropping databases. These default to ask plus elicitation requiring confirmation with structured input. Medium-risk actions modify data, such as writing files or updating records. These default to ask requiring user approval. Low-risk actions are typically read-only, such as listing or reading files. These default to allow with minimal friction. Risk-based controls ensure that MCP clients apply stronger safeguards as operational risk
          increases. This block of code highlights risk assessment logic. Audit logging is essential for security monitoring and compliance. Each permission decision is logged with a timestamp, tool name, arguments, applied policy, risk level, and outcome. Logs capture whether actions were automatic, required approval, approved, or denied, and whether execution succeeded. Elicitation logs include the schema and submitted data. Logs should be stored in append-only structured formats such as JSON lines with metadata such as user ID, session ID, and server identity. For compliance, audit logs prove what operations
          occurred, who authorized them, and when. This includes incident investigation, security monitoring, compliance reports, and access review. This block of code highlights the audit log entry structure. When an AI assistant attempts a sensitive operation, the client's permission layer intercepts
          it and assesses risk. For ask policies, the client prompts the user with full context, including risk level and tool details. The user can approve to proceed, deny to cancel, or request more information. If approved, the client may trigger server elicitation for additional confirmation. For example, deleting a file triggers elicitation requiring the user to type the file name and reason. The client validates this input and sends it to the server. Effective permission management relies on clear security patterns. Apply least privilege by starting with deny all and allowing only required tools. Grant permissions gradually as needed. Use environment-specific policies. Development can allow most tools. Staging should require approval. And production enforces deny by default with audited exceptions. Apply user-based policies so that different users receive appropriate permissions. Temporary
          permissions can be granted for tasks and revoked automatically. Support inheritance through base profiles and role-based templates such as Reader, Editor, and Admin. Store permissions.json in version control to track changes and enable rollback. In this video, you learned that MCP security uses two mechanisms, permissions and elicitation, to control tool execution and validate inputs. Permissions are client-side policies. Allow runs automatically, deny blocks on safe actions, and ask requires user approval. Policies can be global or argument-specific and are stored in editable permissions.json files. Elicitation is server-initiated and requests structured input via JSON schemas. The client validates and returns the data. Users can accept, decline, or cancel, ensuring well-formed inputs and informed decisions. MCP clients classify operations by risk – low, medium, high, critical – with each tier mapped to default permission policies. Audit logs capture decisions, inputs, and policies for compliance. Interactive workflows may require both client approval and validated input before execution depending on risk.

      f83_mcp_hosts_and_clients_cheetsheet:
        source_file: "83. MCP Hosts and Clients Cheetsheet.pdf"
        content: |
          08/04/2026, 14:44 about:blank
          Cheat Sheet: MCP Hosts and Clients
          Estimated time needed: 10 minutes
          This module focused on building and securing MCP Clients. Use this cheat sheet to quickly review the concepts, transport methods, and advanced security patterns
          you implemented.
          MCP client architecture
          Base/derived pattern
          The base/derived pattern separates low-level MCP protocol handling from application-specific logic. The base client manages connections, sessions, and server
          communication, while derived classes add UI or business logic. This architecture promotes code reuse and makes it easy to build multiple client applications (CLI,
          GUI, web) that share the same protocol implementation.
          from contextlib import AsyncExitStack
          from mcp import ClientSession, StdioServerParameters
          from mcp.client.stdio import stdio_client
          class MCPBaseClient:
          def __init__(self, server_script: str):
          self.session = None
          self.exit_stack = AsyncExitStack()
          self._connected = False
          async def connect(self):
          if self._connected:
          return
          server_params = StdioServerParameters(command="python", args=[self.server_script])
          stdio_transport = await self.exit_stack.enter_async_context(stdio_client(server_params))
          read, write = stdio_transport
          self.session = await self.exit_stack.enter_async_context(ClientSession(read, write))
          await self.session.initialize()
          self._connected = True
          async def list_tools(self):
          await self.connect()
          return (await self.session.list_tools()).tools
          async def call_tool(self, tool_name: str, arguments: dict):
          await self.connect()
          return await self.session.call_tool(tool_name, arguments)
          # Derived application inherits all protocol methods
          class MCPGUIApp(MCPBaseClient):
          async def gui_list_tools(self):
          tools = await self.list_tools()
          return "\n".join([f"• {t.name}: {t.description}" for t in tools])
          Key Benefits: The AsyncExitStack ensures proper cleanup of connections, _connected flag enables lazy initialization (connect only when needed), and derived
          classes inherit all protocol methods automatically without reimplementing connection logic.
          Server-initiated operations
          MCP allows servers to initiate requests back to the client, enabling advanced capabilities such as filesystem sandboxing, AI completions, and structured user input.
          Roots (filesystem security)
          Roots define trusted base directories for file operations. By validating all file paths against these roots, you prevent path traversal attacks where malicious code could
          access files outside the intended workspace using patterns such as ../../etc/passwd.
          from pathlib import Path
          BASE_DIR = Path(__file__).parent / "workspace"
          def is_within_roots(path: Path) -> bool:
          try:
          path.resolve().relative_to(BASE_DIR.resolve())
          return True
          except ValueError:
          return False
          @mcp.tool()
          def read_file(filepath: str) -> str:
          path = BASE_DIR / filepath
          if not is_within_roots(path):
          return "Error: Access denied"
          return path.read_text()
          Sampling
          about:blank 1/4
          
          08/04/2026, 14:44 about:blank
          Sampling allows the MCP server to request LLM completions from the client's AI model. This enables the server to leverage AI capabilities without direct model
          access.
          Security critical: Always require explicit human approval before executing sampling requests, as they can trigger arbitrary prompts.
          Elicitation
          Elicitation requests structured user input from the client using Pydantic schemas. Unlike simple text prompts, elicitation enforces type validation and ensures
          responses match expected formats. This is useful for operations requiring explicit user confirmation, such as destructive actions or sensitive operations.
          from fastmcp import Context
          from pydantic import BaseModel
          class ApprovalSchema(BaseModel):
          approved: bool
          reason: str
          @mcp.tool()
          async def delete_file(ctx: Context, filepath: str) -> str:
          response = await ctx.elicit(
          message=f"Delete {filepath}?",
          response_type=ApprovalSchema
          )
          if not response.approved:
          return f"Cancelled: {response.reason}"
          Path(filepath).unlink()
          return "Deleted"
          Transport methods
          MCP supports multiple transport mechanisms for client-server communication. Choose yours based on your deployment model: STDIO for local development and
          subprocess communication, and HTTP for remote servers and production deployments.
          STDIO (local)
          STDIO transport launches the server as a subprocess and communicates via standard input/output streams. This is ideal for local development, testing, and scenarios
          where the server runs on the same machine as the client.
          from mcp.client.stdio import stdio_client
          from mcp import ClientSession, StdioServerParameters
          server_params = StdioServerParameters(command="python", args=["server.py"])
          async with stdio_client(server_params) as (read, write):
          async with ClientSession(read, write) as session:
          await session.initialize()
          tools = await session.list_tools()
          HTTP (remote)
          HTTP/Streamable HTTP transport enables network communication between client and server. Use this for production deployments where the server runs remotely,
          microservices architectures, or when you need to expose your MCP server as a web service accessible to multiple clients.
          # Server
          from fastmcp import FastMCP
          mcp = FastMCP("HTTP Server")
          mcp.run(transport="http", host="127.0.0.1", port=8000)
          # Client
          from mcp.client.streamable_http import streamablehttp_client
          async with streamablehttp_client("http://127.0.0.1:8000/mcp") as (read, write, _):
          async with ClientSession(read, write) as session:
          await session.initialize()
          Security patterns
          Building secure MCP clients requires multiple defense layers: permission policies control which operations are allowed, audit logging tracks all actions for
          compliance, and human-in-the-loop approvals prevent unauthorized operations.
          about:blank 2/4
          
          08/04/2026, 14:44 about:blank
          Permission policies
          Permission policies implement a three-tier authorization model: allow (auto-approve), ask (require confirmation), and deny (block completely). This gives you fine-
          grained control over which tools can execute automatically versus which need user approval.
          class MCPPermissionClient:
          def __init__(self):
          self.permissions = {
          "read_file": "allow",
          "write_file": "ask",
          "delete_file": "deny"
          }
          def check_permission(self, tool_name: str) -> str:
          return self.permissions.get(tool_name, "ask")
          async def call_tool_with_permission(self, tool_name: str, args: dict, approved=False):
          permission = self.check_permission(tool_name)
          if permission == "deny":
          return "Permission denied"
          if permission == "ask" and not approved:
          return "Approval required"
          return await self.session.call_tool(tool_name, args)
          Audit logging
          Audit logs create an immutable record of all tool executions and authorization decisions. This is essential for security monitoring, compliance requirements,
          debugging issues, and understanding system behavior in production environments.
          def log_audit(operation: str, decision: str):
          log_entry = f"[{datetime.now().isoformat()}] {operation} - {decision}\n"
          with open("audit.log", "a") as f:
          f.write(log_entry)
          AI host integration
          AI host applications act as orchestrators that connect LLMs with MCP servers. The host translates between the LLM's tool-calling format (e.g., OpenAI function
          calling) and MCP's protocol, enabling the LLM to discover and execute MCP tools dynamically during conversations.
          LLM tool calling
          This pattern converts MCP tools into OpenAI function calling format, enabling the LLM to select and execute tools based on user queries. The host manages the
          conversation loop: sending messages to the LLM, detecting tool calls, executing them via MCP, and feeding results back to continue the conversation.
          from openai import OpenAI
          class MCPHostApp(MCPBaseClient):
          def __init__(self, server_script: str):
          super().__init__(server_script)
          self.llm_client = OpenAI()
          async def get_available_tools(self):
          return [{
          "type": "function",
          "function": {
          "name": t.name,
          "description": t.description,
          "parameters": t.inputSchema
          }
          } for t in await self.list_tools()]
          async def chat(self, user_message: str):
          self.conversation_history.append({"role": "user", "content": user_message})
          response = self.llm_client.chat.completions.create(
          model="gpt-4o-mini",
          messages=self.conversation_history,
          tools=await self.get_available_tools()
          )
          if response.choices[0].message.tool_calls:
          for tool_call in response.choices[0].message.tool_calls:
          result = await self.call_tool(
          tool_call.function.name,
          json.loads(tool_call.function.arguments)
          )
          self.conversation_history.append({
          "role": "tool",
          "tool_call_id": tool_call.id,
          "content": str(result)
          })
          return self.llm_client.chat.completions.create(
          model="gpt-4o-mini",
          messages=self.conversation_history
          about:blank 3/4
          
          08/04/2026, 14:44 about:blank
          ).choices[0].message.content
          return response.choices[0].message.content
          Synthetic tools
          Synthetic tools expose MCP primitives (resources, prompts) as callable LLM functions. This allows the LLM to access non-tool MCP features through the same
          unified tool-calling interface, making resources and prompts first-class operations in the conversation flow.
          async def get_available_tools(self):
          tools = [convert_to_openai(t) for t in await self.list_tools()]
          tools.append({
          "type": "function",
          "function": {
          "name": "mcp_read_resource",
          "description": "Read resource by URI",
          "parameters": {"type": "object", "properties": {"uri": {"type": "string"}}}
          }
          })
          return tools
          Best practices
          Client design:
          Use the base/derived pattern to separate protocol logic from application logic.
          Implement lazy initialization with connection state tracking.
          Always use AsyncExitStack for proper async resource cleanup, preventing connection leaks.
          Security:
          Always validate file paths against roots to prevent traversal attacks.
          Implement explicit permission policies for all sensitive operations.
          Maintain comprehensive audit logs for security monitoring.
          Use human-in-the-loop approval for high-risk operations like sampling or deletions.
          Transport:
          Use STDIO for local development, testing, and single-machine deployments.
          Switch to Streamable HTTP for production environments, remote servers, or when you need to serve multiple clients simultaneously.
          LLM integration:
          Convert MCP tools to OpenAI function schemas for compatibility with popular LLMs.
          Use synthetic tools to expose resources and prompts as callable functions, giving LLMs full access to all MCP capabilities.
          Author(s)
          Abdul Fatir | Data Science Intern @ IBM
          Jianping Ye | Data Science Intern @ IBM
