          Properties:
          The dot product of two vectors can be positive, negative, or zero, depending on the angle between them.
          Larger dot product values typically indicate a higher degree of similarity between the vectors, especially when they are pointing in similar directions.
          If a distance-like metric is needed, the negative of the dot product can be used. In this case, larger (more negative) values correspond to greater
          dissimilarity or distance.
          The dot product is sensitive to both the magnitude and direction of the vectors, meaning that changes in either will affect the result.
          It is frequently used in machine learning models, such as in neural networks for computing activations or in matrix factorization for recommendation systems.
          Use Case: When the length of the vector (representing something such as relevance, confidence, or quantity) is meaningful. For instance, in recommendation
          systems, the direction of vectors typically indicates two products are about the same topic, but larger magnitudes might indicate that a product is more popular. In this
          case using dot product similarity makes sense, because one would want to recommend the products that are not only about the same topic, but also popular.
