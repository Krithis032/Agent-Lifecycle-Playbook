          Note that many embedding models normalize vectors by default, as this allows cosine similarity or distance to be efficiently computed using the dot product. Since
          cosine-based comparisons are common and the dot product is faster to compute, storing normalized vectors is a practical choice when only cosine-based comparisons
          are needed.
          Properties:
          Cosine similarity focuses on the orientation of vectors rather than their magnitude, measuring the cosine of the angle between them.
          It is particularly well-suited for high-dimensional, sparse data, such as text embeddings or term-frequency vectors in natural language processing.
          This metric is invariant to vector length, meaning that scaling a vector up or down does not affect the similarity score.
          Use Case:
          A common use case for cosine similarity is measuring document similarity in natural language processing (NLP), where it helps identify texts with similar
          content regardless of their length.
          🧠
          Choosing the Right Metric
          Metric Sensitive to Magnitude Normalized Best For
          L2 Distance ✅ Yes ❌ No Spatial data, clustering
          Cosine Distance ❌ No ✅ Yes Text, embeddings, NLP
          Dot Product ✅ Yes ❌ No Neural networks, recommender systems
          🧪
          Practical Considerations
          Normalization
          Normalize vectors if you expect to only need to calculate cosine similarity. For many natural language processing tasks and text embedding models, this
          is the default option.
          High-Dimensional Data
          L2 distance can suffer from the 'curse of dimensionality.' Consider using a different metric or using a dimensionality reduction technique if the data
          exhibits high dimensionality.
          Cosine distance often performs better in high dimensions, and is the default choice in many natural language processing and text-based tasks.
          Dot product can be computed efficiently using matrix operations, and can be used to calculate cosine similarity if the vectors are normalized.
          Conclusion
          Choosing the right distance metric is crucial for effective similarity search. L2 distance works well for continuous, lower-dimensional data where magnitude matters.
          Cosine distance excels with high-dimensional, sparse data where direction is more important than magnitude. Dot product offers computational efficiency and is
