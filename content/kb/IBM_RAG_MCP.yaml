      f20a_lab:
        source_file: "20a. Lab.txt"
        content: |
          Build Your First GenAI Application The Right Way
          demoyou'll build the application pictured above!
          
          Build a smart AI-powered web application using Flask and cutting-edge language models! This hands-on project will teach you to create intelligent applications that generate structured responses and leverage enterprise-grade AI tools. You'll learn to integrate watsonx.ai, implement JSON parsing, and engineer prompts that deliver consistent, actionable results.
          
          Learning Objectives
          By the end of this project, you will be able to:
          
          Develop a Flask web application integrated with AI capabilities
          Utilize the ibm-watsonx-ai library to interact with advanced language models
          Implement LangChain's JsonOutputParser for structured AI outputs
          Apply prompt engineering techniques for generating actionable JSON responses
          Compare and evaluate different language models including Llama, Granite, Mixt
          
          How Large Language Models Work
          Large Language Models are thinking machines that can understand and generate human language with incredible fluency. Unlike traditional software that follows rigid rules, LLMs learn patterns from vast amounts of text to develop an intuitive understanding of language, knowledge, and reasoning. Think of them as having read millions of books and learned to predict what comes next in any conversation.
          
          Tokenization
          Every journey begins with breaking text into digestible pieces called tokens. The sentence "Hello world" becomes separate tokens that the model can process. Using techniques like Byte Pair Encoding, common letter combinations become single tokens, while rare words get split apart. Each token gets assigned a unique number, transforming human language into mathematical data the model can understand.
          
          If you'd like to take a closer look at how different language models perform tokenization, you can play around with Tiktokenizer, an online tool built by David Duong that's designed for visualizing tokenized text input!ral
          Enhance your application with modular and reusable AI integration code
          
          Embeddings
          These token numbers are then transformed into vectors - lists of hundreds of decimal numbers that capture meaning in mathematical space. Words with similar meanings cluster together in this high-dimensional space, like "cat" and "dog" being closer than "cat" and "airplane."
          
          To understand how embeddings group information, explore the Nomic Atlas map linked below. Every dot you see is an embedding of a Wikipedia biography and the coloured clusters reveal underlying connections between people across history.
          
          Attention is All You Need
          Now comes the transformer's secret weapon: attention mechanisms. As the model processes each word, it simultaneously looks at every other word in the sentence to understand relationships and context. When processing "The cat sat on the mat," the model learns that "sat" relates most strongly to "cat" as the subject performing the action. Multiple attention heads work in parallel, each specializing in different types of relationships like grammar, meaning, or long-range dependencies.
          
          Setting Up Your Development Environment
          Before we dive into development, let's set up your project environment in the Cloud IDE. This environment is based on Ubuntu 22.04 and provides all the tools you need to build your AI-driven Flask application.
          
          Step 1: Create Your Project Directory
          Open the terminal in Cloud IDE and run:
          
          
          bash
          mkdir genai_flask_app
          cd genai_flask_app
          Run
          This creates a new directory for your project and navigates into it.
          
          Step 2: Set Up a Python Virtual Environment
          Initialize a new Python virtual environment:
          
          
          bash
          python3.11 -m venv venv
          source venv/bin/activate
          Run
          Step 3: Install the ibm-watsonx-ai library
          With your virtual environment activated, install ibm-watsonx-ai via:
          
          
          bash
          pip install ibm-watsonx-ai==1.3.39
          Run
          This command installs ibm-watsonx-ai which has many watsonx.ai features. In this lab we use this library to help us configure and call our LLMs.
          
          Now that your environment is set up, you're ready to start building your GenAI application!
          
          
          Using the ibm-watsonx-ai Python Library
          Let's make our very first call to one of IBM's latest models, ibm/granite-3-3-8b-instruct. Feel free to try other models!
          
          Create the file capital.py:
          
          Open capital.py in IDE
          
          Let's start by adding in imports:
          
          
          python
          from ibm_watsonx_ai import Credentials
          from ibm_watsonx_ai.foundation_models import ModelInference
          from ibm_watsonx_ai.metanames import GenTextParamsMetaNames
          This imports the required modules to authenticate, interact with the API, define models, and set parameters.
          
          
          python
          credentials = Credentials(
                             url = "https://us-south.ml.cloud.ibm.com",
                             # api_key = "<YOUR_API_KEY>" # Normally you'd put an API key here, but we've got you covered here
                            )
          This sets up the Credentials object to authenticate with IBM Watsonx AI. The API key would normally be added for secure access. An instance of APIClient will be created allowing us to interact with the IBM Watsonx API.
          
          
          python
          params = {
              GenTextParamsMetaNames.DECODING_METHOD: "greedy",
          	GenTextParamsMetaNames.MAX_NEW_TOKENS: 100
          }
          The params object defines the key settings for how the LLM generates its output. Here’s what we’re adjusting:
          
          DECODING_METHOD: This controls how the LLM selects its next token. The default is greedy decoding, where the model always picks the most probable next token. Alternatively, setting this to sampling lets you influence the randomness of the model’s choices (with temperature being a key factor to tweak). If you want more deterministic, predictable responses, use greedy. For more creative, varied outputs, go with sampling.
          MAX_NEW_TOKENS: This sets the maximum number of tokens the LLM can generate in a response. Since both input and output tokens typically contribute to the cost of using the model, this parameter is important for managing usage. Here, we’re limiting the output to 100 new tokens.
          
          python
          model = ModelInference(
              model_id='ibm/granite-3-3-8b-instruct',
              params=params,
              credentials=credentials,
              project_id="skills-network"
          )
          This initializes the model granite-3-3-8b-instruct with the defined parameters and credentials.
          
          
          python
          text = """
          Only reply with the answer. What is the capital of Canada?
          """
          
          print(model.generate(text)['results'][0]['generated_text'])
          This sets up a text prompt and uses the generate method of the model to get a response, then prints the generated text.
          
          
          bash
          python capital.py
          Run
          Running this code you should get the expected answer:
          
          Ottawa.
          
          Great job - you've called your first LLM!
          
          Trying Other LLMs
          There are numerous LLMs available from IBM and other providers, each with its own strengths and use cases. New models are constantly emerging, so it’s important to stay informed about the latest advancements in the field.
          
          How to Choose the Right LLM
          First of all, choosing an LLM model is deceptively complicated (it’s a whole topic in itself). While it’s tempting to focus on the specs alone—like token limits, training data, or number of parameters—these details will only take you so far. The real test comes when you evaluate how a model performs for your specific use cases.
          
          Here are some important factors to consider when selecting a model:
          
          Capabilities: Does the model meet your needs? For example, some models are multimodal, meaning they can handle images and text, while others are limited to text-only tasks.
          Cost: How much does it cost to use the model, including both input and output tokens? Balancing cost with performance is key to ensuring long-term value.
          Speed: How quickly does the model generate responses? In some use cases, speed is just as important as accuracy, especially in real-time applications.
          Quality: How accurate and relevant are the model’s outputs for your tasks? You’ll need to run tests to evaluate if the responses meet your quality standards.
          Other Considerations: Think about any specific vendors you may need to work with, licensing restrictions, or integrations with your existing systems.
          Ultimately, you’ll want to experiment and run real-world tests to find the right fit for your needs. Specs can guide you, but hands-on testing against your own usecases is the only way to truly know if a model works for your unique scenarios.
          
          Now let's try and update our code using a different LLM model, llama-4-maverick-17b-128e-instruct-fp8.
          
          Make sure you still have capital.py open:
          
          Open capital.py in IDE
          
          Now simply update the model from ibm/granite-3-3-8b-instruct to meta-llama/llama-4-maverick-17b-128e-instruct-fp8. The new code should look like the following:
          
          
          python
          model = ModelInference(
              model_id='meta-llama/llama-4-maverick-17b-128e-instruct-fp8',
              params=params,
              credentials=credentials,
              project_id="skills-network"
          )
          Now run the code in the terminal again:
          
          
          bash
          python capital.py
          Run
          Running the code, we get (Note: You will probably get a slightly different output)
          
          """ Ottawa - IELTS Listening Sample Question To answer this question, we simply need to identify the capital city of Canada. The capital of Canada is Ottawa """
          
          Hmm... not quite the answer we were expecting. Why is that? Don't worry, we'll explain in the next section!
          
          Try using different models and see what you come up with!
          
          Here's a list of some of the latest models available in WatsonX (as of September 15, 2025). Just replace the model_id in the code with one of the ones below and run the program again!
          
          Provider	model ID	Use Cases	Context Length	Price USD per million tokens
          IBM	ibm/granite-3-8b-instruct	Supports questions and answers (Q&A), summarization, classification, generation, extraction, RAG, and coding tasks.	4096	0.2
          IBM	ibm/granite-3-2b-instruct	Supports questions and answers (Q&A), summarization, classification, generation, extraction, RAG, and coding tasks.	4096	0.1
          IBM	ibm/granite-13b-instruct-v2	Supports Q&A, summarization, classification, generation, extraction and RAG tasks.	8192	0.6
          Meta	meta-llama/llama-4-maverick-17b-128e-instruct-fp8	Multimodal reasoning, long-context processing (10M tokens), code generation and analysis, multilingual operations (200 languages supported), STEM and logical reasoning.	128k	Input: 0.35 / Output: 1.40
          Meta	meta-llama/llama-3-2-90b-vision-instruct	Supports Q&A, summarization, classification, generation, extraction, translation and RAG tasks in French, German, Portuguese, Spanish and English.	128k	2.00
          Meta	meta-llama/llama-3-2-11b-vision-instruct	Supports image captioning, image-to-text transcription (OCR) including handwriting, data extraction and processing, context Q&A, object identification	128k	0.35
          Mistral	mistralai/mistral-small-3-1-24b-instruct-2503	Supports Q&A, summarization, generation, coding, classification, extraction, translation and RAG tasks in French, German, Italian, Spanish and English.	128k	10.00
          Google	google/flan-t5-xl	Supports Q&A, summarization, classification, generation, extraction and RAG tasks. Available for prompt-tuning	4096	0.6
          
          
          Special Tokens & Prompt Formatting
          We missed a very important step. Llama uses special tokens to improve its functionality, control, and adaptability across diverse tasks. Without special tokens, Llama’s responses can be unpredictable because it lacks the necessary cues to interpret the structure, context, or intent of the input. These tokens act as guides that tell the model how to respond.
          
          Llama
          Token Name	Description
          <|begin_of_text|>	Specifies the start of the prompt.
          <|end_of_text|>	Specifies the end of the prompt.
          <|start_header_id|>	These tokens enclose the role for a particular message, always paired with <|end_header_id|>. The possible roles are: [system, user, assistant, and ipython]
          <|end_header_id|>	Pairs with <|start_header_id|> to define role for a particular message
          <|eot_id|>	End of turn. Represents when the model has determined that it has finished interacting with the user message that initiated its response. This token signals to the executor that the model has finished generating a response.
          Roles
          In addition to prompt formatting, we need to understand the concept of roles (to be enclosed within the <|start_header_id|> and <|end_header_id|> tags). In Llama, there are 4 roles.
          
          System: Specifies the behavior, context, or personality of the assistant. It sets guidelines or instructions that shape how the assistant interacts, responds, and helps users. This can include the tone, formality, and any background knowledge needed to better assist.
          
          User: Represents the person interacting with the assistant. This role contains the queries, requests, or commands made by the user. For example, if the user asks, “What is the capital of France?”, the assistant will generate a relevant response based on this input.
          
          Assistant: This is where the AI-generated response is provided. Based on the user’s input and the system’s instructions, the assistant crafts a reply here that meets the user’s needs.
          
          iPython: A new role introduced in Llama 3.1. This role is used to mark messages with the output of a tool call when sent back to the model from the executor. We won't be using this role here.
          
          Mistral
          Token Name	Description
          <s>	Marks the start of a sentence or sequence.
          <\s>	Marks the end of a sentence or sequence.
          [INST]	Signifies the start of an instructional message or command. Typically used for instructions.
          [/INST]	Marks the end of the instructional message.
          Granite
          Token Name	Description
          <|system|>	Identifies the instruction, commonly referred to as the system prompt for the foundation model.
          <|user|>	The query text to be answered.
          <|assistant|>	A cue at the end of the prompt that indicates that a generated answer is expected.


  rag_applications_fundamentals:
    description: "Course 2 - Build RAG Applications: Get Started"
    concepts:
      f21_why_rag:
        source_file: "21. Why RAG?.txt"
        content: |
          Large language models, they are everywhere. They get some things amazingly right and other things very interestingly wrong. My name is Marina Danilevsky. I am a senior research scientist here at IBM Research,
          and I want to tell you about a framework to help large language models be more accurate and more
          up-to-date, Retrieval Augmented Generation, or RAG. Let's just talk about the generation part for a minute. So forget the retrieval augmented. So the generation, this refers to large language models,
          or LLMs, that generate text in response to a user query referred to as a prompt. These models can have some undesirable behavior. I want to tell you an anecdote to illustrate this. So my kids, they recently asked me this question,
          in our solar system, what planet has the most moons? And my response was, oh, that's really great that you're
          asking me this question. I loved space when I was your age. Of course, that was like 30 years ago. But I know this. I read an article, and the article said that it was Jupiter and 88 moons. So that's the answer. Now, actually, there's a couple of things wrong with my answer. First of all, I have no source to support what I'm saying. So even though I confidently said, I read an article,
          I know the answer, I'm not sourcing it. So that's off the top of my head. And also, I actually haven't kept up with this for a while. And my answer is out of date. So we have two problems here. One is no source. And the second problem is that I am out of date. And these, in fact, are two behaviors that are often
          observed as problematic when interacting with large language models. They are LLM challenges. Now, what would have happened if I had taken a beat
          and first gone and looked up the answer on a reputable source like NASA? Well, then I would have been able to say, ah, OK,
          so the answer is Saturn with 146 moons. And in fact, this keeps changing because scientists
          keep on discovering more and more moons. So I have now grounded my answer in something more believable. I have not hallucinated or made up an answer. Oh, and by the way, I didn't leak personal information
          about how long ago it's been since I was obsessed with space. All right, so what does this have to do with large language models? Well, how would a large language model have answered this question? So let's say that I have a user asking this question about moons. A large language model would confidently say, OK, I have been trained. And from what I know in my parameters during my training,
          the answer is Jupiter. The answer is wrong, but, you know, we don't know. The large language model was very confident in what it answered. Now, what happens when you add this retrieval augmented part here? What does that mean? That means that now, instead of just relying on what the LLM knows,
          we are adding a content store. This could be open like the internet. This can be closed like some collection of documents,
          collection of policies, whatever. The point, though, now is that the LLM first goes and
          talks to the content store and says, hey, can you retrieve from me information that is relevant to what the user's query was? And now, with this retriever augmented answer, it's not Jupiter anymore. We know that it is Saturn. What does this look like? Well, first, user prompts the LLM with their question. They say this is what my question was. And originally, if we're just talking to a generative model,
          the generative model says, oh, OK, I know the response. Here it is. Here's my response. But now, in the RAM framework, the generative model
          actually has an instruction that says, no, no, no. First, go and retrieve relevant content. Combine that with the user's question, and only then generate the answer. So the prompt now has three parts, the instruction to pay
          attention to the retrieved content together with the user's question. Now give a response. And in fact, now you can give evidence for why your
          response was what it was. So now, hopefully, you can see, how does RAD help the
          two LLM challenges that I had mentioned before? So first of all, I'll start with the out-of-date part. Now, instead of having to retrain your model if new
          information comes up, like, hey, we found some more moons. Now it's a Jupiter again. Maybe it'll be Saturn again in the future. All you have to do is you augment your data store with new
          information, updated information. So now the next time that a user comes and asks the question, we're ready. We just go ahead and retrieve the most up-to-date information. The second problem, source. Well, the LLM model is now being instructed to pay
          attention to primary source data before giving its response, and in fact, now being able to give evidence. This makes it less likely to hallucinate or to leak
          data because it is less likely to rely only on information that it learned during training. It also allows us to get the model to have a behavior
          that can be very positive, which is knowing when to say, I don't know. If the user's question cannot be reliably answered based
          on your data store, the model should say, I don't know, instead of making up something
          that is believable and may mislead the user. This can have a negative effect as well, though,
          because if the retriever is not sufficiently good to give the large language model the best,
          most highest quality grounding information, then maybe the user's query that is answerable doesn't get an answer. So this is actually why lots of folks, including many of us
          here at IBM, are working the problem on both sides. We are both working to improve the retriever to give the
          large language model the best quality data on which to ground its response, and also the
          generative part so that the LLM can give the richest, best response, finally, to the user
          when it generates the answer. Thank you for learning more about RAG.

      f22_more_rag_details:
        source_file: "22. More RAG Details.txt"
        content: |
          Welcome to Retrieval
          Augmented Generation or RAG. After watching this video, you'll be able to
          explain the RAG process. You'll also be able to describe various steps
          in the RAG process to receive efficient responses to questions or
          prompts you enter. Let's first understand
          what RAG is. RAG is an AI framework
          that helps optimize the output of large
          language models or LLMs. RAG uses the capabilities of
          LLMs and specific domains or the internal database of an organization without
          retraining the model. Pre-trained LLMs
          may face challenges with specific domain knowledge that they are not trained in. While they perform
          well on general tasks, they may provide
          inaccurate responses to specialized queries. Therefore, adding external
          relevant knowledge sources helps ensure more
          accurate responses. Consider an example of a
          company's mobile policy. If you ask a chatbot about
          the company's mobile policy, the chatbot will
          provide answers from its knowledge base because the company's policy contains
          confidential information. Therefore, to generate
          domain specific responses, the RAG process is helpful. Let's explore how RAG helps
          in generating responses. Based on the inserted
          content or prompt, RAG combines retrieved
          information and generates natural language
          to create responses. RAG uses various content
          from its knowledge base, including data from
          the trained chatbot, company policies unavailable on the Internet, and
          large documents. RAG consists of two main
          components, the retriever, the core of RAG,
          and the generator, which functions as a chatbot. In the RAG process, the first step is
          text embedding. The inserted prompt or
          question is converted into a high dimensional vector
          using a question encoder. Knowledge based documents are
          separately converted into high dimensional vectors and embedded using a
          context encoder. The next step is retrieval, where the system matches
          the similar vectors in the inserted prompt
          or content with the vectors in the
          knowledge base to retrieve information. However, in the augmented
          query creation, the system creates
          an augmented query by combining the text associated with the
          retrieve vectors and the original
          prompt or content. Lastly, in the model
          generation step, the language model uses the
          created augmented query to generate a response using the content from
          the knowledge base. The encoders convert
          the prompt and knowledge base into embeddings that represent the information. Then the context and
          question embeddings can be generated from
          the same encoder. This approach is easy
          to understand as it involves converting
          text to embeddings, even though it may not
          work as effectively. Now, let's understand
          prompt encoding. The inserted prompts
          use token embedding and vector averaging to
          encode the prompt and convert them into a
          vector representation. In the token embedding, each token such as a word
          or sub-word inserted in the prompt uses a pre-trained token embedding model such as Bidirectional
          Encoder Representations from a Transformer or BERT and a Generative Pre-trained
          Transformer or GPT to transform into a
          high dimensional vector. Once all the tokens
          are embedded, the system takes the average of all token vectors to create a single vector representation
          for the prompt. This means that the average
          vector representation captures the meaning
          of the inserted prompt in a concise manner. Next, let's understand
          how to convert the contextual data from the
          knowledge base into vectors. Consider the company's mobile policy displayed on the screen. You can see that the company's
          mobile policy is large, and inserting it into the
          chatbot may be challenging. Therefore, the original
          policy documents should be broken
          down into smaller, manageable chunks of text to achieve targeted and
          efficient retrieval. Next, embed each text chunk into vectors and index them
          into a knowledge base. Now, encode the text chunks for vector representations
          by transforming them into a high
          dimensional vector using a pre-trained
          token embedding model. Once all the tokens
          are embedded, the system averages each
          token vector to create a single vector representation
          for the entire text chunk. Combining text chunks and embedded vectors represents
          the knowledge base, which captures the
          information for each chunk. Insert these embeddings
          into a vector database to represent the
          knowledge base with the chunk ID that
          serves as the key. The distance operations
          on these embeddings use chunk ID to find
          relevant information. The next step in the RAG
          process is to search for relevant context for the inserted prompt from
          the knowledge base. To do so, the system
          compares the prompt vector with the vectors representing the text chunks in
          the knowledge base. Let's ask a question about
          a company's mobile policy. The knowledge base and question are converted into
          vector representations. Further, the system
          calculates the distance between the prompt vector
          and each context vector using distance
          metric to identify the similarities between the prompt vector and
          the context vector. Next, it selects 3
          - 5 context vectors close to the prompt vector to present more relevant
          information to augment the inserted input
          using distance metrics. Let's take query embeddings
          q and embeddings from the knowledge base as c1 and c2. The selected distance metrics affect the retrieval results. If you take a dot product, considering vector's
          directions and magnitude by prioritizing
          overall alignment, you will find knowledge
          based embedding c2 slightly closer to
          the context vector. Now, consider the
          cosine direction, which focuses on the direction to measure the
          angular difference. Therefore, the knowledge based embedding c2 is a good option. It means that for the
          vector magnitude, the dot product is preferable, and for the direction vector, the cosine distance
          is preferable. To select the most
          relevant top K context, where K is the hyperparameter, choose the chunk IDs 6, 2, and 0 using the company's
          mobile policy with 7 chunks. The real dataset uses the library of chunks to
          speed up the process. This means you should select the text chunk IDs similar to the query and related to the company's mobile or
          general company policies. Finally, the selected text
          from the knowledge base and the query are inserted into the chatbot to generate
          an appropriate response. This means that with
          the help of RAG, the chatbot can provide
          an efficient response. In this video, you
          learned to leverage RAG to generate a response when
          the model is not pre-trained. The chatbot generates responses
          based on the questions. However, it is challenging
          to generate responses for specific domains such as the
          company's mobile policy. To generate a response for
          the company's mobile policy, the inserted prompts are encoded using token embedding
          and vector averaging, where the prompt is
          broken down into smaller and possible
          chunks of text. These chunks are embedded
          and converted into high dimensional
          vectors to search for the relevant context
          using distance metrics. The vector closest to the
          text chunk is selected from the knowledge
          base to generate an appropriate response.

      f23_what_is_rag_reading:
        source_file: "23. What is RAG Reading.pdf"
        content: |
          17/03/2026, 17:34 about:blank
          Introduction to RAG
          Estimated Reading Time: 10 minutes
          What is RAG
          Retrieval-Augmented Generation (RAG) is a machine-learning technique that integrates information retrieval with generative AI to produce accurate and context-
          aware responses. By equipping generative models, such as large language models (LLMs), with access to external data sources, RAG enhances the model's ability to
          provide relevant and helpful answers to user prompts or queries.
          Why RAG?
          To understand the value of RAG, we need to consider the limitations of generative models that aren't part of a RAG system. The following image describes the
          response generation process of an LLM that is not part of a RAG pipeline:
          LLMs embedded in such pipelines cannot access external sources and are limited to the information provided by the user in a prompt and the information the LLM
          was trained on. Consequently, these LLMs are prone to generating responses that may be:
          1. Inaccurate,
          2. Outdated, or
          3. Fabricated ('hallucinations')
          Additionally, such responses often lack valid sources, making it difficult to trace their origin or verify their accuracy. Now, consider a generative model integrated
          into an RAG system. The diagram below outlines the response generation component of such a system:
          In an RAG system, the key addition is the retrieved text, which is sourced from an external data store. Steps are taken to ensure that the retrieved text aligns with the
          user's original prompt. This retrieved text is then combined with the original prompt using methods such as simple concatenation or a structured prompt template,
          about:blank 1/3
          
          17/03/2026, 17:34 about:blank
          where specific sections are filled with the original prompt and the retrieved text.
          The result is an 'augmented prompt,' which merges the user's original prompt with the supplementary information provided by the retrieved text. The LLM then
          processes this augmented prompt, enabling it to generate a response that incorporates both the original prompt and the relevant additional context.
          This approach addresses several key challenges:
          1. Enhanced response quality: By incorporating relevant, retrieved data into the model's input, the system can deliver more accurate and detailed responses.
          2. Up-to-date information: Unlike the model's static training data, external data can provide the system with current information, improving its ability to answer
          questions that require the latest insights.
          3. Verification of sources: By citing specific external documents or sources, the system allows users to trace the information back to its origin, fostering greater
          trust and enabling users to verify the accuracy of the response.
          What about models with long context lengths?
          RAG was developed and gained popularity during a period when models with large context lengths were uncommon. Today, models capable of handling context
          lengths up to 128,000 tokens or more are widely available. To put this into perspective, a token is a unit of text that can represent a word, part of a word, or even
          punctuation marks and spaces. Since tokens are not strictly equivalent to words, the ratio of tokens to words can vary. In English, a good estimate is that 100 tokens
          correspond to about 75 words. Based on this, a model with a 128,000-token context length can process an English text of approximately 96,000 words. This is long
          enough to include numerous relevant details within a prompt, providing the model with substantial contextual information.
          However, relying solely on such extended context lengths presents several limitations:
          1. Input Dependency: Users must already possess the necessary source information to provide within the prompt. Without this, the model cannot generate
          insights or solutions.
          2. Limited Capacity: Although a 128,000-token capacity is significant, it may still fall short for extremely lengthy texts. For example, English translations of
          War and Peace by Leo Tolstoy generally exceed 560,000 words—more than five times this limit.
          3. Redundancy Issues: Even when all relevant details fit within the prompt, irrelevant or repeated information can dilute the LLM's focus. This creates a "needle
          in a haystack" challenge for the model, as it must sift through vast data to extract critical facts.
          4. Processing Time: Longer prompts require additional processing time. Since AI models analyze input by breaking it into tokens, more tokens result in longer
          processing times.
          5. Cost Implications: Using a high number of tokens in prompts also increases both computational and financial costs, making this approach potentially less
          practical in some applications.
          RAG helps address these challenges, either partially or fully:
          1. Input Dependency: RAG connects to an external data store that users do not need to provide or even be aware of to interact successfully with the system.
          2. Limited Capacity: RAG retrieves only the text most relevant to the prompt, creating smaller augmented prompts that fit within LLM context limits.
          3. Redundancy Issues: RAG ensures only the most pertinent information is passed to the LLM, making it easier for the system to identify relevant details in
          source texts.
          4. Processing Time: Shorter augmented prompts in RAG reduce the response generation time compared to non-RAG systems that include all available source
          information within the augmented prompt.
          5. Cost Implications: By using shorter augmented prompts, RAG reduces response generation costs, especially for systems with extensive data sources.
          How does RAG work?
          The following diagram illustrates the RAG process for a basic RAG system. Note that this is just one possible representation, and alternative diagrams may result
          from various modifications or adaptations of the RAG system. However, this diagram captures the core concept, as all variations build on the common themes
          presented here:
          The steps in the RAG process are as follows:
          1. Gather Sources: Start with sources like office documents, company policies, or any other relevant information that may provide context for the user's future
          prompt.
          2. Embed Sources: Pass the gathered information through an embedding model. The embedding model converts each chunk of text into a vector representation,
          which is essentially a fixed-length column of numbers.
          3. Store Vectors: Store the embedded source vectors in a vector store — a specialized database optimized for storing and manipulating vector data.
          4. Obtain a User's Prompt: Receive a prompt from the user.
          5. Embed the User's Prompt: Embed the user's prompt using the same embedding model used for the source documents. This produces a prompt embedding,
          which is a vector of numbers equal in length to the vectors representing the source embeddings.
          about:blank 2/3
          
          17/03/2026, 17:34 about:blank
          6. Retrieve Relevant Data: Pass the prompt embedding to the retriever. The retriever also accesses the vector store to find and pull relevant source embeddings
          (vectors) that match the prompt embedding. The retriever's output is the retrieved text.
          7. Create an Augmented Prompt: Combine the retrieved text with the user's original prompt to form an augmented prompt.
          8. Obtain a Response: Feed the augmented prompt into a large language model (LLM), which processes it and produces a response.
          RAG Details
          There are many nuances to each of the RAG steps highlighted above. Some of these details are elaborated on below:
          1. Gather Sources
          Gathering sources often involves preprocessing the data before moving to the next step.
          Preprocessing may include converting source files into more machine-friendly formats (for example, turning PDFs into plain text) or utilizing dynamic
          preprocessing libraries before passing documents to the next phase.
          2. Embed Sources
          Steps involved in embedding documents:
          Chunking: Large documents are split into smaller, manageable chunks to enable efficient retrieval.
          Embedding: Text chunks are processed by an embedding model, distinct from the LLM used for response generation. This embedding model transforms
          text chunks into fixed-length numeric vectors that capture their semantic meaning.
          How embedding works:
          Tokenization: Text is split into tokens (for example, words, parts of words, punctuation). Each token is assigned (encoded with) a unique numerical ID
          with no intrinsic meaning—IDs are consistent for the same token.
          Neural Network Processing: Token IDs are input into the embedding model's neural network, producing fixed-length vectors that encapsulate the text's
          semantic meaning.
          3. Store Vectors
          Embedding vectors are stored for future retrieval.
          Simple systems use matrices, but most utilize specialized vector databases like ChromaDB, FAISS, or Milvus. Each database offers unique features and
          limitations.
          4. Obtain a User's Prompt
          A user's prompt can either be standalone or incorporate prior conversation history.
          If a discussion history is included, conversation memory tools (for example, LangChain, LlamaIndex) help augment the current prompt with the relevant
          context.
          5. Embed the User's Prompt
          The user's prompt is embedded using the same embedding model as the source documents, ensuring compatibility.
          6. Retrieve Relevant Data
          Various retrieval strategies exist, such as:
          Retrieving the most relevant text chunk.
          Fetching the entire document containing the relevant chunk.
          Retrieving multiple relevant documents.
          7. Create an Augmented Prompt
          Augmented prompts merge the user's original query with retrieved data.
          Common methods include:
          Simple concatenation of the user's prompt with retrieved text.
          Using structured templates where different components (for example, user input, retrieved text) are placed alongside additional instructions for the LLM
          to follow.
          8. Obtain a Response
          Responses can be further refined using predefined templates, ensuring a consistent presentation style tailored to the use case.
          The many intricacies of each RAG step contribute to a wide range of implementation possibilities, enabling customization to suit various applications and needs.
          about:blank 3/3

      f24_introduction_to_rag_cheatsheet:
        source_file: "24. Introduction to RAG Cheatsheet.pdf"
        content: |
          18/03/2026, 10:09 about:blank
          Introduction to RAG
          Estimated Reading Time: 5 minutes
          RAG (Retrieval-Augmented Generation) is an AI technique that combines relevant information from external data sources with generative models to produce
          accurate and contextually rich responses.
          Non-RAG systems have a simple Prompt → LLM → Response pipeline. These systems may generate inaccurate, outdated, or fabricated responses.
          RAG aims to augment the prompt with relevant text from an external data store. This enhances response quality by providing the LLM with relevant
          information, provides up-to-date information to the LLM, and allows the user to verify the sources on which the response is generated.
          Using models with long context lengths instead of RAG requires users to provide the necessary contextual information within the prompt. This approach has
          limited capacity, may lead to response quality issues when relevant facts are buried within large amounts of irrelevant text, and increases processing time and
          costs. RAG mitigates these challenges, either partially or fully.
          The following diagram illustrates the RAG process for a basic RAG system:
          Large sources are usually split into smaller chunks prior to or at the embedding step
          Embedding involves tokenization (splitting text into tokens and assigning unique numerical IDs to each token) followed by passing the token IDs through a
          neural network to produce fixed-length numeric vectors, one for each text chunk.
          Vectors are stored in vector databases that specialize in efficiently processing vector data. Examples of vector databases include ChromaDB, Faiss, and Milvus.
          User's prompts are embedded using the same model as the documents.
          Retrievers retrieve the most similar chunks to the embedded prompt from the vector store. The most similar chunks are found through a similarity search.
          Methods of determining similarity include cosine similarity, which only compares the angles of vectors, and the dot product, which compares their angles and
          magnitudes.
          about:blank 1/1

