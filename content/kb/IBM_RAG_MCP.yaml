          )
          # Define chromadb client
          client = chromadb.Client()
          # Create collection
          collection = client.create_collection(
          name="my_collection",
          metadata={"description": "A collection for storing user data"},
          configuration={
          "embedding_function": sentence_transformer_ef
          }
          )
          Connecting to Existing Collections
          # Connect to existing collection
          collection = client.get_collection(name="my_collection")
          Modifying Collections
          # Alter collection using modify method
          collection.modify(
          name="new_collection_name",
          metadata={"key": "value"}
          )
          Important: Certain changes, such as modifying the embedding model or distance metric, cannot be made with an existing collection. To apply these changes, you
          need to clone a collection, which can be an expensive operation computationally if you have a substantial amount of data stored in your collection.
          Adding Documents
          # Add documents to collection
          collection.add(
          documents=[
          "This is a document about LangChain",
          "This is a document about LlamaIndex"
          ],
          metadatas=[
          {"source": "langchain.com", "version": "0.2"},
          {"source": "llamaindex.ai", "version": "0.12"}
          ],
          ids=["id1", "id2"]
          )
          Note: Make sure to include an ID for each document in a list passed to the ids parameter.
          Retrieving Documents
          # Get all documents (returns Python dictionary)
          results = collection.get()
          # Get specific documents by ID
          results = collection.get(ids=["id1"])
          # Include embeddings in results
          results = collection.get(include=['embeddings'])
          about:blank 2/4
          
