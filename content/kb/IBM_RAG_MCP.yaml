      f26_reading_introduction_to_gradio:
        source_file: "26. Reading_Introduction to Gradio.pdf"
        content: |
          18/03/2026, 10:38 about:blank
          Introduction to Gradio
          Estimated Reading Time: 15 minutes
          Objectives
          After completing this reading, you will be able to:
          Explain the basics of Gradio
          Demonstrate an example of implementing image classification in PyTorch
          Introduction
          Gradio is the way to demonstrate your machine learning model with a user-friendly web interface so that everyone can use it anywhere. Gradio is an open-source
          Python package that allows you to quickly build a demo or web application for your machine learning model, API, or any arbitrary Python function. You can then
          share a link to your demo or web application using Gradio's built-in sharing features. No JavaScript, CSS, or web hosting experience is needed.
          Why Use Gradio?
          Gradio is useful for several reasons:
          Ease of use: Gradio enables the creation of interfaces for models with just a few lines of code.
          Flexibility: Gradio supports various inputs and outputs, such as text, images, files, and more.
          Sharing and collaboration: Interfaces can be shared with others through unique URLs, facilitating easy collaboration and feedback collection.
          Task 1: Getting Started with Gradio
          To begin using Gradio, you first need to install the library. You can install Gradio using pip:
          pip install gradio
          Creating Your First Gradio Interface
          You can run Gradio in your favorite code editor, Jupyter notebook, Google Colab, or anywhere else you write Python. Let's write your first Gradio app:
          import gradio as gr
          def greet(name, intensity):
          return "Hello, " + name + "!" * int(intensity)
          demo = gr.Interface(
          fn=greet,
          inputs=["text", "slider"],
          outputs=["text"],
          )
          demo.launch(server_name="127.0.0.1", server_port= 7860)
          If running from a file, the demo below will open in a browser on http://127.0.0.1:7860. If you are running within a notebook, the demo will appear embedded within
          the notebook.
          Type your name in the textbox on the left, drag the slider, and then press the Submit button. You should see a friendly greeting on the right.
          about:blank 1/4
          
          18/03/2026, 10:38 about:blank
          Understanding the Interface class
          Note that to make your first demo, you created an instance of the gr.Interface class. The Interface class is designed to create demos for machine learning models
          that accept one or more inputs and return one or more outputs.
          The Interface class has three core arguments:
          fn: The function to wrap a user interface (UI) around
          inputs: The Gradio component(s) to use for the input. The number of components should match the number of arguments in your function.
          outputs: The Gradio component(s) to use for the output. The number of components should match the number of return values from your function.
          The fn argument is flexible — you can pass any Python function you want to wrap with a UI. In the example above, you saw a relatively simple function, but
          the function could be anything from a music generator to a tax calculator to the prediction function of a pretrained machine learning model.
          The input and output arguments take one or more Gradio components. As we'll see, Gradio includes more than 30 built-in components (such as the gr.Textbox(),
          gr.Image(), and gr.HTML() components) that are designed for machine learning applications.
          If your function accepts more than one argument, as is the case above, pass a list of input components to inputs, with each input component corresponding to one of
          the function's arguments in order. The same applies if your function returns more than one value: simply pass a list of components to outputs. This flexibility makes
          the Interface class a very powerful way to create demos.
          Let's create a simple interface for an image captioning model. The BLIP (Bootstrapped Language Image Pretraining) model can generate captions for images. Here's
          how you can create a Gradio interface for the BLIP model.
          pip install transformers
          pip install torch
          import gradio as gr
          from transformers import BlipProcessor, BlipForConditionalGeneration
          from PIL import Image
          processor = BlipProcessor.from_pretrained("Salesforce/blip-image-captioning-base")
          model = BlipForConditionalGeneration.from_pretrained("Salesforce/blip-image-captioning-base")
          def generate_caption(image):
          # Now directly using the PIL Image object
          inputs = processor(images=image, return_tensors="pt")
          outputs = model.generate(**inputs)
          caption = processor.decode(outputs[0], skip_special_tokens=True)
          return caption
          def caption_image(image):
          """
          Takes a PIL Image input and returns a caption.
          """
          try:
          caption = generate_caption(image)
          return caption
          except Exception as e:
          return f"An error occurred: {str(e)}"
          iface = gr.Interface(
          fn=caption_image,
          inputs=gr.Image(type="pil"),
          outputs="text",
          title="Image Captioning with BLIP",
          description="Upload an image to generate a caption."
          )
          iface.launch(server_name="127.0.0.1", server_port= 7860)
          Here, we use the BlipProcessor and BlipForConditionalGeneration from the transformers library to set up an image captioning model. This example
          demonstrates creating a web interface using Gradio, where the input parameter specifies an image and the output is the generated text caption. The title and
          description parameters enhance the interface by providing context and instructions for users.
          Use Case: Image Captioning
          about:blank 2/4
          
          18/03/2026, 10:38 about:blank
          Image captioning models like BLIP are incredibly powerful tools in various domains, from helping visually impaired individuals understand image content to
          efficiently organizing and searching through large photo libraries. Creating a Gradio interface for such a model makes it accessible for non-technical users to interact
          with and benefit from this technology. For example, photographers or digital asset managers could use your application to automatically generate descriptive names
          for their images, enhancing the usability and searchability of their digital libraries.
          Task 2: Image Classification in PyTorch
          Now let`s explore a different kind of computer vision task — Image Classification. Image classification is a central task in computer vision. Building better
          classifiers to classify what object is present in a picture is an active area of research, as it has applications stretching from autonomous vehicles to medical imaging.
          Such models are perfect to use with Gradio's image input component. In this tutorial, we will build a web demo to classify images using Gradio. We can build the
          whole web application in Python.
          Step 1: Setting up the image classification model
          First, we will need an image classification model. For this tutorial, we will use a pretrained Resnet-18 model, as it is easily downloadable from PyTorch Hub. You
          can use a different pretrained model or train your own.
          import torch
          model = torch.hub.load('pytorch/vision:v0.6.0', 'resnet18', pretrained=True).eval()
          Step 2: Defining a predict function
          Next, we will need to define a function that takes in the user input, which in this case is an image, and returns the prediction. The prediction should be returned as a
          dictionary whose keys are class name and values are confidence probabilities. We will load the class names from this text file.
          In the case of our pretrained model, it will look like this:
          import requests
          from PIL import Image
          from torchvision import transforms
          # Download human-readable labels for ImageNet.
          response = requests.get("https://git.io/JJkYN")
          labels = response.text.split("\n")
          def predict(inp):
          inp = transforms.ToTensor()(inp).unsqueeze(0)
          with torch.no_grad():
          prediction = torch.nn.functional.softmax(model(inp)[0], dim=0)
          confidences = {labels[i]: float(prediction[i]) for i in range(1000)}
          return confidences
          Let's break this down. The function takes one parameter:
          inp: the input image as a PIL image
          The function converts the input image into a PIL Image and subsequently into a PyTorch tensor. After processing the tensor through the model, it returns the
          predictions in the form of a dictionary named confidences. The dictionary's keys are the class labels, and its values are the corresponding confidence probabilities.
          In this section, we define a predict function that processes an input image to return prediction probabilities. The function first converts the image into a PyTorch
          tensor and then forwards it through the pretrained model. We use the softmax function in the final step to calculate the probabilities of each class. The softmax
          function is crucial because it converts the raw output logits from the model, which can be any real number, into probabilities that sum up to 1. This makes it easier to
          interpret the model's outputs as confidence levels for each class.
          Step 3: Creating a Gradio interface
          Now that we have our predictive function set up, we can create a Gradio Interface around it.
          In this case, the input component is a drag-and-drop image component. To create this input, we use Image(type=“pil”) which creates the component and handles
          the preprocessing to convert that to a PIL image.
          The output component will be a Label, which displays the top labels in a nice form. Since we don't want to show all 1,000 class labels, we will customize it to show
          only the top 3 classes by constructing it as Label(num_top_classes=3).
          Finally, we'll add one more parameter, the examples parameter, which allows us to prepopulate our interfaces with a few predefined examples. The code for Gradio
          looks like this:
          import gradio as gr
          gr.Interface(fn=predict,
          inputs=gr.Image(type="pil"),
          outputs=gr.Label(num_top_classes=3),
          examples=["/content/lion.jpg", "/content/cheetah.jpg"]).launch()
          about:blank 3/4
          
          18/03/2026, 10:38 about:blank
          The example paths provided, /content/lion.jpg and /content/cheetah.jpg, are placeholders. You should replace these with the actual paths to images on your system or
          server where you have saved the images you want to use for testing. This ensures that when you or others are using the Gradio interface, the examples are correctly
          loaded and can be used to demonstrate the functionality of your image classifier.
          This produces the following interface, which you can try in a browser (try uploading your own examples).
          And you're done! That's all the code you need to build a web demo for an image classifier. If you'd like to share with others, try setting share=True when you
          launch() the Interface!
          Conclusion
          Gradio simplifies the process of building interactive web demos for machine learning models. By integrating Gradio with models like BLIP for image captioning,
          you can create practical, user-friendly applications that leverage the power of AI to solve real-world problems. This tool not only aids in demonstrating the
          capabilities of your models but also in collecting valuable feedback for further improvement.
          about:blank 4/4

      f27_cheat_sheet_building_apps_with_rag:
        source_file: "27. Cheat Sheet_Building Apps with RAG.pdf"
        content: |
          18/03/2026, 11:02 about:blank
          Cheat Sheet: Building Apps with RAG
          Estimated Reading Time: 5 minutes
          Gradio is an open-source Python package that allows for the quick building of an application interface. No JavaScript, CSS, or web hosting experience is required!
          Interface class core arguments
          Gradio's Interface class wraps any arbitrary Python function. The interface class has the following three core arguments:
          Term Definition
          Fn is the function to wrap. Each function parameter represents an input component, and the function's output should be either a single value or a tuple.
          Fn
          Each element within the tuple corresponds directly to a specific output component.
          inputs The Gradio component(s) to use for the inputs of the function. The number of inputs should match the number of arguments in the function.
          outputs Outputs are the Gradio component(s) to use for the outputs of the function.
          Common input types
          Term Definition
          checkbox A checkbox that can be set to True or False only.
          checkboxGroup An input type that allows users to select multiple values from a predefined checkbox list.
          An input type that provides a dropdown list where, by default, one value can be selected. If multiselect is set to True, then one or more values
          dropdown
          can be selected.
          file An input type that allows a user to upload a file.
          image An input type that allows the user to select or upload an image.
          radio An input type that forces the user to choose one value.
          An input type that provides a slider where a value must be selected between a minimum and a maximum range. The value parameter defines
          slider the default value, and step provides the increment value. Setting the minimum, maximum, and step values to integers will select integer
          values.
          textbox An expandible text box that allows the user to type in text.
          Common output types
          Term Definition
          textbox An expandible text box that allows the user to type in text.
          A type typically used for classification models. Can output the classes along with their predicted probabilities. You can control the number of output
          label
          classes using the num_top_classes parameter.
          Launching the application
          Use the launch() method to launch the application. This method starts a simple web server that serves the interface. If you set share=True in launch(), you can
          share the application with the rest of the world. The system will set up a public URL allowing anyone worldwide to access your application. Users can interact with
          your app through this URL, while all computations run on your local machine.
          Author
          Wojciech "Victor" Fulmyk
          about:blank 1/1

      f28_intro_to_llamaindex_document_ingestion_and_chunking:
        source_file: "28. Intro to LlamaIndex_Document Ingestion and Chunking.txt"
        content: |
          Welcome to this video that introduces you to LlamaIndex document ingestion and chunking. After watching this video, you'll be able to: Describe LlamaIndex including some of its typical use cases. Explain how LlamaIndex works with RAG. Load source documents from a variety of formats into LlamaIndex's document class and Split documents into chunks or nodes using LlamaIndex. Let's begin with a high-level overview of LlamaIndex. LlamaIndex is a framework for building LLM-powered context augmentation. Context augmentation is the process of making your data available to an LLM, allowing the LLM to perform a particular task while grounding its responses in the provided context. Typical use cases include question answering with Retrieval-Augmented Generation or RAG which is the primary focus of this video. Chatbots which extend the basic RAG pipeline by allowing for multiple back-and-forth queries and answers, allowing the LLM to ask for clarification or answer follow-up questions, and document understanding and data extraction, which allow an LLM to read natural language and semantically identify important details such as names, dates, addresses, and figures from large amounts of structured or unstructured data. Let's learn how LlamaIndex works in the context of Retrieval-Augmented Generation or RAG because many of LlamaIndex's other use cases depend on or are related to components used in RAG. The RAG process begins by loading and chunking the source documents. These document chunks are then embedded using the embedding model, which embeds text as equal-sized vectors, one vector per text chunk. These vectors then go into a vector store which is a database that is well-suited to storing and manipulating vectors. When a prompt is provided by the user, that prompt is then embedded using the same model as the source documents and a retriever is used to retrieve the relevant text from the vector store. The retrieved text is then used to augment the prompt, and this augmented prompt is then fed into an LLM to provide a context-aware response that considers the most relevant data from the source documents. Let's begin with the first RAG step, which involves loading textual data file objects into a LlamaIndex document, which is LlamaIndex's generic container for document sources. You can load textual data from a variety of formats including text files, PDF files, markdown files, comma-separated or CSV files, JSON files, and HTML files. In addition to supporting the loading of local documents, LlamaIndex also offers numerous connectors for seamless integration with various databases and cloud storage services. Let's quickly examine LlamaIndex's document class and some of its unique features. First, you create an object of the document class by passing the text Hello LlamaIndex into the document class's text parameter. Then, by calling the resulting document object's dict method, you can inspect the items stored in the document. Note that a LlamaIndex document has several key components. An ID that uniquely identifies the document, a placeholder for embedding if you decide to embed the whole document, a metadata dict where you can store metadata associated with the document, such as its origin or date of creation, a relationships dict that links the document to other related items such as other documents, and the text that is present in the document. Thus, the document class serves as a container that stores a document's text in addition to providing each document with a unique ID and stores the document's metadata and relationships in dictionaries. Now let's look at how to load documents from local storage. LlamaIndex provides a powerful document loader called SimpleDirectoryReader that can load many file types including plain text, markdown, CSV, and PDF files. To use the SimpleDirectoryReader file loader, import it from Llama_index.core Then, you can load all files in the directory by passing that directory's path as the first argument to SimpleDirectoryReader and calling the load_data method. If on the other hand, you would like to load all files from a path with all of its subdirectories, you can pass recursive = True as a parameter to SimpleDirectoryReader. Alternatively, if you would like to load specific files, you can pass the file's path as a list to the input_files parameter. Finally, to load specific file types only, pass a list of requested file type extensions to the required _ext parameter. Note that SimpleDirectoryReader outputs a list of LlamaIndex document class objects of the type you just saw. A LlamaIndex node is simply a text chunk. Chunking long text helps retain the specific context of each segment, leading to more precise and relevant embeddings. LlamaIndex provides an easy-to-use but surprisingly effective text chunker called SentenceSplitter. SentenceSplitter uses a recursive method, splitting long text excessively based on specific characters such as newline characters and periods. To use SentenceSplitter, first import it from Llama_index.core.node_parser. Then, define the node parser by passing the chunk_size and chunk_overlap parameters. The chunk_size parameter controls the maximum size of each chunk in tokens and the chunk_overlap controls the maximum number of tokens that can overlap from one chunk to the next. Then use the get_nodes_from_documents method to split documents into individual nodes. Note that the node parser returns a list of LlamaIndex text node instances, which are similar in structure to the structure of LlamaIndex document instances that you saw previously. In addition to SentenceSplitter, LlamaIndex provides many other splitters, such as Semantic Splitter that splits wherever sentence similarity falls below a certain threshold, or a wrapper for Langchain Splitters that allows you to use any Langchain Splitters in LlamaIndex. Next, let's summarize what you've learned so far. You learned that LlamaIndex is a framework for building LLM-powered context augmentation. Typical use cases for LlamaIndex include question answering using RAG, chatbots, document understanding, and data extraction. In the first RAG step, LlamaIndex loads source documents by converting text, PDF, Markdown, CSV, JSON, and HTML files into LlamaIndex document objects. The LlamaIndex document class creates a document object with several key components, including a unique ID, an embedding placeholder, a metadata dictionary, a relationships dictionary for linking to other documents, and the text in the source document. You can use LlamaIndex's SimpleDirectoryReader to import and load files from a folder, its subdirectories, specific files, and specific file types. You can use LlamaIndex's SentenceSplitter to divide documents into chunks based on predefined separators. And you can also chunk documents using other splitters, such as semantic splitter, or by using a wrapper around any Langchain splitter.

      f29_intro_to_llamaindex_from_vector_stores_to_query_engines:
        source_file: "29. Intro to LlamaIndex_From Vector Stores to Query Engines.txt"
        content: |
          Welcome to this introductory video about LlamaIndex that covers topics from vector stores to query engines. After watching this video, you'll be able to: Discuss embedding in vector stores in LlamaIndex, Describe how retrieval works in LlamaIndex in the presence of a vector store, Discuss prompt augmentation and LLM querying in LlamaIndex, and Explain how LlamaIndex's powerful query engines combine several RAG steps into a single object. Let's start with a high-level review of RAG. In Retrieval-Augmented Generation, documents are loaded, chunked, and embedded into vectors stored in a vector store. A user prompt is also embedded and similar chunks from the source documents are retrieved from the vector store. The prompt and retrieved text are combined and sent to a language model to generate a context-aware response. By now, you're already familiar with loading and chunking documents into nodes. Let's begin with embedding those nodes and storing them in a vector store. Let's look at how you can generate embeddings. To generate and store embeddings, LlamaIndex uses the VectorStoreIndex class. For simple use cases, the embeddings can be generated using a default model and stored in-memory by simply passing in the nodes as the only parameter to VectorStoreIndex. For more complex cases that require a custom embedding model and persistent storage, the following procedure is needed. First, import the necessary libraries. In this case, you are importing the ChromaDB vector database to store the embeddings and a function that imports embedding models from HuggingFace. Then define the embedding model. In this case, you are using an embedding model from HuggingFace. Next, set up your vector store and storage context. In this case, you are using ChromaDB and then passing the embedding model and storage context into VectorStoreIndex. Then pass the nodes, the embedding model, and the storage context into VectorStoreIndex to generate embeddings using the selected model and to store the embedding vectors inside the persistent storage defined by the storage context. Thus, whether you store embedding vectors in-memory or in persistent storage, LlamaIndex's powerful VectorStoreIndex class efficiently handles both embedding text chunks and storing the resulting embeddings in the vector store. Given a VectorStoreIndex, the user's original prompt, embedding, and retrieval steps can be combined in LlamaIndex using the following process. First, create the retriever by calling the "as_retriever" method on the VectorStoreIndex object. Then pass the user's prompt to the retriever object's retrieve method to obtain the relevant results. Alternatively, if you need to control the maximum number of items retrieved, specify the maximum number of retrieved items by setting the similarity_top_k parameter when creating the retriever object. When the user's prompt is passed to this retriever, it retrieves the k nodes most similar to the user's prompt from the vector store, which in this case would be 5 nodes. The retrieved nodes are returned as a ranked list with the most similar nodes at the top of the list. Let's now discuss prompt augmentation, LLM querying, and response generation. LlamaIndex has the ability to combine the prompt augmentation, LLM querying, and response generation RAG steps using a response synthesizer. Given a user's prompt and retrieved nodes, the response synthesizer's synthesize method generates a response from the LLM. Note that the embedding of the user's prompt, prompt augmentation, and the passing of the augmented prompt to the LLM are done in the background, and no additional steps have to be taken by the user to perform these steps manually. With LlamaIndex, the process can be simplified even further using a query engine. LlamaIndex's query engine combines the prompt embedding, retrieval, prompt augmentation, LLM querying, and response generation steps, eliminating the need to manually retrieve nodes and to pass them to a response synthesizer. Given a user's prompt, the query engine's query method generates a response from the LLM. Note that the embeddings of the user's prompt, retrieval, prompt augmentation, and the passing of the augmented prompt to the LLM are done in the background, and no additional steps have to be taken by the user to perform these tasks manually. As a result, LlamaIndex's query engines greatly reduce the amount of code that needs to be written when building a RAG application. And remember these helpful tips when creating your application. You can customize a LlamaIndex query engine by changing the default LLM to a different one of your choosing, defining a custom prompt template for prompt augmentation, or by specifying a custom retriever. LlamaIndex provides numerous avenues to customize the RAG process to fit the needs of your application. Let's review what you've learned. In this video, you learned that LlamaIndex uses the VectorStoreIndex class for embedding generation and storage. You create the retriever by calling the "as_retriever" method on the VectorStoreIndex object. Then you pass the user's prompt to the retriever object's retrieve method to obtain relevant results. The response synthesizer in LlamaIndex combines prompt augmentation, LLM querying, and response generation in one step. The response synthesizer uses the original prompt and retrieved nodes to generate a response, refining it if needed with leftover nodes. You can customize response synthesizer behavior using different LLMs or prompt templates. A query engine can compress the process further by combining the prompt embedding, retrieval, prompt augmentation, LLM querying, and response generation RAG steps into a few simple commands. And a query engine can be modified by changing the default LLM, customizing the prompt template, or modifying the retriever.

      f30_langchain_vs_llamaindex:
        source_file: "30. LangChain vs LlamaIndex.pdf"
        content: |
          02/04/2026, 11:11 about:blank
          LangChain vs LlamaIndex
          Estimated Reading Time: 10 minutes
          In this reading, you'll explore the differences between LangChain and LlamaIndex, two frameworks for LLM-powered context augmentation. Both LangChain and
          LlamaIndex are commonly used to develop Retrieval-Augmented Generation (RAG) applications or chatbots with which you interact repeatedly. Additionally, they
          can be utilized to understand or summarize documents and extract data from various sources.
          You'll specifically focus on the similarities and differences between LangChain and LlamaIndex in the context of RAG. This is because many other typical use cases
          involve components necessary for building RAG applications. For example, a chatbot often connects to a RAG system, enabling the LLM to extract additional
          contextual information from an external knowledge base. Therefore, by comparing LangChain and LlamaIndex in the context of RAG, you'll gain a comprehensive
          understanding of the differences between these frameworks for related workflows.
          A Very Brief Review of RAG
          To assist you in recalling the specific stages within RAG that you will reference when comparing LangChain and LlamaIndex, please refer to the following image,
          which illustrates a typical RAG system:
          1. Load and chunk the source documents.
          2. Embed the chunks or documents, converting text data into numerical vectors using an embedding model.
          3. Store the vectors, typically in a vector database.
          4. Accept the user's original prompt or query into the system.
          5. Embed the user's prompt using the same model used for the source documents.
          6. Use a retriever to compare the prompt embedding with the source document embeddings in the vector store and retrieve the most similar chunks or documents.
          7. Augment the user's prompt with the information retrieved by the retriever.
          8. Pass the augmented prompt to the LLM to produce a context-aware response.
          Let's now compare how LangChain and LlamaIndex handle each of these steps.
          1. Loading and Chunking Source Documents
          Document Loading
          In this section, you will explore the various methods of loading entire source documents in LangChain and LlamaIndex.
          LangChain
          LangChain provides many different document loaders, including:
          TextLoader to load plaintext files
          CSVLoader to load tabular .csv files
          JSONLoader to load JSON data
          WebBaseLoader to load webpages using BeautifulSoup4 under the hood
          DoclingLoader, which integrates with Docling to parse PDF, DOCX, PPTX, HTML and other formats
          UnstructuredLoader, which can handle many types of files by using the open source unstructured library from unstructured.io
          Entire directories can be loaded using LangChain's DirectoryLoader. Under the hood, DirectoryLoader uses UnstructuredLoader by default, though
          this can be changed to a different loader using a parameter.
          Many other connectors and integrations are available to SQL databases, cloud object storage services such as AWS's S3, and specific application files
          such as Figma files.
          LlamaIndex
          LlamaIndex provides a very powerful loader in its core library called SimpleDirectoryReader. SimpleDirectoryReader natively handles a large
          number of formats, including markdown, PDF, Word documents, PowerPoint decks, and more. Moreover, SimpleDirectoryReader can be used to load
          individual files or entire directories, including recursively traversing all subdirectories, as well as loading files with specific extensions defined in a list.
          about:blank 1/3
          
          02/04/2026, 11:11 about:blank
          For additional connections that are not built into LlamaIndex's core library, LlamaIndex provides a registry of data connectors and various other
          integrations at LlamaHub. Some of the many data connectors available at LlamaHub include:
          DatabaseReader, which can run queries against SQL databases
          JSONReader, which can load JSON data, and
          RssReader, which can load RSS feeds.
          When comparing document loading capabilities between LangChain and LlamaIndex, LlamaIndex stands out with its powerful `SimpleDirectoryLoader`, which
          effortlessly handles various file types, offering a superior out-of-the-box experience. On the other hand, LangChain shines in flexibility: its `DirectoryLoader` can be
          configured to use any of LangChain's numerous loaders, highlighting a key design difference. LlamaIndex generally provides effective native solutions for most
          tasks, only resorting to external libraries when necessary. In contrast, LangChain relies heavily on integrations and a modular design, with much of its core
          functionality dependent on external packages and libraries.
          Document chunking
          LangChain and LlamaIndex offer a variety of chunking strategies:
          LangChain
          For typical use cases, LangChain offers length-based text splitters. These come in two types:
          A character-based text splitter, called CharacterTextSplitter, divides text using a specific character sequence, such as \n\n for line breaks.
          Additionally, the chunk sizes are limited by a settable maximum character length.
          Token-based text splitters limit the maximum chunk length by a settable number of tokens. One example is TokenTextSplitter, which encodes
          text into tokens, splits the tokens into chunks based on length, and then decodes the chunks back into text. Additionally, CharacterTextSplitter
          can also be used for token-based text splitting. In this context, CharacterTextSplitter splits text based on a specific character sequence but
          limits the chunk size by the maximum number of tokens instead of character length.
          An extension of some of the above concepts is provided by the RecursiveCharacterTextSplitter. RecursiveCharacterTextSplitter splits on
          characters from a specific list. For instance, if the list is [“\n\n”, “.”], the text is first split on two newline characters. Then, if any of the resulting
          chunks are too long, those chunks are further split on the next character in the list, in this case, a period. Hence, the recursive nature of the text splitting.
          Document-structured text splitters split documents based on some of the inherent elements in the files. For instance, the MarkdownHeaderTextSplitter
          splits on markdown headings, such as #, ## etc. LangChain provides document splitters for markdown files, code, HTML, and a recursive splitter for
          JSON.
          There is also a semantic meaning-based splitter called SemanticChunker that splits text if the similarity between two sentences is below a certain
          threshold. This can be useful for finding natural breaks between concepts in text.
          LlamaIndex
          First off, it's worth noting that LlamaIndex refers to a text chunk as a node.
          For basic use cases, LlamaIndex provides a SentenceSplitter, which works similarly to LangChain's RecursiveCharacterTextSplitter except that
          it is token-based in the sense that the chunk size is defined by the number of tokens.
          LlamaIndex provides several file-based "node parsers" that are similar to LangChain's document-structured text splitters. There are splitters for HTML,
          JSON, and markdown files. There is also a code splitter, though in contrast to LangChain, the code splitter is text-based, not file-based.
          SemanticSplitterNodeParser provides similar functionality to LangChain's SemanticChunker and splits text if the similarity between two sentences
          falls below a threshold.
          Finally, LlamaIndex provides a LangChainNodeParser which wraps around any LangChain text splitter. This allows you to use any splitter from
          LangChain in LlamaIndex!
          Once again, for basic usage LlamaIndex typically provides a slightly better experience with its SentenceSplitter being set up by default with a more
          comprehensive splitting list than LangChain's RecursiveCharacterTextSplitter. However, both frameworks provide comprehensive coverage of splitting
          strategies, with LlamaIndex even providing a wrapper for LangChain's splitters if you prefer those while using the other aspects of LlamaIndex.
          2. Embed the chunks or documents
          Both LangChain and LlamaIndex offer a large number of embedding model integrations, including models from HuggingFace and OpenAI. Moreover, LlamaIndex
          provides a wrapper around LangChain embedding models, allowing you to use any embedding model that is compatible with LangChain within LlamaIndex.
          The main difference between embedding designs in LangChain and LlamaIndex is that in LlamaIndex, vector embeddings are usually generated and stored in a
          vector store within a single command. In contrast, LangChain typically generates the embeddings first and then stores them in the vector store in a separate step.
          3. Store Vectors in a Vector Store
          This section explores the differences between LangChain and LlamaIndex with respect to storing the vector embeddings.
          LangChain
          LangChain does not have a single, all-encompassing vector store class, and typically relies on integrations with external libraries to integrate a vector
          database. The only commonly used vector store defined within the LangChain core library is the InMemoryVectorStore which stores vectors in memory.
          Integrations for external libraries and full-fledged vector databases include:
          Chroma for integration with Chroma DB
          FAISS for integration with the Facebook AI Similarity Search (FAISS) library and vector database
          Milvus for integration with the Milvus vector database
          PGVector for integration with pgvector-extended PostgreSQL
          LlamaIndex
          LlamaIndex provides a powerful VectorStoreIndex class that stores vectors in memory by default but can be integrated with full-fledged vector
          databases such as Chroma DB or Faiss. Thus, LlamaIndex's VectorStoreIndex class ensures ease of use because the vector store backend can be
          swapped out without changing any of the downstream code.
          Moreover, as opposed to the typical workflow in LangChain, in LlamaIndex the vectors are embedded and stored in the vector store with just one
          command: index = VectorStoreIndex(nodes), where nodes contains the document chunks created by one of LlamaIndex's chunking methods.
          One of LlamaIndex's main advantages is that chunk metadata is automatically created and stored within the VectorStoreIndex object. In contrast, LangChain may
          require manual metadata setup. Additionally, due to LangChain's modular design, the methods for handling metadata can vary depending on the backend vector store.
          However, LangChain's vector store integrations are not wrapped by a single class, offering more flexibility and granular control by exposing unique features of each
          vector store type.
          4. Accepting the user's original prompt
          about:blank 2/3
          
          02/04/2026, 11:11 about:blank
          Accepting the user's original prompt is a step in the RAG process, but there are no specific implementations within LangChain or LlamaIndex with respect to how
          that prompt is received. Both LangChain and LlamaIndex operate under the assumption that a prompt will be passed to them from a different workflow or process.
          5. Embed the user's original prompt
          Both LangChain and LlamaIndex typically embed the user's original prompt by using a retriever created from the vector store object. This is done for two reasons:
          The embedding model used to embed the prompt should be the same as the model used to generate the chunk embeddings inside the vector store, so it makes
          sense to store the embedding model within the vector store object
          The prompt embedding is typically only used for retrieval tasks, where the information is retrieved from the vector store
          Thus, embedding is typically combined with retrieval, and there are no specific implementation differences of note between LangChain and LlamaIndex.
          6. Retrieve relevant chunks
          For typical use cases where the top k chunks are retrieved based on similarity with the user prompt, LangChain and LlamaIndex offer similar functionality. However,
          both frameworks provide various advanced retrievers and retrieval patterns. For example, LangChain includes a parent document retriever that retrieves the parent
          document containing the relevant chunk, rather than just the chunk itself. Note that such advanced retrieval patterns in LangChain require two vector stores: one for
          the chunks and one for the parent documents.
          Detailed discussions of retrieval patterns are beyond the scope of this document. If your project requires a specific retrieval pattern, it is recommended to explore the
          retrieval options provided by LangChain and LlamaIndex. Doing so can help you choose the framework that best fits your needs and increases the likelihood that
          your application will work as intended.
          7. Augment the user's original prompt
          Both LangChain and LlamaIndex use prompt templates for prompt augmentation. These templates contain placeholders that are filled with the user's original prompt
          and the retrieved information when that information becomes available. However, the methods of prompt augmentation differ between LangChain and LlamaIndex.
          LangChain
          LangChain does not combine prompt augmentation with any of the preceeding or succeeding steps. This ensures that prompt template customization is
          easy.
          LlamaIndex
          LlamaIndex combines the prompt augmentation step with the LLM response generation step when a "response synthesizer" is used. Alternatively, if a
          "query engine" is used, the process is further combined with the query embedding and retrieval steps. Thus, although the default prompt templates
          provided by LlamaIndex work well for most cases, customizing these templates is slightly more challenging because the prompt augmentation step is
          combined with the LLM response generation step.
          8. Pass the augmented prompt to the LLM
          Passing the augmented prompt to the LLM works differently for LangChain and LlamaIndex.
          LangChain
          For LangChain, the augmented prompt is passed to the LLM manually. For instance, given messages generated by a prompt template and an llm object,
          LangChain generates a response from the LLM using response = llm.invoke(messages).
          LlamaIndex
          For LlamaIndex, the process is combined with the prompt augmentation step. There are several options here, including:
          Using a "prompt synthesizer," which takes the user's original prompt and the retrieved nodes as inputs, performs prompt augmentation internally,
          and passes the augmented prompt to the LLM to generate a response as output.
          Using a "query engine" which is an object that is derived from the vector store index and takes the user's original prompt as an input. The query
          engine then performs the query embedding, retrieval, prompt augmentation, and LLM response generation steps internally.
          Conclusion
          Despite the various strengths and weaknesses of LangChain and LlamaIndex, both are capable of handling most typical RAG workflows. LangChain excels in its
          numerous integrations, modular design, and the ease of accessing and customizing its components. However, it often requires manual setup, such as configuring
          metadata in the vector store. On the other hand, LlamaIndex is known for its simplicity and ease of development. Although customizations can be more challenging,
          LlamaIndex provides sensible defaults and internal solutions that work well for typical tasks. Notably, LlamaIndex's SimpleDirectoryReader document loader can
          handle many different file types out of the box, and the VectorStoreIndex class wraps external vector databases in a native class, making downstream code agnostic
          to the vector store backend.
          Author
          Wojciech "Victor" Fulmyk
          about:blank 3/3

