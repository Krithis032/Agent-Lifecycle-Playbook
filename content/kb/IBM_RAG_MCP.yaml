          # Delete by IDs
          collection.delete(ids=["id1"])
          # Delete using metadata filter
          collection.delete(where={"source": "doc_to_delete.pdf"})
          # Combine IDs and filters
          collection.delete(
          ids=["id1"],
          where={"version": "1.0"}
          )
          Distance Functions in Chroma DB
          Chroma DB uses the Hierarchical Navigable Small World (HNSW) algorithm to perform approximate nearest neighbor searches.
          The space parameter defines the distance function used in the embedding space:
          l2 (default) - squared L2 norm
          cosine - cosine distance
          ip - inner product or dot product distance
          Configuring Distance Function
          # Specify distance function at collection creation
          collection = client.create_collection(
          name="my_collection",
          metadata={"description": "A collection for storing user data"},
          configuration={
          "embedding_function": sentence_transformer_ef,
          "hnsw": {"space": "cosine"}
          }
          )
          What Vector Databases Don't Handle
          Some RAG pipeline tasks usually happen outside the database:
          Chunking is usually done before data enters the vector database
          Extra retrieval logic such as filtering and re-ranking may require extra tools
          Prompt augmentation is typically handled outside the database
          about:blank 3/4
          
          03/04/2026, 21:25 about:blank
          Integration with LLMs is not built into most vector databases
          RAG Frameworks
          Tools such as LangChain and LlamaIndex wrap around your vector database and help manage the pipeline from document prep to final response.
          These frameworks:
          Provide additional structure.
          Simplify the development and deployment of your RAG application even further.
          Fill the gaps by connecting all the pieces.
          Key Takeaways
          Vector databases are the foundation that makes retrieval augmented generation work.
          RAG enhances LLM response quality by retrieving relevant external information, helping the model generate more accurate and well-supported outputs.
          Using a vector database for all relevant RAG steps helps prevent critical mistakes, speeds up application development, and optimizes performance.
          Collections are a way to organize your data within Chroma DB.
          Metadata helps you keep track of the purpose and contents of your collection.
          Always test your results - a little tuning can make a big difference.
          Author(s)
          Wojciech "Victor" Fulmyk
          about:blank 4/4


  advanced_rag_retrievers:
    description: "Course 4 - Advanced RAG with Vector Databases and Retrievers"
    concepts:
      f49_explore_advanced_retrievers_in_langchain_part_1:
        source_file: "49. Explore Advanced Retrievers in Langchain_Part 1.txt"
        content: |
          [MUSIC] Welcome to Explore Advanced Retrievers
          in LangChain, part one. After watching this video, you'll be able to
          explain what LangChain retrievers are. You will also be able to describe
          the vector store-based retriever and explain how it works. Let's begin by understanding
          what a LangChain retriever is. A LangChain retriever is an interface
          that returns documents based on an unstructured query. It is more general than a vector store. It doesn't necessarily store documents
          as its purpose is to retrieve them or their chunks. A LangChain retriever accepts
          a string query as input and returns a list of documents or
          chunks as output. Although the process of
          retrieving data sounds simple, it can be subtly complex with
          several implementations possible. Let's learn more about the simplest
          type of retriever the vector store-based retriever which retrieves
          documents from a vector database. Recall that this vector database is
          brought into existence by loading source documents, splitting them into chunks,
          and embedding them. The vector store-based retriever plugs
          into this existing vector store. It accepts a query and
          retrieves the most similar data, in this case the most similar chunks. The vector store-based retriever
          works by embedding the query and then comparing it with embedded
          chunks using similarity search or maximum marginal relevance, also known as
          MMR, to retrieve the most relevant chunks. The vector store-based retriever is
          simple to understand because it queries an existing vector store and does not require an LLM to
          retrieve the most similar chunks. In addition to using a similarity score, you can use maximum marginal
          relevance retrieval or MMR. MMR in vector stores is a technique
          used to balance the relevance and diversity of retrieved results. It selects documents that are both
          highly relevant to the query and minimally similar to
          previously selected documents. This approach helps to
          avoid redundancy and ensures a more comprehensive coverage
          of different aspects of the query. In this particular example, the query email policy results
          in three retrieved documents. Let's recap. In this video, you learned that a Lanchain
          retriever is an interface that returns documents based on an unstructured query. It has several types. The vector store-based retriever is one
          such type that retrieves documents from a vector database. It can be created directly from the vector
          store object with the retriever method by using similarity search or MMR. Similarity search is when
          the retriever accepts a query and retrieves the most similar data. MMR is a technique used to
          balance the relevance and diversity of retrieved results.

      f50_explore_advanced_retrievers_in_langchain_part_2:
        source_file: "50. Explore Advanced Retrievers in Langchain_Part 2.txt"
        content: |
          Welcome to explore
          advanced retrievers in LangChain, Part 2. After watching this video, you'll be able to describe the different types of
          LangChain retrievers, namely the multi-query
          retriever, the self-query retriever, and the parent
          document retriever. You'll also be able to identify the difference between
          these retrievers. A LangChain retriever
          is an interface that returns documents based
          on an unstructured query. The simplest type of retriever, the vector store
          based retriever, retrieves documents
          from a vector database. The multi-query retriever is similar to the vector
          based retriever, except it uses an LLM to create different
          versions of the query, generating a richer set
          of retrieved documents. This is done to overcome
          potentially different results that can result from subtle
          changes in query wording, or if the embeddings do not capture the semantics
          of the data well. In this particular example, a Watson XLLM instance has
          been created that uses the Mixtral eight by
          seven B foundational model to generate different
          query versions. The multi-query retriever
          object itself is then created using the
          multi-query retriever class from the LLM method. This method except a
          retriever parameter, which is the vector
          based retriever used to retrieve
          results for each query. In this particular example, the simple similarity search
          retriever is being used. However, other retrievers
          can be used here, such as the MMR retriever. Additionally, the multi-query
          retriever class from the LLM method accept
          an LLM parameter, where the LLM is
          used to generate alternative versions of
          the query is passed in. For each query, the multi-query retriever retrieves a set
          of relevant documents and takes the unique
          union across all queries to get a larger set of
          potential relevant documents. Now, suppose that instead of documents that
          just contain text, you also have metadata
          about these documents. In other words, suppose your documents look like the
          ones presented in this code. Here you see documents that contain text describing movies, as well as some metadata
          relating to those movies, such as the year in which
          the movie was released, the director of the movie, and the movies IMDB rating. None of the retrievers
          you have looked at so far have the ability to access this metadata because only the document
          text is considered. This is where the self-query
          retriever comes in. The self-query
          retriever converts the query into two components, a string to look
          up semantically, and a metadata filter
          to go along with it. Let's set up the
          self-query retriever. The first cell converts
          the documents you just saw into a vector store from which you can
          retrieve documents. The second cell describes the metadata fields for the documents in
          the vector store. For instance, the year
          attribute is described as an integer that indicates the year in which the
          movie was released. These metadata field
          descriptions help the LLM create meaningful
          metadata filters to choose relevant documents. Given a vector store and metadata description,
          as described here, you can retrieve documents
          based on the text and the metadata using the
          self-query retriever class from the LLM method. This method accepts an
          LLM, a vector database, a document description, and a metadata field
          description as attributes. Retrieving documents
          using the query, I want to watch a movie
          rated higher than 8.5, successfully returns to movies with ratings greater than 8.5. When splitting documents
          for a retrieval, there are often
          conflicting requirements. On the one hand, you may
          want small documents so that their embeddings can accurately reflect
          their meaning. On the other hand, you want long enough documents so that the context of each
          chunk is retained. This is where the parent
          document retriever comes in. During retrieval, the
          parent document retriever first fetches the
          smaller chunks, looks up their parent IDs, and returns the larger documents in which the small chunks live. Let's set up the parent
          document retriever. The parent document retriever
          has two text splitters, a parent splitter that splits the text into large
          chunks to be retrieved, and a child splitter
          that splits the document into small chunks to generate
          meaningful embeddings. You also need a vector store for the embeddings and a store
          for the parent documents. Finally, you need to create
          the parent retriever object and add the documents to it using the add documents method. The parent document retriever
          can be invoked using the same unified syntax as all of the previously
          seen retrievers. Note that for the
          query smoking policy, the parent document
          retriever retrieves large chunks generated
          by the parent splitter, not the chunks created
          by the child splitter. Here, the retrieved chunk
          is the smoking policy, exactly what the query
          asked for. Let's recap. In this video, you learned
          that the multi-query retriever uses an LLM to create different
          versions of the query, generating a richer set
          of retrieved documents. The self query retriever converts the query
          into two components, a string to look
          up semantically, and a metadata filter
          to accompany it. Finally, you learned that the parent document retriever
          has two text splitters, a parent splitter that splits the text into large
          chunks to be retrieved, and a child splitter
          that splits the document into small chunks to generate
          meaningful embeddings.

      f51_m01l01_recap_advanced_rag_with_vector_dbs_and_retrievers_transcript:
        source_file: "51. M01L01 recap_ Advanced Rag with Vector DBs and Retrievers_transcript.txt"
        content: |
          M01L01 recap: Advanced Rag with Vector DBs and Retrievers - Transcript
          
          [00:00] Tess: Welcome to the show, everyone. Today, we're diving into the world of advanced retrievers in LangChain. Adrian, thanks for joining me.
          [00:08] Adrian: Hey Tess, glad to be here. Ready to get into the nuts and bolts of retrievers.
          [00:13] Tess: Absolutely. Let's start simple—can you explain, just briefly, what exactly is a LangChain retriever?
          [00:20] Adrian: Sure. Basically, a LangChain retriever is an interface. It takes an unstructured query—so, like, just a string you type in—and it returns a list of documents or document chunks that match that query.
          [00:34] Tess: So, it’s not just about storing documents, right?
          [00:39] Adrian: Right. It's more general than a vector store. Its job is to retrieve, not to store. It can use different backends, but the focus is on getting you useful information fast.
          [00:50] Tess: Okay, got it. Now, I know the vector store-based retriever is kind of the entry point. How does that work?
          [00:57] Adrian: Yeah, that’s the classic one. Imagine you load your source documents, split them into chunks, and embed them into a vector database. The retriever plugs into that vector store, takes your query, embeds it, and then compares it using similarity search. The most similar chunks pop out as your results.
          [01:16] Tess: And what about this MMR—maximum marginal relevance—thing?
          [01:21] Adrian: Good question. MMR is a way to balance relevance and diversity. Instead of just giving you the closest matches, it tries to avoid redundancy. So, you get results that cover different angles of your query, not just the same thing over and over.
          [01:36] Tess: That’s helpful. But LangChain has more advanced retrievers now, right? Can you walk us through those?
          [01:42] Adrian: Yeah, absolutely. There are a few major ones: the multi-query retriever, the self-query retriever, and the parent document retriever. Each serves a different purpose.
          [01:53] Tess: Let’s start with the multi-query retriever. How is it different from the basic vector store one?
          [01:58] Adrian: The multi-query retriever uses an LLM—a language model—to create several different versions of your query. That way, it can pull in a richer set of results, especially if the way you word your question affects what you get back.
          [02:13] Tess: So, if I search for something like 'company email policy' and also 'rules for email at work,' it'll cover both?
          [02:20] Adrian: Exactly. It actually generates those different phrasings for you, sends them all to the retriever, and then merges the results. You get a broader, more complete answer set.
          [02:32] Tess: That’s pretty clever. Now, what about the self-query retriever?
          [02:37] Adrian: Okay, so the self-query retriever is great when your documents have metadata—like, say, movies with release years, directors, ratings. Instead of just searching the text, it splits your query into two parts: the text you want, and a metadata filter. For example, 'movies rated higher than 8.5'—it understands to only pull movies above that rating.
          [03:04] Tess: So it's not just keyword search. It's, um, actually understanding and filtering by attributes?
          [03:11] Adrian: Yeah, that's the power. It lets you search semantically and also filter by structured info in your documents. Super useful when you care about both content and context.
          [03:23] Tess: Nice. And the parent document retriever—what’s the idea there?
          [03:27] Adrian: Good one. Sometimes you want your document chunks small for accurate embeddings, but you don’t want to lose the big picture. The parent document retriever starts with small chunks, finds their 'parent' larger chunks, and returns those. So, you can get a whole policy section, not just a sentence or two.
          [03:48] Tess: So it balances detail and context. That’s smart. Can you set it up like the other retrievers?
          [03:54] Adrian: Yup. You use two text splitters: one for small chunks, one for big parent chunks. Then, when you retrieve, it fetches the small ones, looks up the parent IDs, and gives you the larger, more meaningful document sections.
          [04:09] Tess: Alright, let’s recap quickly. There’s the vector store-based retriever for simple similarity, multi-query for richer coverage, self-query for metadata-aware searches, and the parent document retriever for getting both detail and context. Did I miss anything?
          [04:27] Adrian: No, you nailed it. And, um, just remember—each retriever has its own sweet spot, depending on your data and the questions you need to answer.
          [04:36] Tess: Perfect. Adrian, thanks for breaking that all down. That’s all the time we have today, but this was a great overview of what’s possible with advanced retrievers in LangChain. Thanks again.
          [00:00] Adrian: Thanks Tess. Always a pleasure to talk shop.
          [00:00] Tess: And thank you to everyone listening. We’ll see you next time.

      f52_advanced_retrievers_in_llamaindex:
        source_file: "52. Advanced Retrievers in LlamaIndex.txt"
        content: |
          Welcome to this video, "Advanced Retrievers in LLAMAIndex." After watching this video, you'll be able to identify the different index types in LLAMAIndex and know when to use each one, explore core and advanced retrievers that power flexible search strategies, discover fusion techniques that combine results from multiple queries, and understand the most suitable use cases for different types of retrievers. In this video, you will learn how to build intelligent, flexible retrieval pipelines using the tools and retrievers provided by the LLAMAIndex framework. First, let's begin by discussing the three core index types available in LLAMAIndex. VectorStoreIndex is used for semantic search based on meaning. DocumentSummaryIndex uses generated summaries to identify relevant documents. And, KeywordTableIndex enables exact keyword matching for rule-based or hybrid search. Let's discuss the first index type, VectorStoreIndex, in a little more detail. This index stores vector embeddings for each document chunk. It's best suited for semantic retrieval. And it's commonly used in pipelines that involve large language models. Next up is the DocumentSummaryIndex. This index generates and stores summaries of documents at indexing time. These summaries are used to filter documents before retrieving the full content. This type of index is especially useful when working with large and diverse document sets that cannot fit in the context window of an LLM. The third index type is the KeywordTableIndex. This type of index extracts keywords from documents. It maps those keywords to specific content chunks. It's ideal for exact keyword matching and for hybrid or rule-based search scenarios. Let's now talk about retrievers, starting with the Vector Index Retriever. This retriever uses vector embeddings to find semantically relevant content. It's ideal for general purpose search. It's also widely used in retrieval augmented generation, RAG, pipelines. Before moving on to the next retriever, let's understand TF-IDF, The foundation of keyword-based search. Term frequency, the TF part in TF-IDF, measures how often a word appears in a document. Inverse Document Frequency, the IDF part in TF-IDF, measures how rare that word is across all documents. The TF-IDF score is the product of these two values, Highlighting words that are frequent in one document but rare across the collection. Now let's look at the BM25 Retriever which is a keyword-based method for ranking documents. The BM25 Retriever retrieves content based on exact keyword match rather than semantic similarity. However, it improves on TF-IDF by addressing some of its limitations. Specifically, BM25 reduces the impact of repeated terms by using term frequency saturation. It also adjusts for document length, making it more effective for keyword-based search. Next, we'll discuss Document Summary Index Retrievers. These type of retrievers use document summaries instead of the actual documents to find relevant content There are two versions of this retriever, with one version using a large language model, or LLM, to find the most relevant content. However, using an LLM to find the relevant data can be more time-consuming and expensive than other options. The other version uses semantic similarity between the query and the summary embedding in order to find the most relevant content. This version is more efficient for large collections. Regardless of which version is used, the Document Summary Index Retriever returns the original documents, not their summaries. Next up is the Auto Merging Retriever This retriever is designed to preserve context in long documents using a hierarchical structure. It uses hierarchical chunking to break documents into parent and child nodes. If enough child nodes from the same parent are retrieved, the retriever returns the parent node instead. This helps consolidate related content and preserve broader context. Let's consider the Recursive Retriever. This retriever is designed to follow relationships between nodes using references. It can follow references from one node to another, such as citations in an academic paper or other metadata links. It supports both chunk references and metadata references. This allows the Recursive Retriever to retrieve related content across documents or layers of abstraction. Lastly, we'll explore the Query Fusion Retriever. This retriever is used to combine results from different retrievers, such as vector-based and keyword-based methods. It also optionally generates multiple variations of a query using an LLM to improve coverage. The results are merged using fusion strategies such as reciprocal rank fusion or relative score fusion to improve recall capabilities. Let's discuss some of the fusion strategies supported by LLAMAIndex's Query Fusion Retriever. Reciprocal Rank Fusion combines ranked lists by assigning higher scores to documents that appear near the top of any list. It's robust and doesn't rely on score magnitudes. Relative Score Fusion normalizes scores within each result set by dividing the maximum score. This preserves the relative confidence of each retriever. Distribution-Based Fusion uses statistical techniques such as z-score normalization or percentile ranking to combine results, making it ideal for handling score variability. Finally, let's cover some recommendations on which LLAMAIndex Retrievers to use in particular use cases. For general Q and A, use a Vector Index Retriever, potentially combined with a BM25 Retriever. This retriever fusion combines semantic relevance with keyword matching. For technical documents, especially those where exact terms need to be prioritized, consider making BM25 your primary retriever, with the Vector Index Retriever adding contextual flexibility as a secondary retriever. For long documents, the Auto Merging Retriever is a great option, because it will retrieve longer parent versions only if enough shorter child versions are retrieved. For research papers, use the Recursive Retriever in order to retrieve relevant content from cited papers. For large document sets, consider using the Document Summary Index Retriever to narrow down the number of relevant documents, followed by a Vector Search within the remaining subset to retrieve the most pertinent content. In this video, you learned that The core LLAMAIndex types are the VectorStoreIndex, the DocumentSummaryIndex, and the KeywordTableIndex. The VectorStoreIndex stores vector embeddings for each document chunk, is best suited for semantic retrieval, and is commonly used in pipelines that involve large-language models. The DocumentSummaryIndex generates and stores summaries of documents, which are used to filter documents before retrieving the full content and is useful when working with large and diverse document sets. The KeywordTableIndex extracts keywords from documents and maps them to specific content chunks and is useful in hybrid or rule-based search scenarios. The VectorIndexRetriever uses vector embeddings to find semantically related content and is ideal for general-purpose search and RAG pipelines. The BM25 Retriever is a keyword-based method for ranking documents and it retrieves content based on exact keyword matches rather than semantic similarity. The Document Summary Index Retriever uses document summaries instead of the actual documents to find relevant content. There are two versions of the Document Summary Index Retriever, one uses LLM and the other uses semantic similarity. The Auto Merging Retriever preserves context in long documents using a hierarchical structure and uses hierarchical chunking to break documents into parent and child nodes. The Recursive Retriever follows relationships between nodes and uses references such as citations in academic papers or metadata links. The Query Fusion Retriever combines results from different retrievers using fusion strategies. And, the fusion strategies supported by the Query Fusion Retriever are Reciprocal Rank Fusion, Relative Score Fusion, and Distribution-Based Fusion

      f53_interactive_lesson_recap_podcast_ai_powered_qa_history:
        source_file: "53. Interactive Lesson Recap Podcast (AI-Powered)_qa_history.txt"
        content: |
          [Optional] Interactive Lesson Recap Podcast (AI-Powered) - Q&A Transcript
          
          [00:00] Tess: Welcome back to the show. Today, we're diving into advanced retrievers in LLAMAIndex. Adrian, thanks for joining us.
          [00:07] Adrian: Yeah, of course. LLAMAIndex has a ton to offer, so let's break it down. Where do you want to start?
          [00:13] Tess: Let's start with the basics. There are three core index types in LLAMAIndex, right? Can you walk us through those quickly?
          [00:21] Adrian: Absolutely. So, first is the VectorStoreIndex. This one's all about semantic search—meaning, it finds content based on what you mean, not just the words you use. It stores vector embeddings for each chunk of your documents, which is perfect for large language model pipelines.
          [00:41] Tess: Okay, so it's more about the meaning than the exact words. What about the DocumentSummaryIndex?
          [00:47] Adrian: DocumentSummaryIndex is different. It generates summaries of your docs up front, at indexing time. When you search, it checks the summaries first—super useful if you’ve got massive, diverse document sets that can’t all fit into an LLM’s context window.
          [01:07] Tess: And the third type is KeywordTableIndex, right? [pause] How does that one work?
          [01:12] Adrian: Right. KeywordTableIndex pulls out keywords from documents and maps those keywords to content chunks. It's great for exact keyword matches and, uh, hybrid or rule-based search scenarios.
          [01:25] Tess: So depending on your needs, you might pick one of these indexes. Now, let’s talk about retrievers. The Vector Index Retriever—is that just for semantic search?
          [01:37] Adrian: Pretty much, yeah. It uses those vector embeddings to find semantically relevant chunks. Ideal for general search, and it powers a lot of retrieval-augmented generation, or RAG, workflows.
          [01:52] Tess: Now, before we get to other retrievers, can you explain TF-IDF? [chuckles] I feel like I hear that term a lot.
          [01:59] Adrian: Sure. TF-IDF stands for term frequency-inverse document frequency. Basically, it scores words based on how often they appear in a doc versus how rare they are across all docs. So, you get a sense of what words are important in context.
          [02:17] Tess: And BM25 builds on that, right? How is it different?
          [02:21] Adrian: Yeah, BM25 is a keyword-based method, but it improves on TF-IDF. It limits how much repeated terms matter—so if you stuff a doc with the same word, it won't skew the results as much. Plus, it adjusts for document length. Makes keyword search more reliable.
          [02:39] Tess: That makes sense. Now, what about the Document Summary Index Retriever? How does it actually work in practice?
          [02:47] Adrian: There are two main versions. One uses a large language model to pick relevant summaries—accurate, but a bit slower and more expensive. The other uses semantic similarity on summary embeddings. That one's faster, especially with lots of documents. But—either way—you always get the original documents back, not just the summaries.
          [03:09] Tess: Interesting. Let's move on to the Auto Merging Retriever. That sounds a bit... complex. What does it do?
          [03:18] Adrian: Yeah, so, Auto Merging Retriever preserves context in long docs using hierarchy. It breaks stuff into parent and child nodes. If you retrieve enough child nodes from the same parent, it gives you the parent node—keeps the big picture intact. Great for long, dense documents.
          [03:37] Tess: And the Recursive Retriever—how is that different from the others?
          [03:43] Adrian: That one follows references between nodes, like citations in papers or metadata links. It can hop from chunk to chunk, or even across documents. Super valuable in research or anything with cross-referencing.
          [03:57] Tess: Now, let’s talk about the Query Fusion Retriever. It combines results from different retrievers, right?
          [04:03] Adrian: Exactly. It lets you merge semantic and keyword-based results. Plus, you can generate multiple query variations with an LLM to cover more ground. Then, you use fusion strategies—like reciprocal rank fusion, relative score fusion, or distribution-based fusion—to blend the results.
          [04:22] Tess: Can you give us a quick rundown of those fusion strategies?
          [04:27] Adrian: Sure. Reciprocal Rank Fusion gives higher scores to docs that appear near the top of any list—doesn’t care about exact scores. Relative Score Fusion normalizes scores within each set, so each retriever’s confidence is respected. Distribution-Based Fusion uses stats—like z-score normalization—to handle score variability.
          [04:49] Tess: Alright, so let’s bring it all together. If someone’s doing general Q&A, what retrievers should they use?
          [04:56] Adrian: I'd say start with a Vector Index Retriever, maybe add a BM25 Retriever for keyword matching. Fusion gives you both semantic and exact matches.
          [05:08] Tess: And if it's technical docs where you need very specific terms?
          [05:13] Adrian: Make BM25 your main retriever—prioritize keywords. Use Vector Index Retriever as a secondary for extra context.
          [05:21] Tess: How about long documents?
          [05:23] Adrian: Auto Merging Retriever all the way. It’ll give you longer parent chunks if you retrieve enough relevant children—keeps context intact.
          [05:33] Tess: And for large collections of documents?
          [05:36] Adrian: Start with Document Summary Index Retriever to filter things down, then use Vector Search on the smaller set for precision.
          [05:45] Tess: Thanks, Adrian. That was a lot to take in, but super helpful. [sighs] Any final thoughts?
          [05:52] Adrian: Just—experiment with different retrievers. LLAMAIndex gives you a toolkit, so match your retrieval strategy to your use case. That’s really the key.
          [06:03] Tess: Fantastic. Well, that wraps up our discussion on advanced retrievers in LLAMAIndex. Thanks for joining us, and thanks to everyone listening.

      f54_advanced_retrievers_for_rag:
        source_file: "54. Advanced Retrievers for RAG.pdf"
        content: |
          06/04/2026, 16:14 about:blank
          Cheat Sheet: Advanced Retrievers for RAG
          Estimated Reading Time: 15 minutes
          Core Retrieval Concepts
          What are Advanced Retrievers?
          Advanced retrievers go beyond simple vector similarity search to provide more nuanced, context-aware information retrieval through:
          Semantic Understanding: Using embeddings for meaning and context
          Keyword Matching: Precise term-based search for exact specifications
          Hierarchical Context: Maintaining relationships between information levels
          Multi-Query Processing: Generating and combining results from multiple query variations
          Fusion Techniques: Intelligently combining results from different retrieval methods
          Maximum Marginal Relevance (MMR)
          Purpose: Balance relevance and diversity of retrieved results
          Method: Selects documents that are highly relevant to the query AND minimally similar to previously selected documents
          Benefit: Avoids redundancy and ensures comprehensive coverage of different query aspects
          LlamaIndex Retrievers
          Core Index Types in LlamaIndex
          VectorStoreIndex
          Function: Stores vector embeddings for each document chunk
          Best suited for: Semantic retrieval based on meaning
          Usage: Commonly used in LLM pipelines and RAG applications
          DocumentSummaryIndex
          Function: Generates and stores summaries of documents at indexing time
          Process: Uses summaries to find and retrieve relevant documents
          Best for: Large documents whose meanings would be lost by chunking; large documents that cannot fit in LLM or embedding model context windows
          Key Points: Returns original documents, not their summaries; uses summaries instead of text chunks to enable retrieval based on the semantic meaning of the
          entire text
          KeywordTableIndex
          Function: Extracts keywords from documents and maps to content chunks
          Best for: Exact keyword matching for rule-based or hybrid search scenarios
          Use Case: Applications requiring precise term matching
          LlamaIndex Retriever Types
          1. Vector Index Retriever
          Most common retriever - uses vector embeddings to find semantically related content
          Process: Embeds query, compares with document embeddings using cosine similarity
          Ideal for: General-purpose search, RAG pipelines where semantic understanding is crucial
          Limitation: May miss exact keyword matches when specific terms are crucial
          2. BM25 Retriever
          Advanced keyword-based retrieval that improves on TF-IDF
          TF-IDF Foundation:
          Term Frequency (TF): How often a word appears in a document
          Inverse Document Frequency (IDF): How rare a word is across all documents
          TF-IDF Score: TF × IDF
          BM25 Improvements:
          Term Frequency Saturation: Reduces impact of repeated terms using saturation function
          Document Length Normalization: Adjusts for document length, preventing long document bias
          Tunable Parameters: k1≈1.2 (saturation control), b≈0.75 (length normalization)
          Best for: Technical documentation, legal documents, exact terminology requirements
          3. Document Summary Index Retrievers
          about:blank 1/3
          
          06/04/2026, 16:14 about:blank
          Two Variants:
          1. DocumentSummaryIndexLLMRetriever: Uses LLM to analyze query against summaries (intelligent but expensive)
          2. DocumentSummaryIndexEmbeddingRetriever: Uses semantic similarity between query and summary embeddings (faster, cost-effective)
          Process: Two-stage approach using summaries to filter documents, then returns full document content
          4. Auto Merging Retriever
          Purpose: Preserves context in long documents using hierarchical structure
          Method:
          Uses hierarchical chunking (parent and child nodes)
          If enough child nodes from same parent are retrieved, returns parent node instead
          Dual Storage: Child chunks for precise matching, parent chunks for context
          Best for: Long documents, legal papers, technical specifications needing context preservation
          5. Recursive Retriever
          Purpose: Follows relationships between nodes using references
          Capability: Can follow references from one node to another (citations, metadata links)
          Types: Supports chunk references and metadata references
          Best for: Academic papers with citations, interconnected knowledge bases
          6. Query Fusion Retriever
          Purpose: Combines results from different retrievers and optionally generates multiple query variations
          Core Capabilities:
          Multiple retriever support (combines vector-based and keyword-based methods)
          Query variation generation using LLM
          Sophisticated fusion strategies to improve recall
          Three Fusion Modes:
          Reciprocal Rank Fusion (RRF)
          Most robust fusion method - combines ranked lists using reciprocal of ranks
          Formula: RRF_score(d) = Σ (1 / (rank_i(d) + k)) where k≈60
          Best for: Default choice for most fusion scenarios, production systems
          Relative Score Fusion
          Preserves score magnitudes while normalizing across query variations
          Formula: normalized_score = original_score / max_score
          Best for: When embedding model confidence scores are meaningful
          Distribution-Based Score Fusion
          Most sophisticated - uses statistical properties of score distributions
          Methods: Z-score normalization, percentile ranking
          Best for: Complex queries with varying score distributions
          LangChain Retrievers
          LangChain Retriever Interface
          Definition: "An interface that returns documents based on an unstructured query"
          More general than a vector store
          Accepts string query as input, returns list of documents as output
          Doesn't necessarily store documents - purpose is to retrieve them
          LangChain Retriever Types
          1. Vector Store-Backed Retriever
          Foundation retriever - lightweight wrapper around vector store class
          Search Types:
          Simple Similarity Search: Returns documents ranked by similarity (default 4 results)
          MMR Search: Balances relevance and diversity to avoid redundancy
          Similarity Score Threshold: Returns only documents above specified threshold
          2. Multi-Query Retriever
          Problem Addressed: "Distance-based vector database retrieval may vary with subtle changes in query wording"
          Solution Process:
          1. Uses LLM to generate multiple queries from different perspectives
          about:blank 2/3
          
          06/04/2026, 16:14 about:blank
          2. For each query, retrieves set of relevant documents
          3. Takes unique union of results for larger set of potentially relevant documents
          Benefit: "By generating multiple perspectives on the same question, the MultiQueryRetriever can potentially overcome some limitations of distance-based retrieval"
          3. Self-Querying Retriever
          Core Capability: "Has the ability to query itself"
          Process: Converts natural language query into structured query with two components:
          1. String to look up semantically
          2. Metadata filter to accompany it
          Requirements: Documents must have rich, structured metadata with field descriptions
          Best for: Applications combining semantic search with attribute filtering
          Example Queries:
          "I want to watch a movie rated higher than 8.5" (filter only)
          "Has Greta Gerwig directed any movies about women" (query + filter)
          4. Parent Document Retriever
          Problem Solved: "Conflicting desires" when splitting documents:
          Small documents for accurate embeddings
          Large documents for context retention
          Solution: "Strikes that balance by splitting and storing small chunks of data"
          Process:
          1. During retrieval, first fetches small chunks
          2. Looks up parent IDs for those chunks
          3. Returns larger documents containing the small chunks
          Architecture:
          Two splitters: Parent (large chunks for retrieval) and child (small chunks for embeddings)
          Dual storage: Vector store for embeddings, document store for parent documents
          Decision Framework
          Need LlamaIndex Choice LangChain Choice
          Exact keyword matching BM25 Retriever Vector Store-Backed + custom keyword logic
          Multi-query with fusion Query Fusion Retriever (RRF/Relative/Distribution) Multi-Query Retriever (union approach)
          Citation following Recursive Retriever Not directly supported
          Hierarchical context Auto Merging Retriever Parent Document Retriever
          Simple semantic search Vector Index Retriever Vector Store-Backed Retriever
          Author(s)
          Wojciech "Victor" Fulmyk
