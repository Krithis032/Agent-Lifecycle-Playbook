      f14_choose_the_right_ai_model_for_your_use_case:
        source_file: "14. Choose the Right AI Model for Your Use Case.txt"
        content: |
          You can kind of think of an AI model as a vegetable you want to grow in your garden. Before you buy the seeds, you need to research the weather and water requirements for that plant or else it might die before it ever flowers. And as it grows, you need to evaluate and re-optimize the care you're providing so that it can thrive and bloom. And for an entire garden, you need to do that with every vegetable and make sure that none of them interact with each other harmfully, which is important because you need all of those different vegetables in order to survive. You can't live on carrots alone. Welcome to AI Academy. I'm Nicholas Renott, and I'm not a gardener, but I am Chief AI Engineer at IBM Client Engineering. If you want your AI garden to grow, you need to ensure that you're using a variety of vegetables, or in this case, multiple models. That's what we call a multi-model approach, where you have a variety of models for your AI use cases. This means you can pick and choose from different models to find the right one for the right use case, which gives you the opportunity to look at how each of those models is designed as you find the right fit. You need to ask specific, important questions. Who built it? What data was it trained on? What guardrails are in place for it? What risks and regulations do you need to consider and account for? The other challenge when it comes to finding the right model for the right use case is identifying the best use case to fit your business needs. And that begins with a prompt. A prompt is a textual input or instruction that goes into a large language model to set up the basics of the AI. What a good prompt does is clearly articulate your use case and the problem you're solving with AI. So, the first step in the process of choosing a model for your use case is writing a very specific prompt that captures use case, user problem, the ask of the technology, and the guardrails for what good looks like. Next, you'll research the available models, looking at things like model size, performance, costs, risks, and deployment methods. You can then use the information you've collected to evaluate those models against your prompt and identify which of them you first want to test. Start with a large model and work with it until you satisfy your original prompt. Then, try to duplicate the result using smaller models. You're essentially passing the same prompt through different models to experiment and see which works best. That enables you to choose the best model for the use case, but it's not the end of the process. You're going to want to continually evaluate and govern that model with ongoing testing so you assess how it's working based on performance and cost benchmarks. It's like that idea of the garden. You need to tend to it, not just plant the seeds and hope for the best. And part of that ongoing care is to continually update the data and the prompt where needed to keep it relevant and also test new models as they become available. You don't want to stick to just one model forever and get locked in as situations change both inside and outside your business. Now, all throughout this process, you want to be constantly thinking about the factors that affect your choice of model. In addition to the three elements of performance, accuracy, reliability, and speed, you also want to consider size, deployment method, transparency, and any potential risks. All of those need to be considered as you choose the right model for your use case and then start to implement it. That implementation is going to require a team that not only crosses disciplines, but also crosses lines of business. Don't think of it as proprietary to any one department, but treat it as a distinctly collaborative project that takes multiple teams to get up and running. Ensure that this team is ready and able to diagnose performance benchmarks, each of which measures something unique and produces a dataset that shows how everything is being calculated. Without this, you can't make informed decisions about this in future models and use cases. And remember, even once your little AI model crop is growing happily, you need to keep taking care of it. In this case, that means continuous testing, governance, and optimization, all of which are essential to keep that model up to date and running optimally. Remember, models evolve, so your strategy and choices need to do the same. You want to keep growing towards the sun instead of withering on the vine. Check out the AI Academy archives for deep dives into other aspects of AI for business and watch this space for future episodes.

      f15_from_idea_to_ai_building_applications_with_generative_ai:
        source_file: "15. From Idea to AI_Building Applications with Generative AI.txt"
        content: |
          Just the other day, I noticed that Gartner reported that 80% of enterprises will have used some type of generative AI through models or APIs by 2026. And I can't lie, as a developer, this had me a little bit worried because, yeah, I've used AI through different co-pilots in my IDE, and also I've used popular large language models online before, but I have no experience actually building applications that use AI. Well, this is before I found out how easy it is to get started with AI as a developer. So today we're focused on building applications that use GenAI. We're going to talk about where to get started, how to build these AI-powered applications, and where to run them. And you'll also learn today about some of the different open source tools and technologies that can help in my inner loop development of building, running, and testing applications now with the power of AI at our fingertips. So while there's plenty of options out there for locally running a large language model on my laptop, today we're actually going to talk about the three main steps of the AI journey that developers are going to experience when going from a simple proof of concept to a production application. Mainly, these are the ideation and experimentation phases, the building, and also the development and operation side of things. So I have a question for you. How do you get started building an application that uses generative AI? Well, the first step is ideating around exploration and proof of concepts, which I can break down in a few simple steps. So firstly, remember that your use case is specialized, so you need a specialized model that can do the job as well. You'll start from researching and evaluating models from popular repositories like Hugging Face or the open source community. And that's a great start. But you also need to think about different factors such as the model size, or say, for example, its performance, and understand the benchmarking through popular benchmark tools that are out there as well. For example, there's a couple different ground rules that you need to understand. Generally, self hosting a large language model will be cheaper than a cloud-based service. And small language models, SLMs, versus large language models, LLMs, will generally perform better with lower latency, and they're specialized for a specific task. Now, you should also understand about various prompting techniques when you're actually working with the model. For example, zero-shot prompting. Now what this is, is essentially asking a model a question without any examples of how to respond. Now, we can also do this a little bit differently with what's known as few-shot prompting, where we're actually giving a few different examples of how to respond, the behavior you want the LLM to have as we're working with the AI, and also chain of thought, which is actually asking the model to explain its thinking, its process, step by step. So congratulations, you can now put AI engineer on your resume. But in all seriousness, you need to understand the different capabilities and limitations of the models that you're working with. And you can do this and experiment with your data early on so that you can understand any potential challenges that might come up as you go through the AI journey. Now that we've evaluated models for our use case, it's time to build our application. Now, just as we can locally run databases and different services on our machine, well, we can actually do the same with AI to actually serve it locally from our machine and be able to make requests to its API from local host. Plus, you also get the added benefit of knowing that your data is secure and private on premise. That's really important nowadays. But what if you want to use that data with your large language model as well? Well, there's a few different methods to do so, starting with what's known as retrieval, augmented generation, or RAG, where you actually take a large language model, a pre-trained foundational model, and supplement it with relevant and accurate data. And this can help provide better and more accurate responses. But what you can also do is fine tune the model. So take the large language model and include the data with it. So we're actually baking this information, how we want it to behave, the different styles and intuition that we want it to react with, actually into the model itself. And so then we can inference it and be able to have that domain-specific data every time that we're actually working with the AI model itself. Now, these are just two approaches. There are many more. But I also want to mention that having the right tools and frameworks, such as LangChain, are going to simplify your life. They're going to let you focus on building out new features, such as the popular generative AI use cases like chatbot, IT process automation, data management, and much, much more by simplifying the different calls that you're going to make through the model. Now, this can be done through sequences of prompts and model calls to actually accomplish more complex tasks. So that means you're going to need to break down problems into smaller, more manageable steps. And during this process, be able to evaluate the flows during these model calls, now, but also in a production environment, which brings us to the final step of operationalizing these AI-powered applications. So finally, you've got that application powered by AI or a large language model, and you want to deploy it to production to be able to scale things up. And this actually falls under the umbrella of something known as machine learning operations, or MLOps. But let me focus on the topics that's important for you as a developer. So first off, your infrastructure needs to be able to handle efficient model deployment and scaling. So using technologies such as containers and orchestrators, such as Kubernetes, are going to help you do this. Being able to auto scale and balance the traffic for your application. And you can also use production-ready runtime, such as vLLM, for the model serving. And what we're also seeing right now is that organizations are taking a hybrid approach, both with their models and their infrastructure. So having this multi-model Swiss Army knife approach to different models for different use cases, as well as a combination of on-prem and cloud infrastructure to make the most out of your resources and your budget. So with all of these new AI-powered applications out there, say you have something in production, well, the job isn't done. You still need to benchmark, monitor, and be able to handle different exceptions that are coming from your application. And similar to how we have DevOps, well, we also have MLOps for ensuring models go into production in a smooth fashion. So let's take a step back, because I think we've really discovered a lot today. And some of the recent innovations in the world of AI have made this topic much more accessible for developers like you and me. And you have plenty of tools out there to help you along the process. But what I want to emphasize is that while AI is new, well, it's actually just another tool that you can add to your tool belt. And so what you can do is use these tools and use the different steps of process to go from ideation, to building, to deployment of these applications to make a real impact with your work by using GenAI.

