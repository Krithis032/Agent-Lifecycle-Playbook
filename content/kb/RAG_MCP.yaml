          - name: "checkpointing_and_persistence"
            definition: "Checkpointing saves agent state at key points (start, after each step, on error) enabling recovery and resumption. Persistence ensures state survives agent restarts and failures. Redis-based checkpointing is common in production: agent state serialized to JSON, stored with unique identifier and TTL. Comparison of strategies: write-through (durability), write-behind (performance), lazy loading (flexibility). Session-based memory persists within execution; persistent memory survives across sessions."
            how_it_works: |
              Checkpoint Creation:
              1. Agent completes meaningful step or phase
              2. Agent state captured: variables, memory state, step number
              3. State serialized to JSON
              4. Checkpoint saved with: id, timestamp, agent_name, step_number
              5. Metadata tagged for retrieval (agent_id, session_id)

              Write-Through Strategy:
              1. State change -> immediately write to persistent storage
              2. Pros: durable, no data loss on crash
              3. Cons: latency, throughput limited by storage

              Write-Behind Strategy:
              1. State change -> update in-memory, queue for async write
              2. Background worker periodically flushes to storage
              3. Pros: fast, high throughput
              4. Cons: potential loss if crash before flush

              Recovery:
              1. Agent crashes or restarts
              2. Load latest checkpoint by agent_id, session_id
              3. Restore state: variables, memory, step context
              4. Resume from checkpoint + 1
              5. Notify user of resumption

              TTL and Garbage Collection:
              1. Checkpoints expire after TTL (e.g., 7 days)
              2. Automatic cleanup: Redis EXPIRE key
              3. Manual cleanup: delete old checkpoints for storage efficiency
            design_decisions:
              - "Redis for checkpointing: fast, TTL support, simple serialization"
              - "JSON serialization: human readable, cross-language compatible"
              - "Write-behind default: performance > immediate durability"
              - "Session-based TTL: auto cleanup prevents unbounded growth"
              - "Step-level granularity: enables fine-grained resumption"
            implementation:
              code_scaffold: |
                import json
                import redis
                from typing import Dict, Any
                from datetime import datetime, timedelta

                class CheckpointManager:
                    def __init__(self, redis_url: str = "redis://localhost:6379",
                                ttl_days: int = 7,
                                write_strategy: str = "write-behind"):
                        self.redis = redis.from_url(redis_url)
                        self.ttl = timedelta(days=ttl_days)
                        self.write_strategy = write_strategy
                        self.pending_writes = {}  # For write-behind

                    def create_checkpoint(self, agent_id: str,
                                         session_id: str,
                                         step: int,
                                         state: Dict[str, Any]):
                        """Create checkpoint of agent state"""

                        checkpoint = {
                            "agent_id": agent_id,
                            "session_id": session_id,
                            "step": step,
                            "timestamp": datetime.utcnow().isoformat(),
                            "state": state
                        }

                        checkpoint_id = f"{agent_id}:{session_id}:step_{step}"

                        if self.write_strategy == "write-through":
                            self._write_through(checkpoint_id, checkpoint)
                        elif self.write_strategy == "write-behind":
                            self._queue_for_async_write(checkpoint_id, checkpoint)

                    def _write_through(self, checkpoint_id: str, checkpoint: Dict):
                        """Immediately persist to Redis"""
                        json_str = json.dumps(checkpoint)
                        self.redis.setex(
                            checkpoint_id,
                            int(self.ttl.total_seconds()),
                            json_str
                        )

                    def _queue_for_async_write(self, checkpoint_id: str,
                                              checkpoint: Dict):
                        """Queue for background flush"""
                        self.pending_writes[checkpoint_id] = checkpoint

                        # Trigger flush if queue large
                        if len(self.pending_writes) >= 10:
                            self.flush_pending()

                    def flush_pending(self):
                        """Background worker: flush queued checkpoints"""
                        for checkpoint_id, checkpoint in self.pending_writes.items():
                            self._write_through(checkpoint_id, checkpoint)
                        self.pending_writes.clear()

                    def load_checkpoint(self, agent_id: str,
                                       session_id: str) -> Dict:
                        """Load latest checkpoint for agent session"""

                        # Find latest checkpoint
                        pattern = f"{agent_id}:{session_id}:step_*"
                        keys = self.redis.keys(pattern)

                        if not keys:
                            return None

                        # Load most recent
                        latest_key = max(keys, key=lambda k: int(k.split("step_")[1]))
                        json_str = self.redis.get(latest_key)

                        return json.loads(json_str)

                    def delete_checkpoint(self, checkpoint_id: str):
                        """Manual cleanup of checkpoint"""
                        self.redis.delete(checkpoint_id)

                class AgentWithCheckpointing:
                    def __init__(self, agent_id: str, llm_client,
                                checkpoint_mgr: CheckpointManager):
                        self.agent_id = agent_id
                        self.llm = llm_client
                        self.checkpoint_mgr = checkpoint_mgr
                        self.state = {}
                        self.step = 0

                    async def execute_task(self, session_id: str, task: str):
                        """Execute with checkpointing"""

                        # Try load from checkpoint
                        checkpoint = self.checkpoint_mgr.load_checkpoint(
                            self.agent_id,
                            session_id
                        )

                        if checkpoint:
                            print(f"Resuming from step {checkpoint['step']}")
                            self.state = checkpoint["state"]
                            self.step = checkpoint["step"]

                        # Execute steps
                        while self.step < 5:  # Example: 5-step task
                            try:
                                print(f"Executing step {self.step + 1}")

                                # Do work
                                result = await self._execute_step(task)
                                self.state[f"step_{self.step}"] = result

                                # Create checkpoint
                                self.checkpoint_mgr.create_checkpoint(
                                    self.agent_id,
                                    session_id,
                                    self.step,
                                    self.state
                                )

                                self.step += 1

                            except Exception as e:
                                print(f"Error at step {self.step}: {e}")
                                # Checkpoint saved, can resume
                                raise

                        return self.state

                    async def _execute_step(self, task: str) -> str:
                        """Execute single step"""
                        prompt = f"""Task: {task}
                        Prior context: {json.dumps(self.state)}
                        Execute step {self.step}"""
                        return await self.llm.call(prompt)
              pseudocode: |
                create_checkpoint():
                1. Create checkpoint object: {agent_id, session_id, step, timestamp, state}
                2. Serialize state to JSON
                3. Create checkpoint_id: f"{agent_id}:{session_id}:step_{step}"
                4. If write-through: setex(checkpoint_id, ttl, json)
                5. If write-behind: queue checkpoint_id, checkpoint

                flush_pending():
                1. For each pending_write:
                   a. setex(checkpoint_id, ttl, json)
                2. Clear pending_writes queue

                load_checkpoint():
                1. Find all keys matching pattern: "{agent_id}:{session_id}:step_*"
                2. Select max (most recent step)
                3. redis.get(latest_key)
                4. json.loads() and return

                execute_with_checkpointing():
                1. load_checkpoint(): restore from prior step if available
                2. Loop steps:
                   a. Execute step
                   b. Update state
                   c. create_checkpoint()
                   d. step += 1
                3. On error: checkpoint already saved, can resume
            sources:
              - "B16 Ch1: Checkpointing"
              - "B04 Ch4: Persistence Patterns"
            real_world_analogies:
              - "Like database transactions: checkpoint = save point for rollback"
              - "Like game saves: can resume from where you left off"

          - name: "intelligent_compression"
            definition: "As memory systems grow, compression becomes necessary to reduce storage costs and retrieval latency. LLM-based summarization condenses conversation chunks while preserving key facts: decisions, outcomes, entities mentioned. Risk: compressing negations ('not approved') can distort meaning. Stratified compression uses multiple levels: concise (1 sentence), detailed (paragraph), raw (full text). Memory consolidation benefits more from compression than knowledge bases. Verbose content (conversations) compresses better than code (loses semantic meaning)."
            how_it_works: |
              LLM-Based Summarization:
              1. Select chunk of conversation (e.g., 10-turn exchange)
              2. Prompt LLM: "Summarize key facts, decisions, outcomes"
              3. LLM produces 1-3 sentence summary
              4. Validate summary preserves critical negations
              5. Store summary instead of full conversation
              6. Link original ID for deep-dive retrieval

              Multi-Level Strategy:
              Level 1 (Concise): 1 sentence abstract
                "Customer approved budget increase for Q2"

              Level 2 (Detailed): 1 paragraph with context
                "Customer meeting with Finance VP to discuss Q2 budget.
                 Initial request $50K, negotiated to $40K. Approved contingent
                 on headcount freeze."

              Level 3 (Raw): Full conversation text
                [complete chat history]

              Compression Effectiveness:
              - Conversations: 80-90% reduction (verbose)
              - Meeting notes: 70-80% reduction (narrative)
              - Code: 10-20% reduction (already concise)
              - Structured data: 0% reduction (compression loses meaning)

              Risk Mitigation:
              1. Preserve negations explicitly: "NOT approved", "failed to"
              2. Keep entity names and dates
              3. Mark compressed entries: can re-expand if needed
              4. Validate via re-reading for accuracy
            design_decisions:
              - "LLM summarization: intelligent, handles nuance"
              - "Multi-level: balance detail vs storage"
              - "Compress memory, not knowledge: temporal data compresses well"
              - "Preserve negations: critical for accuracy"
              - "Traceability: link back to originals"
            implementation:
              code_scaffold: |
                from typing import Dict, List

                class IntelligentCompressor:
                    def __init__(self, llm_client):
                        self.llm = llm_client

                    async def summarize_conversation(self,
                                                   messages: List[Dict]) -> Dict:
                        """Compress conversation to multi-level summary"""

                        # Format messages for LLM
                        conversation_text = "\n".join([
                            f"{m['role']}: {m['content']}" for m in messages
                        ])

                        # Level 1: Concise
                        concise_prompt = f"""
                        Summarize in ONE sentence, preserving negations:
                        {conversation_text}
                        """
                        level1 = await self.llm.call(concise_prompt)

                        # Level 2: Detailed
                        detailed_prompt = f"""
                        Summarize in a paragraph with key decisions and outcomes:
                        {conversation_text}
                        """
                        level2 = await self.llm.call(detailed_prompt)

                        # Level 3: Raw (original)
                        level3 = conversation_text

                        # Validation: check negations preserved
                        negations = self._extract_negations(conversation_text)
                        compressed_negations = self._extract_negations(level1 + level2)

                        missing = negations - compressed_negations
                        if missing:
                            print(f"Warning: Missing negations in compression: {missing}")

                        return {
                            "concise": level1,
                            "detailed": level2,
                            "raw": level3,
                            "missing_negations": list(missing)
                        }

                    def _extract_negations(self, text: str) -> set:
                        """Find negation phrases"""
                        negation_patterns = ["not", "failed", "denied", "rejected",
                                           "cannot", "unable", "no"]
                        negations = set()

                        words = text.lower().split()
                        for i, word in enumerate(words):
                            for pattern in negation_patterns:
                                if pattern in word and i + 1 < len(words):
                                    negations.add(f"{word} {words[i+1]}")

                        return negations

                class MemoryArchive:
                    """Storage with compression levels"""

                    def __init__(self, llm_client, storage_backend):
                        self.compressor = IntelligentCompressor(llm_client)
                        self.storage = storage_backend

                    async def archive_conversation(self, conversation_id: str,
                                                 messages: List[Dict]):
                        """Store conversation with multi-level compression"""

                        # Compress
                        compressed = await self.compressor.summarize_conversation(messages)

                        # Store all levels
                        archive_entry = {
                            "id": conversation_id,
                            "timestamp": datetime.utcnow().isoformat(),
                            "level1_concise": compressed["concise"],
                            "level2_detailed": compressed["detailed"],
                            "level3_raw": compressed["raw"],
                            "issues": compressed["missing_negations"],
                            "compression_ratio": len(compressed["raw"]) / (
                                len(compressed["concise"]) + len(compressed["detailed"])
                            )
                        }

                        self.storage.store(f"archive:{conversation_id}", archive_entry)

                        return archive_entry

                    async def retrieve_with_detail(self, conversation_id: str,
                                                 detail_level: str = "detailed"):
                        """Retrieve compressed memory at requested detail level"""

                        entry = self.storage.get(f"archive:{conversation_id}")

                        if detail_level == "concise":
                            return entry["level1_concise"]
                        elif detail_level == "detailed":
                            return entry["level2_detailed"]
                        elif detail_level == "raw":
                            return entry["level3_raw"]

                        return entry["level2_detailed"]  # Default
              pseudocode: |
                summarize_conversation():
                1. Format messages into single text
                2. Call LLM: summarize in ONE sentence (level 1)
                3. Call LLM: summarize in paragraph (level 2)
                4. Keep raw text (level 3)
                5. Extract negations from original
                6. Extract negations from compressed
                7. Compare: alert if negations missing
                8. Return {level1, level2, level3, missing_negations}

                archive_conversation():
                1. Call summarize_conversation()
                2. Create archive entry with all levels
                3. Calculate compression_ratio
                4. Store entry
                5. Return entry for logging

                retrieve_with_detail():
                1. Load archive entry
                2. If detail_level == "concise": return level1
                3. If "detailed": return level2
                4. If "raw": return level3
