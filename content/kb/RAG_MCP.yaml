          - name: "importance_scoring_algorithm"
            definition: "Importance scoring determines which memories should be prioritized for retrieval and storage, since not all experiences are equally valuable. The scoring formula combines recency (recent events matter more), frequency (repeated patterns are important), engagement (involved, complex events), and relevance (similar to current context). Weights typically: recency=0.3, frequency=0.2, engagement=0.2, relevance=0.3. Dynamic ranking enables intelligent context window prioritization when memory exceeds available context."
            how_it_works: |
              Component 1 - Recency:
              1. Time decay function: importance decreases with age
              2. Formula: recency_score = exp(-days_ago / decay_constant)
              3. Typical: events 1 day old score 0.6, 1 week old score 0.1

              Component 2 - Frequency:
              1. Count occurrences of similar memory in history
              2. Formula: frequency_score = (occurrence_count / max_count)
              3. Normalize to [0, 1]

              Component 3 - Engagement:
              1. Measure complexity or involvement: conversation turns, branches, depth
              2. Formula: engagement_score = (turns / avg_turns)
              3. High-interaction memories score higher

              Component 4 - Relevance:
              1. Semantic similarity between current context and memory
              2. Formula: relevance_score = cosine_similarity(current_context_embedding, memory_embedding)
              3. Most similar memories score highest

              Final Scoring:
              1. importance = 0.3*recency + 0.2*frequency + 0.2*engagement + 0.3*relevance
              2. Weights configurable per domain
              3. Rank memories by importance score
              4. Include top-K memories in context window
            design_decisions:
              - "Linear combination of factors: simple, interpretable, weights tunable"
              - "Recency + relevance weighted heavily: current context matters most"
              - "Frequency moderate: repeated patterns important but not dominant"
              - "Engagement adds quality signal: complex interactions more valuable"
              - "Normalized scores in [0,1]: enables fair combination"
            implementation:
              code_scaffold: |
                import math
                from datetime import datetime, timedelta
                from typing import List, Dict, Tuple

                class ImportanceScoringEngine:
                    def __init__(self,
                                recency_weight: float = 0.3,
                                frequency_weight: float = 0.2,
                                engagement_weight: float = 0.2,
                                relevance_weight: float = 0.3,
                                decay_constant: float = 7.0):
                        self.recency_weight = recency_weight
                        self.frequency_weight = frequency_weight
                        self.engagement_weight = engagement_weight
                        self.relevance_weight = relevance_weight
                        self.decay_constant = decay_constant  # days

                    def score_importance(self,
                                       memory: Dict,
                                       current_context_embedding: List[float],
                                       memory_embedding: List[float],
                                       all_memories: List[Dict]) -> float:
                        """Compute importance score for single memory"""

                        # Recency component
                        days_ago = (datetime.utcnow() - datetime.fromisoformat(
                            memory["timestamp"])).days
                        recency_score = math.exp(-days_ago / self.decay_constant)

                        # Frequency component
                        occurrence_count = self._count_similar(memory, all_memories)
                        max_count = max([self._count_similar(m, all_memories)
                                       for m in all_memories]) or 1
                        frequency_score = occurrence_count / max_count

                        # Engagement component
                        engagement_score = self._compute_engagement(memory)

                        # Relevance component
                        relevance_score = self._cosine_similarity(
                            current_context_embedding,
                            memory_embedding
                        )

                        # Combine
                        importance = (
                            self.recency_weight * recency_score +
                            self.frequency_weight * frequency_score +
                            self.engagement_weight * engagement_score +
                            self.relevance_weight * relevance_score
                        )

                        return min(importance, 1.0)  # Clamp to [0, 1]

                    def _count_similar(self, target_memory: Dict,
                                     all_memories: List[Dict]) -> int:
                        """Count similar memories by content/tags"""
                        count = 0
                        target_tags = set(target_memory.get("tags", []))

                        for memory in all_memories:
                            memory_tags = set(memory.get("tags", []))
                            intersection = len(target_tags & memory_tags)
                            if intersection > 0:
                                count += 1

                        return count

                    def _compute_engagement(self, memory: Dict) -> float:
                        """Score based on complexity/interaction level"""
                        # Heuristics: turns, branches, duration
                        turns = memory.get("conversation_turns", 1)
                        avg_turns = 3  # Configurable baseline
                        return min(turns / avg_turns, 1.0)

                    def _cosine_similarity(self, vec1: List[float],
                                         vec2: List[float]) -> float:
                        """Compute cosine similarity [0, 1]"""
                        dot_product = sum(a * b for a, b in zip(vec1, vec2))
                        mag1 = math.sqrt(sum(a**2 for a in vec1)) or 1
                        mag2 = math.sqrt(sum(b**2 for b in vec2)) or 1
                        return dot_product / (mag1 * mag2)

                    def rank_memories(self,
                                     memories: List[Dict],
                                     current_context_embedding: List[float],
                                     memory_embeddings: Dict[str, List[float]]) -> List[Tuple[Dict, float]]:
                        """Rank all memories by importance for context inclusion"""

                        scored = []
                        for memory in memories:
                            memory_id = memory.get("id")
                            memory_embedding = memory_embeddings.get(memory_id, [0] * 768)

                            score = self.score_importance(
                                memory,
                                current_context_embedding,
                                memory_embedding,
                                memories
                            )
                            scored.append((memory, score))

                        # Sort by score descending
                        scored.sort(key=lambda x: x[1], reverse=True)
                        return scored

                    def select_for_context(self,
                                         memories: List[Dict],
                                         current_context_embedding: List[float],
                                         memory_embeddings: Dict[str, List[float]],
                                         max_tokens: int = 2000) -> List[Dict]:
                        """Select memories that fit in context window"""

                        ranked = self.rank_memories(
                            memories,
                            current_context_embedding,
                            memory_embeddings
                        )

                        selected = []
                        tokens_used = 0

                        for memory, score in ranked:
                            memory_tokens = self._estimate_tokens(memory)

                            if tokens_used + memory_tokens <= max_tokens:
                                selected.append(memory)
                                tokens_used += memory_tokens
                            else:
                                break

                        return selected

                    def _estimate_tokens(self, memory: Dict) -> int:
                        """Rough token estimate: ~1 token per 4 chars"""
                        content = json.dumps(memory)
                        return len(content) // 4
              pseudocode: |
                score_importance():
                1. recency = exp(-days_ago / decay_constant)
                2. frequency = occurrence_count / max_count
                3. engagement = conversation_turns / avg_turns
                4. relevance = cosine_similarity(current_emb, memory_emb)
                5. importance = 0.3*recency + 0.2*frequency + 0.2*engagement + 0.3*relevance
                6. Return clamp(importance, 0, 1)

                rank_memories():
                1. For each memory: compute importance score
                2. Create (memory, score) tuples
                3. Sort by score descending
                4. Return sorted list

                select_for_context():
                1. Rank all memories
                2. Iterate top-ranked memories
                3. Add to selected if fits in token budget
                4. Stop when context window full
                5. Return selected memories
