                        """Add entity profiles to prompt"""
                        entity_info = []
                        for eid in entity_ids:
                            profile = self.memory.get_entity_profile(eid)
                            if profile:
                                entity_info.append(self._format_profile(profile))

                        if entity_info:
                            return f"""{base_prompt}

                Known facts about mentioned entities:
