              - "Like search engine cache: returns previous answer for similar queries"
              - "Like memorization: 'I've seen this before, here's the answer'"

          - name: "memory_framework_comparison"
            definition: "Multiple memory frameworks exist with different trade-offs: LangMem (unified API, multi-backend), Mem0 (selective fact extraction, graph extensions), LeTTA/MemGPT (tiered self-editing, internal monologue), LangGraph Stores (JSON documents, namespaces), Google ADK MemoryService (in-memory vs cloud options), Zep (organizational memory), and context window strategies (FIFO, intelligent pruning, summarization). Each framework targets different use cases and complexity levels. Understanding the landscape enables choosing the right tool."
            how_it_works: |
              LangMem:
              1. Unified API across multiple memory backends
              2. Supports Redis, PostgreSQL, Anthropic (cloud), vector DBs
              3. Namespace organization: json.{namespace}.{key}
              4. Automatic serialization/deserialization
              5. TTL support per entry

              Mem0:
              1. Selective fact extraction (not full histories)
              2. Extract {entity, attribute, value} triples
              3. Mem0g extension: build knowledge graph
              4. API: add_memory(), get_memories(), update_memory()
              5. Deduplication and consolidation

              LeTTA / MemGPT:
              1. Tiered memory: core_memory (fixed), recall_buffer (working)
              2. internal_monologue(): agent reflects on state
              3. core_memory_append(text): agent updates core facts
              4. Self-editing: agent modifies own memory state
              5. Compression when recall_buffer full

              LangGraph Stores:
              1. Store arbitrary JSON documents
              2. Organize by namespace (e.g., "conversations", "entities")
              3. Query by namespace: get_values(namespace)
              4. Good for structured application state
              5. Not semantic search (use separate vector DB)

              Google ADK MemoryService:
              1. InMemoryService: session-scoped, non-persistent
              2. VertexAIMemoryBankService: Google Cloud persistent
              3. Unified interface: save_session_context(), get_session_context()
              4. Automatic serialization and versioning

              Zep:
              1. Organizational memory: multi-agent, multi-session
              2. Summarization of long conversations
              3. Fact extraction and deduplication
              4. API server with optional persistence
              5. Good for teams needing shared context

              Context Window Strategies:
              - FIFO: oldest memories dropped (simple, loses valuable old context)
              - Intelligent pruning: drop low-importance by scoring
              - Summarization: compress N memories into summary
              - Semantic filtering: keep most-relevant to current context
            design_decisions:
              - "LangMem: simplicity, flexibility, multi-backend"
              - "Mem0: fact-focused, lightweight, good for entity tracking"
              - "LeTTA/MemGPT: self-editing, advanced agent control"
              - "LangGraph: simple JSON storage, no semantic search overhead"
              - "Google ADK: cloud integration, enterprise features"
              - "Zep: team/organizational scale"
              - "Context pruning: importance > simple FIFO"
