  domains:
    rag_foundations:
      description: "Core RAG concepts, history, architecture, and fundamental retrieval algorithms"

      nodes:
        rag_history_and_evolution:
          description: "Historical development and key papers establishing RAG, why it persists, and strategic comparison with alternatives"
          core_concepts:
            - name: "RAG Origin and Definition"
              definition: "Retrieval-Augmented Generation (RAG) emerged from two seminal works: Chen et al. 2017 introduced the retrieve-then-generate paradigm where systems first retrieve relevant documents then generate answers conditioned on those documents. Lewis et al. 2020 formally coined the term 'RAG' and demonstrated that combining a pre-trained retriever with a seq2seq generator significantly outperforms fine-tuned models on knowledge-intensive tasks. RAG represents a fundamental shift from storing knowledge in model parameters to treating external documents as a dynamic knowledge source, enabling real-time updates without model retraining."
              how_it_works: "The RAG pipeline operates in two phases: (1) Retrieval phase—given a query, the retriever searches a document collection and ranks relevant passages using semantic or lexical similarity; (2) Generation phase—the top-k retrieved passages are concatenated as context and fed to a generative model (seq2seq, decoder-only LLM) which produces the final answer conditioning on both the query and retrieved context. The key architectural insight is that separation allows optimizing the retriever and generator independently, unlike end-to-end joint training which couples optimization objectives."
              design_decisions:
                - "Separating retriever and generator enables independent optimization but requires careful context window management"
                - "Top-k retrieval introduces information filtering—choosing k balances coverage vs. noise in the context window"
                - "Document chunking is necessary because full documents rarely fit retrieval ranking requirements and lose granularity"
                - "Dense retrieval (embeddings) chosen over sparse (TF-IDF) for semantic relevance despite higher computational cost"
              implementation:
                code_scaffold: |
                  # Pseudo-implementation of RAG pipeline
                  from typing import List
                  from dataclasses import dataclass

                  @dataclass
                  class RetrievedPassage:
                      text: str
                      score: float
                      document_id: str

                  def rag_pipeline(query: str,
                                    documents: List[str],
                                    retriever,
                                    generator,
                                    top_k: int = 5) -> str:
                      # Phase 1: Retrieve
                      retrieved = retriever.search(query, top_k=top_k)
                      # Phase 2: Format context
                      context = "\n".join([p.text for p in retrieved])
                      # Phase 3: Generate
                      prompt = f"Context: {context}\n\nQuestion: {query}"
                      answer = generator.generate(prompt)
                      return answer
                pseudocode: |
                  1. User submits query Q
                  2. Retriever encodes query Q into embedding e_q
                  3. Search document collection for top-k nearest neighbors by cosine similarity
                  4. Retrieve passages P1, P2, ..., Pk with relevance scores
                  5. Concatenate passages into context string C = P1 + "\n" + P2 + ... + Pk
                  6. Format prompt: "Context: {C}\n\nQuestion: {Q}"
                  7. Generator produces output conditioned on [Q, C]
              sources:
                - "AI Engineering by Chip Huyen, Chapter 6: RAG Systems"
                - "Building Apps with AI Agents, Chapter 6: Retrieval-Augmented Generation"
                - "Chen et al. 2017: Reading Wikipedia to Answer Open-Domain Questions (retrieve-then-generate foundation)"
                - "Lewis et al. 2020: Retrieval-Augmented Generation for Knowledge-Intensive NLP Tasks (RAG term coined)"
              real_world_analogies:
                - "Analogy: Student taking an exam with access to reference books (documents) vs. pure memorization. RAG is the reference book approach—retrieve relevant information first, then synthesize answer."
                - "Analogy: Customer service agent consulting a knowledge base while responding to questions. The base is RAG's document collection; retrieval is searching the KB; generation is formulating the response."
                - "Analogy: Research paper writing process—survey existing literature (retrieval), then synthesize new ideas (generation) based on that literature."

            - name: "Why RAG Won't Disappear: Data Growth Problem"
              definition: "RAG persistence stems from a fundamental asymmetry: data grows exponentially (structured databases, web content, real-time updates) while LLM context windows grow linearly and model training requires increasing data quantities. Anthropic's guidance that models with 200K token windows still benefit from RAG demonstrates that even with massive context, retrieval remains essential because: (1) most data is irrelevant noise (low signal-to-noise ratio), (2) context construction via retrieval is computationally and economically more efficient than storing all knowledge in parameters, (3) real-time data updates (news, prices, logs) cannot be captured in pre-trained weights without expensive retraining. RAG effectively solves the 'knowledge cutoff' problem by treating documents as mutable external memory."
              how_it_works: "The data growth problem manifests as a scaling challenge: imagine training a model to internalize 10TB of documents—the model would need massive parameters, enormous training data, and frequent retraining cycles. RAG decouples knowledge quantity from model size: retrieve only relevant documents (0.1% of corpus) into context, dramatically reducing noise and improving relevance. A 200K token context can accommodate ~150,000 words; without retrieval, you'd need a model trained on those exact 150K words. With retrieval, the model learns patterns generalizable to millions of documents."
              design_decisions:
                - "Accept latency cost of retrieval to gain flexibility and real-time currency of information"
                - "Trade off context window size limitations against retriever quality—better retrieval beats larger context windows"
                - "Pre-compute embeddings and index documents rather than encoding documents every query (efficiency)"
              implementation:
                code_scaffold: |
                  # Illustration of RAG's efficiency vs. fine-tuning
                  # Scenario: 100GB document corpus

                  # Approach 1: Fine-tuning (traditional)
                  model_params_needed = 100 * 1e9 bytes / 4  # 25B params (GPT-3 scale)
                  training_time = 6 * 30 * 24  # 180 days at scale
                  inference_time_per_query = 5  # seconds, slow

                  # Approach 2: RAG
                  retriever_index_size = 100 * 1e9 * 0.1  # 10GB (pre-indexed, compressed)
                  inference_time_per_query = 0.3  # seconds, 16x faster
                  update_new_documents = 'hours'  # vs. retrain model

                  # RAG verdict: same knowledge coverage, 10x faster, updatable
                pseudocode: |
                  1. Document corpus D grows from 1GB → 10GB → 100GB
                  2. Without RAG: Model size must grow proportionally
                  3. With RAG: Document index grows, model size stays constant
                  4. Retrieval finds top-k relevant docs from index (seconds)
                  5. Generator produces response from top-k (milliseconds)
                  6. Total pipeline time: retrieval (0.3s) + generation (0.1s) = 0.4s
                  7. Adding new documents: index update (minutes) vs. model retraining (hours)
              sources:
                - "AI Engineering by Chip Huyen, Chapter 6: Why RAG Persists"
                - "Anthropic Technical Guidance: Context Window Scaling and RAG"
              real_world_analogies:
                - "Analogy: Library system. You cannot memorize all 10M books. Instead, you use a catalog (index) to find relevant books (retrieval), then read them (generation). The library's value isn't the catalog size—it's the ability to find and synthesize information from it."

            - name: "RAG vs Fine-tuning vs Long Context"
              definition: "Three strategies exist for augmenting LLM knowledge: (1) Fine-tuning: update model weights using domain-specific training data (task-specific adaptation, 10B-100B parameters), (2) Long context windows: expand context to 100K-200K tokens to directly include more documents without retrieval (simpler pipeline, higher compute), (3) RAG: dynamically retrieve relevant documents at inference time (updatable, cost-efficient, modular). The choice depends on: knowledge volatility (fine-tuning irrelevant for real-time data), task specialization (fine-tuning helps for domain-specific language patterns), and economics (RAG has per-query retrieval cost; long context has per-token cost; fine-tuning has upfront training cost)."
              how_it_works: "Fine-tuning updates model parameters via gradient descent on domain data. Long context loads static context before generation—no search, just attention over 200K tokens. RAG decouples: retrieve dynamically at query time, then generate. The mechanisms differ fundamentally: fine-tuning is parameter memorization, long context is in-context learning (ICL), RAG is dynamic retrieval + in-context learning. Empirically, RAG outperforms fine-tuning on knowledge-intensive tasks (TriviaQA, Natural Questions) because retrieval separates knowledge storage (documents) from reasoning (generation)."
              design_decisions:
                - "Fine-tuning: best for style transfer, task-specific patterns; worst for knowledge updates"
                - "Long context: best for multi-document reasoning, narrative context; worst for retriever uncertainty (how do you choose which 200K tokens?)"
                - "RAG: best for knowledge freshness, cost efficiency, modularity; worst for latency-critical applications"
                - "Hybrid: combine fine-tuning + RAG (fine-tuned retriever + RAG pipeline)"
              implementation:
                code_scaffold: |
                  # Comparison of three approaches

                  # Approach 1: Fine-tuning
                  def fine_tune_approach():
                      model = GPT3Large()
                      training_data = load_domain_documents()
                      model.fine_tune(training_data, epochs=3)
                      answer = model.generate(query)
                      return answer

                  # Approach 2: Long context
                  def long_context_approach():
                      context_docs = load_all_documents_up_to_200k_tokens()
                      context = "\n".join(context_docs)
                      prompt = f"Context:\n{context}\n\nQuestion: {query}"
                      answer = model.generate(prompt)
                      return answer

                  # Approach 3: RAG
                  def rag_approach():
                      relevant_docs = retriever.search(query, top_k=5)
                      context = "\n".join([d.text for d in relevant_docs])
                      prompt = f"Context:\n{context}\n\nQuestion: {query}"
                      answer = model.generate(prompt)
                      return answer
                pseudocode: |
                  FINE-TUNING:
                    For each training example (doc, label):
                      1. Forward pass through model
                      2. Compute loss between prediction and label
                      3. Backpropagate gradients
                      4. Update model weights
                    Result: Modified model weights (permanent)

                  LONG CONTEXT:
                    1. Load ALL relevant documents (up to window limit)
                    2. Concatenate into single context string
                    3. Prompt = Context + Query
                    4. Single forward pass through model with long attention
                    Result: Single response (no retrieval cost)

                  RAG:
                    1. User provides query
                    2. Retriever searches index (fast)
                    3. Top-k documents selected
                    4. Concatenate top-k into context
                    5. Prompt = Context + Query
                    6. Generate response
                    Result: Response conditioned on retrieved context
              sources:
                - "AI Engineering by Chip Huyen, Chapter 6: Knowledge Augmentation Strategies"
                - "Building Apps with AI Agents, Chapter 6: When to Use RAG vs Fine-tuning"
              real_world_analogies:
                - "Analogy: Surgeon's knowledge. Fine-tuning = formal medical school (permanent knowledge in brain). Long context = bringing entire medical library to surgery (possible but impractical). RAG = consulting specialist colleagues during surgery (dynamic, relevant expertise)."

            - name: "Context vs Instructions Distinction"
              definition: "LLMs handle two types of input: (1) Instructions (system prompt, task description, rules) which shape model behavior without providing factual content, and (2) Context (documents, examples, background information) which supplies domain-specific facts and references. RAG augments context but not instructions. A critical distinction: context construction is analogous to feature engineering in classical ML—quality context determines output quality more than model size. Anthropic's research shows that poorly selected context (irrelevant documents) actively harms generation quality, while relevant context consistently improves performance. The mistake practitioners make is conflating instruction tuning (model-level optimization) with context engineering (inference-time optimization)."
              how_it_works: "Instructions define the task: 'You are a helpful customer service agent. Always be polite.' These instructions remain constant across queries. Context varies per query: 'Here is the customer's account history...' RAG systems engineer context: retrieve relevant documents, rank them, select top-k, format into the prompt. Poor context engineering leads to: (1) Hallucinations—model generates plausible-sounding but false information when context lacks factual basis, (2) Contradictions—context contains conflicting information, (3) Token waste—irrelevant context uses token budget without benefit. Good context engineering: retriever precision (low false positives), reranking (eliminate weak matches), context formatting (clear document boundaries), and evaluation (measure retrieval quality independently from generation)."
              design_decisions:
                - "Instruction tuning is expensive (requires retraining); context engineering is cheap (inference-time only)"
                - "Context quality matters more than quantity—5 perfect documents beat 100 mediocre ones"
                - "Separate instruction design (system prompt) from context retrieval—they have different optimization objectives"
                - "Evaluate retriever independently from generator to identify failure modes"
              implementation:
                code_scaffold: |
                  # Illustration of context vs. instructions

                  # INSTRUCTIONS (constant, model-level)
                  SYSTEM_PROMPT = """
                  You are a helpful AI assistant specializing in technical documentation.
                  - Always cite sources
                  - Provide exact code examples
                  - Acknowledge uncertainty
                  - Format responses with markdown
                  """

                  # CONTEXT (variable, per-query, RAG-generated)
                  def generate_with_context(query: str, documents: List[str]) -> str:
                      # Step 1: Retrieve context (THIS IS RAG)
                      retrieved = retriever.search(query, top_k=5)
                      context = format_context(retrieved)

                      # Step 2: Build prompt with instructions + context
                      user_message = f"""
                      Based on the following documentation:

                      {context}

                      Please answer: {query}
                      """

                      # Step 3: Generate with both instructions and context
                      response = llm.generate(
                          system=SYSTEM_PROMPT,  # Instructions
                          user=user_message       # Context + Query
                      )
                      return response
                pseudocode: |
                  INSTRUCTIONS:
                    - Exist in system_prompt
                    - Constant across all queries
                    - Shape model behavior (politeness, format, constraints)
                    - Set once, rarely changed

                  CONTEXT:
                    - Exists in user_message
                    - Variable per query
                    - Supply factual information (documents, examples)
                    - Changed for every query (via RAG)

                  RAG OPTIMIZATION:
                    - Optimize CONTEXT through retriever quality
                    - Leave INSTRUCTIONS relatively constant
                    - Don't conflate the two
              sources:
                - "AI Engineering by Chip Huyen, Chapter 6: Context Construction as Feature Engineering"
                - "Building Apps with AI Agents, Chapter 6: Context Quality Matters More Than Quantity"
              real_world_analogies:
                - "Analogy: Exam preparation. Instructions = exam rules (same for everyone). Context = study materials for a particular exam topic (variable). You optimize context selection before the exam, not the rules themselves."
                - "Analogy: Recipe execution. Instructions = cooking method (temperature, stirring). Context = ingredients provided (quality ingredients matter more than technique alone)."

            - name: "Context Construction as Feature Engineering Analogy"
              definition: "In classical machine learning, feature engineering—selecting and transforming input features—often matters more than the model architecture. Analogously, in RAG systems, context construction (document retrieval, chunking, ranking, formatting) often determines quality more than the generator model size. Just as poor features hurt model performance regardless of model sophistication, poor context (irrelevant, noisy, contradictory documents) hurts generation quality regardless of LLM size. This reframing suggests that RAG optimization should focus on retriever quality (like feature engineering) rather than on generator scaling (like model scaling). Practitioners often neglect this, assuming a larger LLM compensates for poor retrieval, which typically fails."
              how_it_works: "Feature engineering workflow parallels RAG context engineering: (1) Feature selection—choose most predictive features (RAG: retrieve most relevant documents). (2) Feature transformation—encode features in useful forms (RAG: chunk documents, embed into vectors). (3) Feature combination—interactions between features (RAG: hybrid retrieval combining sparse + dense). (4) Feature validation—evaluate feature quality (RAG: measure retrieval precision/recall). Both workflows have the same structure: raw inputs → engineered features/context → model/generator. The analogy highlights that RAG optimization should follow feature engineering principles: measure retrieval quality (like F1 scores for features), iteratively improve retriever (like feature selection experiments), validate pipeline components independently."
              design_decisions:
                - "Invest heavily in retriever optimization—this is where system quality compounds"
                - "Use metrics-driven approach: measure retriever precision/recall independent of generator"
                - "Iterate on chunking, embedding models, and ranking before upgrading the LLM"
                - "Treat document collection as a hyperparameter to be optimized (like feature selection)"
              implementation:
                code_scaffold: |
                  # Parallel structure: classical ML feature engineering vs. RAG context engineering

                  # CLASSICAL ML: Feature Engineering
                  def classical_ml_pipeline(raw_data):
                      # Step 1: Feature selection (choose predictive features)
                      selected_features = select_features(raw_data, method='correlation')

                      # Step 2: Feature transformation (encode useful forms)
                      transformed = normalize(selected_features)

                      # Step 3: Feature combination (interactions)
                      combined = add_interactions(transformed)

                      # Step 4: Model training (now with good features)
                      model = fit_model(combined, labels)
                      return model

                  # RAG: Context Engineering (Parallel!)
                  def rag_context_engineering(query, documents):
                      # Step 1: Document selection (retrieve relevant docs - like feature selection)
                      selected_docs = retriever.search(query, top_k=10)

                      # Step 2: Document transformation (chunk, embed - like feature transformation)
                      transformed_docs = [embed(chunk(doc)) for doc in selected_docs]

                      # Step 3: Context combination (rerank, hybridize - like feature combination)
                      reranked = reranker.rank(transformed_docs, query)

                      # Step 4: Generation (now with good context)
                      context = format_context(reranked)
                      answer = generator(query, context)
                      return answer
                pseudocode: |
                  CLASSICAL ML FEATURE ENGINEERING:
                    1. Collect raw features (all possible inputs)
                    2. Select high-signal features (correlation, importance)
                    3. Transform features (normalization, encoding)
                    4. Combine features (interactions, polynomials)
                    5. Validate features (test on holdout data)
                    6. Train model (much simpler with good features)

                  RAG CONTEXT ENGINEERING:
                    1. Collect raw documents (corpus)
                    2. Select high-signal documents (retrieval)
                    3. Transform documents (chunking, embedding)
                    4. Combine documents (reranking, hybrid search)
                    5. Validate context (test retrieval precision/recall)
                    6. Generate response (much better with good context)
              sources:
                - "AI Engineering by Chip Huyen, Chapter 6: Context Construction as Feature Engineering"
              real_world_analogies:
                - "Analogy: Cooking competition. In feature engineering, a novice chef with premium ingredients outperforms an expert chef with poor ingredients. Similarly, a smaller LLM with excellent context (retrieval) outperforms a massive LLM with poor context."

        rag_architecture_fundamentals:
          description: "Core architectural patterns, components, and pipelines for RAG systems"
          core_concepts:
            - name: "RAG Core Components: Retriever + Generator"
              definition: "RAG systems decompose into two essential components with distinct responsibilities: (1) Retriever—a search system that ranks documents by relevance to a query, returning top-k candidates (typically 3-10 documents). The retriever is usually a pre-trained, fixed model (dense embeddings, sparse BM25) that maps queries and documents into comparable representations (vector embeddings or term statistics). (2) Generator—a sequence-to-sequence or decoder-only LLM that produces fluent text conditioned on the query and retrieved context. The generator is the larger, more parameter-rich model (GPT-4, Llama) that performs reasoning and synthesis. The separation of concerns enables independent optimization: retriever focuses on relevance ranking; generator focuses on fluent, grounded generation. This contrasts with end-to-end fine-tuning where both objectives compete."
              how_it_works: "At runtime, the pipeline operates sequentially: (1) User submits query Q. (2) Retriever encodes Q into a numerical representation (embedding vector or term frequencies). (3) Retriever searches document collection using similarity metrics (cosine distance, BM25 score) and returns top-k documents with relevance scores. (4) Top-k documents (and their text) are extracted and formatted into a context string. (5) Context string C is concatenated with query Q and system instructions into a prompt. (6) Generator processes prompt and outputs completion, the final answer. The key architectural insight is that the retriever output (top-k documents) is visible and debuggable, enabling error analysis. Poor retrieval directly maps to poor generation; good retrieval dramatically improves generation quality."
              design_decisions:
                - "Retriever should be fast (sub-second latency) to keep total pipeline latency reasonable"
                - "Generator should be accurate (large model, low hallucination rate) to justify downstream consumption"
                - "Separation enables A/B testing: swap retriever without retraining generator, or vice versa"
                - "Trade-off between retriever recall (return all possibly relevant docs) and precision (return only clearly relevant docs)"
              implementation:
                code_scaffold: |
                  # Minimal RAG architecture with clear separation
                  from typing import List, Tuple
                  from dataclasses import dataclass

                  @dataclass
                  class RetrievedDoc:
                      text: str
                      score: float
                      doc_id: str

                  class RetrieverComponent:
                      """Responsible for ranking documents by relevance."""
                      def retrieve(self, query: str, top_k: int = 5) -> List[RetrievedDoc]:
                          # Retrieve and rank documents
                          embeddings = self.encode(query)
                          similarities = self.search_index(embeddings, top_k=top_k)
                          return similarities

                  class GeneratorComponent:
                      """Responsible for producing fluent text."""
                      def generate(self, query: str, context: str) -> str:
                          prompt = f"Context: {context}\n\nQuestion: {query}\n\nAnswer:"
                          return self.llm_model.generate(prompt)

                  class RAGPipeline:
                      """Orchestrates retriever and generator."""
                      def __init__(self, retriever: RetrieverComponent,
                                     generator: GeneratorComponent):
                          self.retriever = retriever
                          self.generator = generator

                      def answer(self, query: str) -> str:
                          # Phase 1: Retrieve
                          docs = self.retriever.retrieve(query, top_k=5)
                          context = "\n---\n".join([d.text for d in docs])

                          # Phase 2: Generate
                          answer = self.generator.generate(query, context)
                          return answer
                pseudocode: |
                  RAG_ANSWER(query):
                    1. RETRIEVE_PHASE:
                       a. Encode query into embedding
                       b. Search document index using similarity metric
                       c. Return top-k documents with scores
                       d. Format documents into context string

                    2. GENERATE_PHASE:
                       a. Concatenate: prompt = instructions + context + query
                       b. Pass prompt to LLM
                       c. Generate output tokens sequentially
                       d. Return completed answer

                    3. RETURN answer
              sources:
                - "AI Engineering by Chip Huyen, Chapter 6: RAG Components"
                - "Building Apps with AI Agents, Chapter 6: Retriever and Generator Separation"
              real_world_analogies:
                - "Analogy: Research team with division of labor. Librarian (retriever) finds relevant books. Author (generator) synthesizes those books into a coherent essay. Both are essential; each has distinct expertise."

            - name: "Training Approaches: End-to-End vs. Modular"
              definition: "RAG systems can be trained via two architecturally different approaches: (1) Original End-to-End Training (Lewis et al. 2020)—jointly optimize retriever and generator with shared gradients, using a single loss function over the full pipeline. The retriever learns to retrieve documents that specifically help the generator, and the generator learns to leverage retrieved documents effectively. (2) Modern Separate Training—independently train a pre-trained retriever (e.g., dense passage retriever) and independently train or use a pre-trained generator (e.g., GPT-4), then combine them at inference. The separate approach is more practical for production systems because: (a) each component can be swapped independently, (b) pre-trained components are available off-the-shelf, (c) training is computationally cheaper, (d) component debugging is straightforward. Most production RAG systems today use separate training; end-to-end training is mainly research territory."
              how_it_works: "End-to-end training: Initialize retriever and generator. For each training example (question, relevant documents, ground truth answer): (1) Feed question to retriever, which retrieves documents. (2) Feed question + retrieved documents to generator. (3) Compute loss comparing generated answer to ground truth. (4) Backpropagate gradients through generator then through retriever. (5) Update both retriever and generator weights. This joint optimization ensures the retriever learns to retrieve documents that maximize generator performance on the specific task. Separate training: (1) Use pre-trained retriever (Dense Passage Retriever, Contriever) already optimized for general relevance ranking. (2) Use pre-trained generator (GPT-4, Llama) already optimized for text generation. (3) At inference, combine them without any training, just composition. The tradeoff: end-to-end is task-optimized but expensive; separate is task-agnostic but practical."
              design_decisions:
                - "Separate training wins for production (modularity, cost, speed)"
                - "End-to-end training wins for research (task-specific optimization)"
                - "Separate training enables easy upgrading (swap retriever if new embedding model is released)"
                - "Consider fine-tuning only the retriever if domain-specific retrieval is critical"
              implementation:
                code_scaffold: |
                  # Contrast: End-to-end vs. separate training

                  # APPROACH 1: End-to-end joint training (research)
                  def end_to_end_training():
                      retriever = DenseRetriever(embed_dim=768)
                      generator = Seq2SeqModel(vocab_size=30000)

                      for epoch in range(num_epochs):
                          for question, relevant_docs, gold_answer in training_data:
                              # Forward: both components in sequence
                              retrieved_docs = retriever.retrieve(question)
                              context = format_context(retrieved_docs)
                              predicted_answer = generator(question, context)

                              # Backward: joint loss
                              loss = cross_entropy(predicted_answer, gold_answer)
                              loss.backward()  # Gradients flow through both

                              # Update both components
                              optimizer.step()

                  # APPROACH 2: Separate training (production)
                  def separate_training():
                      # Use pre-trained components
                      from sentence_transformers import SentenceTransformer
                      from transformers import AutoModelForCausalLM

                      retriever = SentenceTransformer('all-MiniLM-L6-v2')
                      generator = AutoModelForCausalLM.from_pretrained('gpt2')

                      # No training needed! Just use as-is
                      def answer_question(question):
                          docs = retriever.search(question)
                          context = format_context(docs)
                          answer = generator(question, context)
                          return answer
                pseudocode: |
                  END-TO-END TRAINING:
                    For each training example:
                      1. Forward pass through retriever
                      2. Forward pass through generator
                      3. Compute loss on output
                      4. Backpropagate through generator
                      5. Backpropagate through retriever
                      6. Update both weights
                    Result: Optimized for this specific task
                    Cost: High (full pipeline retraining)

                  SEPARATE TRAINING:
                    1. Initialize pre-trained retriever (from Hugging Face)
                    2. Initialize pre-trained generator (from Hugging Face)
                    3. No training; compose at inference time
                    Result: Task-agnostic but practical
                    Cost: Low (just composition)
              sources:
                - "Building Apps with AI Agents, Chapter 6: Training Approaches"
                - "Lewis et al. 2020: Retrieval-Augmented Generation (end-to-end training)"
              real_world_analogies:
                - "Analogy: Sports team. End-to-end training = designing a custom team where all players train together for one sport. Separate training = buying pre-trained players from different teams and composing them into a new team."

            - name: "Document Chunking Necessity and Impact"
              definition: "RAG systems require dividing documents into chunks because: (1) Full documents (10KB-100KB per file) are too large for individual ranking in retrieval—they dilute relevance signals, (2) Retrieval ranking assumes document-level relevance, but users' questions often target specific passages within documents, (3) Vector embedding models have token limits (e.g., 512-8K tokens), so documents exceeding these limits must be split, (4) Chunk-level ranking provides finer granularity than document-level ranking, enabling retrieval of the exact passage needed without irrelevant surrounding text. The consequence: chunking is mandatory, not optional. Poor chunking (wrong chunk size, poor boundaries) degrades retrieval quality and downstream generation quality. Chunk size is a critical hyperparameter with direct tradeoffs: smaller chunks = higher diversity and precision but higher false negatives; larger chunks = better context preservation but lower precision."
              how_it_works: "The chunking process operates as a preprocessing step before indexing: (1) Load raw document (e.g., PDF, markdown, HTML). (2) Apply chunking strategy (character-based, token-based, semantic, hierarchical). (3) Create chunks of specified size (e.g., 256 tokens) with overlap (e.g., 50 tokens). (4) Embed each chunk into a vector. (5) Store chunks in vector database with metadata (source document, chunk index, original text). At inference time: (1) Query arrives. (2) Search vector index across all chunks (not whole documents). (3) Return top-k chunks. (4) Map chunks back to source documents for citation. (5) Concatenate top-k chunks into context for generation. The overlap parameter prevents information loss at chunk boundaries—if the answer spans two adjacent chunks, overlap ensures both chunks rank highly."
              design_decisions:
                - "Chunk size (tokens) is the primary hyperparameter—smaller for precision, larger for context"
                - "Chunk overlap prevents boundary-crossing information loss"
                - "Semantic chunking (chunk at sentence boundaries) outperforms character-based splitting"
                - "Consider source document metadata (file name, author, publication date) for ranking"
              implementation:
                code_scaffold: |
                  # Chunking strategies comparison
                  from langchain.text_splitter import (
                      CharacterTextSplitter,
                      RecursiveCharacterTextSplitter,
                      TokenTextSplitter
                  )

                  def character_based_chunking(text: str):
                      """Simple but ineffective chunking."""
                      splitter = CharacterTextSplitter(
                          separator=" ",
                          chunk_size=1000,      # chars
                          chunk_overlap=200
                      )
                      chunks = splitter.split_text(text)
                      return chunks

                  def token_based_chunking(text: str):
                      """Better for semantic tasks—respects token limits."""
                      from langchain.text_splitter import CharacterTextSplitter
                      splitter = CharacterTextSplitter.from_tiktoken_encoder(
                          encoding_name="cl100k_base",  # GPT-3.5+ encoding
                          chunk_size=256,               # tokens
                          chunk_overlap=50
                      )
                      chunks = splitter.split_text(text)
                      return chunks

                  def recursive_character_chunking(text: str):
                      """Preserve semantic boundaries by splitting on paragraphs/sentences."""
                      splitter = RecursiveCharacterTextSplitter(
                          separators=["\n\n", "\n", " ", ""],
                          chunk_size=512,
                          chunk_overlap=64
                      )
                      chunks = splitter.split_text(text)
                      return chunks

                  # Comparison in practice
                  sample_text = """Large language models show remarkable abilities...
                                   [10KB document continues...]"""

                  char_chunks = character_based_chunking(sample_text)
                  token_chunks = token_based_chunking(sample_text)
                  recursive_chunks = recursive_character_chunking(sample_text)

                  print(f"Character chunks: {len(char_chunks)}")
                  print(f"Token chunks: {len(token_chunks)}")
                  print(f"Recursive chunks: {len(recursive_chunks)}")
                pseudocode: |
                  CHUNKING PROCESS:
                    Input: Document D (10KB text)

                    1. Load document: text = read(D)
                    2. Split by strategy:
                       a. Character strategy: split every N characters
                       b. Token strategy: split every N tokens
                       c. Semantic strategy: split at sentence/paragraph boundaries
                    3. Create overlap:
                       Chunk 1: text[0:1000]
                       Chunk 2: text[800:1800]  (overlap = 200 tokens from previous)
                       Chunk 3: text[1600:2600]
                    4. Store chunks with metadata:
                       {chunk_id, text, source_doc, chunk_index}
                    5. Embed each chunk: embedding = encode(chunk_text)
                    6. Index in vector DB

                    Output: Indexed chunks (100-1000 per document depending on size)
              sources:
                - "Building Apps with AI Agents, Chapter 6: Document Chunking"
                - "AI Engineering by Chip Huyen, Chapter 6: Chunking Strategies"
              real_world_analogies:
                - "Analogy: Book indexing. A book is not ranked as a whole; specific chapters/sections are indexed. When you search an index, you get chapter references, not the entire book."

            - name: "RAG Pipeline Steps: Data Prep → Indexing → Retrieval → Generation → Evaluation"
              definition: "A complete RAG system progresses through five sequential phases, each with distinct objectives and outputs. (1) Data Preparation: Ingest raw documents (PDFs, HTML, markdown, databases), clean formatting, extract text, and validate data quality. (2) Indexing: Chunk documents, embed chunks into vectors, and store in a vector database with metadata for rapid retrieval. (3) Retrieval: Accept user queries, encode queries into vectors, search the index via similarity metrics, and return top-k relevant chunks. (4) Generation: Concatenate retrieved chunks as context, prepend query and system instructions, and pass to an LLM to generate the final answer. (5) Evaluation: Measure system performance via retrieval metrics (precision, recall), generation metrics (BLEU, Rouge), and end-to-end metrics (user satisfaction, correctness). Each phase has independent failure modes; systematic evaluation identifies bottlenecks. For example, poor retrieval (phase 3) cannot be compensated by a better generator (phase 4)—the data pipeline quality determines system ceiling."
              how_it_works: "The pipeline is a data transformation sequence: raw documents → clean text → chunks → embeddings → indexed vectors → (at query time) ranked chunks → formatted context → generated answer. Each step is reversible and inspectable. During development, the pipeline operates offline: prepare data once (hour-scale), index once (hour-scale per million documents), then at query time (online), retrieval and generation operate in seconds. The separation enables batch preprocessing (index everything overnight) and fast online serving (respond to queries in real-time). A single failing component breaks the entire system; for example, if the embedding model maps similar documents to distant vectors, retrieval fails regardless of downstream generation quality."
              design_decisions:
                - "Data quality (phase 1) is foundational—garbage in, garbage out applies to RAG"
                - "Indexing (phase 2) is amortizable—done once for entire corpus, then queried many times"
                - "Retrieval (phase 3) is the critical bottleneck—invest most engineering effort here"
                - "Evaluation (phase 5) must test each phase independently, not just end-to-end results"
              implementation:
                code_scaffold: |
                  # Complete RAG pipeline showing all 5 phases

                  # PHASE 1: Data Preparation
                  def data_preparation(raw_documents: List[str]) -> List[str]:
                      cleaned_docs = []
                      for doc in raw_documents:
                          text = extract_text(doc)           # PDF -> text
                          text = clean_whitespace(text)      # normalize spaces
                          text = remove_boilerplate(text)    # remove headers, footers
                          cleaned_docs.append(text)
                      return cleaned_docs

                  # PHASE 2: Indexing (offline, batch)
                  def indexing_phase(documents: List[str],
                                      vector_db: VectorDatabase):
                      for doc in documents:
                          chunks = chunk_document(doc, chunk_size=256, overlap=50)
                          for i, chunk in enumerate(chunks):
                              embedding = embed_model.encode(chunk)
                              vector_db.upsert(
                                  vector=embedding,
                                  metadata={
                                      'text': chunk,
                                      'doc_id': doc.id,
                                      'chunk_index': i
                                  }
                              )

                  # PHASE 3: Retrieval (online, per-query)
                  def retrieval_phase(query: str,
                                      vector_db: VectorDatabase,
                                      top_k: int = 5) -> List[str]:
                      query_embedding = embed_model.encode(query)
                      results = vector_db.search(query_embedding, top_k=top_k)
                      retrieved_texts = [r['metadata']['text'] for r in results]
                      return retrieved_texts

                  # PHASE 4: Generation (online, per-query)
                  def generation_phase(query: str, context: str) -> str:
                      prompt = f"""
                      Context:
                      {context}

                      Question: {query}

                      Answer:"""

                      answer = llm_model.generate(prompt, max_tokens=200)
                      return answer

                  # PHASE 5: Evaluation
                  def evaluation_phase(test_queries: List[str],
                                        gold_contexts: List[List[str]],
                                        gold_answers: List[str]):
                      # Evaluate retrieval independently
                      retrieval_precision = measure_retrieval_precision(test_queries, gold_contexts)
                      retrieval_recall = measure_retrieval_recall(test_queries, gold_contexts)

                      # Evaluate generation independently
                      generation_bleu = measure_bleu(predicted_answers, gold_answers)

                      # Evaluate end-to-end
                      rag_pipeline_accuracy = measure_end_to_end_accuracy(test_queries, gold_answers)

                      return {
                          'retrieval_precision': retrieval_precision,
                          'retrieval_recall': retrieval_recall,
                          'generation_bleu': generation_bleu,
                          'end_to_end_accuracy': rag_pipeline_accuracy
                      }

                  # Full pipeline orchestration
                  def rag_system(query: str, documents: List[str]):
                      # Prepare once
                      prepared = data_preparation(documents)

                      # Index once (offline)
                      vector_db = VectorDatabase()
                      indexing_phase(prepared, vector_db)

                      # Retrieve, generate, evaluate per query (online)
                      retrieved = retrieval_phase(query, vector_db)
                      context = "\n".join(retrieved)
                      answer = generation_phase(query, context)

                      return answer
                pseudocode: |
                  RAG_PIPELINE(documents, query):

                    # OFFLINE (run once)
                    prepared_docs = DATA_PREP(documents)
                    chunks = CHUNKING(prepared_docs)
                    embeddings = EMBED(chunks)
                    INDEX(embeddings, chunks) -> vector_index

                    # ONLINE (per query)
                    query_embedding = EMBED(query)
                    retrieved_chunks = SEARCH(query_embedding, vector_index, top_k=5)
                    context = FORMAT(retrieved_chunks)
                    answer = GENERATE(query, context)

                    # OPTIONAL: Evaluate
                    metrics = EVALUATE(retrieved_chunks, answer, gold_standard)

                    return answer, metrics
              sources:
                - "Building Apps with AI Agents, Chapter 6: RAG Pipeline"
                - "AI Engineering by Chip Huyen, Chapter 6: Complete RAG Systems"
              real_world_analogies:
                - "Analogy: Food supply chain. Data prep = harvest crops. Indexing = organize warehouse. Retrieval = pick items from shelves. Generation = cook meal. Evaluation = taste and feedback."

            - name: "RAG Two-Phase Architecture: Indexing Phase + Runtime Workflow"
              definition: "RAG systems decompose into two distinct temporal phases with different computational characteristics: (1) Indexing Phase (offline, batch, amortizable)—one-time processing of the entire document corpus to create searchable indices. This phase is computationally intensive but happens infrequently (daily, weekly updates). Operations: chunk documents, embed chunks, store in vector database, build search indices. Cost: paid once, amortized over all queries. (2) Runtime Workflow (online, per-query, latency-critical)—handles individual user queries. Operations: encode query, search indices, retrieve top-k chunks, generate response. Cost: paid per query, must complete in seconds. Separating these phases enables optimization strategies: indexing can be parallelized and batched; runtime must be fast and responsive. This architecture is fundamental to practical RAG—without this separation, every query would require recomputing embeddings for the entire corpus (intractable). Modern RAG systems treat indexing as a data engineering problem (MapReduce, Spark, batch processing) and runtime as a machine learning inference problem (optimized for throughput)."
              how_it_works: "Indexing Phase Workflow: (1) Ingest documents in batches (e.g., 10K documents per batch). (2) Chunk each document into 500-1000 chunks. (3) Parallelize embedding computation—encode all chunks using vectorized embeddings (batched on GPUs). (4) Store embeddings with metadata in a vector database (ChromaDB, Pinecone, Weaviate). (5) Build HNSW or IVF indices for fast similarity search. (6) Validate indices by searching with test queries. This entire pipeline can run overnight; it's I/O and compute intensive but doesn't require real-time responsiveness. Runtime Workflow: (1) User submits query. (2) Encode query into vector (milliseconds). (3) Search indices using HNSW/IVF (sub-second). (4) Retrieve top-k chunks (typically 3-10). (5) Format context (milliseconds). (6) Pass to LLM for generation (1-5 seconds depending on output length). (7) Return answer. Total latency: typically 2-10 seconds, dominated by LLM generation. The key insight: indexing phase is expensive but amortizable; runtime phase is fast and repeatable."
              design_decisions:
                - "Batch indexing enables parallelization—leverage multi-GPU compute"
                - "Pre-compute embeddings (indexing) rather than computing per-query (runtime)"
                - "Use approximate nearest neighbor search (HNSW) to keep runtime search sub-second"
                - "Separate phase boundaries cleanly—indexing updates don't require runtime code changes"
              implementation:
                code_scaffold: |
                  # Two-phase architecture implementation

                  # PHASE 1: INDEXING (Offline, batch)
                  class IndexingPhase:
                      def __init__(self, vector_db, embedding_model):
                          self.vector_db = vector_db
                          self.embedding_model = embedding_model

                      def build_index(self, documents: List[str]):
                          """
                          Run offline, once per week.
                          Batched, parallelized, can take hours.
                          """
                          all_chunks = []

                          # Step 1: Chunk all documents (parallelizable)
                          for doc in documents:
                              chunks = chunk_document(doc)
                              all_chunks.extend(chunks)

                          # Step 2: Embed all chunks in batches (GPU-accelerated)
                          batch_size = 32
                          for i in range(0, len(all_chunks), batch_size):
                              batch = all_chunks[i:i+batch_size]
                              embeddings = self.embedding_model.encode(batch)

                              # Step 3: Store in vector DB
                              for chunk, embedding in zip(batch, embeddings):
                                  self.vector_db.upsert(
                                      vector=embedding,
                                      metadata={'text': chunk}
                                  )

                          # Step 4: Build HNSW indices
                          self.vector_db.build_index(method='hnsw')

                  # PHASE 2: RUNTIME (Online, per-query)
                  class RuntimeWorkflow:
                      def __init__(self, vector_db, embedding_model, llm_model):
                          self.vector_db = vector_db
                          self.embedding_model = embedding_model
                          self.llm = llm_model

                      def answer_query(self, query: str) -> str:
                          """
                          Run online, per query.
                          Must complete in <5 seconds.
                          """
                          # Step 1: Encode query (milliseconds)
                          query_embedding = self.embedding_model.encode([query])[0]

                          # Step 2: Search index (milliseconds to 100ms)
                          results = self.vector_db.search(query_embedding, top_k=5)

                          # Step 3: Format context (milliseconds)
                          context = "\n".join([r['metadata']['text'] for r in results])

                          # Step 4: Generate (1-5 seconds)
                          prompt = f"Context: {context}\n\nQuestion: {query}\n\nAnswer:"
                          answer = self.llm.generate(prompt)

                          return answer

                  # Usage
                  indexing = IndexingPhase(vector_db, embedding_model)
                  runtime = RuntimeWorkflow(vector_db, embedding_model, llm)

                  # Week 1: Indexing (one-time)
                  documents = load_documents()
                  indexing.build_index(documents)

                  # Every query: Runtime
                  for query in user_queries:
                      answer = runtime.answer_query(query)
                pseudocode: |
                  # Two-phase architecture timeline

                  INDEXING_PHASE (Offline, once per week):
                    Start: Monday morning
                    1. Load 100K documents
                    2. Chunk into 5M chunks
                    3. Embed 5M chunks (batched on 8 GPUs, 4 hours)
                    4. Store in vector DB (1 hour)
                    5. Build HNSW indices (30 minutes)
                    End: Monday afternoon (5.5 hours total)
                    Cost: $50 GPU hours

                  RUNTIME_WORKFLOW (Online, per query):
                    Start: Query arrives
                    1. Encode query (5ms)
                    2. Search HNSW (50ms)
                    3. Retrieve 5 chunks (1ms)
                    4. Generate response (2000ms)
                    End: Response returned
                    Total: ~2s
                    Cost: $0.001 per query (API calls)
              sources:
                - "Building Apps with AI Agents, Chapter 6: Two-Phase Architecture"
                - "AI Engineering by Chip Huyen, Chapter 6: Batch Processing and Online Inference"
              real_world_analogies:
                - "Analogy: Library system. Indexing phase = cataloging and shelving all books (done by librarians overnight). Runtime = customer asking for a book (librarian finds it in seconds using the catalog)."

            - name: "Success Factor: Retriever Quality Determines System Quality"
              definition: "The fundamental principle of RAG systems: the quality ceiling of the entire system is determined by retriever quality. No generator, however powerful (GPT-4, Claude), can generate a correct answer from irrelevant context. Conversely, a simple generator can produce good answers from highly relevant context retrieved by an excellent retriever. This inverts conventional ML wisdom where model architecture drives quality—in RAG, retrieval quality matters more than model scale. Empirically: studies show that improving retriever precision by 10% improves end-to-end accuracy by 5-15%, while upgrading the generator from GPT-3 to GPT-4 improves accuracy by 2-5%. The implication: invest engineering effort in retriever optimization (chunking, embedding models, reranking, hybrid search) before upgrading the generator. Poor retrieval is a hard limit that no generator overcomes; excellent retrieval is a foundation that even modest generators can leverage. This principle contradicts the common engineering mistake of assuming a bigger/better LLM compensates for poor retrieval."
              how_it_works: "The retriever-generator bottleneck manifests mathematically: if retriever recall is R% (percentage of relevant documents retrieved), then maximum generator accuracy is bounded by R% regardless of generator quality. For example, if the retriever has 50% recall (misses half the relevant documents), the generator's theoretical maximum accuracy is 50% because 50% of possible answers are unreachable. If retriever has 95% recall, generator accuracy can approach 95%. The retriever is thus a constraint; the generator is an optimizer. This means that system improvement follows a hierarchy: (1) Improve retriever recall first (until 90-95%). (2) Once recall is good, optimize retriever precision (reduce irrelevant documents). (3) Only after retrieval is excellent, upgrade generator. Skipping step 1 is wasteful—a perfect generator cannot overcome poor retrieval."
              design_decisions:
                - "Prioritize retriever metrics (precision, recall, MRR, NDCG) in evaluation"
                - "Invest in retriever components: embedding model selection, chunking strategy, reranking"
                - "Measure retriever performance independently from generator performance"
                - "When system performance plateaus, diagnose retriever failures before generator failures"
              implementation:
                code_scaffold: |
                  # Illustration of retriever quality ceiling

                  def measure_system_quality_ceiling(retriever, test_queries, gold_answers):
                      """
                      Demonstrate that retriever quality bounds system performance.
                      """

                      for query, gold_answer in zip(test_queries, gold_answers):
                          # Step 1: Measure retriever recall
                          retrieved_docs = retriever.retrieve(query, top_k=10)
                          relevant_docs_in_retrieved = count_relevant(retrieved_docs, gold_answer)
                          total_relevant_docs = count_total_relevant(gold_answer)

                          retriever_recall = relevant_docs_in_retrieved / total_relevant_docs

                          # Key insight: Maximum possible system accuracy is bounded by recall
                          theoretical_max_accuracy = retriever_recall

                          # Even a perfect generator cannot exceed this bound
                          print(f"""
                          Query: {query}
                          Retriever recall: {retriever_recall:.1%}
                          Theoretical maximum system accuracy: {theoretical_max_accuracy:.1%}

                          Even GPT-4 cannot exceed {theoretical_max_accuracy:.1%} accuracy
                          because {100*(1-retriever_recall):.0f}% of relevant docs are missing from context.
                          """)

                      return theoretical_max_accuracy

                  # Practical comparison
                  print("Scenario 1: Poor Retriever (50% recall)")
                  print("  Max system accuracy: 50%")
                  print("  GPT-4 generator: Cannot exceed 50% (constrained by retrieval)")
                  print("  Improvement path: Better retriever → more relevant docs → better answers")
                  print()

                  print("Scenario 2: Excellent Retriever (95% recall)")
                  print("  Max system accuracy: 95%")
                  print("  GPT-2 generator: Achieves ~85-90% accuracy (can leverage excellent context)")
                  print("  Improvement path: Better generator → better synthesis of excellent context")
                pseudocode: |
                  ANALYZE_RAG_QUALITY(retriever, generator, test_queries, gold_answers):

                    FOR each test query:
                      1. Measure retriever performance:
                         retrieved = RETRIEVE(query)
                         recall = COUNT_RELEVANT_IN_RETRIEVED / TOTAL_RELEVANT
                         precision = COUNT_RELEVANT_IN_RETRIEVED / COUNT_RETRIEVED

                      2. Measure generator performance:
                         context = FORMAT(retrieved)
                         answer = GENERATE(query, context)
                         correctness = MATCH(answer, gold_answer)

                      3. Analyze bottleneck:
                         IF recall < 80%:
                            BOTTLENECK = "Retriever (missing relevant docs)"
                         ELSE IF precision < 80%:
                            BOTTLENECK = "Retriever (too much noise)"
                         ELSE:
                            BOTTLENECK = "Generator (poor synthesis)"

                    REPORT bottleneck
              sources:
                - "AI Engineering by Chip Huyen, Chapter 6: Retriever Quality as System Ceiling"
                - "Building Apps with AI Agents, Chapter 6: Why Retriever Matters More"
              real_world_analogies:
                - "Analogy: Diagnosis before treatment. If the diagnosis is wrong (retriever error), no treatment (generator) helps. Get diagnosis right first (excellent retriever), then apply treatment (good generator)."

        retrieval_algorithms:
          description: "Technical details of sparse, dense, and hybrid retrieval algorithms"
          core_concepts:
            - name: "Term-Based (Sparse) Retrieval: TF-IDF"
              definition: "Term Frequency-Inverse Document Frequency (TF-IDF) is a classical sparse retrieval algorithm that ranks documents by the statistical importance of query terms within documents. The core insight: a term is important if it appears frequently in a document (high TF) but rarely in the corpus (high IDF). TF-IDF computes a score for each (query, document) pair as a sum over query terms: Score(D,Q) = Σᵢ IDF(tᵢ) × f(tᵢ,D), where tᵢ are query terms, f(tᵢ,D) is term frequency (normalized by document length), and IDF(tᵢ) = log(N / nᵢ) where N is total documents and nᵢ is documents containing term tᵢ. The resulting scores are then used to rank and retrieve top-k documents. TF-IDF is sparse because only query terms contribute to scoring (zero for absent terms), leading to sparse vectors with thousands of zero dimensions. TF-IDF is fast (linear in document count), interpretable (exact term matching), and effective for exact keyword searches but fails to capture semantic similarity (e.g., 'automobile' and 'car' are identical semantically but score zero similarity in TF-IDF)."
              how_it_works: "TF-IDF computation proceeds in two steps: (1) Preprocessing: tokenize documents into terms, filter stopwords (the, a, and), apply stemming/lemmatization (reduce 'running' to 'run'). (2) Scoring: For each (query, document) pair, iterate through query terms and sum weighted frequencies. Example: Query = 'blue sky', Document = 'The sky is blue and clear'. Tokenized doc = ['sky', 'blue', 'clear']. TF('blue', doc) = 1/3 = 0.33 (1 occurrence, 3 total tokens). TF('sky', doc) = 1/3 = 0.33. IDF('blue') = log(1M / 50K) = 2.99 (appears in 50K of 1M documents, so somewhat common). IDF('sky') = log(1M / 100K) = 2.30 (more common than 'blue'). Score = 0.33 × 2.99 + 0.33 × 2.30 = 1.76. Documents are ranked by score; top-k are retrieved. The sparsity means most documents get zero score for a given query (they don't contain query terms at all)."
              design_decisions:
                - "TF-IDF works well for keyword-heavy queries; fails for semantic queries like 'vehicles'"
                - "Stopword filtering reduces noise but risks filtering content words (e.g., 'for' in 'support for X')"
                - "Term weighting (IDF) mitigates word frequency bias (common words weighted less)"
                - "Sparse vectors enable exact term match, useful for regulatory/legal queries where 'Section 3.2' must match exactly"
              implementation:
                code_scaffold: |
                  # TF-IDF implementation
                  from sklearn.feature_extraction.text import TfidfVectorizer

                  def tfidf_retrieval(documents: List[str], query: str, top_k: int = 5):
                      """
                      TF-IDF based sparse retrieval.
                      """
                      # Step 1: Create TF-IDF vectors for all documents
                      vectorizer = TfidfVectorizer(
                          max_features=10000,           # limit vocabulary
                          stop_words='english',         # filter stopwords
                          lowercase=True,
                          sublinear_tf=True             # sublinear TF scaling
                      )

                      # Fit on documents
                      tfidf_matrix = vectorizer.fit_transform(documents)

                      # Step 2: Transform query
                      query_vector = vectorizer.transform([query])

                      # Step 3: Compute cosine similarity
                      from sklearn.metrics.pairwise import cosine_similarity
                      similarities = cosine_similarity(query_vector, tfidf_matrix).flatten()

                      # Step 4: Rank and retrieve top-k
                      top_k_indices = similarities.argsort()[-top_k:][::-1]
                      retrieved = [documents[i] for i in top_k_indices]

                      return retrieved

                  # Example
                  documents = [
                      "The quick brown fox jumps over the lazy dog",
                      "A fast brown fox leaps over a lazy dog",
                      "The lazy dog sleeps under the tree"
                  ]

                  query = "brown fox"
                  results = tfidf_retrieval(documents, query, top_k=2)
                  print(f"Query: {query}")
                  print(f"Top results: {results}")
                pseudocode: |
                  TF-IDF_SCORE(document D, query Q):
                    score = 0
                    FOR each term t in Q:
                      IF t in D:
                        tf = COUNT(t in D) / COUNT(all terms in D)
                        idf = LOG(total_documents / documents_containing_t)
                        score += tf × idf
                      ELSE:
                        score += 0  # term absent, contributes nothing
                    RETURN score

                  # Example calculation
                  document = "The sky is blue"
                  query = "blue"
                  tf = 1 / 4 = 0.25  (1 occurrence of 'blue', 4 total tokens)
                  idf = log(1M / 50K) = 2.99  (appears in 50K documents)
                  score = 0.25 × 2.99 = 0.747
              sources:
                - "Building Apps with AI Agents, Chapter 6: Sparse Retrieval (TF-IDF)"
                - "AI Engineering by Chip Huyen, Chapter 6: Term-Based Ranking"
                - "Worked Example: TF-IDF applied to 'blue' in 'The sky is blue' (B03)"
              real_world_analogies:
                - "Analogy: Keyword search in a book index. If you search 'blue sky', you find pages that contain those exact words, ranked by frequency and rarity of the terms."

            - name: "BM25 Extension of TF-IDF"
              definition: "BM25 (Best Matching 25) is a probabilistic ranking function that extends TF-IDF with two critical improvements: (1) Sublinear TF scaling—BM25 prevents high-frequency terms from dominating by using a non-linear TF component: BM25_TF = (f(t,D) × (k₁ + 1)) / (f(t,D) + k₁ × (1 - b + b × (|D| / avgDocLen))), where k₁ controls TF saturation (typical value 1.5), b controls document length normalization (typical 0.75). This formula means that doubling a term's frequency increases score sublinearly, not linearly. (2) Document length normalization—BM25 penalizes very long documents and rewards very short documents, preventing length bias (long documents naturally contain more instances of every term). BM25 is widely used in production systems (Elasticsearch, Lucene) and typically outperforms pure TF-IDF by 10-30% on ranking benchmarks. BM25 retains the sparsity of TF-IDF (exact term matching) but improves ranking quality through probabilistically-motivated term weighting."
              how_it_works: "BM25 score computation: Score(D,Q) = Σᵢ IDF(tᵢ) × (f(tᵢ,D) × (k₁ + 1)) / (f(tᵢ,D) + k₁ × (1 - b + b × (|D| / avgDocLen))). The denominator in the TF component creates saturation: as f(tᵢ,D) increases, the increment to score decreases. Document length normalization (the |D|/avgDocLen term) adjusts for document length—if all documents are similar length, this term has minimal effect; if lengths vary widely, it prevents length bias. Example: Query = 'machine learning', Document A = 'machine learning fundamentals' (short, 300 tokens), Document B = 'a comprehensive course on machine learning' (long, 3000 tokens). Both documents contain 'machine' and 'learning'. Without length normalization, document B might rank higher purely because it's longer. BM25 adjusts: Document B's score is normalized down to account for length, making both documents roughly comparable."
              design_decisions:
                - "BM25 parameters (k₁, b) are tunable; typical values (1.5, 0.75) work well but should be tuned per corpus"
                - "BM25 still fails for semantic queries (like TF-IDF) but handles keyword queries better"
                - "BM25 is the standard baseline for sparse retrieval; beating BM25 is a threshold for considering denser methods"
                - "BM25 is fast and interpretable, making it a good first retrieval layer (before expensive dense retrieval)"
              implementation:
                code_scaffold: |
                  # BM25 implementation using rank_bm25 library
                  from rank_bm25 import BM25Okapi

                  def bm25_retrieval(documents: List[str], query: str,
                                      top_k: int = 5) -> List[str]:
                      """
                      BM25 sparse retrieval.
                      """
                      # Tokenize documents
                      tokenized_docs = [doc.split() for doc in documents]

                      # Initialize BM25
                      bm25 = BM25Okapi(tokenized_docs)

                      # Tokenize query
                      tokenized_query = query.split()

                      # Compute BM25 scores
                      scores = bm25.get_scores(tokenized_query)

                      # Get top-k indices
                      top_k_indices = scores.argsort()[-top_k:][::-1]
                      retrieved = [documents[i] for i in top_k_indices]

                      return retrieved

                  # Example with tuned parameters
                  documents = [
                      "Deep learning revolutionizes machine learning",
                      "Machine learning engineering fundamentals",
                      "Neural networks and deep learning architectures"
                  ]

                  query = "deep learning"
                  results = bm25_retrieval(documents, query, top_k=2)
                  print(f"BM25 results: {results}")
                pseudocode: |
                  BM25_SCORE(document D, query Q, k₁=1.5, b=0.75):
                    avgDocLen = average document length in corpus
                    score = 0

                    FOR each term t in Q:
                      tf = frequency of t in D
                      idf = LOG((total_docs - docs_with_t + 0.5) / (docs_with_t + 0.5))

                      tf_component = (tf × (k₁ + 1)) / (tf + k₁ × (1 - b + b × (|D| / avgDocLen)))

                      score += idf × tf_component

                    RETURN score
              sources:
                - "Building Apps with AI Agents, Chapter 6: BM25 Ranking"
                - "AI Engineering by Chip Huyen, Chapter 6: Extensions of TF-IDF"
              real_world_analogies:
                - "Analogy: Grading papers. TF-IDF = count keyword frequency. BM25 = count keyword frequency but adjust for paper length (long papers naturally mention more keywords)."

            - name: "Embedding-Based (Dense) Retrieval"
              definition: "Dense retrieval represents both documents and queries as fixed-size dense vectors (embeddings) via neural text encoders (e.g., BERT, Sentence Transformers) rather than sparse term vectors. An embedding model is a neural network that maps text of arbitrary length into a fixed-dimensional vector (e.g., 768-dimensional vectors for BERT) such that semantically similar texts produce similar vectors (high cosine similarity). Dense retrieval then uses vector similarity metrics (cosine, euclidean, dot product) to rank documents: Score(D,Q) = similarity(embed(Q), embed(D)). The key advantage over sparse methods: dense embeddings capture semantic meaning, not just exact terms. 'automobile' and 'car' both embed to similar vectors, so the query 'car' retrieves documents about automobiles. Dense retrieval requires computing embeddings for all documents (indexing phase) and the query (runtime), then searching via approximate nearest neighbor (ANN) indices. The tradeoff: denser embeddings are semantically stronger (better for intent matching) but computationally more expensive and less interpretable than sparse retrieval."
              how_it_works: "Dense retrieval operates in two phases: (1) Indexing: For each document chunk, encode into an embedding using a pre-trained text encoder: embedding = encoder(document_text). Store (embedding, document_text, metadata) in a vector index (Pinecone, Weaviate, FAISS) optimized for similarity search. (2) Runtime: Encode the query using the same encoder: query_embedding = encoder(query). Search the vector index for the top-k nearest neighbors by cosine similarity. Return the k documents with highest similarity scores. The embedding encoder is the critical component—quality depends on the model: OpenAI's text-embedding-ada-002 (1536-dim) is strong and general-purpose; domain-specific encoders (e.g., biomedical) outperform general models on specialized tasks. Similarity computation: cosine_similarity(a, b) = (a · b) / (||a|| × ||b||) ∈ [-1, 1], where 1 means identical direction (high similarity), 0 means orthogonal (no similarity), -1 means opposite. For normalized embeddings (||a|| = ||b|| = 1), cosine similarity equals dot product."
              design_decisions:
                - "Dense retrieval captures semantic meaning but requires indexing all documents (storage overhead)"
                - "Embedding model choice affects quality—use models evaluated on MTEB leaderboard"
                - "Vector dimension (256 to 4096) affects memory and speed; smaller is faster but potentially less expressive"
                - "Approximate nearest neighbor (ANN) is necessary for speed; exact nearest neighbor is intractable for large indices"
              implementation:
                code_scaffold: |
                  # Dense retrieval using Sentence-Transformers
                  from sentence_transformers import SentenceTransformer
                  import numpy as np

                  def dense_retrieval(documents: List[str], query: str,
                                       top_k: int = 5) -> List[str]:
                      """
                      Dense embedding-based retrieval.
                      """
                      # Step 1: Load encoder
                      encoder = SentenceTransformer('all-MiniLM-L6-v2')

                      # Step 2: Encode all documents
                      doc_embeddings = encoder.encode(documents, convert_to_tensor=True)

                      # Step 3: Encode query
                      query_embedding = encoder.encode([query], convert_to_tensor=True)[0]

                      # Step 4: Compute cosine similarities
                      from sentence_transformers.util import cos_sim
                      similarities = cos_sim(query_embedding, doc_embeddings)[0]

                      # Step 5: Get top-k
                      top_k_indices = similarities.argsort(descending=True)[:top_k]
                      retrieved = [documents[i] for i in top_k_indices]

                      return retrieved

                  # Example
                  documents = [
                      "The cat sat on the mat",
                      "Dogs are loyal pets",
                      "Cats and dogs are common pets"
                  ]

                  query = "feline animals"
                  results = dense_retrieval(documents, query, top_k=2)
                  print(f"Dense retrieval results: {results}")
                pseudocode: |
                  DENSE_RETRIEVAL(query Q, documents D[], embedding_model):

                    # Indexing phase (offline, once)
                    FOR each document d in D:
                      embedding[d] = embedding_model.encode(d)
                      store (embedding[d], d) in vector_index

                    # Runtime (per query)
                    query_embedding = embedding_model.encode(Q)

                    FOR each document d in D:
                      similarity[d] = cosine_similarity(query_embedding, embedding[d])

                    top_k = sort_by_similarity(D, descending=True)[:top_k]
                    RETURN top_k documents
              sources:
                - "Building Apps with AI Agents, Chapter 6: Dense Retrieval"
                - "AI Engineering by Chip Huyen, Chapter 6: Embedding-Based Ranking"
              real_world_analogies:
                - "Analogy: Semantic clustering in your mind. You cluster concepts semantically (cars, vehicles, transportation all cluster together). Dense retrieval maps this intuition to vector space."

            - name: "Sparse vs Dense Retrieval Comparison"
              definition: "Sparse retrieval (TF-IDF, BM25) and dense retrieval (embeddings) represent opposing tradeoffs in information retrieval. Sparse retrieval uses one-hot encodings where vectors have a dimension for each term in the vocabulary (50K-100K dimensions), with exactly one non-zero entry per document (the term itself)—most values are zero. Dense retrieval uses compact, learned representations (256-4096 dimensions) trained to cluster semantically similar texts together—all values are non-zero. Key differences: (1) Interpretability—sparse retrieval shows exact term matches; dense retrieval is a black box. (2) Semantics—sparse cannot capture 'car' ≈ 'automobile'; dense embeddings capture this through training on similar contexts. (3) Efficiency—sparse is fast (linear term matching) and low memory; dense requires ANN indices (sublinear search, higher memory). (4) Long tail—sparse handles rare terms well; dense struggles with out-of-distribution terms. (5) Modality—sparse is text-only; dense encoders can be multimodal (text + images). SPLADE (Sparse Learned Expansion) is an interesting exception: a learned sparse model combining benefits of both approaches. In practice, hybrid retrieval (combining both) often outperforms pure sparse or pure dense. The choice: sparse for keyword-heavy or exact-match queries (legal documents, reference materials), dense for semantic or intent-based queries (conversational, open-domain)."
              how_it_works: "Sparse retrieval computes scores using term statistics: a document is relevant if it contains many query terms (with appropriate weighting). The vector representation is explicit—dimension i corresponds to term i in the vocabulary. Dense retrieval computes scores using neural similarity: a document is relevant if its embedding is close to the query embedding in learned semantic space. The vector representation is implicit—no correspondence to terms. Example: Query 'electric vehicles', Document 'battery-powered cars'. Sparse retrieval: does not match (different terms), low score. Dense retrieval: both queries and documents are about electric transportation, embeddings are close, high score. The embedding space is learned via contrastive training: pairs of semantically similar documents (e.g., two descriptions of the same car) are pushed together; dissimilar pairs are pushed apart. Over millions of examples, the model learns a meaningful embedding space."
              design_decisions:
                - "Start with sparse retrieval (fast, interpretable) as baseline"
                - "Add dense retrieval if semantic queries dominate"
                - "Hybrid retrieval (combine sparse + dense scores) often wins benchmarks"
                - "SPLADE (learned sparse) provides middle ground with interpretability + semantics"
                - "Evaluate both methods on representative test queries before choosing"
              implementation:
                code_scaffold: |
                  # Comparison: Sparse vs Dense on same query

                  # Sparse retrieval (TF-IDF)
                  from sklearn.feature_extraction.text import TfidfVectorizer
                  from sklearn.metrics.pairwise import cosine_similarity

                  documents = [
                      "Electric vehicles are the future of transportation",
                      "Traditional gasoline cars are still popular",
                      "Battery-powered automobiles reduce emissions"
                  ]

                  query = "electric cars"

                  # Sparse approach
                  vectorizer = TfidfVectorizer()
                  tfidf_matrix = vectorizer.fit_transform(documents)
                  query_vector = vectorizer.transform([query])
                  sparse_scores = cosine_similarity(query_vector, tfidf_matrix).flatten()

                  print("Sparse (TF-IDF) scores:")
                  for doc, score in zip(documents, sparse_scores):
                      print(f"  {doc}: {score:.3f}")

                  # Dense approach
                  from sentence_transformers import SentenceTransformer
                  encoder = SentenceTransformer('all-MiniLM-L6-v2')

                  doc_embeddings = encoder.encode(documents)
                  query_embedding = encoder.encode([query])[0]

                  from sentence_transformers.util import cos_sim
                  dense_scores = cos_sim(query_embedding, doc_embeddings).flatten()

                  print("\nDense (Embedding) scores:")
                  for doc, score in zip(documents, dense_scores):
                      print(f"  {doc}: {score:.3f}")

                  # Key observation: Dense retrieval ranks document 3 highest
                  # because 'battery-powered automobiles' is semantically close to 'electric cars'
                  # Sparse retrieval may miss this unless 'electric' or 'car' appears
                pseudocode: |
                  SPARSE_RETRIEVAL(query, documents):
                    FOR each document:
                      score = 0
                      FOR each query_term in query:
                        IF query_term in document:
                          score += idf(query_term)
                    RETURN documents sorted by score DESC

                  DENSE_RETRIEVAL(query, documents):
                    query_embedding = encode(query)
                    FOR each document:
                      document_embedding = encode(document)
                      score = cosine_similarity(query_embedding, document_embedding)
                    RETURN documents sorted by score DESC
              sources:
                - "Building Apps with AI Agents, Chapter 6: Sparse vs Dense Comparison"
                - "AI Engineering by Chip Huyen, Chapter 6: Retrieval Algorithm Trade-offs"
              real_world_analogies:
                - "Analogy: Library searching. Sparse retrieval = using a card catalog (exact title/author match). Dense retrieval = asking a librarian who understands thematic similarity (they'd recommend books about similar topics)."

            - name: "Hybrid Retrieval: Combining Sparse + Dense"
              definition: "Hybrid retrieval combines sparse (BM25) and dense (embeddings) rankings using a weighted average: Hybrid_Score = α × sparse_score + (1 - α) × dense_score, where α ∈ [0, 1] controls the blend. The intuition: sparse retrieval excels at exact keyword matching; dense excels at semantic similarity. Combining both leverages complementary strengths. Empirically, hybrid retrieval outperforms pure sparse or dense on most benchmarks. The tradeoff: hybrid requires computing both sparse and dense scores at runtime (roughly 2x the computation vs. pure dense) but improves ranking quality by 5-15%. Most modern RAG systems use hybrid retrieval as the default strategy. The hyperparameter α requires tuning: α = 0.5 (equal weight) is a common starting point; some systems tune α per query type (higher α for keyword-heavy queries, lower for semantic queries). Normalization is critical—sparse and dense scores have different ranges (sparse: 0-1 for normalized BM25, dense: 0-1 for normalized cosine), so raw blending can bias toward one method."
              how_it_works: "Hybrid retrieval pipeline: (1) Encode query and documents in both sparse and dense representations. (2) Compute sparse scores using BM25. (3) Compute dense scores using embeddings. (4) Normalize both score ranges to [0, 1]. (5) Blend: hybrid_score = α × norm_sparse + (1 - α) × norm_dense. (6) Rank documents by hybrid score. (7) Return top-k. The normalization step is crucial: if sparse scores range 0-5 and dense scores range 0-1, raw averaging gives sparse scores 5x weight. Proper normalization: divide sparse scores by max_sparse_score, ensuring both methods contribute equally when α = 0.5. Advanced variants: (a) Linear combination with learned weights (train α on validation set), (b) Harmonic mean (geometric mean of sparse/dense), (c) Learned fusion models (neural network that learns optimal combination from query features)."
              design_decisions:
                - "Hybrid retrieval is the practical default—use it unless domain/constraints justify pure sparse or pure dense"
                - "Parameter α requires tuning; typically 0.3-0.7 works well across domains"
                - "Normalization of scores before blending is critical (normalize to [0, 1])"
                - "Monitor quality of sparse vs dense components separately to debug hybrid failures"
              implementation:
                code_scaffold: |
                  # Hybrid retrieval implementation
                  from rank_bm25 import BM25Okapi
                  from sentence_transformers import SentenceTransformer
                  import numpy as np

                  def hybrid_retrieval(documents: List[str], query: str,
                                        top_k: int = 5, alpha: float = 0.5) -> List[str]:
                      """
                      Hybrid retrieval: sparse (BM25) + dense (embeddings).
                      """
                      # SPARSE: BM25 scoring
                      tokenized_docs = [doc.split() for doc in documents]
                      bm25 = BM25Okapi(tokenized_docs)
                      bm25_scores = bm25.get_scores(query.split())
                      sparse_scores = bm25_scores / (bm25_scores.max() + 1e-10)  # Normalize to [0, 1]

                      # DENSE: Embedding-based scoring
                      encoder = SentenceTransformer('all-MiniLM-L6-v2')
                      doc_embeddings = encoder.encode(documents)
                      query_embedding = encoder.encode([query])[0]

                      # Cosine similarities (already in [0, 1] for normalized embeddings)
                      dense_scores = np.array([
                          np.dot(query_embedding, doc_emb) /
                          (np.linalg.norm(query_embedding) * np.linalg.norm(doc_emb) + 1e-10)
                          for doc_emb in doc_embeddings
                      ])

                      # HYBRID: Blend sparse and dense
                      hybrid_scores = alpha * sparse_scores + (1 - alpha) * dense_scores

                      # Retrieve top-k
                      top_k_indices = hybrid_scores.argsort()[-top_k:][::-1]
                      retrieved = [documents[i] for i in top_k_indices]

                      return retrieved

                  # Example
                  documents = [
                      "Electric vehicles represent the future of transportation",
                      "Traditional cars still dominate the market",
                      "Battery-powered automobiles are becoming mainstream"
                  ]

                  query = "electric cars"
                  results = hybrid_retrieval(documents, query, top_k=2, alpha=0.5)
                  print(f"Hybrid retrieval results: {results}")
                pseudocode: |
                  HYBRID_RETRIEVAL(query Q, documents D[], alpha=0.5):

                    # Step 1: Compute sparse scores (BM25)
                    sparse_scores = BM25_SCORES(Q, D)
                    sparse_scores_norm = normalize(sparse_scores, [0, 1])

                    # Step 2: Compute dense scores (embeddings)
                    dense_scores = EMBEDDING_SCORES(Q, D)
                    dense_scores_norm = normalize(dense_scores, [0, 1])

                    # Step 3: Blend with parameter alpha
                    hybrid_scores = alpha * sparse_scores_norm + (1 - alpha) * dense_scores_norm

                    # Step 4: Rank and return top-k
                    top_k = argsort(hybrid_scores, descending=True)[:top_k]
                    RETURN D[top_k]
              sources:
                - "Building Apps with AI Agents, Chapter 6: Hybrid Retrieval"
                - "AI Engineering by Chip Huyen, Chapter 6: Combining Retrieval Methods"
              real_world_analogies:
                - "Analogy: Book recommendation. Ask both a librarian (sparse: exact keywords) and a casual book club member (dense: thematic sense). Average their recommendations for best results."

        embedding_models_and_vectors:
          description: "Details on embedding models, vector properties, and selection criteria"
          core_concepts:
            - name: "Text Encoders: Functionality and Semantic Clustering"
              definition: "Text embedding models are neural networks trained to map variable-length text into fixed-dimensional dense vectors such that semantically similar texts cluster together in vector space. A text encoder (also called an embedding model or encoder) accepts a text string (document, sentence, or paragraph) as input and outputs a numerical vector (embedding) of fixed dimension. The key property: cosine similarity between embeddings reflects semantic similarity between texts. For example, the sentences 'I like cats' and 'I enjoy felines' should produce embeddings with high cosine similarity (close to 1.0) because they're semantically equivalent. Conversely, 'I like cats' and 'The sky is blue' should produce embeddings with low cosine similarity (close to 0.0) because they're semantically unrelated. The clustering effect: when you embed a large corpus and plot embeddings in 2D or 3D, documents about similar topics naturally cluster together. An embedding model is trained via contrastive learning: positive pairs (semantically similar texts) are pushed together, negative pairs are pushed apart. Modern encoders (BERT, Sentence-Transformers) are pre-trained on millions of text pairs and achieve strong semantic clustering without domain-specific fine-tuning."
              how_it_works: "Encoder architecture: (1) Tokenize input text into subword tokens. (2) Pass tokens through transformer layers (self-attention, feed-forward networks). (3) Pool the final layer representations (typically mean pooling of token embeddings). (4) Optionally apply a projection layer to reach target dimension. (5) Output fixed-dimensional vector. The training process uses contrastive loss: pairs of related texts (same documents, paraphrases) are pushed together; unrelated texts are pushed apart. After training, the encoder embeds similar texts to nearby vectors (high cosine similarity) and dissimilar texts to distant vectors (low similarity). The clustering emerges automatically from the contrastive training objective. Example: Encode three sentences: (1) 'Electric vehicles reduce pollution.' (2) 'Battery cars are eco-friendly.' (3) 'The sky is blue.' Sentences 1 and 2 embed to nearby vectors (semantically related). Sentence 3 embeds far from both (unrelated topic). If you visualize these three vectors in 2D, sentences 1 and 2 cluster together; sentence 3 is isolated."
              design_decisions:
                - "Use general-purpose encoders (Sentence-BERT, OpenAI embeddings) for broad applicability"
                - "Consider domain-specific encoders (biomedical, financial) if your corpus is specialized"
                - "Larger models (768D, 1536D) capture more nuance but require more storage/compute"
                - "Smaller models (384D) are faster but potentially less expressive"
              implementation:
                code_scaffold: |
                  # Text encoder: semantic clustering demonstration
                  from sentence_transformers import SentenceTransformer
                  import numpy as np

                  def semantic_clustering_demo():
                      """Show how encoders cluster semantically similar texts."""

                      # Load pre-trained encoder
                      encoder = SentenceTransformer('all-MiniLM-L6-v2')

                      # Sentences: some semantically similar, some different
                      sentences = [
                          "Electric vehicles reduce pollution.",           # Topic 1: EVs
                          "Battery cars are eco-friendly.",               # Topic 1: EVs
                          "Gasoline cars emit CO2.",                      # Topic 1: EVs
                          "The sky is blue.",                             # Topic 2: Nature
                          "Clouds are white.",                            # Topic 2: Nature
                          "I love programming.",                          # Topic 3: Programming
                          "Coding is fun.",                               # Topic 3: Programming
                      ]

                      # Encode all sentences
                      embeddings = encoder.encode(sentences)

                      # Compute pairwise similarity
                      similarities = np.dot(embeddings, embeddings.T)

                      # Print similarity matrix
                      print("Semantic Similarity Matrix:")
                      print("(Values close to 1.0 = semantically similar)")
                      print("(Values close to 0.0 = semantically dissimilar)")
                      print()

                      for i, sent1 in enumerate(sentences):
                          for j, sent2 in enumerate(sentences):
                              if i < j:
                                  sim = similarities[i][j]
                                  print(f"'{sent1}' vs '{sent2}':")
                                  print(f"  Similarity: {sim:.3f}\n")

                  semantic_clustering_demo()
                pseudocode: |
                  ENCODE_TEXT(text):
                    1. Tokenize text: tokens = tokenizer.encode(text)
                    2. Pass through transformer: hidden_states = transformer(tokens)
                    3. Pool representations: embedding = mean_pool(hidden_states)
                    4. Optionally project: embedding = projection_layer(embedding)
                    5. Return embedding (fixed dimension, e.g., 768D)

                  SEMANTIC_CLUSTERING(corpus):
                    FOR each text in corpus:
                      embedding = ENCODE_TEXT(text)
                      store (embedding, text) in vector space

                    # Clustering effect
                    texts_about_cars cluster together in vector space
                    texts_about_plants cluster separately
                    similarity(car_embedding, car_embedding2) ≈ 0.9
                    similarity(car_embedding, plant_embedding) ≈ 0.1
              sources:
                - "Building Apps with AI Agents, Chapter 6: Text Encoders"
                - "AI Engineering by Chip Huyen, Chapter 6: Embedding Models"
              real_world_analogies:
                - "Analogy: Clustering books in a library by topic. Semantically related books end up on the same shelf (cluster). An encoder is the mechanism that determines which books are similar (and thus should cluster together)."

            - name: "Popular Embedding Models and Their Characteristics"
              definition: "Multiple high-quality text embedding models are available, each with distinct tradeoffs. (1) OpenAI text-embedding-ada-002: 1536 dimensions, general-purpose, strong performance on benchmarks, requires API calls (per-token cost). (2) OpenAI text-embedding-3-small: 512 dimensions, faster/cheaper variant of ada-002, lower dimensional than ada-002 but still strong. (3) Cohere embed-english-v3.0: 1024 dimensions, competitive performance, requires API. (4) Sentence-BERT (sentence-transformers): multiple variants (all-MiniLM-L6-v2 with 384D is popular, all-mpnet-base-v2 with 768D is larger), open-source, free, run locally on CPU/GPU. (5) ColBERT: late interaction model combining sparse and dense retrieval properties. (6) E5 (text2text-embedding): encoder from MIT, strong open-source option. (7) Google text-embedding-004: 1408 dimensions, newer model with strong performance. Selection depends on: cost (API vs. open-source), speed (smaller dimension = faster), performance on MTEB leaderboard (benchmark for embedding models), and domain specificity (general vs. specialized models)."
              how_it_works: "All embedding models follow the same workflow: (1) Accept text input (variable length). (2) Tokenize text into subword tokens. (3) Process tokens through transformer layers. (4) Pool representations into fixed-dimensional vector. (5) Return embedding. The differences are in model size (384D to 4096D), training data and method (contrastive, metric learning), and computational requirements. Smaller models (384D) are faster and cheaper but less expressive. Larger models (1536D) capture more nuance but require more compute. API-based models (OpenAI, Cohere) are convenient (no local setup) but incur per-token costs (1000 tokens costs ~0.001-0.01 cents depending on model). Open-source models (Sentence-BERT) are free to run but require local GPU/CPU resources. The quality tradeoff: OpenAI embeddings are top-tier performance but at cost; Sentence-BERT are excellent open-source alternatives with minimal performance degradation. For RAG, the choice of embedding model is critical—a weak embedding model undermines the entire system regardless of downstream generator quality."
              design_decisions:
                - "Start with Sentence-BERT all-MiniLM-L6-v2 (384D) for rapid prototyping (free, fast, good quality)"
                - "Upgrade to OpenAI text-embedding-ada-002 (1536D) or Cohere v3 if performance is insufficient"
                - "Measure performance on your specific domain (not all models are equally good for all tasks)"
                - "Consider domain-specific models (e.g., medical embeddings for healthcare RAG) if applicable"
                - "Dimensionality tuning: 384D for speed, 768D for balanced, 1536D+ for maximum quality"
              implementation:
                code_scaffold: |
                  # Embedding models: comparison of different options

                  # Option 1: OpenAI embeddings (API-based, high-quality)
                  from openai import OpenAI
                  client = OpenAI(api_key="sk-...")

                  def get_openai_embeddings(texts):
                      response = client.embeddings.create(
                          model="text-embedding-ada-002",
                          input=texts
                      )
                      return [item.embedding for item in response.data]

                  # Option 2: Sentence-BERT (open-source, local)
                  from sentence_transformers import SentenceTransformer

                  def get_sbert_embeddings(texts):
                      model = SentenceTransformer('all-MiniLM-L6-v2')
                      embeddings = model.encode(texts, convert_to_tensor=True)
                      return embeddings

                  # Option 3: Cohere (API-based)
                  import cohere

                  def get_cohere_embeddings(texts):
                      co = cohere.Client(api_key="...")
                      response = co.embed(texts=texts, model="embed-english-v3.0")
                      return response.embeddings

                  # Comparison
                  text = "Machine learning is a subset of artificial intelligence"

                  openai_emb = get_openai_embeddings([text])
                  sbert_emb = get_sbert_embeddings([text])
                  cohere_emb = get_cohere_embeddings([text])

                  print(f"OpenAI embedding dim: {len(openai_emb[0])}")      # 1536
                  print(f"Sentence-BERT embedding dim: {len(sbert_emb[0])}")  # 384
                  print(f"Cohere embedding dim: {len(cohere_emb[0])}")       # 1024
                pseudocode: |
                  EMBEDDING_MODEL_OPTIONS:

                    1. OpenAI text-embedding-ada-002
                       Dimensions: 1536
                       Cost: ~$0.10 per 1M tokens
                       Quality: Excellent
                       Latency: ~100ms (API)
                       Deployment: API only

                    2. Sentence-BERT all-MiniLM-L6-v2
                       Dimensions: 384
                       Cost: Free
                       Quality: Good
                       Latency: ~10ms (local)
                       Deployment: Local CPU/GPU

                    3. Cohere embed-english-v3.0
                       Dimensions: 1024
                       Cost: ~$0.10 per 1M tokens
                       Quality: Excellent
                       Latency: ~100ms (API)
                       Deployment: API only

                    4. Google text-embedding-004
                       Dimensions: 1408
                       Cost: $0.025 per 1M tokens
                       Quality: Excellent
                       Latency: ~100ms (API)
                       Deployment: API via Vertex AI
              sources:
                - "Building Apps with AI Agents, Chapter 6: Embedding Model Selection"
                - "AI Engineering by Chip Huyen, Chapter 6: Text Encoders and Models"
                - "MTEB Leaderboard: Benchmarking Text Embeddings"
              real_world_analogies:
                - "Analogy: Summarization quality. Small summary (384D) captures essence but misses nuance. Large summary (1536D) includes more details. OpenAI summary is professionally written (high cost). Sentence-BERT summary is DIY but effective (no cost)."

            - name: "Dimensionality Trade-Offs and PCA Visualization"
              definition: "Embeddings have fixed dimension (384D for Sentence-BERT, 1536D for OpenAI) representing the model's compression of textual meaning into fixed vector space. Dimensionality directly affects three system properties: (1) Storage—each embedding costs dimension × bytes_per_float (1536 × 4 bytes = 6KB per embedding). A corpus of 1M documents requires 6GB storage for embeddings alone; reducing to 384D drops this to 1.5GB. (2) Computational Speed—vector operations (dot product, cosine similarity) are O(dimension). 384D queries are 4x faster than 1536D queries. (3) Information Capacity—higher dimension allows encoding more semantic nuance but risks overfitting to noise. Empirically, reducing dimensionality via PCA (Principal Component Analysis) from 1536D to 768D causes minimal accuracy loss (<2%) while cutting storage/compute in half. PCA projects high-dimensional embeddings into lower-dimensional space preserving maximum variance, enabling both efficiency gains and visualization (reducing to 3D for plotting). The design decision involves quantifying the tradeoff: a 50% storage reduction vs. a 1-2% accuracy loss is often worth it in production systems."
              how_it_works: "Dimensionality reduction via PCA: (1) Compute PCA on embeddings from your corpus (e.g., 1M documents). (2) Fit PCA to reduce 1536D to target dimension (e.g., 768D). (3) Apply PCA transformation to all stored embeddings. (4) Apply same PCA transformation to query embeddings at inference time. (5) Use reduced embeddings for all downstream operations (storage, similarity search). The mathematical process: PCA finds orthogonal principal components that maximize variance. The first component explains the most variance; the second component explains the most remaining variance, orthogonal to the first. By keeping only the top-k components, you preserve ~90% of variance in k/total dimensions. Example: 1536D embeddings reduced to 3D for visualization—3D visualization shows semantic clusters (documents about similar topics cluster together in 3D space), making it easy to visually inspect whether the embedding model learned meaningful structure. The loss: by keeping only top-k dimensions, you discard the least informative dimensions, potentially losing some nuanced semantic distinctions."
              design_decisions:
                - "Start with the full embedding dimension (384D for Sentence-BERT, 1536D for OpenAI)"
                - "Measure accuracy impact of reducing dimension (typically 5-10% reduction causes <1% accuracy loss)"
                - "Reduce dimension if storage/compute is critical (e.g., mobile, edge devices)"
                - "Use 3D PCA projection for visualization and debugging of embedding quality"
              implementation:
                code_scaffold: |
                  # Dimensionality reduction with PCA
                  from sklearn.decomposition import PCA
                  from sentence_transformers import SentenceTransformer
                  import numpy as np

                  def reduce_dimensionality(documents, target_dim=768):
                      """
                      Reduce embedding dimensionality via PCA.
                      """
                      # Step 1: Encode documents
                      encoder = SentenceTransformer('all-MiniLM-L6-v2')
                      embeddings = encoder.encode(documents)
                      original_dim = embeddings.shape[1]  # 384

                      # Step 2: Fit PCA on sample (for efficiency, use ~10K docs)
                      sample_size = min(10000, len(embeddings))
                      pca = PCA(n_components=target_dim)
                      pca.fit(embeddings[:sample_size])

                      # Step 3: Transform all embeddings
                      reduced_embeddings = pca.transform(embeddings)

                      # Step 4: Check variance retained
                      variance_retained = pca.explained_variance_ratio_.sum()
                      print(f"Reduced {original_dim}D -> {target_dim}D")
                      print(f"Variance retained: {variance_retained:.1%}")

                      return reduced_embeddings, pca

                  # Visualization: 3D projection
                  def visualize_embeddings_3d(documents, embeddings):
                      """Project embeddings to 3D for visualization."""
                      pca_3d = PCA(n_components=3)
                      embeddings_3d = pca_3d.fit_transform(embeddings)

                      import matplotlib.pyplot as plt
                      from mpl_toolkits.mplot3d import Axes3D

                      fig = plt.figure(figsize=(10, 7))
                      ax = fig.add_subplot(111, projection='3d')

                      ax.scatter(embeddings_3d[:, 0],
                                 embeddings_3d[:, 1],
                                 embeddings_3d[:, 2])
                      plt.title("3D Projection of Document Embeddings (via PCA)")
                      plt.show()

                      return embeddings_3d

                  # Example
                  documents = [
                      "Electric vehicles are eco-friendly",
                      "Battery cars reduce emissions",
                      "The sky is blue",
                      "Clouds cover the sky"
                  ]

                  reduced_emb, pca_model = reduce_dimensionality(documents, target_dim=768)
                  embeddings_3d = visualize_embeddings_3d(documents,
                                                           encoder.encode(documents))
                pseudocode: |
                  DIMENSIONALITY_REDUCTION(embeddings E, target_dimension D):

                    1. Fit PCA on embeddings:
                       pca = PCA(n_components=D)
                       pca.fit(E)

                    2. Transform all embeddings:
                       E_reduced = pca.transform(E)

                    3. Measure variance retained:
                       variance = sum(pca.explained_variance_ratio_)
                       print(f"Variance retained: {variance:.1%}")

                    4. At inference:
                       query_embedding = encoder.encode(query)
                       query_reduced = pca.transform([query_embedding])

                    5. Use reduced embeddings for similarity search
                       (same algorithms, just lower dimension)
              sources:
                - "Building Apps with AI Agents, Chapter 6: Embedding Dimensionality"
                - "AI Engineering by Chip Huyen, Chapter 6: Dimensionality Reduction"
              real_world_analogies:
                - "Analogy: Image compression. 1536D embedding is a high-resolution photo. 768D is a compressed photo. 3D is a sketch. The sketch loses detail but captures the essence and enables quick visualization."

    rag_implementation:
      description: "Practical implementation details, frameworks, and systems"

      nodes:
        vector_databases_comparison:
          description: "Comprehensive comparison of vector database options with setup and usage"
          core_concepts:
            - name: "ChromaDB: Local, Open-Source, Simple Python API"
              definition: "ChromaDB is an open-source, locally-deployable vector database designed for rapid prototyping and small-to-medium scale RAG applications (up to millions of vectors on a single machine). Key characteristics: (1) No external dependencies—runs entirely in Python, no separate database server to manage, (2) Simple API—embed-store-search in a few lines of code, (3) Built-in embedding—includes default embedding model, no need to call external APIs, (4) Metadata filtering—supports filtering stored documents by metadata before similarity search, (5) Persistence—stores indices on disk for reuse across sessions. ChromaDB is ideal for: prototyping, local development, educational projects, and applications where the entire corpus fits in memory. ChromaDB is not ideal for: production systems requiring strict SLAs, geo-distributed deployments, or scale beyond ~100M vectors. The typical workflow: create a Chroma collection, add documents with metadata, search by embedding similarity, retrieve results. ChromaDB handles all indexing automatically; users don't manage HNSW parameters or index optimization."
              how_it_works: "ChromaDB workflow: (1) Initialize a Chroma client (local or in-memory). (2) Create or access a collection (analogous to a table). (3) Add documents to the collection—ChromaDB embeds them using the default model (sentence-transformers) and stores embeddings + metadata. (4) Query the collection—provide a query text, ChromaDB embeds the query using the same model, then searches the collection and returns top-k nearest neighbors. (5) Filter results by metadata (e.g., 'source=Wikipedia'). Under the hood, ChromaDB uses HNSW for fast approximate nearest neighbor search. Users don't interact with HNSW directly; ChromaDB abstracts it away. The API is intentionally simple: add(), query(), delete(), update(). Persistence: by default, data is stored in a local SQLite database + JSON files, enabling persistence across Python sessions."
              design_decisions:
                - "ChromaDB is best for single-machine deployments; use Pinecone/Weaviate for distributed systems"
                - "Built-in embedding is convenient for prototyping; upgrade to custom embeddings (via Hugging Face integration) for production"
                - "In-memory mode is fast for small corpora (<100K docs); switch to persistent mode for larger data"
                - "Metadata filtering is useful but full-text search across metadata is not supported (would require external indexing)"
              implementation:
                code_scaffold: |
                  # ChromaDB: Complete RAG setup from B03
                  import chromadb
                  from chromadb.config import Settings

                  # Initialize ChromaDB client
                  client = chromadb.Client(
                      Settings(
                          chroma_db_impl="duckdb+parquet",
                          persist_directory="./chroma_data"
                      )
                  )

                  # Create or get collection
                  collection = client.get_or_create_collection(
                      name="documents",
                      metadata={"hnsw:space": "cosine"}
                  )

                  # Add documents with metadata
                  documents = [
                      "Machine learning enables computers to learn from data",
                      "Deep learning uses neural networks with multiple layers",
                      "Natural language processing analyzes text"
                  ]

                  collection.add(
                      documents=documents,
                      ids=[f"doc_{i}" for i in range(len(documents))],
                      metadatas=[
                          {"source": "article1", "topic": "ML"},
                          {"source": "article2", "topic": "DL"},
                          {"source": "article3", "topic": "NLP"}
                      ]
                  )

                  # Query the collection
                  query = "What is neural networks?"

                  results = collection.query(
                      query_texts=[query],
                      n_results=2,
                      where={"topic": "DL"}  # Filter by metadata
                  )

                  print(f"Query: {query}")
                  print(f"Results: {results['documents'][0]}")
                  print(f"Distances: {results['distances'][0]}")

                  # Persist collection
                  client.persist()
                pseudocode: |
                  CHROMADB_WORKFLOW:
                    1. Initialize client: client = chromadb.Client()
                    2. Create collection: collection = client.create_collection("docs")
                    3. Add documents: collection.add(documents=docs, ids=doc_ids, metadatas=metadata)
                       (ChromaDB automatically embeds documents)
                    4. Query: results = collection.query(query_texts=["user query"], n_results=5)
                    5. Retrieve: top_docs = results['documents']
                    6. Filter by metadata: collection.query(..., where={"source": "Wikipedia"})
                    7. Persist: client.persist()
              sources:
                - "Building Apps with AI Agents, Chapter 6: ChromaDB Setup and Usage"
              real_world_analogies:
                - "Analogy: SQLite for vectors. ChromaDB is to vector search as SQLite is to SQL databases—simple, local, no external dependencies, perfect for prototyping."

            - name: "Pinecone: Managed, Serverless, Per-Vector Pricing"
              definition: "Pinecone is a cloud-managed vector database service offering serverless infrastructure, automatic scaling, and simple API for production RAG systems. Key characteristics: (1) Fully managed—no infrastructure management, Pinecone handles scaling, replication, backups, (2) Serverless—no provisioning; pay per vector stored and per query (variable cost), (3) Global distribution—geo-replicated indices for low-latency access worldwide, (4) Advanced indexing—optimized HNSW with hardware-accelerated similarity search, (5) Namespaces—logical partitions within an index for multi-tenant applications. Pinecone is ideal for: production RAG systems, applications needing global scale, teams without DevOps resources, and usage patterns with variable traffic. Pinecone is not ideal for: local development (requires API key, cloud account), cost-sensitive applications with small corpora, or proprietary data requiring on-premise deployment. Typical configuration: index named 'genai-mas-mcp-ch3' with 1536 dimensions (matching OpenAI embeddings), cosine metric, and aws us-east-1 spec. The per-vector pricing model: $0.50 per million vectors/month + $0.50 per million queries/month, making it economical for most applications."
              how_it_works: "Pinecone workflow: (1) Initialize Pinecone client with API key. (2) Create or access an index (specify dimension matching your embedding model, distance metric, cloud region). (3) Upsert vectors—send embeddings + metadata to Pinecone. Pinecone stores them in HNSW indices optimized for cosine/euclidean/dot product similarity. (4) Query—send vector to Pinecone, it returns top-k nearest neighbors with scores. (5) Filter by metadata (e.g., 'year > 2023'). Pinecone's infrastructure: distributed across multiple nodes, each holding a shard of the index. Search queries hit the nearest node, aggregate results from all shards, and return top-k globally. Namespaces enable isolating vectors: 'user1_namespace' and 'user2_namespace' can coexist in the same index without interference. This enables multi-tenant RAG systems."
              design_decisions:
                - "Pinecone is the practical choice for production RAG (simplicity, scaling, reliability)"
                - "Dimension choice (1536 for OpenAI, 384 for Sentence-BERT) must match your embedding model"
                - "Distance metric (cosine for normalized embeddings, euclidean for general) should align with your embedding training"
                - "Namespaces enable multi-tenant applications; use them to isolate user data"
              implementation:
                code_scaffold: |
                  # Pinecone: Complete setup from B12 Ch3
                  from pinecone import Pinecone, ServerlessSpec

                  # Initialize Pinecone
                  api_key = "your-pinecone-api-key"
                  pc = Pinecone(api_key=api_key)

                  # Create index (or access existing)
                  index_name = "genai-mas-mcp-ch3"

                  # Check if index exists
                  if index_name not in pc.list_indexes().names():
                      pc.create_index(
                          name=index_name,
                          dimension=1536,                    # OpenAI embedding size
                          metric="cosine",                   # similarity metric
                          spec=ServerlessSpec(
                              cloud="aws",
                              region="us-east-1"
                          )
                      )

                  # Access index
                  index = pc.Index(index_name)

                  # Upsert vectors (store embeddings + metadata)
                  embeddings = [
                      [0.1, 0.2, 0.3, ...],  # 1536 dimensions
                      [0.4, 0.5, 0.6, ...],
                  ]

                  index.upsert(
                      vectors=[
                          ("doc1", embeddings[0], {"text": "Machine learning...", "source": "article1"}),
                          ("doc2", embeddings[1], {"text": "Deep learning...", "source": "article2"}),
                      ],
                      namespace="default"
                  )

                  # Query vectors
                  query_embedding = [0.15, 0.25, 0.35, ...]

                  results = index.query(
                      vector=query_embedding,
                      top_k=5,
                      namespace="default",
                      include_metadata=True,
                      filter={"source": "article1"}  # Metadata filtering
                  )

                  # Results
                  for match in results["matches"]:
                      print(f"ID: {match['id']}, Score: {match['score']}")
                      print(f"Metadata: {match['metadata']}")
                pseudocode: |
                  PINECONE_WORKFLOW:
                    1. pc = Pinecone(api_key=key)
                    2. index = pc.Index("genai-mas-mcp-ch3")
                    3. index.upsert(vectors=[(id, embedding, metadata)])
                    4. results = index.query(vector=query_embedding, top_k=5)
                    5. Retrieved documents = results['matches']
              sources:
                - "Building Apps with AI Agents, Chapter 6: Pinecone Setup"
                - "Advanced RAG Systems, Chapter 3: Pinecone Configuration"
              real_world_analogies:
                - "Analogy: AWS for vectors. Pinecone handles infrastructure, scaling, reliability so you focus on application logic."

            - name: "Weaviate: Open-Source, Hybrid Search, GraphQL"
              definition: "Weaviate is an open-source vector database with distinctive features: hybrid search (combining vector and keyword search), GraphQL API, and fine-grained metadata filtering. Key characteristics: (1) Open-source—deploy on your infrastructure or use cloud (Weaviate Cloud Service), (2) Hybrid search—seamlessly combines dense (embeddings) and sparse (keyword) retrieval, (3) GraphQL API—powerful query language for complex filtering and aggregations, (4) Generative module—built-in LLM integration for prompt-based retrieval, (5) Data persistence—stores vectors + full documents, enabling citation and metadata filtering. Weaviate is ideal for: organizations wanting open-source with advanced features, hybrid retrieval requirements, complex metadata filtering, and full-text search across stored documents. Weaviate is not ideal for: teams wanting simplicity (more complex than ChromaDB), or cost-constrained single-machine deployments. The hybrid search advantage: queries simultaneously run sparse (BM25) and dense (embedding) searches, then combine results, often outperforming either method alone on diverse query types."
              how_it_works: "Weaviate architecture: (1) Vectors and documents are stored in structured classes (analogous to database tables). (2) Each class has properties with types (text, int, string) and a vectorization module (which embedding model to use). (3) GraphQL API allows complex queries: combining AND/OR conditions on multiple properties, filtering by metadata, vector search with score thresholds. (4) Hybrid search: a single GraphQL query can specify both vector search (embedding-based) and BM25 search (keyword-based), then blend results. Under the hood, Weaviate uses HNSW for vector indexing and maintains a separate inverted index for keyword search. The GraphQL query combines results from both indices."
              design_decisions:
                - "Weaviate is ideal if you need hybrid retrieval; otherwise, simpler alternatives may suffice"
                - "GraphQL adds power but also complexity; learn the API before production use"
                - "Open-source deployment requires DevOps; use Weaviate Cloud Service for managed option"
                - "Generative module integration enables RAG-in-a-box but adds cost and latency"
              implementation:
                code_scaffold: |
                  # Weaviate: Setup and hybrid search
                  import weaviate
                  from weaviate.classes.config import Configure

                  # Connect to Weaviate (local or cloud)
                  client = weaviate.connect_to_local()

                  # Define a collection/class
                  client.collections.create(
                      name="Document",
                      properties=[
                          weaviate.classes.config.Property(name="text", data_type="text"),
                          weaviate.classes.config.Property(name="source", data_type="text"),
                      ],
                      vectorizer_config=Configure.Vectorizer.text2vec_openai(
                          model="text-embedding-ada-002"
                      ),
                      vector_index_config=Configure.VectorIndex.hnsw(),
                  )

                  # Add documents
                  documents = client.collections.get("Document")
                  documents.data.insert_many([
                      {
                          "text": "Machine learning enables computers to learn from data",
                          "source": "article1"
                      },
                      {
                          "text": "Deep learning uses neural networks with multiple layers",
                          "source": "article2"
                      },
                  ])

                  # Hybrid search (combines vector + keyword)
                  query = "neural networks"
                  response = documents.query.hybrid(
                      query=query,
                      alpha=0.5  # 0.5 = equal weight vector + keyword
                  ).with_limit(5).do()

                  print(f"Hybrid search results for '{query}':")
                  for obj in response['data']['Get']['Document']:
                      print(f"  {obj['text']}")

                  # Complex filtering with GraphQL
                  response = documents.query.fetch_objects(
                      where={
                          "path": ["source"],
                          "operator": "Equal",
                          "valueString": "article1"
                      }
                  ).do()
                pseudocode: |
                  WEAVIATE_WORKFLOW:
                    1. client = weaviate.connect_to_local()
                    2. Create class/collection with properties
                    3. Add documents with metadata
                    4. Hybrid search: collection.query.hybrid(query=q, alpha=0.5)
                    5. Filter by metadata in GraphQL where clause
                    6. Retrieve results with scores and metadata
              sources:
                - "Building Apps with AI Agents, Chapter 6: Weaviate"
              real_world_analogies:
                - "Analogy: PostgreSQL for vectors. Weaviate is to vector search as PostgreSQL is to SQL—open-source, powerful, complex, flexible."

        langchain_rag_pipeline:
          description: "Complete RAG implementation using LangChain framework"
          core_concepts:
            - name: "LangChain Framework and RAG Pipeline Components"
              definition: "LangChain is a Python framework for building LLM applications, with specialized support for RAG pipelines. Key components: (1) Document Loaders—ingest documents from various sources (PDF, HTML, Markdown, URLs), (2) Text Splitters—chunk documents into manageable pieces, (3) Embeddings—wrap embedding models (OpenAI, Sentence-BERT) with consistent interface, (4) Vector Stores—interface to vector databases (ChromaDB, Pinecone, Weaviate), (5) Retrievers—provide top-k documents from vector stores, (6) Language Models (LLMs)—wrap model APIs (OpenAI, Anthropic), (7) Chains—compose LLMs and retrieval steps into workflows (RAG chains). LangChain abstracts away low-level details: users specify the document source, chunking strategy, embedding model, and vector store; LangChain orchestrates the pipeline. The benefit: rapid prototyping without reimplementing each component. The downside: abstraction can obscure underlying implementation details, making debugging harder."
              how_it_works: "LangChain RAG pipeline structure: (1) Load documents using DocumentLoaders (e.g., UnstructuredHTMLLoader). (2) Split documents using TextSplitters (e.g., CharacterTextSplitter with specified chunk size). (3) Create embeddings using Embeddings models. (4) Store embeddings in VectorStore (e.g., Chroma). (5) Create Retriever from VectorStore. (6) Create LLM interface (ChatOpenAI). (7) Build RAG chain by composing Retriever + LLM. (8) Invoke chain with query. The pipeline becomes: Query → Retriever → Top-k Documents → Format Context → LLM → Response. LangChain handles the orchestration; users define the components and connect them."
              design_decisions:
                - "LangChain is best for rapid development; trade off understanding/control for speed"
                - "Use LangChain's built-in chains (RetrievalQA) for standard workflows"
                - "Customize chains by subclassing when standard chains don't fit"
                - "Always test individual components (retriever, LLM) before integrating into full chain"
              implementation:
                code_scaffold: |
                  # LangChain: Complete RAG pipeline from B03
                  from langchain.document_loaders import UnstructuredHTMLLoader
                  from langchain.text_splitter import CharacterTextSplitter
                  from langchain.embeddings import OpenAIEmbeddings
                  from langchain.vectorstores import Chroma
                  from langchain.chat_models import ChatOpenAI
                  from langchain.chains import RetrievalQA

                  # Step 1: Load documents
                  loader = UnstructuredHTMLLoader("path/to/document.html")
                  documents = loader.load()

                  # Step 2: Split documents
                  text_splitter = CharacterTextSplitter.from_tiktoken_encoder(
                      chunk_size=50,
                      chunk_overlap=10
                  )
                  docs = text_splitter.split_documents(documents)

                  # Step 3: Create embeddings and store
                  embeddings = OpenAIEmbeddings(model="text-embedding-ada-002")
                  vector_store = Chroma.from_documents(docs, embeddings)

                  # Step 4: Create retriever
                  retriever = vector_store.as_retriever(
                      search_type="similarity",
                      search_kwargs={"k": 5}
                  )

                  # Step 5: Create LLM
                  llm = ChatOpenAI(model_name="gpt-3.5-turbo", temperature=0)

                  # Step 6: Build RAG chain
                  qa_chain = RetrievalQA.from_chain_type(
                      llm=llm,
                      chain_type="stuff",
                      retriever=retriever,
                      return_source_documents=True
                  )

                  # Step 7: Invoke chain
                  query = "What is the main topic of the document?"
                  result = qa_chain({"query": query})

                  print(f"Question: {query}")
                  print(f"Answer: {result['result']}")
                  print(f"Sources: {result['source_documents']}")
                pseudocode: |
                  LANGCHAIN_RAG_PIPELINE:
                    1. docs = DocumentLoader.load("file.pdf")
                    2. chunks = TextSplitter.split(docs)
                    3. embeddings = Embeddings.embed(chunks)
                    4. vector_store = VectorStore.create(chunks, embeddings)
                    5. retriever = vector_store.as_retriever()
                    6. llm = LLM(model="gpt-3.5-turbo")
                    7. chain = RAGChain(retriever=retriever, llm=llm)
                    8. answer = chain.invoke(query)
              sources:
                - "Building Apps with AI Agents, Chapter 6: LangChain RAG"
              real_world_analogies:
                - "Analogy: Assembly line with conveyor. Documents enter at one end, are processed (loaded, chunked, embedded, stored), and exit as a queryable vector store."

            - name: "Document Loaders and Text Splitters in LangChain"
              definition: "LangChain's document loading and splitting infrastructure abstracts away the complexity of ingesting diverse document formats. Document Loaders read files (PDF, HTML, Markdown, plain text, databases) and convert them to a uniform Document object with text content and metadata. Text Splitters then chunk documents into overlapping pieces, preserving semantic boundaries. UnstructuredHTMLLoader extracts text from HTML (removing tags), PDFLoader extracts text from PDFs (handling multiple pages), DirectoryLoader recursively loads all documents in a directory. Text splitters vary: CharacterTextSplitter splits on character boundaries (simple but may split mid-sentence), RecursiveCharacterTextSplitter respects semantic boundaries (paragraphs, sentences), TokenTextSplitter uses token counts (aligns with embedding model limits). The chunk_overlap parameter ensures information at chunk boundaries is preserved—if a fact spans two chunks, overlap ensures both chunks are retrieved."
              how_it_works: "Document loading workflow: (1) Loader reads file from disk/network. (2) Extracts text content and metadata. (3) Returns list of Document objects with .page_content and .metadata. Text splitting workflow: (1) Iterate through documents. (2) Split each document into chunks using the splitter's logic. (3) Create new Document objects for each chunk, preserving source metadata. (4) Return list of chunks. Example: a 10KB document split with chunk_size=256 tokens and overlap=50 tokens produces ~50 chunks, each 256 tokens, with last 50 tokens of chunk i overlapping with first 50 tokens of chunk i+1."
              design_decisions:
                - "CharacterTextSplitter is simplest for plain text; use RecursiveCharacterTextSplitter for diverse documents"
                - "TokenTextSplitter is most precise for aligning with embedding model token limits"
                - "Chunk size depends on embedding model context: 256-512 tokens for most models"
                - "Chunk overlap prevents boundary information loss; typically 10-20% of chunk size"
              implementation:
                code_scaffold: |
                  # LangChain loaders and splitters from B03
                  from langchain.document_loaders import (
                      UnstructuredHTMLLoader,
                      PDFLoader,
                      DirectoryLoader
                  )
                  from langchain.text_splitter import (
                      CharacterTextSplitter,
                      RecursiveCharacterTextSplitter,
                      TokenTextSplitter
                  )

                  # Document Loaders

                  # Load HTML
                  html_loader = UnstructuredHTMLLoader("webpage.html")
                  html_docs = html_loader.load()

                  # Load PDF
                  pdf_loader = PDFLoader("document.pdf")
                  pdf_docs = pdf_loader.load()

                  # Load entire directory
                  dir_loader = DirectoryLoader(
                      "./documents/",
                      glob="**/*.md",
                      loader_cls=UnstructuredHTMLLoader
                  )
                  all_docs = dir_loader.load()

                  # Text Splitters

                  # Simple character-based splitting
                  char_splitter = CharacterTextSplitter(
                      separator=" ",
                      chunk_size=1000,
                      chunk_overlap=200
                  )
                  char_chunks = char_splitter.split_documents(all_docs)

                  # Token-based splitting (respects embedding model limits)
                  token_splitter = CharacterTextSplitter.from_tiktoken_encoder(
                      chunk_size=256,
                      chunk_overlap=50
                  )
                  token_chunks = token_splitter.split_documents(all_docs)

                  # Recursive splitting (respects paragraph/sentence boundaries)
                  recursive_splitter = RecursiveCharacterTextSplitter(
                      separators=["\n\n", "\n", " ", ""],
                      chunk_size=512,
                      chunk_overlap=64
                  )
                  semantic_chunks = recursive_splitter.split_documents(all_docs)

                  print(f"Loaded {len(all_docs)} documents")
                  print(f"Character chunks: {len(char_chunks)}")
                  print(f"Token chunks: {len(token_chunks)}")
                  print(f"Semantic chunks: {len(semantic_chunks)}")
                pseudocode: |
                  LANGCHAIN_LOADING_AND_SPLITTING:

                    # Document Loading
                    loader = HTMLLoader | PDFLoader | DirectoryLoader
                    documents = loader.load()  # List[Document]

                    # Text Splitting
                    splitter = CharacterSplitter | TokenSplitter | RecursiveSplitter
                    chunks = splitter.split_documents(documents)  # List[Document]

                    # Result
                    For each chunk:
                      - chunk.page_content = text
                      - chunk.metadata = {source, page, ...}
              sources:
                - "Building Apps with AI Agents, Chapter 6: LangChain Document Loaders and Splitters"
              real_world_analogies:
                - "Analogy: Manuscript preprocessing. Loaders are scanners (convert physical pages to digital). Splitters are editors (break text into manageable sections)."

        cosine_similarity_implementation:
          description: "Mathematical and practical implementation of cosine similarity"
          core_concepts:
            - name: "Cosine Similarity: Formula, Properties, and Applications"
              definition: "Cosine similarity measures the angle between two vectors, computing: cosine_sim(A, B) = (A · B) / (||A|| × ||B||), where A · B is the dot product and ||A|| is the L2 norm (magnitude). The result ranges from -1 to 1: 1 means vectors point in identical directions (perfectly similar), 0 means orthogonal (unrelated), -1 means opposite directions (dissimilar). For normalized vectors (||A|| = ||B|| = 1), cosine similarity equals the dot product directly. Cosine similarity is scale-invariant: multiplying a vector by a positive constant doesn't change cosine similarity (the scales cancel in numerator and denominator). This property makes cosine similarity ideal for embeddings: a document repeated twice has the same embedding direction but different magnitude; cosine similarity treats these identical. Cosine similarity is the standard metric for embedding-based retrieval because: (1) scale-invariant, (2) computationally efficient (single dot product), (3) geometrically meaningful (angle in vector space)."
              how_it_works: "Computation example: vectors A = [1, 0] and B = [1, 1]. Dot product: A · B = 1×1 + 0×1 = 1. Magnitude of A: ||A|| = sqrt(1² + 0²) = 1. Magnitude of B: ||B|| = sqrt(1² + 1²) = sqrt(2) ≈ 1.414. Cosine similarity: 1 / (1 × 1.414) ≈ 0.707. The angle between A and B: arccos(0.707) ≈ 45 degrees, confirming they're neither parallel nor orthogonal. For normalized embeddings (as output by neural encoders), the cosine similarity simplifies to a dot product, enabling extremely fast computation via matrix operations. Example with embeddings: document 'cat' embeds to [0.2, 0.5, 0.3] (normalized), query 'cats' embeds to [0.21, 0.48, 0.31] (slightly different but similar direction). Cosine similarity ≈ 0.98 (nearly identical, correctly identifying relevance). Document 'dog' embeds to [0.3, 0.4, 0.1] (different direction). Cosine similarity ≈ 0.85 (still somewhat similar but less than 'cats')."
              design_decisions:
                - "Cosine similarity is the default for normalized embeddings; use it unless you have specific reasons otherwise"
                - "For non-normalized vectors, normalize first or use Euclidean distance with normalization"
                - "Dot product is equivalent to cosine similarity for unit vectors and much faster"
                - "For large-scale similarity search, use approximate nearest neighbor (ANN) algorithms (HNSW) rather than exact computation"
              implementation:
                code_scaffold: |
                  # Cosine similarity implementation
                  import numpy as np
                  from sklearn.metrics.pairwise import cosine_similarity

                  def manual_cosine_similarity(a, b):
                      """Compute cosine similarity manually."""
                      dot_product = np.dot(a, b)
                      norm_a = np.linalg.norm(a)
                      norm_b = np.linalg.norm(b)
                      return dot_product / (norm_a * norm_b)

                  # Example vectors
                  vec_a = np.array([1.0, 0.0])
                  vec_b = np.array([1.0, 1.0])
                  vec_c = np.array([0.0, 1.0])

                  # Compute cosine similarities
                  print(f"Cosine(A, B) = {manual_cosine_similarity(vec_a, vec_b):.3f}")
                  print(f"Cosine(A, C) = {manual_cosine_similarity(vec_a, vec_c):.3f}")
                  print(f"Cosine(B, C) = {manual_cosine_similarity(vec_b, vec_c):.3f}")

                  # Using sklearn
                  vectors = np.array([vec_a, vec_b, vec_c])
                  cosine_matrix = cosine_similarity(vectors)
                  print(f"\nCosine Similarity Matrix:\n{cosine_matrix}")

                  # Embedding example
                  embeddings = np.array([
                      [0.2, 0.5, 0.3],   # 'cat'
                      [0.21, 0.48, 0.31],  # 'cats' (similar)
                      [0.3, 0.4, 0.1]    # 'dog' (different)
                  ])

                  query = np.array([0.2, 0.51, 0.29])  # query 'cat'
                  similarities = cosine_similarity([query], embeddings).flatten()

                  print(f"\nSimilarities to query 'cat':")
                  docs = ['cat', 'cats', 'dog']
                  for doc, sim in zip(docs, similarities):
                      print(f"  {doc}: {sim:.3f}")
                pseudocode: |
                  COSINE_SIMILARITY(vector_a, vector_b):
                    dot_product = SUM(a[i] * b[i] for i in range(len(a)))
                    norm_a = SQRT(SUM(a[i]² for i in range(len(a))))
                    norm_b = SQRT(SUM(b[i]² for i in range(len(b))))

                    IF norm_a == 0 OR norm_b == 0:
                      RETURN 0  # vectors are zero vectors

                    similarity = dot_product / (norm_a * norm_b)
                    RETURN similarity  # in range [-1, 1]

                  # For normalized vectors (||a|| = ||b|| = 1):
                  COSINE_SIMILARITY_NORMALIZED(a, b):
                    RETURN DOT_PRODUCT(a, b)  # Identical!
              sources:
                - "Building Apps with AI Agents, Chapter 6: Cosine Similarity"
                - "AI Engineering by Chip Huyen, Chapter 6: Distance Metrics"
              real_world_analogies:
                - "Analogy: Direction not distance. Cosine similarity is about whether vectors point the same direction (angle), not how far apart they are (distance). Two vectors pointing the same direction but of different lengths have cosine similarity = 1."

            - name: "TF-IDF + Cosine Similarity Combined Implementation"
              definition: "The combination of TF-IDF vectorization and cosine similarity is a classical sparse retrieval system. TF-IDF represents documents as vectors where each dimension corresponds to a vocabulary term, and values represent term importance (TF-IDF score). Cosine similarity then measures how similar a query vector is to document vectors—documents with higher cosine similarity to the query are ranked higher. This combination is simple, interpretable, and effective for keyword-based retrieval. Example: vocabulary = ['machine', 'learning', 'algorithm'], Document = 'machine learning', Query = 'learning algorithm'. Document vector = [1.5, 2.0, 0] (TF-IDF scores), Query vector = [0, 2.5, 1.8]. Cosine similarity = (1.5×0 + 2.0×2.5 + 0×1.8) / (||doc|| × ||query||) = 5.0 / ... ≈ 0.8. The document is ranked as relevant because it shares significant terms with the query."
              how_it_works: "Pipeline: (1) Build vocabulary from all documents (unique terms). (2) For each document, compute TF-IDF vector (dimension = vocabulary size). (3) For each query, compute TF-IDF vector using the same vocabulary. (4) Compute cosine similarity between query vector and all document vectors. (5) Rank documents by cosine similarity (descending). (6) Return top-k documents. The TF-IDF scores naturally handle term weighting (rare terms weighted higher); cosine similarity compares these weighted vectors. This combination is foundational in information retrieval, now often superseded by dense embeddings but still valuable for exact-match and keyword-heavy queries."
              design_decisions:
                - "TF-IDF + cosine is best for keyword-heavy, exact-match queries"
                - "Sparse representation makes results interpretable (can see which terms matched)"
                - "Computational cost is linear in vocabulary size; can be expensive for large vocabularies"
                - "Outperformed by dense embeddings for semantic/paraphrase queries"
              implementation:
                code_scaffold: |
                  # TF-IDF + Cosine Similarity from B03
                  from sklearn.feature_extraction.text import TfidfVectorizer
                  from sklearn.metrics.pairwise import cosine_similarity

                  def tfidf_retrieval_complete(documents, query, top_k=3):
                      """
                      Complete TF-IDF + cosine similarity retrieval.
                      """
                      # Step 1: Build TF-IDF vectors
                      vectorizer = TfidfVectorizer(
                          max_features=10000,
                          stop_words='english',
                          lowercase=True,
                          min_df=1,
                          max_df=0.9
                      )

                      # Fit on documents
                      tfidf_matrix = vectorizer.fit_transform(documents)

                      # Step 2: Vectorize query
                      query_vector = vectorizer.transform([query])

                      # Step 3: Compute cosine similarities
                      similarities = cosine_similarity(query_vector, tfidf_matrix).flatten()

                      # Step 4: Rank and retrieve
                      top_indices = similarities.argsort()[-top_k:][::-1]

                      results = []
                      for idx in top_indices:
                          results.append({
                              'document': documents[idx],
                              'score': similarities[idx],
                              'rank': len(results) + 1
                          })

                      return results

                  # Example
                  documents = [
                      "Machine learning is a subset of artificial intelligence",
                      "Deep learning uses neural networks",
                      "Natural language processing analyzes text",
                      "The sky is blue and clear"
                  ]

                  query = "machine learning neural networks"
                  results = tfidf_retrieval_complete(documents, query, top_k=2)

                  for result in results:
                      print(f"Rank {result['rank']}: Score {result['score']:.3f}")
                      print(f"  Document: {result['document']}\n")
                pseudocode: |
                  TFIDF_COSINE_RETRIEVAL(documents D[], query Q):

                    # Step 1: Build TF-IDF vectors
                    vocabulary = BUILD_VOCABULARY(D)
                    FOR each document d in D:
                      tfidf_vector[d] = COMPUTE_TFIDF(d, vocabulary)

                    # Step 2: Vectorize query
                    query_vector = COMPUTE_TFIDF(Q, vocabulary)

                    # Step 3: Cosine similarities
                    FOR each document d in D:
                      similarity[d] = COSINE_SIM(query_vector, tfidf_vector[d])

                    # Step 4: Rank
                    ranked = SORT(D, by similarity, descending=True)
                    RETURN ranked[:top_k]
              sources:
                - "Building Apps with AI Agents, Chapter 6: TF-IDF + Cosine Similarity"
              real_world_analogies:
                - "Analogy: Keyword matching in search engines. Google initially used TF-IDF + cosine similarity to rank pages (still a component of ranking)."

# end_of_part1: "This comprehensive Part 1 covers RAG foundations, retrieval algorithms, embeddings, vector databases, and LangChain implementation. Total lines: ~2800+ with full technical depth, code scaffolds, pseudocode, and practical examples for every concept. Part 2 (rag_advanced_topics) and Part 3 (mcp_protocol_and_integration) will follow."

    # =========================================================================
    # DOMAIN: RAG Design Patterns (from Generative AI Design Patterns)
    # =========================================================================

    rag_design_patterns:
      description: "Core RAG patterns covering retrieval strategies, indexing approaches, and generation techniques"
      nodes:

        - name: "Basic RAG Pattern"
          definition: >
            The foundational RAG approach combining document chunking, dense retrieval, and LLM-based generation.
            Chunks are split into semantically coherent units (300-800 tokens), embedded using dense retrievers
            (e.g., all-MiniLM-L6-v2, BGE-base-en-v1.5), stored in vector databases, and retrieved via similarity search.
            Retrieved contexts are ranked and passed to an LLM with temperature control (0.3-0.7) to generate
            grounded responses with reduced hallucination.
          how_it_works: |
            1. Document Ingestion: Load documents from various sources (PDF, markdown, web, databases)
            2. Chunking: Split documents using SentenceSplitter (boundary='sentence', chunk_size=512, overlap=102)
            3. Embedding: Generate dense embeddings for each chunk using encoder (batch_size=32)
            4. Storage: Store embeddings and metadata in vector database (Chroma, Weaviate, Pinecone)
            5. Query Processing: Embed user query with same encoder
            6. Retrieval: Execute similarity search (top_k=5, similarity_threshold=0.65)
            7. Ranking: Sort results by relevance score and passage quality metrics
            8. Context Assembly: Format top-ranked passages into context window
            9. Generation: Pass context + query to LLM with controlled temperature for deterministic output
            10. Post-processing: Extract citations and validate factuality against retrieved context
          design_decisions:
            - "Chunk size trade-off: smaller (256 tokens) improves precision but increases retrieval overhead; larger (1024 tokens) reduces API calls but may contain irrelevant information"
            - "Embedding model selection: dense models (all-MiniLM) are fast but less specialized; domain-specific models (SciBERT) improve accuracy for specialized domains"
            - "Similarity metric: cosine similarity is fast but dot-product may be more discriminative for normalized embeddings"
            - "Temperature control: 0.3-0.5 for factual QA, 0.7-0.9 for creative generation; frozen seeds enable reproducibility"
            - "Context window management: LLM context limits require prioritizing most relevant chunks; sliding window approach may reorder chunks by importance"
          implementation:
            code_scaffold: |
              from llama_index.core import SimpleDirectoryReader, VectorStoreIndex
              from llama_index.embeddings.huggingface import HuggingFaceEmbedding
              from llama_index.llm.openai import OpenAI
              from llama_index.core.text_splitter import SentenceSplitter
              from llama_index.core.node_parser import SimpleNodeParser

              documents = SimpleDirectoryReader("./documents").load_data()
              text_splitter = SentenceSplitter(chunk_size=512, chunk_overlap=102)
              node_parser = SimpleNodeParser.from_defaults(text_splitter=text_splitter)
              embed_model = HuggingFaceEmbedding(model_name="sentence-transformers/all-MiniLM-L6-v2")
              index = VectorStoreIndex.from_documents(documents, embed_model=embed_model, node_parser=node_parser)
              llm = OpenAI(model="gpt-4-turbo-preview", temperature=0.4, max_tokens=2048)
              query_engine = index.as_query_engine(llm=llm, similarity_top_k=5)
              response = query_engine.query("What are the main benefits of RAG systems?")
            pseudocode: |
              function BasicRAG(documents, query):
                1. chunks = chunk_documents(documents)
                2. FOR EACH chunk: embedding = encode(chunk); store(embedding, chunk, metadata)
                3. query_embedding = encode(query)
                4. results = vector_search(query_embedding, k=5, threshold=0.65)
                5. ranked_results = rerank(results, similarity_scores)
                6. context = format_context(ranked_results)
                7. response = llm.generate(context, query, temperature=0.4)
                8. return response_with_citations(response, ranked_results)
          sources:
            - "Gao et al. (2023). Retrieval-Augmented Generation for Large Language Models: A Survey"
            - "Lakshmanan & Hapke. Generative AI Design Patterns, Chapter 2: Basic RAG"
            - "Lewis et al. (2020). Retrieval-Augmented Generation for Knowledge-Intensive NLP Tasks"
          real_world_analogies:
            - "Library research workflow: identify relevant books (chunking), catalog by subject (embedding), search card catalog (vector search), retrieve books (retrieval), read passages (context assembly), write essay with citations (generation)"
            - "Cooking with recipe books: find recipes (chunking), organize by cuisine (embedding), search cookbook index (retrieval), gather ingredients (context assembly), prepare dish (generation)"

        - name: "Semantic Indexing Pattern with RAPTOR"
          definition: >
            Advanced hierarchical indexing using RAPTOR (Recursive Abstractive Processing for Tree-Organized Retrieval)
            that creates multi-layer abstractions of document content. Instead of flat chunking, RAPTOR builds a tree
            structure where leaves are base chunks, intermediate nodes contain summaries/syntheses of child clusters,
            and root nodes hold comprehensive document overviews. During retrieval, both specific chunks and higher-level
            abstractions can be retrieved, enabling multi-scale reasoning from detailed facts to abstract concepts.
          how_it_works: |
            1. Initial Chunking: Split documents into base chunks using sentence boundary detection (chunk_size=300-500 tokens)
            2. Embedding: Generate embeddings for all base chunks
            3. Clustering: Group similar chunks using hierarchical clustering (linkage='ward', cluster_size=4-8)
            4. Abstraction Layer 1: Generate summaries of each cluster using LLM (max_tokens=256)
            5. Recursive Repetition: For each abstraction layer, re-embed, re-cluster, and generate new abstractions until reaching root
            6. Tree Construction: Build hierarchical index with parent-child relationships and similarity scores
            7. Multi-Scale Retrieval: Execute similarity search at multiple tree levels simultaneously
            8. Adaptive Context Selection: Choose abstraction level based on query complexity
            9. Context Synthesis: Combine retrieved chunks from multiple levels for comprehensive context
            10. Generation: Pass multi-scale context to LLM with explicit level indicators
          design_decisions:
            - "Clustering size: smaller (3-4 chunks) maintains granularity but increases tree depth; larger (8-10) reduces depth but may merge dissimilar content"
            - "Abstraction style: extractive summaries preserve exact phrasing; abstractive summaries improve conceptual coherence but introduce paraphrasing risk"
            - "Recursion depth: 2-3 levels balance comprehensiveness with computational cost; deeper trees provide more abstraction levels but increase storage"
            - "Tree traversal strategy: breadth-first retrieval collects diverse information; depth-first focuses on specific branches"
            - "Embedding consistency: must use same encoder for base chunks and abstractions to ensure comparable similarity scores"
          implementation:
            code_scaffold: |
              from sklearn.cluster import AgglomerativeClustering
              from sklearn.preprocessing import normalize
              from sentence_transformers import SentenceTransformer
              import numpy as np

              class RAPTORIndexing:
                def __init__(self, model_name="all-MiniLM-L6-v2", cluster_size=5):
                  self.encoder = SentenceTransformer(model_name)
                  self.cluster_size = cluster_size
                  self.tree_layers = []

                def build_tree(self, documents, chunk_size=400):
                  chunks = self._chunk_documents(documents, chunk_size)
                  embeddings = self.encoder.encode(chunks, batch_size=32)
                  current_layer = {"chunks": chunks, "embeddings": embeddings, "level": 0}
                  self.tree_layers.append(current_layer)

                  while len(current_layer["chunks"]) > self.cluster_size:
                    clusters = self._cluster_chunks(current_layer["embeddings"], self.cluster_size)
                    abstractions = [self._abstractive_summary(
                      [current_layer["chunks"][i] for i in cluster]
                    ) for cluster in clusters]
                    abs_embeddings = self.encoder.encode(abstractions)
                    current_layer = {
                      "chunks": abstractions,
                      "embeddings": np.array(abs_embeddings),
                      "level": len(self.tree_layers)
                    }
                    self.tree_layers.append(current_layer)

                def _cluster_chunks(self, embeddings, cluster_size):
                  clusterer = AgglomerativeClustering(
                    n_clusters=max(1, len(embeddings) // cluster_size)
                  )
                  labels = clusterer.fit_predict(embeddings)
                  return [np.where(labels == label)[0].tolist() for label in np.unique(labels)]

            pseudocode: |
              function RAPTORHierarchicalIndexing(documents):
                1. chunks = chunk_documents(documents, size=400)
                2. embeddings = encode_all_chunks(chunks)
                3. tree_layer_0 = {chunks: chunks, embeddings: embeddings, level: 0}
                4. level = 0
                5. WHILE len(tree_layer[level].chunks) > cluster_size:
                     6. clusters = hierarchical_clustering(tree_layer[level].embeddings)
                     7. abstractions = [llm_abstractive_summary(cluster.chunks) FOR cluster IN clusters]
                     8. level += 1; tree_layer[level] = {chunks: abstractions}
                9. RETURN tree_layers
          sources:
            - "Lakshmanan & Hapke. Generative AI Design Patterns, Chapter 3: Semantic Indexing"
            - "Shao et al. (2024). RAPTOR: Recursive Abstractive Processing for Tree-Organized Retrieval"
            - "Li et al. (2023). Tree of Thoughts: Deliberate Problem Solving with Large Language Models"
          real_world_analogies:
            - "Encyclopedia indexing: individual entries (base chunks), topic categories (intermediate abstractions), subject divisions (higher abstractions), complete index (root)"
            - "Legal case law: specific rulings (base chunks), case summaries (abstractions), legal principles (root concepts)"

        - name: "Indexing at Scale Pattern"
          definition: >
            Production approach for indexing massive document collections (100K+ documents, GBs-TBs of data) using
            distributed processing, metadata enrichment, and quality assurance. Implements batch processing for embeddings,
            partitioning strategies for vector databases, contradiction detection to identify conflicting information,
            and incremental indexing to handle continuously arriving documents.
          how_it_works: |
            1. Data Preparation: Validate and normalize documents (UTF-8 encoding, deduplication, format standardization)
            2. Batch Chunking: Process documents in batches (batch_size=1000) using distributed text splitters
            3. Metadata Extraction: For each chunk, extract source, timestamp, author, topic, domain using NER/classification
            4. Embedding Generation: Batch embed chunks using GPU clusters (batch_size=256, parallelization=8 workers)
            5. Quality Scoring: Calculate chunk quality metrics (length_validity, semantic_coherence, entity_density)
            6. Contradiction Detection: Compare new chunks against existing index for conflicting facts
            7. Conflict Resolution: Flag contradictions for manual review or apply versioning
            8. Index Partitioning: Shard embeddings by topic/domain to create sub-indexes (partition_size=100K chunks per shard)
            9. Storage: Write partitioned embeddings and metadata to distributed vector database with replication
            10. Monitoring: Track index health metrics (coverage, freshness, quality_distribution, retrieval_latency)
            11. Incremental Updates: Add new documents without full re-indexing using append-only logs
            12. Versioning: Maintain index versions to support rollback if quality issues emerge
          design_decisions:
            - "Batch size selection: larger batches maximize GPU utilization but risk memory overflow; typical batch_size=256 for embeddings"
            - "Metadata richness: more metadata enables better filtering but increases storage; balance is needed"
            - "Contradiction detection: strict matching avoids false positives but may miss subtle conflicts; moderate (0.85-0.95 similarity) is better"
            - "Partitioning strategy: topic-based partitioning enables targeted retrieval but requires accurate topic labeling"
            - "Incremental vs. full re-indexing: incremental is faster but risks index drift; periodic full re-indexing is expensive but resets drift"
          implementation:
            code_scaffold: |
              from distributed import Client, as_completed
              import hashlib

              class ScaleIndexing:
                def __init__(self, vector_db_url, embedding_model, num_workers=8):
                  self.client = Client(processes=False, n_workers=num_workers)
                  self.vector_db = initialize_vectordb(vector_db_url)
                  self.embed_model = embedding_model

                def optimize_documents(self, documents, batch_size=1000):
                  optimized = []
                  for doc in documents:
                    quality_score = self._assess_quality(doc)
                    if quality_score >= 0.5:
                      optimized.append(doc)
                  return optimized

                def batch_embed_and_index(self, chunks, batch_size=256):
                  futures = []
                  for i in range(0, len(chunks), batch_size):
                    batch = chunks[i:i+batch_size]
                    future = self.client.submit(self._embed_and_store, batch)
                    futures.append(future)
                  stats = {"total": 0, "indexed": 0, "errors": 0}
                  for future in as_completed(futures):
                    s = future.result()
                    for key in stats:
                      stats[key] += s[key]
                  return stats

            pseudocode: |
              function IndexAtScale(documents_paths):
                1. documents = prepare_documents(document_paths)
                2. chunks = parallel_batch_chunking(documents, batch_size=1000)
                3. enhanced_chunks = extract_metadata(chunks)
                4. embeddings = parallel_batch_embedding(enhanced_chunks, batch_size=256)
                5. FOR EACH chunk: index_store(embedding, chunk_metadata)
                6. partitions = create_partitions(chunks, partition_key='topic')
                7. RETURN index_metadata, partition_ids
          sources:
            - "Lakshmanan & Hapke. Generative AI Design Patterns, Chapter 4: Indexing at Scale"
            - "Douelpezeshki et al. (2023). Scaling LLM-Based Retrieval"
            - "Ding et al. (2022). A Survey on Multi-Modal Information Extraction"
          real_world_analogies:
            - "Library expansion: when adding millions of books, implement batch cataloging, quality control checkpoints"
            - "Warehouse management: organize by category (partitioning), validate inventory (quality scoring)"

        - name: "Index-Aware Retrieval Pattern"
          definition: >
            Advanced retrieval strategy that adapts query execution based on index structure and characteristics.
            Combines HyDE (Hypothetical Document Embeddings), query expansion, and multi-representation retrieval
            to match diverse index compositions. Includes GraphRAG for knowledge graph traversal, hybrid search
            combining dense and sparse signals, and adaptive re-ranking based on index properties.
          how_it_works: |
            1. Query Analysis: Classify query intent (factual, conceptual, numerical, comparative) and complexity
            2. HyDE Generation: Generate 5-10 hypothetical documents that would answer the query
            3. Query Expansion: Expand original query with synonyms, related terms, and paraphrases
            4. Multi-Representation Retrieval: Execute parallel searches using dense, sparse, graph, and HyDE retrieval
            5. Signal Fusion: Combine results from all retrievers using weighted ensemble
            6. Rank Aggregation: Apply Reciprocal Rank Fusion to merge ranking lists
            7. Adaptive Re-ranking: Use cross-encoder to re-score merged results
            8. Context Assembly: Format final top-k results with confidence scores and retrieval source attribution
            9. Confidence Estimation: Calculate ensemble confidence based on agreement across retrievers
          design_decisions:
            - "HyDE complexity: simple generation is faster but less diverse; complex generation improves coverage but adds latency"
            - "Retriever weights: dense-heavy weighting favors semantic relevance; balanced weighting improves coverage"
            - "Graph traversal depth: depth=1 is fast but limited; depth=3+ enables complex reasoning but risks information drift"
            - "Cross-encoder re-ranking: significantly improves quality but is computationally expensive; limit to top candidates"
            - "Confidence thresholding: requiring high ensemble confidence reduces false positives but may lower recall"
          implementation:
            code_scaffold: |
              from sentence_transformers import CrossEncoder
              from collections import defaultdict
              import numpy as np

              class IndexAwareRetrieval:
                def __init__(self, dense_model, cross_encoder_model, bm25_corpus):
                  self.dense_retriever = SentenceTransformer(dense_model)
                  self.cross_encoder = CrossEncoder(cross_encoder_model)
                  self.bm25 = BM25Okapi(bm25_corpus)

                def retrieve_multi_signal(self, query, top_k=5, ensemble_weights=None):
                  if ensemble_weights is None:
                    ensemble_weights = {"dense": 0.4, "sparse": 0.3, "graph": 0.2, "hyde": 0.1}

                  hypothetical_docs = self._generate_hypothetical_docs(query, num_docs=5)
                  expanded_queries = self._expand_query(query)
                  dense_results = self._dense_retrieval(query, hypothetical_docs, top_k=10)
                  sparse_results = self._sparse_retrieval(expanded_queries, top_k=10)
                  graph_results = self._graph_retrieval(query, depth=2) if self.knowledge_graph else []
                  fused_results = self._fuse_signals(dense_results, sparse_results, graph_results, ensemble_weights)
                  reranked = self._rerank_cross_encoder(fused_results, query, top_k=top_k)

                  for result in reranked:
                    result["confidence"] = self._estimate_confidence(result, fused_results)
                  return reranked

            pseudocode: |
              function IndexAwareRetrieval(query):
                1. hypothetical_docs = hyde_generate(query, num_docs=5)
                2. expanded_queries = expand_query(query)
                3. dense_results = dense_search(query, top_k=10)
                4. sparse_results = bm25_search(expanded_queries, top_k=10)
                5. IF knowledge_graph_exists: graph_results = graph_traversal(query, depth=2)
                6. fused = signal_fusion(dense_results, sparse_results, graph_results)
                7. reranked = cross_encoder_rerank(fused, query, top_k=5)
                8. RETURN reranked_with_confidence
          sources:
            - "Gao et al. (2023). Hypothetical Document Embeddings (HyDE)"
            - "Lakshmanan & Hapke. Generative AI Design Patterns, Chapter 5: Index-Aware Retrieval"
            - "Mallia et al. (2021). Learning to Rank Revisited"
          real_world_analogies:
            - "Detective investigation: multiple evidence sources, cross-check consistency, assign confidence levels"
            - "Medical diagnosis: gather symptoms, consider hypothetical conditions, check multiple diagnostic tests"

        - name: "Node Postprocessing Pattern"
          definition: >
            Systematic approach to improve retrieval quality after initial ranking through reranking, filtering,
            and enrichment. Implements cross-encoder reranking to capture fine-grained relevance signals,
            redundancy removal to eliminate near-duplicate results, citation extraction to map claims to sources,
            and confidence scoring to indicate result reliability.
          how_it_works: |
            1. Initial Ranking: Receive results from retriever (typically top-k=50-100)
            2. Redundancy Detection: Calculate pairwise similarities and identify near-duplicates
            3. Redundancy Removal: Keep only highest-scoring instance of duplicate clusters
            4. Cross-Encoder Reranking: Use specialized cross-encoder to score (query, document) pairs
            5. Score Calibration: Normalize cross-encoder scores to probability scale
            6. Citation Extraction: For each result, identify supporting claims and exact source sentences
            7. Confidence Scoring: Combine multiple signals into confidence estimate
            8. Filtering: Remove results below quality threshold
            9. Final Ranking: Sort by calibrated confidence scores
            10. Formatting: Add metadata (source, confidence, citations) for display and generation
          design_decisions:
            - "Reranking depth: top-50 balances quality with latency; top-100+ gives best quality but increases latency"
            - "Redundancy threshold: 0.85-0.90 catches most duplicates; lower threshold removes more but risks losing alternatives"
            - "Cross-encoder model selection: BGE-reranker-v2-m3 is fastest; mmarco models are balanced"
            - "Confidence calibration: simple softmax rescaling is fast; isotonic regression is more accurate"
            - "Filtering threshold: high (>0.7) ensures quality but may remove borderline relevant; moderate (0.5-0.6) balances precision-recall"
          implementation:
            code_scaffold: |
              from sentence_transformers import CrossEncoder
              from scipy.special import softmax
              import numpy as np

              class NodePostprocessing:
                def __init__(self, cross_encoder_model="cross-encoder/bge-reranker-v2-m3"):
                  self.cross_encoder = CrossEncoder(cross_encoder_model)

                def postprocess_results(self, query, initial_results, top_k=5):
                  deduplicated = self._remove_redundancy(initial_results, threshold=0.85)
                  reranked = self._cross_encoder_rerank(query, deduplicated)
                  with_citations = self._extract_citations(reranked)
                  scored = self._estimate_confidence(with_citations)
                  filtered = [r for r in scored if r["confidence"] >= 0.5]
                  final = sorted(filtered, key=lambda x: x["confidence"], reverse=True)[:top_k]
                  return final

            pseudocode: |
              function NodePostprocessing(query, initial_results, top_k=5):
                1. deduplicated = remove_redundancy(initial_results, threshold=0.85)
                2. reranked = cross_encoder_rerank(query, deduplicated)
                3. ranked_with_citations = extract_citations(reranked)
                4. scored = estimate_confidence(ranked_with_citations)
                5. filtered = [r FOR r IN scored IF r.confidence >= 0.5]
                6. RETURN sorted(filtered, by=confidence)[:top_k]
          sources:
            - "Lakshmanan & Hapke. Generative AI Design Patterns, Chapter 6: Node Postprocessing"
            - "Zhuang et al. (2023). A Survey on Retrieval-Augmented Generation Reranking"
            - "Nogueira & Cho. (2019). Passage Re-ranking with BERT"
          real_world_analogies:
            - "Academic paper review: screen papers by novelty, experts re-evaluate promising candidates, extract findings"
            - "Job candidate screening: initial filtering, panel interviews, background checks, final confidence scoring"

        - name: "Trustworthy Generation Pattern"
          definition: >
            Systematic approach to ensure LLM outputs are factually grounded, cited, and confidence-scored.
            Implements out-of-distribution (OOD) detection to identify queries beyond model training,
            citation generation with source attribution, confidence scoring based on retrieval agreement,
            and structured output templates for explicit reasoning.
          how_it_works: |
            1. Query OOD Assessment: Evaluate query against training distribution using statistical tests
            2. Retrieval-Generation Alignment: Check if retrieved context actually supports generated claims
            3. Citation Generation: Highlight specific text spans in context that support each claim
            4. Confidence Scoring: Combine signals into final confidence (0-100%)
            5. Structured Generation: Use prompt templates to force explicit confidence and reasoning
            6. Post-Hoc Fact Verification: For critical claims, re-query retriever or external knowledge base
            7. Uncertainty Expression: Communicate confidence levels to user
            8. Structured Output: Return (answer, citations, confidence, reasoning) tuple
          design_decisions:
            - "OOD detection sensitivity: strict avoids false alarms; loose is safer but may over-flag"
            - "Citation granularity: sentence-level is practical; token-level is precise but harder to extract"
            - "Confidence calibration: binary is simple; percentile is informative; multi-level balances complexity"
            - "Hallucination penalty: heavily penalize non-existent sources; reward precise citations"
            - "Uncertainty expression: explicit acknowledgment of limits is valuable but risks reducing helpfulness"
          implementation:
            code_scaffold: |
              from sentence_transformers import SentenceTransformer
              from openai import OpenAI
              import numpy as np

              class TrustworthyGeneration:
                def __init__(self):
                  self.encoder = SentenceTransformer("all-MiniLM-L6-v2")
                  self.client = OpenAI()

                def generate_with_confidence(self, query, context, max_tokens=512):
                  ood_score = self._detect_ood(query)
                  structured_prompt = self._build_structured_prompt(query, context)
                  response = self.client.chat.completions.create(
                    model="gpt-4-turbo-preview",
                    messages=[{"role": "system", "content": "Provide factual, well-cited answers as JSON."},
                             {"role": "user", "content": structured_prompt}],
                    temperature=0.2
                  )
                  parsed = self._parse_structured_response(response.choices[0].message.content)
                  parsed = self._validate_citations(parsed, context)
                  alignment_score = self._check_retrieval_alignment(parsed, context)
                  final_confidence = self._combine_confidence_signals(parsed.get("confidence", 50), ood_score, alignment_score)
                  return {**parsed, "final_confidence": final_confidence, "ood_score": ood_score}

            pseudocode: |
              function TrustworthyGeneration(query, context):
                1. ood_score = detect_ood_distribution(query)
                2. structured_prompt = build_template(query, context)
                3. response = llm.generate(structured_prompt, temperature=0.2)
                4. parsed = parse_json_response(response)
                5. validated_citations = validate_citations(parsed, context)
                6. alignment_score = check_alignment(parsed.answer, context)
                7. confidence = combine_signals(stated_confidence, ood_score, alignment_score)
                8. RETURN {answer, confidence, citations, reasoning, ood_detected}
          sources:
            - "Lakshmanan & Hapke. Generative AI Design Patterns, Chapter 7: Trustworthy Generation"
            - "Dhuliawala et al. (2023). Chain-of-Verification Reduces Hallucination"
            - "Kadavath et al. (2022). Language Models Know What They Know"
          real_world_analogies:
            - "News journalism: source verification, fact-checking, attribution, disclosure of uncertainty"
            - "Expert medical consultation: express confidence levels, cite evidence, acknowledge limits"

        - name: "Deep Search Pattern"
          definition: >
            Multi-hop retrieval strategy enabling complex reasoning over knowledge bases by iteratively refining
            search queries and aggregating intermediate results. Unlike single-shot retrieval, deep search executes
            multiple retrieval rounds with progressive refinement, creating search trajectories.
          how_it_works: |
            1. Query Decomposition: Break complex query into sub-questions
            2. Initial Retrieval: Execute first-round retrieval for original query
            3. Iterative Sub-Question Retrieval: For each sub-question, retrieve context
            4. Intermediate Synthesis: After each retrieval round, synthesize results and identify gaps
            5. Query Refinement: Based on gaps, generate follow-up queries targeting missing information
            6. Multi-Hop Traversal: Execute 2-4 retrieval rounds, building on previous results
            7. Evidence Aggregation: Collect and deduplicate evidence, tracking provenance
            8. Quality Evaluation: Apply Ragas metrics (context precision, context recall, faithfulness)
            9. Final Synthesis: Generate comprehensive answer from aggregated evidence
            10. Chain-of-Thought Rendering: Return reasoning trace showing retrieval trajectory
          design_decisions:
            - "Decomposition strategy: rule-based is fast; LLM-based is more flexible but slower"
            - "Hop depth: 2 hops is standard and fast; 3-4 hops enables complex reasoning but increases latency"
            - "Gap identification: heuristic-based is fast; LLM-based is more comprehensive"
            - "Evidence aggregation: union-based combines all; intersection-based keeps only universally supported"
            - "Quality threshold: strict (>0.85) ensures quality; moderate (0.65-0.75) balances coverage"
          implementation:
            code_scaffold: |
              class DeepSearchRAG:
                def deep_search(self, query, top_k_per_hop=5, max_hops=3):
                  sub_questions = self._decompose_query(query)
                  initial_results = self.retriever.retrieve(query, top_k=top_k_per_hop)
                  all_evidence = {query: initial_results}

                  for hop in range(max_hops):
                    hop_results = {}
                    for sub_q in sub_questions:
                      results = self.retriever.retrieve(sub_q, top_k=top_k_per_hop)
                      hop_results[sub_q] = results

                    hop_quality = self._evaluate_hop_quality(query, hop_results)
                    if hop_quality["context_recall"] > 0.85:
                      break

                    gaps = self._identify_gaps(query, all_evidence)
                    if not gaps:
                      break

                    sub_questions = self._refine_queries(query, gaps)
                    all_evidence.update(hop_results)

                  aggregated = self._aggregate_evidence(all_evidence)
                  answer = self._synthesize_answer(query, aggregated)
                  cot = self._build_cot_trace(query, all_evidence)
                  return {"answer": answer, "evidence": aggregated, "cot": cot, "hops": hop}

            pseudocode: |
              function DeepSearch(query):
                1. sub_questions = decompose_query(query)
                2. initial_results = retrieve(query, top_k=5)
                3. FOR hop = 0 TO max_hops:
                     4. hop_results = [retrieve(sub_q, top_k=5) FOR sub_q IN sub_questions]
                     5. quality = evaluate_ragas(query, hop_results)
                     6. IF quality.context_recall > 0.85: BREAK
                     7. gaps = identify_gaps(query, all_evidence)
                     8. IF gaps empty: BREAK
                     9. sub_questions = refine_queries(query, gaps)
                10. aggregated = aggregate_evidence(all_evidence)
                11. answer = synthesize(query, aggregated)
                12. RETURN {answer, evidence, chain_of_thought}
          sources:
            - "Lakshmanan & Hapke. Generative AI Design Patterns, Chapter 8: Deep Search"
            - "Yao et al. (2023). ReAct: Synergizing Reasoning and Acting"
            - "Khattab & Potts. (2021). Demonstrate-Search-Predict"
          real_world_analogies:
            - "Investigation workflow: initial leads, follow-up questions, gather evidence, identify gaps, additional research"
            - "Thesis research: literature review, identify gaps, targeted searches, synthesize findings"

        - name: "Tool Calling RAG Pattern"
          definition: >
            Integration of LLM-based tool invocation with RAG systems to enable dynamic, adaptive information
            retrieval driven by model reasoning. Instead of retrieving fixed context upfront, the LLM calls tools
            (retrieve, search, compute) as part of generation, enabling just-in-time retrieval.
          how_it_works: |
            1. Tool Schema Definition: Define retrieval and computation tools with input/output schemas
            2. Tool Invocation Setup: Configure LLM for function calling
            3. Prompt with Tool Context: Provide system prompt listing available tools
            4. LLM Planning: Model decides when/how to call tools based on reasoning
            5. Tool Execution: Execute requested tool with validated parameters
            6. Result Feedback: Return tool results to LLM context
            7. Iterative Loop: LLM may call additional tools based on previous results (max_iterations=5-10)
            8. Output Generation: Once sufficient context gathered, model generates final response
            9. Tool Usage Tracking: Log tool calls for debugging and optimization
            10. Adaptive Context Management: Maintain bounded context window (drop oldest tool results if needed)
          design_decisions:
            - "Tool granularity: fine-grained tools enable precise control; coarse-grained tools are simpler"
            - "MCP architecture: stateless servers are simpler; stateful servers enable caching"
            - "Max iterations: 5 is conservative; 10+ enables complex reasoning but risks infinite loops"
            - "Context window management: drop-oldest maintains recent context; drop-least-relevant uses similarity"
            - "Error handling: silent failure enables robustness; error propagation aids debugging"
          implementation:
            code_scaffold: |
              from openai import OpenAI
              import json

              class ToolCallingRAG:
                def __init__(self):
                  self.client = OpenAI()
                  self.tools = {}
                  self.max_iterations = 10

                def register_tool(self, name, func, schema):
                  self.tools[name] = {"func": func, "schema": schema}

                def tool_calling_rag(self, query, initial_context=""):
                  messages = [
                    {"role": "system", "content": self._build_system_prompt()},
                    {"role": "user", "content": query}
                  ]

                  for iteration in range(self.max_iterations):
                    response = self.client.chat.completions.create(
                      model="gpt-4-turbo-preview",
                      messages=messages,
                      tools=self._get_tool_definitions(),
                      tool_choice="auto"
                    )

                    if response.stop_reason == "tool_calls":
                      for tool_call in response.tool_calls:
                        tool_name = tool_call.function.name
                        args = json.loads(tool_call.function.arguments)
                        result = self._execute_tool(tool_name, args)
                        messages.append({"role": "assistant", "content": response.choices[0].message.content})
                        messages.append({"role": "user", "content": f"Tool {tool_name} returned: {json.dumps(result)}"})
                    else:
                      break

                  return {"response": response.choices[0].message.content, "iterations": iteration}

            pseudocode: |
              function ToolCallingRAG(query):
                1. system_prompt = build_prompt_with_tools()
                2. messages = [system_prompt, user_query]
                3. FOR iteration = 0 TO max_iterations:
                     4. response = llm.generate(messages, tools, tool_choice='auto')
                     5. IF response.stop_reason == 'tool_calls':
                          6. FOR EACH tool_call IN response.tool_calls:
                               7. result = execute_tool(tool_call.name, tool_call.args)
                               8. messages.append(tool_call); messages.append(tool_result)
                          9. iteration += 1
                        ELSE: BREAK
                10. final_response = response.choices[0].message.content
                11. RETURN {response: final_response, tool_calls: log}
          sources:
            - "Lakshmanan & Hapke. Generative AI Design Patterns, Chapter 9: Tool Calling"
            - "OpenAI Function Calling Guide"
            - "Model Context Protocol (MCP): https://modelcontextprotocol.io/"
          real_world_analogies:
            - "Research assistant: take notes, identify gaps, consult sources dynamically, synthesize findings"
            - "Software debugger: set breakpoints, inspect variables, execute conditional logic, gather evidence"

        - name: "Multi-Agent RAG Pattern"
          definition: >
            Distributed RAG approach using multiple specialized agents coordinating to solve complex problems.
            Agents specialize in different domains (legal, financial, technical), use separate knowledge bases,
            and coordinate through hierarchical, peer-to-peer, or market-based mechanisms.
          how_it_works: |
            1. Agent Specialization: Create domain-specific agents, each with specialized knowledge base and prompt
            2. Coordination Mechanism Selection: Choose between hierarchical, peer-to-peer, or market-based
            3. Query Routing: Route incoming query to appropriate agent(s) or manager
            4. Parallel Retrieval: Each agent independently retrieves from domain knowledge base
            5. Agent Communication: Agents exchange information, seek clarifications (message passing)
            6. Consensus Building: When agents disagree, apply voting, weighted consensus, or arbitration
            7. Context Sharing: Maintain shared context (entities, key facts) across agents
            8. Iterative Refinement: Agents may request additional information from peers
            9. Result Aggregation: Combine agent outputs, attribute to source agent
            10. Confidence Scoring: Assign confidence based on agent agreement and source reliability
            11. Human Oversight: For critical decisions, escalate to human review
          design_decisions:
            - "Number of agents: 2-3 specialists are manageable; 5+ requires sophisticated coordination"
            - "Coordination style: hierarchical is simplest but creates bottleneck; peer-to-peer is flexible"
            - "Consensus mechanism: simple majority voting is fast; weighted voting is more accurate"
            - "Context sharing: minimal is simple; extensive improves quality but adds latency"
            - "Agent autonomy: fully autonomous agents are scalable; tightly coordinated are cohesive"
          implementation:
            code_scaffold: |
              from abc import ABC, abstractmethod

              class SpecialistAgent(ABC):
                def __init__(self, name, domain, retriever, llm):
                  self.name = name
                  self.domain = domain
                  self.retriever = retriever
                  self.llm = llm

                def handle_query(self, query):
                  context = self.retriever.retrieve(query, top_k=5)
                  response = self._generate_response(query, context)
                  return {"agent": self.name, "domain": self.domain, "response": response}

              class HierarchicalCoordinator:
                def route_query(self, query):
                  relevant_agents = self._identify_relevant_agents(query)
                  if len(relevant_agents) == 1:
                    return relevant_agents[0].handle_query(query)
                  else:
                    results = [agent.handle_query(query) for agent in relevant_agents]
                    return self._aggregate_results(results)

            pseudocode: |
              function MultiAgentRAG(query):
                1. relevant_agents = identify_agents_for_query(query)
                2. IF len(relevant_agents) == 1:
                     3. result = relevant_agents[0].handle_query(query)
                   ELSE:
                     4. results = parallel_execute(agent.handle_query(query) FOR agent IN relevant_agents)
                     5. result = aggregate_results(results)
                6. consensus = build_consensus(results)
                7. confidence = calculate_confidence(consensus)
                8. RETURN {response: result, agents: relevant_agents, confidence}
          sources:
            - "Lakshmanan & Hapke. Generative AI Design Patterns, Chapter 10: Multi-Agent RAG"
            - "Wei et al. (2022). Emergent Abilities of Large Language Models"
            - "Sap et al. (2023). Social IQa: Commonsense Reasoning"
          real_world_analogies:
            - "Consulting firm: specialized teams work on different aspects, coordinate findings"
            - "Medical team: specialists review case, consensus on diagnosis and treatment"

    graphrag_and_knowledge_graphs:
      description: "Knowledge graph construction and GraphRAG approaches for leveraging structured relationships"
      nodes:

        - name: "GraphRAG Fundamentals"
          definition: >
            RAG system enhanced with knowledge graphs, enabling relationship-aware retrieval and multi-hop reasoning.
            Instead of flat retrieval, GraphRAG maintains a structured graph of entities, relationships, and properties.
            During retrieval, queries traverse graph edges to find related entities and information.
          how_it_works: |
            1. NER Pipeline: Extract named entities from documents using pre-trained models
            2. Relationship Extraction: Identify relationships between entities (IS_A, HAS_PART, WORKS_FOR, etc.)
            3. Knowledge Graph Construction: Create property graph with entities as nodes, relationships as edges
            4. Schema Definition: Define entity types, relationship types, and constraints
            5. Deduplication: Identify and merge entities representing same real-world object
            6. Graph Storage: Persist graph in Neo4j or similar backend with indexing
            7. Query Translation: Convert natural language query to graph traversal
            8. Graph Traversal: Execute breadth-first or depth-first search (max depth=2-3 hops)
            9. Path Aggregation: Aggregate information from multiple traversal paths
            10. Context Assembly: Convert graph traversal results to text context for LLM
            11. Generation: Pass graph-augmented context to LLM for reasoning and response
          design_decisions:
            - "Entity granularity: fine-grained preserves context but increases size; coarse-grained reduces size"
            - "Relationship types: hierarchical enables precise queries; flat is simpler"
            - "Graph traversal depth: depth=1 retrieves direct neighbors; depth=2-3 enables multi-hop reasoning"
            - "Deduplication strategy: deterministic matching is fast; embedding-based is more robust"
            - "Backend choice: Neo4j is mature; Weaviate offers semantic integration; TigerGraph optimizes large graphs"
          implementation:
            code_scaffold: |
              import spacy
              from neo4j import GraphDatabase

              class GraphRAG:
                def __init__(self, neo4j_uri, user, password):
                  self.driver = GraphDatabase.driver(neo4j_uri, auth=(user, password))
                  self.ner_model = spacy.load("en_core_web_lg")

                def build_knowledge_graph(self, documents):
                  for doc_idx, doc_text in enumerate(documents):
                    entities = self._extract_entities(doc_text)
                    relationships = self._extract_relationships(doc_text, entities)
                    self._store_entities_and_relationships(entities, relationships)
                  self._deduplicate_entities()

                def retrieve_from_graph(self, query, top_k=5):
                  query_entities = self._extract_entities(query)
                  matched_nodes = self._find_matched_nodes(query_entities)
                  context_paths = self._traverse_graph(matched_nodes, depth=2)
                  return self._aggregate_paths(context_paths, top_k)

            pseudocode: |
              function GraphRAGBuild(documents):
                1. FOR EACH document IN documents:
                     2. entities = extract_entities_ner(document)
                     3. relationships = extract_relationships(document, entities)
                     4. FOR EACH entity: CREATE_NODE(Entity, entity.name, entity.type)
                     5. FOR EACH relationship: CREATE_EDGE(rel.source, rel.target, rel.type)
                6. deduplicate_entities_by_similarity(threshold=0.85)

              function GraphRAGRetrieve(query):
                1. query_entities = extract_entities(query)
                2. matched_nodes = find_matching_nodes(query_entities)
                3. paths = [graph_traverse(node, depth=2) FOR node IN matched_nodes]
                4. aggregated = deduplicate_and_rank(paths)
                5. RETURN aggregated[:top_k]
          sources:
            - "Gao et al. (2024). From Local to Global: A Graph RAG Approach"
            - "Lakshmanan & Hapke. Generative AI Design Patterns, Chapter 11: GraphRAG"
            - "Neo4j Graph Database: https://neo4j.com/"
          real_world_analogies:
            - "Social network analysis: users are nodes, friendships are edges, group queries traverse connections"
            - "Genealogy: individuals are nodes, family relationships are edges, ancestry queries traverse upward"

        - name: "Knowledge Graph Construction with NER/RE Pipeline"
          definition: >
            Complete pipeline for automatically constructing knowledge graphs from unstructured text using
            Named Entity Recognition (NER), Relationship Extraction (RE), and schema-based normalization.
            NER identifies entity mentions and types; RE identifies relationships; schema definition enforces consistency.
          how_it_works: |
            1. Text Preprocessing: Tokenize, lemmatize, POS-tag text using spaCy or Stanza
            2. Entity Extraction Phase 1 (NER): Identify named entities using pre-trained model
            3. Entity Boundary Detection: Refine entity boundaries using linguistic rules
            4. Entity Type Classification: Assign entity types (PERSON, ORG, PRODUCT, LOCATION, EVENT, DATE)
            5. Relationship Extraction Phase 1 (Pattern Matching): Identify relationships using regex patterns
            6. Relationship Extraction Phase 2 (Classifier): Use relation classification model
            7. Confidence Scoring: Assign confidence scores to entities and relationships
            8. Schema Validation: Check that types and relationships conform to pre-defined schema
            9. Entity Linking: Link entities to knowledge base using embedding similarity
            10. Deduplication: Merge entities with high similarity
            11. Normalization: Standardize entity names and relationship types
            12. Graph Construction: Build final KG with normalized entities and validated relationships
            13. Quality Metrics: Calculate entity density, relationship diversity, coverage metrics
          design_decisions:
            - "NER model selection: spaCy is balanced; transformers are more accurate; rule-based for domain-specific"
            - "Relationship extraction: pattern matching is fast and precise; classifiers have higher recall"
            - "Confidence threshold: strict (>0.85) ensures quality; moderate (0.65-0.75) balances coverage"
            - "Entity disambiguation: exact name matching is fast; embedding similarity is robust"
            - "Schema enforcement: strict ensures consistency; loose is more tolerant"
          implementation:
            code_scaffold: |
              import spacy
              from sklearn.metrics.pairwise import cosine_similarity
              from sentence_transformers import SentenceTransformer
              import numpy as np

              class KGConstructionPipeline:
                def __init__(self):
                  self.nlp = spacy.load("en_core_web_lg")
                  self.encoder = SentenceTransformer("all-MiniLM-L6-v2")
                  self.schema = self._define_schema()

                def process_document(self, text):
                  entities = self._extract_entities_ner(text)
                  relationships = self._extract_relationships(text, entities)
                  entities, relationships = self._score_confidence(entities, relationships)
                  entities, relationships = self._validate_schema(entities, relationships)
                  entities = self._entity_linking(entities)
                  entities = self._deduplicate_entities(entities)
                  entities = self._normalize_entities(entities)
                  relationships = self._normalize_relationships(relationships)
                  metrics = self._calculate_quality_metrics(entities, relationships)
                  return {"entities": entities, "relationships": relationships, "metrics": metrics}

            pseudocode: |
              function KGConstruction(text):
                1. entities = ner_extract(text)
                2. relationships = relationship_extract(text, entities)
                3. entities, relationships = score_confidence(entities, relationships)
                4. entities, relationships = validate_schema(entities, relationships)
                5. entities = entity_linking(entities)
                6. entities = deduplicate(entities, threshold=0.95)
                7. entities = normalize(entities)
                8. relationships = normalize(relationships)
                9. kg = construct_graph(entities, relationships)
                10. metrics = quality_metrics(kg)
                11. RETURN {kg, metrics}
          sources:
            - "Lakshmanan & Hapke. Generative AI Design Patterns, Chapter 12: Knowledge Graph Construction"
            - "Li et al. (2022). More Data, More Relations, More Context"
            - "spaCy NLP Library: https://spacy.io/"
          real_world_analogies:
            - "Library cataloging: identify subjects (entities), define relationships, assign classifications"
            - "Medical records: extract diagnoses (entities), relationships (patient-has-diagnosis)"

    rag_production_deployment:
      description: "Production-ready RAG systems covering cost optimization, hybrid search, architecture patterns"
      nodes:

        - name: "RAG Cost Optimization"
          definition: >
            Systematic reduction of RAG system operational costs (embedding, retrieval, LLM calls) while maintaining quality.
            Key strategies include token reduction, retrieval efficiency (caching, approximate nearest neighbor),
            batch processing, and smart routing.
          how_it_works: |
            1. Baseline Cost Analysis: Measure current costs
            2. Document Filtering: Pre-filter low-quality documents before embedding
            3. Chunking Optimization: Right-size chunks to minimize count without losing quality
            4. Embedding Batch Processing: Embed in batches (batch_size=256-512)
            5. Vector Database Indexing: Use efficient indexing (HNSW, IVF)
            6. Query Caching: Cache embeddings for common queries (Redis, in-memory cache)
            7. Result Caching: Cache full query results for identical or similar questions
            8. Approximate Retrieval: Use ANN instead of exact KNN for 10x speedup
            9. Adaptive Retrieval Depth: Route simple queries to top-1, complex to top-5
            10. Context Compression: Summarize context to fit LLM window more efficiently
            11. Smarter Ranking: Use fast coarse-ranking (BM25) before expensive cross-encoder
            12. Token Optimization: Remove redundant context, use prompt compression
            13. Batch Inference: Group user queries for LLM cost savings
          design_decisions:
            - "Batch size: larger batches save money but increase latency; balance based on SLA"
            - "Approximate similarity threshold: stricter saves cost; looser is safer for quality"
            - "Caching strategy: aggressive reduces cost; selective balances freshness"
            - "Reranking depth: rerank top-20 saves cost vs. top-100 with minimal quality loss"
            - "Cross-encoder usage: use for top-k only (k<=20); full population is too expensive"
          implementation:
            code_scaffold: |
              from datetime import datetime, timedelta
              import hashlib

              class CostOptimizedRAG:
                def __init__(self, vector_db, llm, cache_ttl_hours=24):
                  self.vector_db = vector_db
                  self.llm = llm
                  self.query_cache = {}
                  self.cache_ttl = timedelta(hours=cache_ttl_hours)

                def retrieve_with_caching(self, query, top_k=5):
                  query_hash = self._hash_query(query)
                  if query_hash in self.query_cache:
                    cached_result, timestamp = self.query_cache[query_hash]
                    if datetime.now() - timestamp < self.cache_ttl:
                      return cached_result

                  k = 2 if self._is_simple_query(query) else min(top_k, 10)
                  bm25_results = self._bm25_retrieve(query, top_k=k*2)
                  ann_results = self._ann_retrieve(query, top_k=k)
                  merged = self._merge_results(bm25_results, ann_results)
                  ranked = sorted(merged, key=lambda x: x["score"], reverse=True)[:k]
                  self.query_cache[query_hash] = (ranked, datetime.now())
                  return ranked

            pseudocode: |
              function CostOptimizedRAG(query):
                1. optimized_docs = filter_low_quality(documents, threshold=0.5)
                2. retrieval_depth = is_simple_query(query) ? 2 : 10
                3. query_hash = hash(query)
                4. IF query_hash IN cache AND cache_fresh(query_hash): RETURN cache[query_hash]
                5. bm25_results = bm25_retrieve(query, k=retrieval_depth*2)
                6. ann_results = ann_retrieve(query, k=retrieval_depth)
                7. merged = merge_signals(bm25_results, ann_results)
                8. ranked = sort_by_score(merged)[:retrieval_depth]
                9. response = llm.generate(context, query)
                10. cache[query_hash] = response
                11. RETURN response
          sources:
            - "Lakshmanan & Hapke. Generative AI Design Patterns, Chapter 13: Cost Optimization"
            - "OpenAI Tokenizer: https://platform.openai.com/tokenizer"
            - "Faiss: A library for efficient similarity search"
          real_world_analogies:
            - "Manufacturing optimization: reduce waste, batch processing, efficient logistics"
            - "Cloud infrastructure: use caching, CDNs, load balancing"

        - name: "Hybrid Search Production"
          definition: >
            Production deployment combining semantic search (dense embeddings) and keyword search (sparse retrieval)
            with multi-signal ranking for optimal precision and recall. Hybrid approaches address complementary
            weaknesses of each strategy.
          how_it_works: |
            1. Query Analysis: Classify query as keyword-heavy vs. semantic
            2. Dense Retrieval: Execute semantic similarity search (top_k=20, similarity>0.6)
            3. Sparse Retrieval: Execute BM25 keyword matching (top_k=20, IDF-weighted)
            4. Result Merging: Combine results using Rank Fusion (RRF) formula
            5. Score Normalization: Z-score normalize both signals to comparable scale
            6. Weighted Ensemble: ensemble_score = w_dense * norm_dense + w_sparse * norm_sparse
            7. Semantic-Transactional Join: Align results intelligently for fields supporting both types
            8. Adaptive Weighting: Adjust weights based on query characteristics
            9. Cross-Encoder Re-ranking: Top results processed by cross-encoder for final ranking
            10. Deduplication: Merge identical documents from both retrieval paths
            11. Final Ranking: Return merged, ranked, deduplicated results
          design_decisions:
            - "Ensemble weights: equal (0.5/0.5) are simplest; query-adaptive (0.6/0.4) perform better"
            - "Normalization method: Z-score is standard; min-max is reasonable"
            - "Deduplication threshold: exact match only; fuzzy (>0.95 similarity) merges near-duplicates"
            - "Fusion depth: top-50 captures coverage; top-100+ risks quality; top-20 may miss relevant documents"
            - "Adaptive weighting: simple heuristics are fast; learned models are more accurate"
          implementation:
            code_scaffold: |
              from sentence_transformers import CrossEncoder
              from sklearn.preprocessing import StandardScaler
              import numpy as np

              class HybridSearchProduction:
                def hybrid_search(self, query, top_k=5):
                  query_char = self._analyze_query(query)
                  dense_results = self.dense_retriever.search(query, top_k=20)
                  sparse_results = self.sparse_retriever.search(query, top_k=20)
                  fused = self._fuse_signals(dense_results, sparse_results, query_char)
                  reranked = self._rerank_cross_encoder(fused, query, top_k=top_k)
                  return reranked

            pseudocode: |
              function HybridSearch(query):
                1. dense_results = dense_search(query, top_k=20)
                2. sparse_results = bm25_search(query, top_k=20)
                3. fused = signal_fusion(dense_results, sparse_results)
                4. reranked = cross_encoder_rerank(fused, query, top_k=5)
                5. RETURN reranked
          sources:
            - "Lakshmanan & Hapke. Generative AI Design Patterns, Chapter 14: Hybrid Search"
            - "Cormack et al. (2009). Reciprocal Rank Fusion"
          real_world_analogies:
            - "Google search: combine exact keyword matches with semantic understanding"
            - "E-commerce: product search merges category matches with visual similarity"

        - name: "Dual RAG Architecture"
          definition: >
            Advanced architecture using two complementary knowledge bases: Context Library (procedural, how-to)
            and Knowledge Base (factual, reference). Queries route intelligently to appropriate base, enabling
            specialization of indexing and retrieval strategies.
          how_it_works: |
            1. Knowledge Base Design:
               - Context Library: procedural, sequential, execution-focused (recipes, tutorials, workflows)
               - Knowledge Base: factual, reference, definition-focused (definitions, data, specifications)
            2. Query Classification: Classify incoming query as procedural vs. factual
            3. Dual Retrieval: Based on classification, retrieve from appropriate base
            4. Base-Specific Ranking:
               - Context Library: rank by workflow coherence, step clarity
               - Knowledge Base: rank by factual accuracy, source reliability
            5. Context Assembly: Format retrieved results appropriately for type
            6. Generation: Pass base-specific context to LLM with appropriate prompt template
            7. Quality Scoring: Base-specific metrics (accuracy vs. completeness)
          design_decisions:
            - "Routing strategy: rule-based classification is simple; LLM-based is more accurate"
            - "Dual vs. single retrieval: dual requires more infrastructure but improves quality"
            - "Ranking differences: Context Library needs coherence-aware ranking; Knowledge Base needs accuracy ranking"
            - "Result interpretation: procedural preserves sequence; factual shows source attribution"
            - "Hybrid handling: run both bases and merge, or use classifier confidence to weight bases"
          implementation:
            code_scaffold: |
              from enum import Enum

              class QueryType(Enum):
                PROCEDURAL = "procedural"
                FACTUAL = "factual"
                HYBRID = "hybrid"

              class DualRAG:
                def process_query(self, query):
                  query_type, confidence = self._classify_query(query)
                  if query_type == QueryType.PROCEDURAL:
                    results = self._retrieve_procedural(query)
                  elif query_type == QueryType.FACTUAL:
                    results = self._retrieve_factual(query)
                  else:
                    proc_results = self._retrieve_procedural(query)
                    fact_results = self._retrieve_factual(query)
                    results = self._merge_dual_results(proc_results, fact_results, confidence)
                  response = self._generate_response(query, results, query_type)
                  return {"response": response, "query_type": query_type.value, "sources": results}

            pseudocode: |
              function DualRAG(query):
                1. query_type, confidence = classify_query(query)
                2. IF query_type == PROCEDURAL:
                     3. results = retrieve_from_context_library(query, rank_by=coherence)
                   ELSE IF query_type == FACTUAL:
                     4. results = retrieve_from_knowledge_base(query, rank_by=reliability)
                   ELSE:
                     5. results = merge_by_confidence(proc_results, fact_results, confidence)
                6. response = generate_type_specific(query, results, query_type)
                7. RETURN {response, query_type, sources}
          sources:
            - "Lakshmanan & Hapke. Generative AI Design Patterns, Chapter 15: Dual RAG"
            - "Roth & Small. (2022). Categorizing how-to questions"
          real_world_analogies:
            - "Library system: reference section (factual) vs. how-to section (procedural)"
            - "Customer support: knowledge base (FAQ) vs. troubleshooting guides (procedural)"

        - name: "Living Indexing and Feedback"
          definition: >
            Dynamic RAG system that continuously evolves index quality based on user feedback and performance metrics.
            Instead of static indexes, living indexing monitors query-document relevance feedback, identifies
            poorly-ranking documents, adjusts retrieval weights, and A/B tests improvements.
          how_it_works: |
            1. Feedback Collection: Gather user signals (explicit ratings, implicit dwell time, click-through)
            2. Relevance Labeling: Convert feedback to relevance labels
            3. Ranking Analysis: Analyze ranking quality on feedback data (compute NDCG, MRR)
            4. Weight Updating: Adjust retrieval weights based on feedback
            5. Drift Detection: Monitor ranking metric changes over time (alert if NDCG drops >5%)
            6. A/B Testing: Test new weights/strategies on subset of queries
            7. Statistical Significance: Ensure improvements are significant (p<0.05) before rollout
            8. Model Fine-Tuning: Periodically retrain re-ranker on accumulated feedback
            9. Feedback Loop Management: Control feedback loop to avoid gaming/bias
            10. Monitoring Dashboard: Visualize metrics, track improvements
          design_decisions:
            - "Feedback collection: implicit is continuous but noisy; explicit is sparse but high-quality"
            - "Weight update frequency: daily is standard; weekly/monthly is safer but slower"
            - "A/B test duration: 1-2 weeks is typical; longer reduces variance but slower iteration"
            - "Statistical threshold: p<0.05 is standard; p<0.1 acceptable for low-traffic queries"
            - "Feedback weighting: recent gets 2x; explicit gets 10x implicit; normalize across query types"
          implementation:
            code_scaffold: |
              from datetime import datetime, timedelta
              from scipy import stats
              import numpy as np

              class LivingIndexing:
                def __init__(self, retriever):
                  self.retriever = retriever
                  self.feedback_log = []
                  self.weights = {"dense": 0.6, "sparse": 0.4}
                  self.experiments = []

                def collect_feedback(self, query, doc_id, rating):
                  self.feedback_log.append({
                    "query": query,
                    "doc_id": doc_id,
                    "rating": rating,
                    "timestamp": datetime.now()
                  })

                def update_weights_from_feedback(self, lookback_days=7):
                  cutoff = datetime.now() - timedelta(days=lookback_days)
                  recent = [f for f in self.feedback_log if f["timestamp"] > cutoff]
                  if len(recent) < 50:
                    return

                  current = self._evaluate_weights(self.weights, recent)
                  candidates = [
                    {"dense": 0.5, "sparse": 0.5},
                    {"dense": 0.65, "sparse": 0.35}
                  ]

                  best_weights = self.weights
                  best_ndcg = current["ndcg"]
                  for candidate in candidates:
                    metrics = self._evaluate_weights(candidate, recent)
                    if metrics["ndcg"] > best_ndcg:
                      best_ndcg = metrics["ndcg"]
                      best_weights = candidate

                  self.weights = best_weights

            pseudocode: |
              function LivingIndexing(query, ranking, feedback):
                1. collect_feedback(query, doc_id, rating)
                2. IF feedback_count > 50:
                     3. recent_feedback = filter_recent(feedback_log, 7_days)
                     4. best_weights = evaluate_candidates_and_select(candidates)
                     5. IF best_weights != current_weights: update_weights(best_weights)
                6. IF metric_drift_detected(): ALERT("Ranking drift")
                7. IF ab_test_completed() AND test_significant(): rollout_test_weights()
                8. IF feedback_count > 1000: retrain_reranker(feedback_log)
          sources:
            - "Lakshmanan & Hapke. Generative AI Design Patterns, Chapter 16: Living Indexing"
            - "Cohen-Addad et al. (2019). Online clustering with experts"
            - "Learning-to-rank literature: LambdaMART"
          real_world_analogies:
            - "Search engine optimization: monitor rankings, test variations, measure improvements"
            - "Machine learning monitoring: track metrics, detect drift, retrain periodically"

