          - name: "procedural_memory_implementation"
            definition: "Procedural memory stores learned skills, behaviors, patterns, and decision-making strategies that improve agent performance over time. Implementation combines multiple layers: LLM weights (implicit), agent code (explicit), system prompts (context), and reflection mechanisms. Procedural memory is automatically refined through feedback loops, self-correction, and metaprompting where agents update their own system prompts based on performance."
            how_it_works: |
              Multi-Layer Procedural Storage:
              1. LLM Weights: Pre-trained knowledge (immutable in inference)
              2. Agent Code: Decision logic, workflows (controlled by developers)
              3. System Prompt: Instructions, guidelines (mutable per session)
              4. Reflection Logs: Self-critique, lessons learned (input to improvements)

              Self-Updating via Reflection:
              1. Agent completes task and evaluates performance
              2. Generates self-critique: "What went well? What could improve?"
              3. Extracts lessons: "In future, try X instead of Y"
              4. Updates system prompt: adds new guideline or constraint
              5. Next iteration uses improved prompt

              Feedback Loop:
              1. Human provides feedback: "Good approach, but missed detail X"
              2. Agent incorporates: "Add detail X check to procedure"
              3. Next task includes new check
              4. Performance metric tracked over time
            design_decisions:
              - "Multi-layer: weights + code + prompts + reflection"
              - "Reflection mechanism: agents learn from own mistakes"
              - "Prompt evolution: continuous improvement via metaprompting"
              - "Feedback integration: human input accelerates learning"
            implementation:
              code_scaffold: |
                from dataclasses import dataclass
                import json
                from datetime import datetime

                @dataclass
                class Procedure:
                    name: str
                    description: str
                    system_prompt: str
                    steps: List[str]
                    success_criteria: List[str]
                    version: int
                    last_updated: str

                class ProceduralMemory:
                    def __init__(self):
                        self.procedures: Dict[str, Procedure] = {}
                        self.reflection_log: List[Dict] = []

                    def define_procedure(self, name: str, description: str,
                                       steps: List[str],
                                       system_prompt: str):
                        """Create new procedure"""
                        self.procedures[name] = Procedure(
                            name=name,
                            description=description,
                            system_prompt=system_prompt,
                            steps=steps,
                            success_criteria=[],
                            version=1,
                            last_updated=datetime.utcnow().isoformat()
                        )

                    def get_procedure(self, name: str) -> Procedure:
                        """Retrieve procedure for execution"""
                        if name not in self.procedures:
                            raise ValueError(f"Procedure not found: {name}")
                        return self.procedures[name]

                class ReflectionAgent:
                    """Self-critique and learning mechanism"""

                    def __init__(self, llm_client, procedural_memory: ProceduralMemory):
                        self.llm = llm_client
                        self.memory = procedural_memory

                    async def reflect_on_performance(self,
                                                   procedure_name: str,
                                                   task_input: str,
                                                   output: str,
                                                   evaluation: Dict) -> Dict:
                        """Generate self-critique and extract lessons"""

                        prompt = f"""
                        Task: {procedure_name}
                        Input: {task_input}
                        My Output: {output}
                        Evaluation: success={evaluation['success']}, score={evaluation['score']}

                        Reflect on my performance:
                        1. What did I do well?
                        2. What could I improve?
                        3. What new rule or guideline should I follow?
                        4. How should my procedure change?

                        Return JSON:
                        {{
                            "strengths": [...],
                            "weaknesses": [...],
                            "lessons": [...],
                            "suggested_prompt_update": "..."
                        }}
                        """

                        reflection_json = await self.llm.call(prompt)
                        reflection = json.loads(reflection_json)

                        # Log reflection
                        self.memory.reflection_log.append({
                            "procedure": procedure_name,
                            "timestamp": datetime.utcnow().isoformat(),
                            "evaluation_score": evaluation["score"],
                            "reflection": reflection
                        })

                        return reflection

                    async def update_procedure_prompt(self,
                                                    procedure_name: str,
                                                    reflection: Dict):
                        """Update system prompt based on reflection"""

                        procedure = self.memory.get_procedure(procedure_name)
                        current_prompt = procedure.system_prompt

                        # Incorporate lessons into prompt
                        lessons = "\n".join([f"- {l}" for l in reflection["lessons"]])
                        updated_prompt = f"""{current_prompt}

                        Recent lessons from reflection:
                        {lessons}

                        Use these lessons to inform your approach."""

                        # Update procedure
                        procedure.system_prompt = updated_prompt
                        procedure.version += 1
                        procedure.last_updated = datetime.utcnow().isoformat()

                        return procedure

                class FeedbackIntegrator:
                    """Incorporate human feedback into procedures"""

                    def __init__(self, procedural_memory: ProceduralMemory):
                        self.memory = procedural_memory

                    def apply_feedback(self, procedure_name: str,
                                      human_feedback: str):
                        """Update procedure based on human feedback"""

                        procedure = self.memory.get_procedure(procedure_name)

                        # Append feedback to system prompt
                        procedure.system_prompt += f"\n\nHuman feedback: {human_feedback}"
                        procedure.version += 1
                        procedure.last_updated = datetime.utcnow().isoformat()

                        return procedure
              pseudocode: |
                reflect_on_performance():
                1. Create reflection prompt with task, output, evaluation
                2. Ask LLM: strengths, weaknesses, lessons, suggested changes
                3. Parse reflection JSON
                4. Log in reflection_log
                5. Return reflection for further processing

                update_procedure_prompt():
                1. Get current procedure and system prompt
                2. Extract lessons from reflection
                3. Append lessons to system prompt
                4. Increment version number
                5. Update last_updated timestamp

                apply_feedback():
                1. Get procedure
                2. Append human feedback to system prompt
                3. Increment version
                4. Save updated procedure
