          - name: "cascading_memory_systems"
            definition: "Cascading memory systems implement a tiered architecture: short-term working memory (session), intermediate caching, and long-term persistent storage. Agents self-select what to promote to long-term storage based on importance and relevance. Automatic summarization of archived memories reduces storage footprint. The system mirrors human memory consolidation where frequently accessed or emotionally significant memories are strengthened while unused memories fade. Configurable thresholds control promotion criteria and archival policies."
            how_it_works: |
              Tier 1 - Working Memory (Session):
              1. Stores current conversation and recent events
              2. Fast access, limited by context window (e.g., 8K tokens)
              3. FIFO eviction when full (oldest removed first)
              4. Minimal latency, no persistence

              Tier 2 - Intermediate Cache:
              1. Stores frequently accessed or recent memories
              2. Redis-backed or local SSD cache
              3. TTL-based expiration (e.g., 24 hours)
              4. Faster than long-term, persists across sessions

              Tier 3 - Long-Term Storage:
              1. Persistent database (e.g., PostgreSQL, S3)
              2. Summarized (compressed) content
              3. Indexed for efficient retrieval
              4. Survives agent restarts

              Promotion Logic:
              1. Monitor memory access patterns
              2. If access_count > threshold: promote to cache
              3. If cache_duration > threshold: promote to long-term
              4. Summarize before long-term storage
              5. Delete from higher tiers (garbage collection)

              Consolidation (Background):
              1. Periodically batch read cache tier
              2. Summarize semantically-related memories
              3. Move compressed version to long-term
              4. Delete originals from cache and working
            design_decisions:
              - "Three-tier: balances latency, cost, and persistence"
              - "Self-selection by importance: agent decides what matters"
              - "Automatic summarization: reduces storage and retrieval latency"
              - "TTL-based garbage collection: prevents unbounded growth"
              - "Background consolidation: doesn't block agent execution"
            implementation:
              code_scaffold: |
                from typing import Dict, List, Any
                import json
                from datetime import datetime, timedelta

                class CascadingMemorySystem:
                    def __init__(self,
                                working_memory_limit: int = 8000,  # tokens
                                cache_ttl_hours: int = 24,
                                promotion_threshold: int = 3):
                        self.working_memory: List[Dict] = []
                        self.working_tokens = 0
                        self.working_limit = working_memory_limit

                        self.cache = {}  # In-memory or Redis
                        self.cache_ttl = timedelta(hours=cache_ttl_hours)

                        self.long_term_db = None  # PostgreSQL, S3, etc.
                        self.access_count: Dict[str, int] = {}
                        self.promotion_threshold = promotion_threshold

                    def store_in_working(self, memory: Dict):
                        """Add to working memory (fast, session-scoped)"""
                        memory_tokens = self._estimate_tokens(memory)

                        # Evict old memories if needed
                        while (self.working_tokens + memory_tokens > self.working_limit and
                               len(self.working_memory) > 0):
                            evicted = self.working_memory.pop(0)
                            self.working_tokens -= self._estimate_tokens(evicted)
                            self._try_promote_to_cache(evicted)

                        self.working_memory.append(memory)
                        self.working_tokens += memory_tokens

                    def retrieve_from_working(self, query: str) -> List[Dict]:
                        """Query working memory with update tracking"""
                        results = [m for m in self.working_memory
                                 if query.lower() in json.dumps(m).lower()]

                        # Track access for promotion
                        for result in results:
                            memory_id = result.get("id")
                            self.access_count[memory_id] = self.access_count.get(memory_id, 0) + 1

                        return results

                    def _try_promote_to_cache(self, memory: Dict):
                        """Promote working memory to cache if important"""
                        memory_id = memory.get("id")
                        access_count = self.access_count.get(memory_id, 0)

                        if access_count >= self.promotion_threshold:
                            self.cache[memory_id] = {
                                "data": memory,
                                "cached_at": datetime.utcnow(),
                                "access_count": access_count
                            }

                    def retrieve_from_cache(self, memory_id: str) -> Dict:
                        """Query cache with expiration check"""
                        if memory_id not in self.cache:
                            return None

                        cached = self.cache[memory_id]
                        if datetime.utcnow() - cached["cached_at"] > self.cache_ttl:
                            # Expired, try promote to long-term
                            self._try_promote_to_long_term(cached["data"])
                            del self.cache[memory_id]
                            return None

                        return cached["data"]

                    def _try_promote_to_long_term(self, memory: Dict):
                        """Move to long-term storage with summarization"""
                        summarized = self._summarize(memory)
                        self.long_term_db.store(summarized)

                    def _summarize(self, memory: Dict) -> Dict:
                        """Compress memory for long-term storage"""
                        # Extract key info, remove verbosity
                        summary = {
                            "id": memory.get("id"),
                            "timestamp": memory.get("timestamp"),
                            "type": memory.get("type"),
                            "summary": memory.get("summary", ""),  # Pre-computed summary
                            "tags": memory.get("tags", []),
                            "embedding": memory.get("embedding"),  # Vector for semantic search
                        }
                        return summary

                    def consolidate_background(self):
                        """Periodic consolidation: cache -> long-term"""
                        expired_entries = []

                        for memory_id, cached in self.cache.items():
                            if datetime.utcnow() - cached["cached_at"] > self.cache_ttl:
                                self._try_promote_to_long_term(cached["data"])
                                expired_entries.append(memory_id)

                        for memory_id in expired_entries:
                            del self.cache[memory_id]

                class MemorySummarizer:
                    """Automatic summarization for storage efficiency"""

                    def __init__(self, llm_client):
                        self.llm = llm_client

                    async def summarize_episode(self, episode: Dict) -> str:
                        """Generate summary of conversation/event"""
                        prompt = f"""
                        Summarize this episode in 2-3 sentences, highlighting key facts:
                        {json.dumps(episode)}
                        """
                        return await self.llm.call(prompt)

                    async def batch_summarize(self, episodes: List[Dict]) -> Dict:
                        """Summarize related episodes into single consolidated memory"""
                        content = "\n---\n".join([json.dumps(e) for e in episodes])

                        prompt = f"""
                        These related episodes span {len(episodes)} interactions.
                        Create a single consolidated summary capturing:
                        1. Key facts
                        2. Evolution of understanding
                        3. Important decisions made

                        Episodes:
                        {content}
                        """

                        summary = await self.llm.call(prompt)
                        return {
                            "consolidated_from": len(episodes),
                            "summary": summary,
                            "episode_ids": [e.get("id") for e in episodes]
                        }
              pseudocode: |
                store_in_working():
                1. Estimate tokens needed
                2. While working_memory full and has entries:
                   a. Pop oldest memory from working
                   b. Try promote to cache if access_count >= threshold
                3. Append new memory to working
                4. Update working_tokens

                retrieve_from_working():
                1. Search working_memory for matching query
                2. Track access_count for each result
                3. If access_count >= threshold: mark for promotion
                4. Return results

                _try_promote_to_cache():
                1. Check access_count vs promotion_threshold
                2. If access_count >= threshold:
                   a. Add to cache with timestamp
                   b. Set expiration to now + cache_ttl

                consolidate_background():
                1. Iterate cache entries
                2. For expired entries:
                   a. Summarize via LLM
                   b. Store summarized version in long-term DB
                   c. Delete from cache
            sources:
              - "B16 Ch1: Memory Consolidation"
              - "B04 Ch4: Tiered Memory Architecture"
            real_world_analogies:
              - "Like human sleep consolidation: day's memories processed and moved to long-term"
              - "Like email: inbox (working), important/starred (cache), archive (long-term)"

          - name: "semantic_caching_implementation"
            definition: "Semantic caching caches responses not by exact string matching, but by semantic similarity using vector embeddings. A query is considered a cache hit if its embedding is sufficiently similar (cosine similarity > 0.8-0.95) to a previous query. Redis caching backend supports semantic operations via plugins. The REST API enables PUT /cache/{user_id}/query to store responses and GET /similar to retrieve similar cached responses. Semantic caching works well for single-shot queries but degrades in multiturn conversations with evolving context. Cost benefits accrue from eliminating redundant LLM calls."
            how_it_works: |
              Semantic Similarity Matching:
              1. User query arrives
              2. Embed query to vector: embedding = encode(query)
              3. Query cache: find all embeddings with similarity > threshold
              4. If similarity > 0.95: return cached response immediately (exact match)
              5. If 0.8 < similarity < 0.95: return with confidence score
              6. If similarity < 0.8: cache miss, call LLM

              Storage:
              1. After LLM response, compute query embedding
              2. Store: {query, embedding, response, timestamp, user_id}
              3. Index embedding in vector database
              4. Set TTL (time-to-live) for automatic expiration

              Redis Implementation (LangCache):
              1. Use Redis vector similarity search
              2. API: PUT /cache/{user_id}/query
                   {query, response, embedding, ttl_seconds}
              3. API: GET /similar?user_id=X&query=Y&threshold=0.85
                   returns [{similarity, response, original_query}]
              4. API: DELETE /cache/{key} for explicit removal

              Performance Characteristics:
              - Single-shot queries: high hit rate (avoid redundant calls)
              - Multiturn: low hit rate (context drifts)
              - Semantic vs. keyword search: captures synonyms, paraphrasing
              - Tradeoff: embedding time vs. LLM call time (usually favorable)
            design_decisions:
              - "Similarity threshold 0.85-0.95: balance false positives vs coverage"
              - "Lower threshold (0.8): broad matching, risk stale responses"
              - "Higher threshold (0.95): conservative, miss applicable cache"
              - "Per-user caching: privacy, personalization, reduced cache size"
              - "TTL expiration: prevents outdated responses"
              - "Multiturn degrades gracefully: falls back to LLM"
            implementation:
              code_scaffold: |
                import redis
                import numpy as np
                from typing import Dict, List, Tuple, Optional

                class SemanticCache:
                    def __init__(self, redis_url: str = "redis://localhost:6379",
                                embedding_model,
                                similarity_threshold: float = 0.85,
                                ttl_seconds: int = 86400):  # 24 hours
                        self.redis_client = redis.from_url(redis_url)
                        self.embedding_model = embedding_model
                        self.threshold = similarity_threshold
                        self.ttl = ttl_seconds

                    async def get_cached_response(self, user_id: str,
                                                query: str) -> Optional[Dict]:
                        """Check if query response is cached"""

                        # Embed the query
                        query_embedding = self.embedding_model.encode(query)

                        # Search for similar cached queries
                        cache_key = f"cache:{user_id}:queries"

                        # Get all cached queries for user (simplified; real impl uses vector index)
                        cached_entries = self.redis_client.hgetall(cache_key)

                        best_match = None
                        best_similarity = 0

                        for cached_id, cached_json in cached_entries.items():
                            cached_data = json.loads(cached_json)
                            cached_embedding = np.array(cached_data["embedding"])

                            # Compute cosine similarity
                            similarity = self._cosine_similarity(
                                query_embedding,
                                cached_embedding
                            )

                            if similarity > best_similarity:
                                best_similarity = similarity
                                best_match = cached_data

                        # Return if above threshold
                        if best_similarity >= self.threshold:
                            return {
                                "response": best_match["response"],
                                "similarity": best_similarity,
                                "original_query": best_match["query"],
                                "cached": True
                            }

                        return None

                    async def cache_response(self, user_id: str,
                                           query: str,
                                           response: str):
                        """Store query-response pair in cache"""

                        # Embed query
                        embedding = self.embedding_model.encode(query)

                        # Create entry
                        entry = {
                            "query": query,
                            "response": response,
                            "embedding": embedding.tolist(),
                            "timestamp": datetime.utcnow().isoformat(),
                            "hits": 0
                        }

                        # Store in Redis with TTL
                        cache_key = f"cache:{user_id}:queries"
                        entry_id = hashlib.md5(query.encode()).hexdigest()

                        self.redis_client.hset(
                            cache_key,
                            entry_id,
                            json.dumps(entry)
                        )

                        # Set TTL on the cache key
                        self.redis_client.expire(cache_key, self.ttl)

                    def _cosine_similarity(self, vec1: np.ndarray,
                                         vec2: np.ndarray) -> float:
                        """Compute cosine similarity [0, 1]"""
                        dot_product = np.dot(vec1, vec2)
                        magnitude1 = np.linalg.norm(vec1)
                        magnitude2 = np.linalg.norm(vec2)

                        if magnitude1 == 0 or magnitude2 == 0:
                            return 0.0

                        return dot_product / (magnitude1 * magnitude2)

                class SemanticCacheRESTAPI:
                    """REST API for semantic caching"""

                    def __init__(self, semantic_cache: SemanticCache):
                        self.cache = semantic_cache

                    async def put_cache(self, user_id: str,
                                       query: str, response: str):
                        """PUT /cache/{user_id}/query"""
                        await self.cache.cache_response(user_id, query, response)
                        return {"cached": True}

                    async def get_similar(self, user_id: str,
                                         query: str,
                                         threshold: float = 0.85) -> Dict:
                        """GET /similar?user_id=X&query=Y&threshold=Z"""

                        # Temporarily override threshold
                        old_threshold = self.cache.threshold
                        self.cache.threshold = threshold

                        result = await self.cache.get_cached_response(user_id, query)

                        self.cache.threshold = old_threshold

                        if result:
                            return {
                                "hit": True,
                                "response": result["response"],
                                "similarity": result["similarity"]
                            }
                        else:
                            return {
                                "hit": False,
                                "message": "No similar cached response found"
                            }

                    async def delete_cache(self, user_id: str, entry_id: str):
                        """DELETE /cache/{user_id}/{entry_id}"""
                        cache_key = f"cache:{user_id}:queries"
                        self.cache.redis_client.hdel(cache_key, entry_id)
                        return {"deleted": True}

                class SemanticCachingAgent:
                    """Agent with semantic caching integrated"""

                    def __init__(self, llm_client, semantic_cache: SemanticCache):
                        self.llm = llm_client
                        self.cache = semantic_cache

                    async def query_with_cache(self, user_id: str,
                                             query: str) -> str:
                        """Query with caching"""

                        # Check cache first
                        cached = await self.cache.get_cached_response(user_id, query)
                        if cached:
                            print(f"Cache hit! Similarity: {cached['similarity']:.3f}")
                            return cached["response"]

                        # Cache miss: call LLM
                        response = await self.llm.call(query)

                        # Store for future
                        await self.cache.cache_response(user_id, query, response)

                        return response
              pseudocode: |
                get_cached_response():
                1. Embed query to vector
                2. Retrieve all cached queries for user
                3. For each cached query:
                   a. Compute cosine_similarity(query_embedding, cached_embedding)
                   b. Track best similarity
                4. If best_similarity >= threshold:
                   a. Return cached response
                   b. Include similarity score
                5. Else: return None (cache miss)

                cache_response():
                1. Embed query
                2. Create entry: {query, response, embedding, timestamp}
                3. Store in Redis: hset(cache_key, entry_id, json.dumps(entry))
                4. Set TTL: expire(cache_key, ttl_seconds)

                query_with_cache():
                1. Check cache: get_cached_response(user_id, query)
                2. If hit: return cached response
                3. If miss: call LLM
                4. After LLM: cache_response(user_id, query, response)
                5. Return LLM response
