                        {conversation}

                        Return JSON: {{"attributes": {{"key": "value", ...}}}}
                        """
                        # Call LLM to extract
                        new_attributes = {"mention_count": mention_count}

                        if entity_id in self.entities:
                            self.entities[entity_id]["attributes"].update(new_attributes)
                            self.entities[entity_id]["updated_at"] = datetime.utcnow().isoformat()
                        else:
                            self.add_entity(entity_id, "person", new_attributes)

                class PromptInjector:
                    """Inject semantic facts into prompts"""

                    def __init__(self, semantic_memory: SemanticMemory):
                        self.memory = semantic_memory

                    def augment_with_entities(self, base_prompt: str,
