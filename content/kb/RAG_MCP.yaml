          - name: "context_engineering_discipline"
            definition: "Context engineering is deliberate design of how context is created, maintained, and applied throughout agent execution. Key decisions: in-context vs in-weights treatment (transformers process in-context tokens differently than training weights), confidence-aware retrieval strategies (retrieve high-confidence facts), context window optimization (FlashAttention, RAG, semantic caching). Agent performance depends heavily on context quality, not just model size. Systematic context engineering becomes competitive advantage."
            how_it_works: |
              In-Context vs In-Weights:
              1. In-weights: knowledge learned during training (static, permanent)
              2. In-context: knowledge in prompt/memory (mutable, per-conversation)
              3. Transformer self-attention treats both similarly (both tokens)
              4. But in-context: easier to update, override, remove
              5. In-weights: implicit, harder to control
              6. Strategy: put changeable facts in-context, static in weights

              Confidence-Aware Retrieval:
              1. Not all retrieved facts equally credible
              2. Source metadata: where did fact come from?
              3. Confidence score: how sure are we?
              4. Strategy: retrieve high-confidence facts preferentially
              5. Mark uncertain facts: "probably", "uncertain"

              Context Window Optimization:
              1. Limited tokens: model max 8K, 100K, or more
              2. Cannot fit everything: must prioritize
              3. Techniques: FlashAttention (faster computation, not more tokens),
                 RAG (retrieve only relevant), semantic caching (avoid re-fetch),
                 hierarchical context (summaries + details)
              4. Tradeoff: relevant depth vs breadth

              Structured vs Unstructured:
              1. Structured: {entity: "John", role: "engineer"} (clear boundaries)
              2. Unstructured: "John is an engineer who..." (contextual)
              3. Mix both: structured for facts, unstructured for narrative
            design_decisions:
              - "In-context for mutable knowledge: facts, preferences, session state"
              - "In-weights for static knowledge: training, base facts"
              - "Confidence scoring: track provenance, credibility"
              - "Structured + unstructured: each has role"
              - "Optimize context window: retrieval quality > quantity"
            implementation:
              code_scaffold: |
                from typing import Dict, List, Tuple

                @dataclass
                class ContextFact:
                    content: str
                    source: str  # "training", "knowledge_base", "conversation", "web"
                    confidence: float  # 0.0-1.0
                    timestamp: str

                class ContextEngineer:
                    def __init__(self, token_budget: int = 8000):
                        self.facts: List[ContextFact] = []
                        self.token_budget = token_budget

                    def add_fact(self, content: str, source: str,
                                confidence: float = 1.0):
                        """Add fact with confidence"""
                        self.facts.append(ContextFact(
                            content=content,
                            source=source,
                            confidence=confidence,
                            timestamp=datetime.utcnow().isoformat()
                        ))

                    def build_context_for_query(self, query: str,
                                              min_confidence: float = 0.5) -> str:
                        """Build optimal context for query"""

                        # Filter by confidence
                        high_confidence = [f for f in self.facts
                                         if f.confidence >= min_confidence]

                        # Prioritize by source (knowledge_base > conversation > web)
                        source_priority = {
                            "knowledge_base": 3,
                            "conversation": 2,
                            "training": 1,
                            "web": 0
                        }

                        sorted_facts = sorted(
                            high_confidence,
                            key=lambda f: (source_priority.get(f.source, -1), f.confidence),
                            reverse=True
                        )

                        # Build context respecting token budget
                        context_parts = []
                        tokens_used = 0

                        for fact in sorted_facts:
                            fact_tokens = len(fact.content.split())

                            if tokens_used + fact_tokens > self.token_budget:
                                break

                            # Include confidence indicator
                            confidence_marker = "" if fact.confidence >= 0.9 else " (uncertain)"
                            context_parts.append(f"- {fact.content}{confidence_marker}")
                            tokens_used += fact_tokens

                        return "Context facts:\n" + "\n".join(context_parts)

                class StructuredContext:
                    """Structured representation of context"""

                    def __init__(self):
                        self.entities: Dict[str, Dict] = {}
                        self.relationships: List[Tuple] = []

                    def add_entity(self, entity_id: str, entity_type: str,
                                  attributes: Dict):
                        """Add entity with attributes"""
                        self.entities[entity_id] = {
                            "type": entity_type,
                            "attributes": attributes
                        }

                    def add_relationship(self, entity1: str, rel_type: str,
                                       entity2: str):
                        """Add relationship between entities"""
                        self.relationships.append((entity1, rel_type, entity2))

                    def to_context_string(self) -> str:
                        """Convert to natural language context"""
                        parts = []

                        # Entities
                        for eid, edata in self.entities.items():
                            attrs = ", ".join([f"{k}={v}" for k, v in edata["attributes"].items()])
                            parts.append(f"{eid} ({edata['type']}): {attrs}")

                        # Relationships
                        for e1, rel, e2 in self.relationships:
                            parts.append(f"{e1} {rel} {e2}")

                        return "\n".join(parts)

                class RobustRetrieval:
                    """Retrieve context with quality guarantees"""

                    async def retrieve_with_confidence(self,
                                                      query: str,
                                                      min_confidence: float = 0.7) -> List[ContextFact]:
                        """Retrieve facts above confidence threshold"""

                        # Semantic search
                        candidates = await self._semantic_search(query)

                        # Filter by confidence
                        filtered = [c for c in candidates
                                  if c.confidence >= min_confidence]

                        # Sort by relevance + confidence
                        filtered.sort(
                            key=lambda x: (x.relevance_score, x.confidence),
                            reverse=True
                        )

                        return filtered
              pseudocode: |
                ContextEngineer.build_context_for_query():
                1. Filter facts: confidence >= min_confidence
                2. Prioritize by source (KB > conversation > web)
                3. Iterate sorted facts:
                   a. Estimate tokens
                   b. If fits in budget: add to context
                   c. Mark uncertain facts
                   d. If exceeds budget: stop
                4. Return formatted context

                StructuredContext:
                1. Store entities with attributes
                2. Store relationships as tuples
                3. Convert to natural language for prompt

                RobustRetrieval.retrieve_with_confidence():
                1. Semantic search by query
                2. Filter: confidence >= min_confidence
                3. Sort: relevance_score, confidence
                4. Return top-k facts with quality markers
            sources:
              - "B06: Context Engineering"
              - "B16: Context Window Optimization"
            real_world_analogies:
              - "Like witness testimony: some sources more credible than others"

          - name: "nondeterministic_memory_challenges"
            definition: "Semantic memory retrieval is inherently nondeterministic: same query may return different results on different runs due to embedding model variations, similarity threshold differences, query phrasing sensitivity. This creates testing and validation challenges. Design implications: cannot rely on exact retrieval consistency; multiple runs needed for validation; must handle gracefully when retrieval results vary; confidence scores become critical."
            how_it_works: |
              Sources of Nondeterminism:
              1. Embedding model: different models produce different vectors
              2. Similarity metric: cosine vs Euclidean vs other
              3. Threshold: same embeddings, different threshold = different results
              4. Phrasing: "customer is happy" vs "satisfied customer" different vectors
              5. Index state: concurrent inserts may affect ranking

              Practical Implications:
              1. Test cannot assert: "retrieve 'John' returns exact John record"
              2. Must assert: "retrieve returns record with John, similarity > 0.95"
              3. Flaky tests: retrieval-based assertions fail randomly
              4. Caching helps: deterministic when cached, nondeterministic on miss

              Validation Strategies:
              1. Multiple runs: run same query 3-5 times, check consistency
              2. Statistical: measure p(relevant result returned), should be > 95%
              3. Robustness: test with slight query variations (synonyms, paraphrasing)
              4. Confidence bounds: accept results above confidence threshold only

              Design Implications:
              1. Never rely on "exact retrieval" in critical paths
              2. Use importance scoring: combine retrieval with other signals
              3. Caching: prefer cached (deterministic) over fresh (nondeterministic)
              4. Fallbacks: have alternate fact sources
            design_decisions:
              - "Accept nondeterminism: cannot be eliminated"
              - "Use confidence scores: quantify reliability"
              - "Multiple runs for validation: measure consistency"
              - "Graceful degradation: fallbacks when retrieval fails"
            implementation:
              code_scaffold: |
                import statistics
                from typing import List, Dict

                class NondeterministicMemoryValidator:
                    def __init__(self, runs: int = 5):
                        self.runs = runs

                    async def test_retrieval_consistency(self,
                                                        query: str,
                                                        memory_system) -> Dict[str, any]:
                        """Test retrieval consistency over multiple runs"""

                        results = []
                        top_item_consistency = []

                        for run in range(self.runs):
                            try:
                                retrieved = await memory_system.retrieve(query)
                                results.append(retrieved)

                                # Track top item consistency
                                if retrieved:
                                    top_item = retrieved[0]["id"]
                                    top_item_consistency.append(top_item)
                            except Exception as e:
                                print(f"Run {run} failed: {e}")

                        # Analyze consistency
                        unique_top_items = set(top_item_consistency)
                        top_item_consistency_rate = (
                            len([t for t in top_item_consistency if t == top_item_consistency[0]]) /
                            len(top_item_consistency)
                        )

                        return {
                            "runs": self.runs,
                            "successful_runs": len(results),
                            "top_item_consistency": top_item_consistency_rate,
                            "unique_top_items": len(unique_top_items),
                            "recommendation": (
                                "high_confidence" if top_item_consistency_rate > 0.95
                                else "medium_confidence" if top_item_consistency_rate > 0.8
                                else "low_confidence"
                            )
                        }

                    async def robust_retrieve(self, query: str,
                                            memory_system,
                                            min_consistency: float = 0.9) -> Dict:
                        """Retrieve with consistency guarantee"""

                        # Run query multiple times
                        results = []
                        for _ in range(self.runs):
                            try:
                                retrieved = await memory_system.retrieve(query)
                                results.append(retrieved)
                            except:
                                pass

                        if not results:
                            return {"error": "Retrieval failed all runs", "fallback": True}

                        # Check consistency: did we get similar results?
                        top_items = [r[0]["id"] if r else None for r in results]
                        consistency = sum(1 for t in top_items if t == top_items[0]) / len(top_items)

                        if consistency >= min_consistency:
                            return {
                                "success": True,
                                "result": results[0],
                                "consistency": consistency,
                                "confidence": "high"
                            }
                        else:
                            # Inconsistent: return with lower confidence
                            return {
                                "success": True,
                                "result": results[0],
                                "consistency": consistency,
                                "confidence": "low",
                                "warning": "Inconsistent retrieval, consider fallback"
                            }

                class FailoverRetrieval:
                    """Fallback strategies for nondeterministic retrieval"""

                    def __init__(self, semantic_memory, kb_fallback, default_fallback):
                        self.semantic = semantic_memory
                        self.kb_fallback = kb_fallback  # Alternative source
                        self.default = default_fallback  # Last resort

                    async def retrieve_with_fallback(self, query: str) -> Dict:
                        """Try semantic, fallback to KB, then default"""

                        try:
                            # Try semantic retrieval
                            result = await self.semantic.retrieve(query)
                            if result and len(result) > 0:
                                return {"source": "semantic", "data": result[0]}
                        except Exception as e:
                            print(f"Semantic retrieval failed: {e}")

                        try:
                            # Fallback to knowledge base
                            result = await self.kb_fallback.query(query)
                            if result:
                                return {"source": "knowledge_base", "data": result}
                        except Exception as e:
                            print(f"KB fallback failed: {e}")

                        # Final fallback
                        return {
                            "source": "default",
                            "data": self.default,
                            "note": "Using default fallback"
                        }
              pseudocode: |
                test_retrieval_consistency():
                1. For run=1 to runs:
                   a. Execute: retrieve(query)
                   b. Capture: top item ID
                2. Analyze results:
                   a. Count: how many runs returned same top item
                   b. Consistency = matches / runs
                3. Return: consistency rate and recommendation

                robust_retrieve():
                1. Run retrieve(query) N times
                2. Collect results
                3. Compare: are top items consistent?
                4. If consistency >= threshold: return with high_confidence
                5. Else: return with low_confidence + warning

                retrieve_with_fallback():
                1. Try: semantic retrieval
                2. If success: return
                3. Else: try KB fallback
                4. If success: return
                5. Else: return default
                6. Mark source for debugging
            sources:
              - "B16: Nondeterminism in Retrieval"
            real_world_analogies:
              - "Like weather forecasting: same data produces slightly different results"

          - name: "cross_agent_memory_sharing"
            definition: "Multi-agent teams benefit from shared organizational memory: facts, lessons, successful strategies accumulated across agents and sessions. Transactive memory systems (TMS) track which team members know what. Zep platform enables collective memory: consolidated facts accessible to all agents. MCP becomes organizational connector: agents publish findings, subscribe to others' discoveries. Novices benefit most from shared knowledge (overcome cold start). Measurement: team performance improves with shared memory."
            how_it_works: |
              Transactive Memory System (TMS):
              1. Directory: who knows what (meta-knowledge)
              2. Example: "Agent A knows customer preferences, Agent B knows inventory"
              3. Cross-agent queries: find agent with relevant knowledge
              4. Credibility: track accuracy of each agent's knowledge

              Organizational Memory Structure:
              1. Team findings: discoveries shared by all agents
              2. Lessons learned: what worked, what failed
              3. Domain knowledge: facts and patterns
              4. Temporal: recent discoveries prioritized

              MCP-Based Sharing:
              1. Agent A discovers insight: publishes via MCP resource
              2. Agent B queries: finds A's resource, retrieves insight
              3. Bi-directional: both read and write to shared memory
              4. Aggregation: combine insights from multiple agents

              Zep Platform Pattern:
              1. Summarize: consolidate long conversations
              2. Extract: facts from unstructured text
              3. Deduplicate: merge similar facts
              4. Organize: taxonomies and relationships
              5. Share: all agents can query

              Cold Start Problem:
              1. New agent starts with no personal experience
              2. Access shared memory: instant context from team
              3. Accelerates learning: don't repeat team's mistakes
              4. Enables specialization: focus on novel problems
            design_decisions:
              - "Organizational memory: shared, not siloed"
              - "TMS directory: efficient routing of queries"
              - "MCP integration: agents as memory sources"
              - "Consolidation: summaries not raw data"
              - "Credibility tracking: whose knowledge is reliable"
            implementation:
              code_scaffold: |
                from typing import Dict, List, Set

                class TransactiveMemoryDirectory:
                    """Track what each agent knows"""

                    def __init__(self):
                        self.agent_knowledge: Dict[str, Set[str]] = {}
                        self.knowledge_holders: Dict[str, Set[str]] = {}

                    def register_knowledge(self, agent_id: str,
                                         knowledge_topics: List[str]):
                        """Agent declares what it knows"""
                        self.agent_knowledge[agent_id] = set(knowledge_topics)

                        for topic in knowledge_topics:
                            if topic not in self.knowledge_holders:
                                self.knowledge_holders[topic] = set()
                            self.knowledge_holders[topic].add(agent_id)

                    def find_expert(self, topic: str) -> List[str]:
                        """Find agents who know about topic"""
                        return list(self.knowledge_holders.get(topic, []))

                    def cross_agent_query(self, query: str) -> Dict[str, List[str]]:
                        """Find all agents with relevant knowledge"""
                        relevant = {}

                        for topic, agents in self.knowledge_holders.items():
                            if query.lower() in topic.lower():
                                relevant[topic] = list(agents)

                        return relevant

                class OrganizationalMemory:
                    """Shared memory accessible to all agents"""

                    def __init__(self, storage_backend):
                        self.storage = storage_backend
                        self.facts: Dict[str, Dict] = {}
                        self.lessons: List[Dict] = []

                    async def publish_fact(self, agent_id: str,
                                          fact: str,
                                          category: str,
                                          credibility: float = 0.9):
                        """Publish fact to organizational memory"""

                        fact_id = f"{agent_id}_{datetime.utcnow().timestamp()}"

                        self.facts[fact_id] = {
                            "content": fact,
                            "category": category,
                            "source_agent": agent_id,
                            "timestamp": datetime.utcnow().isoformat(),
                            "credibility": credibility,
                            "accessed_by": []
                        }

                        await self.storage.insert("org_facts", self.facts[fact_id])

                    async def publish_lesson(self, agent_id: str,
                                           lesson: str,
                                           outcome: str):
                        """Publish lesson learned"""

                        self.lessons.append({
                            "lesson": lesson,
                            "outcome": outcome,
                            "source_agent": agent_id,
                            "timestamp": datetime.utcnow().isoformat()
                        })

                        await self.storage.insert("lessons", self.lessons[-1])

                    async def query_shared_knowledge(self, agent_id: str,
                                                  query: str) -> List[Dict]:
                        """Query organizational memory"""

                        # Search facts
                        matching_facts = [
                            f for f in self.facts.values()
                            if query.lower() in f["content"].lower()
                        ]

                        # Track access
                        for fact in matching_facts:
                            fact["accessed_by"].append(agent_id)

                        # Search lessons
                        matching_lessons = [
                            l for l in self.lessons
                            if query.lower() in l["lesson"].lower()
                        ]

                        return matching_facts + matching_lessons

                class MCPMemoryConnector:
                    """MCP-based agent memory sharing"""

                    def __init__(self, mcp_client):
                        self.mcp = mcp_client

                    async def register_as_memory_source(self, agent_id: str,
                                                      get_knowledge_fn):
                        """Register agent as MCP memory provider"""

                        # MCP tool: get_agent_knowledge
                        await self.mcp.register_tool(
                            f"get_knowledge_{agent_id}",
                            description=f"Get knowledge from {agent_id}",
                            handler=get_knowledge_fn
                        )

                    async def query_agent_knowledge(self, agent_id: str,
                                                  query: str) -> List[Dict]:
                        """Query another agent's knowledge via MCP"""

                        tool_name = f"get_knowledge_{agent_id}"
                        result = await self.mcp.call_tool(
                            tool_name,
                            {"query": query}
                        )

                        return result

                class ColdStartMitigation:
                    """Help new agents leverage team knowledge"""

                    def __init__(self, org_memory: OrganizationalMemory,
                                tms: TransactiveMemoryDirectory):
                        self.org_mem = org_memory
                        self.tms = tms

                    async def bootstrap_new_agent(self, agent_id: str,
                                                domain: str) -> Dict:
                        """Initialize new agent with team knowledge"""

                        # Find domain experts
                        experts = self.tms.find_expert(domain)

                        # Retrieve domain knowledge
                        knowledge = await self.org_mem.query_shared_knowledge(
                            agent_id,
                            domain
                        )

                        # Retrieve lessons learned
                        lessons = [
                            l for l in self.org_mem.lessons
                            if domain.lower() in l["lesson"].lower()
                        ]

                        return {
                            "domain_experts": experts,
                            "domain_knowledge": knowledge,
                            "lessons_learned": lessons,
                            "initialization_complete": True
                        }
              pseudocode: |
                TransactiveMemoryDirectory:
                1. register_knowledge(agent_id, topics):
                   a. agent_knowledge[agent_id] = topics
                   b. For each topic: knowledge_holders[topic].add(agent_id)
                2. find_expert(topic): return knowledge_holders[topic]
                3. cross_agent_query(query): find all matching topics/agents

                OrganizationalMemory:
                1. publish_fact(agent, fact, category):
                   a. Create fact_id
                   b. Store with credibility, timestamp
                   c. Insert to storage
                2. query_shared_knowledge(agent, query):
                   a. Search facts by query
                   b. Track: accessed_by.append(agent)
                   c. Search lessons by query
                   d. Return combined results

                MCPMemoryConnector:
                1. register_as_memory_source(agent, handler):
                   a. MCP tool: get_knowledge_{agent}
                   b. Handler returns agent's knowledge
                2. query_agent_knowledge(agent, query):
                   a. Call MCP tool: get_knowledge_{agent}
                   b. Return result

                ColdStartMitigation:
                1. bootstrap_new_agent(agent, domain):
                   a. Find domain experts: TMS.find_expert(domain)
                   b. Retrieve knowledge: org_mem.query(domain)
                   c. Retrieve lessons: filter lessons by domain
                   d. Return initialization context
            sources:
              - "B16 Ch5: Cross-Agent Memory and Team Learning"
            real_world_analogies:
              - "Like company wiki: all employees access shared knowledge base"

