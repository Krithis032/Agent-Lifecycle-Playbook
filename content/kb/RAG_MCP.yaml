    agent_protocols:
        description: "Inter-agent communication protocols enabling autonomous agent coordination, negotiation, and transactions"
        nodes:

          - name: "a2a_protocol"
            definition: "Agent-to-Agent (A2A) protocol enables direct communication between agents for task delegation, capability discovery, and information exchange. Agent cards describe capabilities via natural language with example inputs/outputs. Task messages include: agent_id, request_id, task description, parameters, priority, deadline. Agent registries enable discovery via keywords or capability matching. Fallback mechanisms handle missing or unavailable agents."
            how_it_works: |
              Agent Card Creation:
              1. Agent defines capabilities: name, description, input_schema, output_schema
              2. Provides examples: input -> output demonstrations
              3. Registers in agent registry with keywords
              4. Card published: other agents can discover

              Capability Discovery:
              1. Agent A searches registry: find_agent(keyword="scheduling")
              2. Returns matching agents with cards
              3. Agent A reviews cards: capabilities, examples, reliability
              4. Selects agent B for task

              Task Delegation:
              1. Agent A creates message:
                 {agent_id, request_id, task, parameters, priority, deadline}
              2. Sends to Agent B (via MCP)
              3. Agent B receives, validates, executes
              4. Returns result or error
              5. Agent A handles response

              Reliability and Fallback:
              1. Track agent response times: reliability_score
              2. If Agent B unavailable: try next-best match
              3. If all agents fail: fallback to manual handling
              4. Timeout handling: if response exceeds deadline, escalate
            design_decisions:
              - "Natural language agent cards: human-readable, discoverable"
              - "Request_id for correlation: enables async tracking"
              - "Priority+deadline: enables scheduling decisions"
              - "Registry pattern: decentralized discovery"
              - "Reliability scoring: enables intelligent fallback"
            implementation:
              code_scaffold: |
                from dataclasses import dataclass
                from datetime import datetime, timedelta
                from typing import Dict, List

                @dataclass
                class AgentCard:
                    agent_id: str
                    name: str
                    description: str
                    input_schema: Dict
                    output_schema: Dict
                    examples: List[Dict]  # [{input, output}, ...]
                    keywords: List[str]
                    reliability_score: float = 0.95

                class AgentRegistry:
                    def __init__(self):
                        self.agents: Dict[str, AgentCard] = {}
                        self.reliability_history: Dict[str, List[bool]] = {}

                    def register_agent(self, card: AgentCard):
                        """Register agent in discovery registry"""
                        self.agents[card.agent_id] = card
                        self.reliability_history[card.agent_id] = []

                    def find_agent(self, keyword: str,
                                 required_capabilities: List[str] = None) -> List[AgentCard]:
                        """Discover agents by keyword and capabilities"""
                        matches = []

                        for agent in self.agents.values():
                            # Check keyword match
                            if keyword.lower() not in [k.lower() for k in agent.keywords]:
                                continue

                            # Check required capabilities
                            if required_capabilities:
                                has_all = all(
                                    cap in agent.description
                                    for cap in required_capabilities
                                )
                                if not has_all:
                                    continue

                            matches.append(agent)

                        # Sort by reliability
                        matches.sort(
                            key=lambda a: a.reliability_score,
                            reverse=True
                        )

                        return matches

                @dataclass
                class TaskMessage:
                    agent_id: str
                    request_id: str
                    task: str
                    parameters: Dict
                    priority: int  # 1-5, 5=highest
                    deadline: datetime

                class A2AProtocol:
                    def __init__(self, registry: AgentRegistry):
                        self.registry = registry

                    async def delegate_task(self, from_agent_id: str,
                                           to_agent_id: str,
                                           task: str,
                                           parameters: Dict,
                                           priority: int = 3) -> Dict:
                        """Send task to another agent"""

                        deadline = datetime.utcnow() + timedelta(minutes=5)

                        message = TaskMessage(
                            agent_id=to_agent_id,
                            request_id=f"req_{from_agent_id}_{uuid.uuid4()}",
                            task=task,
                            parameters=parameters,
                            priority=priority,
                            deadline=deadline
                        )

                        # Send via MCP
                        result = await self._send_task(to_agent_id, message)

                        # Track reliability
                        self._record_reliability(to_agent_id, result["success"])

                        return result

                    async def delegate_with_fallback(self,
                                                   from_agent_id: str,
                                                   task: str,
                                                   parameters: Dict,
                                                   required_caps: List[str]) -> Dict:
                        """Find agent, delegate with fallback"""

                        # Find candidates
                        candidates = self.registry.find_agent(
                            keyword=task.split()[0],
                            required_capabilities=required_caps
                        )

                        if not candidates:
                            return {"error": "No matching agent found"}

                        # Try each candidate
                        for candidate in candidates:
                            try:
                                result = await self.delegate_task(
                                    from_agent_id,
                                    candidate.agent_id,
                                    task,
                                    parameters
                                )
                                if result.get("success"):
                                    return result
                            except Exception as e:
                                print(f"Agent {candidate.agent_id} failed: {e}")

                        return {"error": "All agents failed"}

                    def _record_reliability(self, agent_id: str, success: bool):
                        """Update reliability score"""
                        history = self.registry.reliability_history[agent_id]
                        history.append(success)

                        # Keep recent 100 results
                        if len(history) > 100:
                            history.pop(0)

                        # Update score
                        success_rate = sum(history) / len(history)
                        self.registry.agents[agent_id].reliability_score = success_rate
              pseudocode: |
                register_agent():
                1. Create AgentCard with capabilities, examples
                2. Add to agents dict
                3. Initialize reliability_history list

                find_agent():
                1. Iterate agents
                2. Check if keyword in agent.keywords
                3. Check if required_capabilities in agent description
                4. Collect matches
                5. Sort by reliability_score descending
                6. Return matches

                delegate_task():
                1. Create TaskMessage: agent_id, request_id, task, params, deadline
                2. Send via MCP to agent
                3. Wait for response
                4. Record reliability: success=true/false
                5. Return result

                delegate_with_fallback():
                1. find_agent(keyword, required_capabilities)
                2. For each candidate (in reliability order):
                   a. Try delegate_task()
                   b. If success: return result
                   c. If failure: continue to next
                3. If all fail: return error
            sources:
              - "B04 Ch8: Agent-to-Agent Communication"
            real_world_analogies:
              - "Like contractor hiring: find capable contractor, delegate task, verify completion"

          - name: "agent_commerce_protocol"
            definition: "Agent Commerce Protocol (ACP) enables autonomous economic transactions between agents. Five phases: Discovery (service listings), Negotiation (price/terms), Agreement (signed contract), Execution (service delivery), Settlement (payment). Contract structure: {buyer_id, seller_id, service, price, terms, signature}. Blockchain or escrow provides settlement mechanism ensuring both parties fulfill obligations."
            how_it_works: |
              Phase 1 - Discovery:
              1. Buyer Agent searches marketplace: services matching criteria
              2. Seller Agent publishes service offerings with terms
              3. Service listing: {description, price, availability, SLA}
              4. Buyer reviews options

              Phase 2 - Negotiation:
              1. Buyer sends: proposal {service, quantity, desired_price, deadline}
              2. Seller evaluates: can deliver? at what cost?
              3. Seller responds: counter-proposal with adjusted price/terms
              4. Back-and-forth until agreement or timeout

              Phase 3 - Agreement:
              1. Both parties agree on: service scope, price, delivery date
              2. Create contract: {buyer_id, seller_id, service, price, terms}
              3. Cryptographic signing: buyer signs, seller signs
              4. Contract recorded immutably (blockchain or DB)

              Phase 4 - Execution:
              1. Seller begins service delivery
              2. Buyer monitors: is service being delivered as promised?
              3. Checkpoints: partial delivery, quality verification
              4. Seller completes service

              Phase 5 - Settlement:
              1. Buyer confirms service satisfactory
              2. Escrow releases payment to Seller
              3. Transaction recorded
              4. Both parties settle reputation
            design_decisions:
              - "Five phases: structured, handles common failure modes"
              - "Contract signing: authenticity, non-repudiation"
              - "Escrow: protects both parties during execution"
              - "Blockchain: immutable record, decentralized trust"
              - "SLA enforcement: automatic penalties for non-performance"
            implementation:
              code_scaffold: |
                from dataclasses import dataclass
                from datetime import datetime
                from typing import Dict, List

                @dataclass
                class Contract:
                    id: str
                    buyer_id: str
                    seller_id: str
                    service: str
                    price: float
                    terms: Dict  # {delivery_date, quality_level, sla_penalty, etc}
                    status: str  # pending, signed, executing, completed
                    buyer_signature: str
                    seller_signature: str
                    created_at: datetime

                class AgentCommerceProtocol:
                    def __init__(self, marketplace, escrow):
                        self.marketplace = marketplace
                        self.escrow = escrow
                        self.contracts: Dict[str, Contract] = {}

                    # Phase 1: Discovery
                    async def discover_services(self, buyer_id: str,
                                              service_query: str) -> List[Dict]:
                        """Search marketplace for services"""
                        return self.marketplace.search(service_query)

                    # Phase 2: Negotiation
                    async def propose_negotiation(self, buyer_id: str,
                                                service: str,
                                                proposed_price: float) -> Dict:
                        """Buyer initiates negotiation"""
                        proposal = {
                            "buyer_id": buyer_id,
                            "service": service,
                            "proposed_price": proposed_price,
                            "deadline": datetime.utcnow() + timedelta(hours=1)
                        }
                        # Send to seller, seller responds with counter-proposal
                        return proposal

                    # Phase 3: Agreement
                    async def create_contract(self, buyer_id: str,
                                            seller_id: str,
                                            service: str,
                                            price: float,
                                            terms: Dict) -> Contract:
                        """Create and sign contract"""

                        contract = Contract(
                            id=f"contract_{uuid.uuid4()}",
                            buyer_id=buyer_id,
                            seller_id=seller_id,
                            service=service,
                            price=price,
                            terms=terms,
                            status="pending",
                            buyer_signature="",
                            seller_signature="",
                            created_at=datetime.utcnow()
                        )

                        # Both parties sign
                        contract.buyer_signature = self._sign(buyer_id, contract)
                        contract.seller_signature = self._sign(seller_id, contract)
                        contract.status = "signed"

                        self.contracts[contract.id] = contract
                        return contract

                    # Phase 4: Execution
                    async def begin_execution(self, contract_id: str):
                        """Seller begins service delivery"""
                        contract = self.contracts[contract_id]
                        contract.status = "executing"

                    async def verify_checkpoint(self, contract_id: str,
                                              checkpoint_num: int,
                                              verified: bool) -> Dict:
                        """Buyer verifies checkpoint of service"""
                        contract = self.contracts[contract_id]

                        return {
                            "contract_id": contract_id,
                            "checkpoint": checkpoint_num,
                            "verified": verified,
                            "timestamp": datetime.utcnow().isoformat()
                        }

                    # Phase 5: Settlement
                    async def complete_and_settle(self, contract_id: str) -> Dict:
                        """Buyer confirms completion, settlement executes"""

                        contract = self.contracts[contract_id]

                        # Buyer confirms
                        contract.status = "completed"

                        # Escrow releases payment
                        payment_result = await self.escrow.release_payment(
                            contract.buyer_id,
                            contract.seller_id,
                            contract.price
                        )

                        return {
                            "contract_id": contract_id,
                            "status": "settled",
                            "payment": payment_result
                        }

                    def _sign(self, agent_id: str, contract: Contract) -> str:
                        """Cryptographic signature"""
                        # Simplified: real implementation uses actual crypto
                        content = json.dumps({
                            "buyer": contract.buyer_id,
                            "seller": contract.seller_id,
                            "price": contract.price,
                            "timestamp": contract.created_at.isoformat()
                        })
                        return hashlib.sha256((agent_id + content).encode()).hexdigest()
              pseudocode: |
                ACP Five Phases:

                1. Discovery:
                   a. marketplace.search(service_query)
                   b. Return matching service listings

                2. Negotiation:
                   a. buyer.propose(service, price)
                   b. seller.counter_propose(new_price)
                   c. Loop until agreement or timeout

                3. Agreement:
                   a. create_contract(buyer, seller, service, price, terms)
                   b. buyer.sign(contract)
                   c. seller.sign(contract)
                   d. status = "signed"

                4. Execution:
                   a. status = "executing"
                   b. seller.perform_service()
                   c. buyer.verify_checkpoint() at milestones
                   d. Loop until completion

                5. Settlement:
                   a. buyer.confirm_completion()
                   b. status = "completed"
                   c. escrow.release_payment(buyer, seller, price)
                   d. Record transaction
            sources:
              - "B04 Ch8: Agent Commerce Protocol"
            real_world_analogies:
              - "Like eBay transaction: browse, negotiate, purchase, verify, pay"

          - name: "nlweb_and_agentic_web"
            definition: "NLWeb and Agentic Web treat natural language as the primary service interface. Instead of REST API definitions, services are described in natural language. Intent matching via semantic embedding enables agents to find services matching their goals. Service composition chains multiple agents' natural language services. Trust and reputation systems enable agents to verify service quality and agent reliability before engaging."
            how_it_works: |
              Natural Language Service Description:
              1. Service provider: describes service in English
                 "I can analyze quarterly financial reports and extract key metrics"
              2. Embed description: vector representation of capability
              3. Register in NLWeb: description + embedding

              Intent Matching:
              1. Agent has goal: "Need quarterly metrics extracted"
              2. Embed goal to vector
              3. Search NLWeb: find services similar to goal vector
              4. Return matching services with similarity scores
              5. Select best match (highest similarity)

              Service Invocation:
              1. Agent describes task in natural language
              2. Service understands via LLM (no formal schema)
              3. Service executes using natural language spec
              4. Return result in natural language

              Composition:
              1. Service A's output fed to Service B
              2. LLM translates between natural language outputs
              3. Chain builds complex workflows from simple services

              Trust and Reputation:
              1. After service use: rate quality, reliability
              2. Aggregate ratings: service reliability score
              3. Agents can query: "services with >4.5 rating"
              4. Penalize bad actors: remove from discovery
            design_decisions:
              - "Natural language as interface: flexible, human-friendly"
              - "Semantic matching: finds relevant services by meaning"
              - "Trust systems: enable safe service selection"
              - "Composition: enables complex workflows"
            implementation:
              code_scaffold: |
                from typing import List, Dict
                import numpy as np

                class NLWebRegistry:
                    def __init__(self, embedding_model):
                        self.embedding_model = embedding_model
                        self.services: Dict[str, Dict] = {}
                        self.ratings: Dict[str, List[float]] = {}

                    def register_service(self, service_id: str,
                                       description: str,
                                       executor_fn):
                        """Register service with natural language description"""

                        embedding = self.embedding_model.encode(description)

                        self.services[service_id] = {
                            "id": service_id,
                            "description": description,
                            "embedding": embedding,
                            "executor": executor_fn,
                            "created_at": datetime.utcnow().isoformat(),
                            "call_count": 0
                        }
                        self.ratings[service_id] = []

                    def find_services(self, intent: str,
                                    top_k: int = 5) -> List[Dict]:
                        """Find services matching agent intent"""

                        intent_embedding = self.embedding_model.encode(intent)

                        scored = []
                        for service_id, service in self.services.items():
                            similarity = self._cosine_similarity(
                                intent_embedding,
                                service["embedding"]
                            )
                            scored.append((service, similarity))

                        # Sort by similarity
                        scored.sort(key=lambda x: x[1], reverse=True)

                        # Add reputation
                        results = []
                        for service, similarity in scored[:top_k]:
                            reputation = self._compute_reputation(service["id"])
                            results.append({
                                "service": service,
                                "similarity": similarity,
                                "reputation": reputation,
                                "rank": len(results) + 1
                            })

                        return results

                    async def invoke_service(self, service_id: str,
                                           task_description: str) -> str:
                        """Invoke service with natural language task"""

                        service = self.services[service_id]
                        service["call_count"] += 1

                        # Service executor receives task description
                        result = await service["executor"](task_description)

                        return result

                    def rate_service(self, service_id: str, rating: float):
                        """Submit rating for service (1-5 stars)"""
                        self.ratings[service_id].append(rating)

                    def _compute_reputation(self, service_id: str) -> Dict:
                        """Compute reputation score"""
                        ratings = self.ratings[service_id]
                        if not ratings:
                            return {
                                "average": 0.0,
                                "count": 0,
                                "reliability": "unknown"
                            }

                        avg = sum(ratings) / len(ratings)
                        return {
                            "average": avg,
                            "count": len(ratings),
                            "reliability": "high" if avg >= 4.5 else "medium" if avg >= 3.5 else "low"
                        }

                    def _cosine_similarity(self, vec1: np.ndarray,
                                         vec2: np.ndarray) -> float:
                        """Compute cosine similarity"""
                        return np.dot(vec1, vec2) / (
                            np.linalg.norm(vec1) * np.linalg.norm(vec2)
                        )

                class ServiceComposition:
                    """Chain natural language services"""

                    def __init__(self, nlweb: NLWebRegistry):
                        self.nlweb = nlweb

                    async def compose_workflow(self, steps: List[Dict]) -> str:
                        """Execute workflow: service_A -> service_B -> service_C"""

                        result = None

                        for step in steps:
                            service_id = step["service_id"]
                            task = step["task"]

                            # If prior result, inject into task
                            if result:
                                task = task.replace("{{PRIOR}}", result)

                            # Invoke service
                            result = await self.nlweb.invoke_service(
                                service_id,
                                task
                            )

                        return result
              pseudocode: |
                register_service():
                1. Embed description to vector
                2. Store: {service_id, description, embedding, executor_fn}

                find_services():
                1. Embed intent to vector
                2. For each service: compute cosine_similarity(intent, service_embedding)
                3. Rank by similarity
                4. Compute reputation for each
                5. Return top_k with similarity + reputation

                invoke_service():
                1. Get service executor
                2. Call executor(task_description)
                3. Executor understands task via LLM
                4. Return result

                compose_workflow():
                1. For each step:
                   a. If prior result: inject into task
                   b. invoke_service(service_id, task)
                   c. Capture result
                2. Return final result
            sources:
              - "B04 Ch8: NLWeb and Agentic Web"
            real_world_analogies:
              - "Like Google Search: describe what you want, find matching results"

          - name: "internet_of_agents_vision"
            definition: "Internet of Agents (IoA) is a vision of a global, interconnected agent network with standardized communication. Components: universal agent registry (findability), global naming scheme (identifiers), standardized message format (MCP), decentralized reputation systems (trust), cryptographic signing (authenticity). Convergence of MCP + A2A + ACP + NLWeb creates a seamless agent ecosystem where any agent can discover and interact with any other."
            how_it_works: |
              Universal Registry:
              1. Global registry: all agents register identity, capabilities
              2. DHT (Distributed Hash Table) or centralized: both viable
              3. Query: find_agent(capabilities=X, reputation>4.5)
              4. Enables cross-domain discovery

              Global Naming:
              1. Agent identifiers: unique, persistent
              2. Format: domain/agent_type/instance_name
                Example: anthropic.com/data_analyst/quarterly_report_bot
              3. Enables routing: messages find right agent globally

              Standardized Messages:
              1. All communication via MCP JSON-RPC 2.0
              2. Tools/resources defined via schema
              3. Interoperability: agent from any domain can talk to any other

              Decentralized Reputation:
              1. Each agent publishes ratings and reviews
              2. Global reputation aggregated from distributed sources
              3. No single point of failure
              4. Malicious actors identified and filtered

              Cryptographic Trust:
              1. Agent digital signature: proves identity
              2. Message signing: prevents tampering
              3. Chain of trust: verify agent credentials
            design_decisions:
              - "Decentralization: no single controller, resilient"
              - "Open standards: MCP enables vendor independence"
              - "Reputation: enables trust in unknown agents"
              - "Global naming: enables reference and discovery"
            implementation:
              code_scaffold: |
                from typing import Dict, List
                import hashlib

                class GlobalAgentRegistry:
                    """Distributed registry of all agents"""

