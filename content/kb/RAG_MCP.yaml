    # =========================================================================
    # DOMAINS: MCP, Memory, Protocols, Data Architecture
    # =========================================================================

    mcp_implementation:
        description: "Model Context Protocol deep implementation patterns, message formats, client-server architecture, multi-agent orchestration, and error handling strategies"
        nodes:

          - name: "mcp_message_format_and_protocol"
            definition: "MCP uses JSON-RPC 2.0 as its underlying message format, encoding all communication as clean JSON objects with UTF-8 encoding. Messages are transmitted as single-line outputs (no embedded newlines) with protocol versioning support. The protocol requires connection validation and security rules enforcement. Each MCP message contains protocol_version, sender, content, and metadata fields that enable robust inter-agent communication and capability negotiation."
            how_it_works: |
              1. Agent creates a message object with protocol_version (typically "1.0"), sender identifier, and content payload
              2. Message is serialized to JSON string using UTF-8 encoding
              3. Message is transmitted as single line (newlines escaped) over transport layer
              4. Receiving agent validates protocol version and required fields
              5. Sender identity is verified against security rules
              6. Content is parsed and routed to appropriate handler
              7. Optional metadata (timestamps, priority, request_id) enables correlation and retry logic
            design_decisions:
              - "Single-line protocol allows streaming over STDIO without buffering issues"
              - "JSON-RPC 2.0 standardization enables cross-platform compatibility"
              - "UTF-8 requirement ensures international character support and unicode safety"
              - "Metadata field supports extensibility without protocol version changes"
              - "No embedded newlines prevents accidental message boundary violations"
            implementation:
              code_scaffold: |
                import json
                import uuid
                from datetime import datetime

                def create_mcp_message(sender, content, metadata=None):
                    """Create a valid MCP message object"""
                    return {
                        "protocol_version": "1.0",
                        "sender": sender,
                        "content": content,
                        "metadata": metadata or {
                            "timestamp": datetime.utcnow().isoformat(),
                            "request_id": str(uuid.uuid4())
                        }
                    }

                def serialize_mcp_message(msg):
                    """Serialize to single-line JSON for transport"""
                    json_str = json.dumps(msg, separators=(',', ':'))
                    # Ensure no newlines embedded
                    if '\n' in json_str or '\r' in json_str:
                        raise ValueError("Message contains forbidden newlines")
                    return json_str + '\n'

                def validate_mcp_message(json_str):
                    """Validate message structure before processing"""
                    required_keys = {"protocol_version", "sender", "content"}
                    try:
                        msg = json.loads(json_str)
                        if not isinstance(msg, dict):
                            raise TypeError("Message must be JSON object")
                        if not required_keys.issubset(msg.keys()):
                            missing = required_keys - msg.keys()
                            raise ValueError(f"Missing required fields: {missing}")
                        if msg["protocol_version"] != "1.0":
                            raise ValueError(f"Unsupported protocol version: {msg['protocol_version']}")
                        return msg
                    except json.JSONDecodeError as e:
                        raise ValueError(f"Invalid JSON: {e}")
              pseudocode: |
                1. Initialize message with protocol_version="1.0"
                2. Set sender to agent identifier
                3. Populate content with payload (tools, resources, responses)
                4. Add metadata: timestamp (ISO 8601), request_id (UUID)
                5. Serialize to JSON with compact separators
                6. Validate no embedded newlines or control characters
                7. Append single newline for transport
                8. On receive: validate required_keys, version, JSON format
                9. Route to handler based on content type
            sources:
              - "B12 Ch2: MCP Protocol Specification"
              - "B04 Ch8: Transport Layer Design"
            real_world_analogies:
              - "Like HTTP request/response format: headers (metadata), body (content), version number"
              - "Similar to email SMTP protocol: single-line message boundaries, structured headers"

          - name: "mcp_transport_layers"
            definition: "MCP abstracts over multiple transport mechanisms to support different deployment scenarios. STDIO connects agents on the same machine via standard input/output streams. HTTP enables agent distribution across servers with REST semantics. WebSocket provides real-time bidirectional communication for low-latency scenarios. All transports carry the same JSON-RPC 2.0 message format, making MCP a true 'USB-C port for AI' that works across deployment architectures."
            how_it_works: |
              STDIO Transport:
              1. Parent process spawns MCP server process with stdin/stdout pipes
              2. Client writes JSON-RPC messages to server's stdin
              3. Server responds by writing JSON-RPC messages to stdout
              4. Process stays alive for message exchange duration
              5. Error messages go to stderr (separate channel)

              HTTP Transport:
              1. MCP server exposes REST API endpoint (e.g., POST /mcp/message)
              2. Client makes HTTP requests with MCP message as JSON body
              3. Server processes and returns response in HTTP response body
              4. Optional versioning header: X-MCP-Version: 1.0
              5. HTTP verbs: POST for send, GET for discovery

              WebSocket Transport:
              1. Client initiates WebSocket connection to server endpoint
              2. Both directions can send messages (full duplex)
              3. Connection persists for session duration
              4. Heartbeat frames prevent timeout
              5. Enables bidirectional subscriptions and streaming
            design_decisions:
              - "STDIO chosen for simplicity: no network setup, process isolation, resource efficiency"
              - "HTTP chosen for scalability: load balancing, stateless servers, firewall friendly"
              - "WebSocket chosen for low-latency bidirectional: real-time agents, streaming responses"
              - "Protocol abstraction means same agent code works across transports"
              - "Versioning headers enable backward compatibility during upgrades"
            implementation:
              code_scaffold: |
                # STDIO Transport
                import subprocess
                import json

                class StdioMCPClient:
                    def __init__(self, command, args):
                        self.process = subprocess.Popen(
                            [command] + args,
                            stdin=subprocess.PIPE,
                            stdout=subprocess.PIPE,
                            stderr=subprocess.PIPE,
                            text=True
                        )

                    def send_message(self, msg):
                        json_str = json.dumps(msg)
                        self.process.stdin.write(json_str + '\n')
                        self.process.stdin.flush()

                    def receive_message(self):
                        response_line = self.process.stdout.readline()
                        return json.loads(response_line)

                # HTTP Transport
                import httpx

                class HttpMCPClient:
                    def __init__(self, base_url):
                        self.base_url = base_url
                        self.client = httpx.Client()

                    def send_message(self, msg):
                        headers = {"X-MCP-Version": "1.0"}
                        response = self.client.post(
                            f"{self.base_url}/mcp/message",
                            json=msg,
                            headers=headers
                        )
                        return response.json()

                # WebSocket Transport
                import websockets
                import asyncio

                class WebSocketMCPClient:
                    def __init__(self, server_uri):
                        self.server_uri = server_uri
                        self.websocket = None

                    async def connect(self):
                        self.websocket = await websockets.connect(self.server_uri)

                    async def send_message(self, msg):
                        await self.websocket.send(json.dumps(msg))

                    async def receive_message(self):
                        response = await self.websocket.recv()
                        return json.loads(response)
              pseudocode: |
                STDIO:
                1. Spawn child process with command and arguments
                2. Serialize message to JSON, append newline
                3. Write to process stdin, flush buffer
                4. Read line from stdout until newline
                5. Deserialize JSON response

                HTTP:
                1. Serialize message to JSON
                2. Add X-MCP-Version header
                3. POST to /mcp/message endpoint
                4. Extract response body
                5. Deserialize JSON

                WebSocket:
                1. Establish persistent connection to server
                2. Serialize message to JSON
                3. Send frame on open connection
                4. Wait for response frame
                5. Deserialize JSON
            sources:
              - "B12 Ch2: MCP Transport Specification"
              - "B04 Ch8: Multi-Agent Communication"
              - "R03: Anthropic MCP Announcement"
            real_world_analogies:
              - "STDIO like talking through pipes: same machine, shared processes, fast"
              - "HTTP like REST API calls: distributed, scalable, stateless"
              - "WebSocket like phone call: real-time, bidirectional, persistent"
              - "MCP as 'USB-C port for AI': universal connector for heterogeneous systems (Anthropic metaphor)"

          - name: "mcp_client_server_architecture"
            definition: "MCP follows a client-server architecture where MCP Servers expose tools, resources, and capabilities, and MCP Clients consume them. Servers are typically single-purpose (math tools, weather API, code execution) while clients orchestrate tasks across multiple servers. Capability negotiation happens at connection time through tool discovery and schema fetching. The protocol is stateless to enable load balancing and fault tolerance, with resources categorized as tools (callable actions) or resources (queryable data)."
            how_it_works: |
              Server Initialization:
              1. Server process starts and listens on transport (STDIO, HTTP, WebSocket)
              2. Server registers tool definitions with schemas
              3. Server registers resource definitions (URIs, MIME types)
              4. Server waits for client connections

              Client Connection:
              1. Client initiates connection to server (via transport)
              2. Client sends capability discovery request
              3. Server responds with list of available tools and resources
              4. Client caches tool schemas and resource metadata
              5. Client is ready to call tools or fetch resources

              Tool Invocation:
              1. Client sends tool call request with tool name and arguments
              2. Server validates arguments against schema
              3. Server executes tool logic
              4. Server returns result or error
              5. Client processes result

              Resource Fetching:
              1. Client sends resource request with URI
              2. Server locates and reads resource
              3. Server returns content with MIME type
              4. Client processes based on MIME type

              MultiServerMCPClient Pattern:
              1. Client maintains list of multiple server connections
              2. Client merges tool definitions from all servers
              3. Client maintains routing table: tool_name -> server_connection
              4. When tool called, client looks up correct server and invokes
            design_decisions:
              - "Stateless protocol allows server restarts without losing client state"
              - "Capability negotiation at connection time enables schema validation"
              - "Tool vs resource distinction: tools execute (stateful), resources read (stateless)"
              - "MultiServerMCPClient pattern enables seamless tool aggregation"
              - "Resource-oriented design follows REST principles"
            implementation:
              code_scaffold: |
                from typing import Dict, List, Any
                import json

                class MCPServer:
                    def __init__(self):
                        self.tools: Dict[str, Dict] = {}
                        self.resources: Dict[str, Dict] = {}

                    def register_tool(self, name: str, description: str,
                                    parameters: Dict[str, Any]):
                        """Register a callable tool with schema"""
                        self.tools[name] = {
                            "name": name,
                            "description": description,
                            "inputSchema": {
                                "type": "object",
                                "properties": parameters
                            }
                        }

                    def register_resource(self, uri: str, mime_type: str,
                                        fetch_fn):
                        """Register a queryable resource"""
                        self.resources[uri] = {
                            "uri": uri,
                            "mimeType": mime_type,
                            "fetch": fetch_fn
                        }

                    async def handle_tools_list(self):
                        """Respond to client capability discovery"""
                        return {"tools": list(self.tools.values())}

                    async def handle_tool_call(self, tool_name: str, arguments: Dict):
                        """Execute tool with arguments"""
                        if tool_name not in self.tools:
                            return {"error": f"Tool not found: {tool_name}"}
                        # Execute tool logic here
                        return {"result": "success"}

                class MultiServerMCPClient:
                    def __init__(self, servers: List[Dict[str, Any]]):
                        self.servers = {}
                        self.tool_routing = {}  # tool_name -> server_name
                        self.resources_routing = {}  # uri -> server_name

                    async def initialize(self):
                        """Connect to all servers and discover capabilities"""
                        for server_config in self.servers:
                            name = server_config["name"]
                            client = await self._connect_server(server_config)
                            self.servers[name] = client

                            # Discover tools
                            tools = await client.get_tools()
                            for tool in tools:
                                self.tool_routing[tool["name"]] = name

                            # Discover resources
                            resources = await client.get_resources()
                            for resource in resources:
                                self.resources_routing[resource["uri"]] = name

                    async def call_tool(self, tool_name: str, **kwargs):
                        """Route tool call to appropriate server"""
                        if tool_name not in self.tool_routing:
                            raise ValueError(f"Tool not found: {tool_name}")

                        server_name = self.tool_routing[tool_name]
                        server = self.servers[server_name]
                        return await server.call_tool(tool_name, kwargs)

                    async def fetch_resource(self, uri: str):
                        """Route resource fetch to appropriate server"""
                        if uri not in self.resources_routing:
                            raise ValueError(f"Resource not found: {uri}")

                        server_name = self.resources_routing[uri]
                        server = self.servers[server_name]
                        return await server.fetch_resource(uri)

                    async def _connect_server(self, config):
                        """Establish connection based on transport type"""
                        if config.get("type") == "stdio":
                            return StdioMCPClient(config["command"], config["args"])
                        elif config.get("type") == "http":
                            return HttpMCPClient(config["url"])
                        elif config.get("type") == "websocket":
                            return WebSocketMCPClient(config["url"])
              pseudocode: |
