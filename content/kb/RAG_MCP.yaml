          - name: "mcp_multi_agent_orchestration"
            definition: "Multi-agent orchestration in MCP combines multiple specialized agents (Researcher, Writer, Validator, Librarian) coordinated by an Orchestrator. The Orchestrator acts as project manager, never directly performing tasks but rather delegating to specialized agents and managing their outputs. Context chaining via $$STEP_X_OUTPUT$$ syntax enables dependency resolution between steps. The pattern uses robust LLM calls with retry logic, validation loops, and agent registries for centralized management. ExecutionTrace provides transparency into agent decision-making."
            how_it_works: |
              Orchestration Flow:
              1. Orchestrator receives high-level user request
              2. Orchestrator creates execution plan with numbered steps
              3. Each step assigned to specialized agent with specific task
              4. Dependencies resolved via $$STEP_X_OUTPUT$$ token substitution
              5. call_llm_robust() invokes agent with retries and backoff
              6. Agent produces output (research, draft, validation, etc.)
              7. Orchestrator captures output in ExecutionTrace
              8. Subsequent steps reference prior outputs via syntax
              9. Validator agent checks output quality/accuracy
              10. If validation fails, Orchestrator loops with refinement instructions
              11. Final output returned to user with full trace

              Agent Specialization:
              - Researcher: Gathers information, cites sources, depth-first exploration
              - Writer: Synthesizes information into polished content
              - Validator: Fact-checks, evaluates accuracy and completeness
              - Librarian: Matches patterns, retrieves from knowledge base
              - Planner: Decomposes tasks, creates execution plans
              - Orchestrator: Delegates, manages flow, ensures quality
            design_decisions:
              - "Orchestrator pattern: separation of concerns, each agent expert in domain"
              - "Context chaining via $$STEP_X_OUTPUT$$: explicit dependency graph"
              - "call_llm_robust() with retries: resilience to transient API failures"
              - "Validation loop with max_revisions: quality gates"
              - "AgentRegistry pattern: centralized agent management, discoverability"
              - "ExecutionTrace: transparency, debugging, audit trail"
            implementation:
              code_scaffold: |
                import asyncio
                import json
                from typing import Dict, List, Any
                from datetime import datetime

                class ExecutionTrace:
                    def __init__(self):
                        self.steps: List[Dict[str, Any]] = []

                    def record_step(self, step_num: int, agent: str, task: str,
                                   input_data: str, output: str):
                        self.steps.append({
                            "step": step_num,
                            "agent": agent,
                            "task": task,
                            "input": input_data,
                            "output": output,
                            "timestamp": datetime.utcnow().isoformat()
                        })

                    def get_output(self, step_num: int) -> str:
                        for step in self.steps:
                            if step["step"] == step_num:
                                return step["output"]
                        return ""

                class AgentRegistry:
                    def __init__(self):
                        self.registry: Dict[str, Any] = {}

                    def register_agent(self, name: str, handler,
                                      capabilities: List[str]):
                        self.registry[name] = {
                            "handler": handler,
                            "capabilities": capabilities
                        }

                    def get_handler(self, agent_name: str):
                        if agent_name not in self.registry:
                            raise ValueError(f"Agent not found: {agent_name}")
                        return self.registry[agent_name]["handler"]

                    def get_capabilities_description(self) -> str:
                        desc = []
                        for name, info in self.registry.items():
                            caps = ", ".join(info["capabilities"])
                            desc.append(f"{name}: {caps}")
                        return "\n".join(desc)

                async def call_llm_robust(llm_client, prompt: str,
                                        max_retries: int = 3,
                                        initial_delay: float = 5) -> str:
                    """Call LLM with exponential backoff retry"""
                    for attempt in range(max_retries):
                        try:
                            response = await llm_client.call(prompt)
                            return response
                        except Exception as e:
                            if attempt < max_retries - 1:
                                delay = initial_delay * (2 ** attempt)
                                print(f"Attempt {attempt + 1} failed: {e}. Retrying in {delay}s...")
                                await asyncio.sleep(delay)
                            else:
                                raise

                class Orchestrator:
                    def __init__(self, agent_registry: AgentRegistry,
                                llm_client):
                        self.registry = agent_registry
                        self.llm = llm_client
                        self.trace = ExecutionTrace()

                    async def orchestrate(self, user_request: str) -> str:
                        # Step 1: Create plan
                        plan_prompt = f"""
                        Given user request: {user_request}

                        Create a JSON execution plan with steps.
                        Format: {{"steps": [{{"step": 1, "agent": "Researcher",
                                            "task": "...", "dependencies": []}}]}}
                        """
                        plan_json = await call_llm_robust(self.llm, plan_prompt)

                        try:
                            plan_data = json.loads(plan_json)
                            # Handle case where LLM wraps in nested dict
                            if "steps" in plan_data:
                                steps = plan_data["steps"]
                            elif isinstance(plan_data, list):
                                steps = plan_data
                            else:
                                steps = list(plan_data.values())[0]
                        except (json.JSONDecodeError, KeyError):
                            print(f"Planner validation failed: {plan_json}")
                            raise

                        # Step 2-N: Execute plan
                        for step_data in steps:
                            step_num = step_data["step"]
                            agent_name = step_data["agent"]
                            task = step_data["task"]

                            # Resolve dependencies
                            task_with_context = task
                            dependencies = step_data.get("dependencies", [])
                            for dep_step in dependencies:
                                prev_output = self.trace.get_output(dep_step)
                                task_with_context = task_with_context.replace(
                                    f"$$STEP_{dep_step}_OUTPUT$$",
                                    prev_output
                                )

                            # Invoke agent
                            agent_handler = self.registry.get_handler(agent_name)
                            output = await agent_handler(
                                self.llm,
                                task_with_context,
                                self.trace
                            )

                            self.trace.record_step(step_num, agent_name, task,
                                                 task_with_context, output)

                        # Step Final: Return trace
                        final_step = steps[-1]["step"]
                        return self.trace.get_output(final_step)

                # Example agent handlers
                async def researcher_handler(llm, task: str, trace) -> str:
                    prompt = f"""Research task: {task}

                    Provide detailed information with citations."""
                    return await call_llm_robust(llm, prompt)

                async def writer_handler(llm, task: str, trace) -> str:
                    prompt = f"""Writing task: {task}

                    Produce polished, well-structured content."""
                    return await call_llm_robust(llm, prompt)

                async def validator_handler(llm, task: str, trace) -> str:
                    prompt = f"""Validation task: {task}

                    Check accuracy, completeness, and quality.
                    Return JSON: {{"pass": true/false, "issues": [...]}}"""
                    return await call_llm_robust(llm, prompt)
              pseudocode: |
                Orchestrator.orchestrate(user_request):
                1. Create plan via LLM: decompose into steps
                2. Parse plan JSON: extract steps, agents, tasks, dependencies
                3. For each step:
                   a. Get agent handler from registry
                   b. Resolve context dependencies using $$STEP_X_OUTPUT$$
                   c. Call llm_robust(agent, task) with max_retries=3, delay=5
                   d. Record in ExecutionTrace
                   e. If agent is Validator:
                      - If pass=false and revisions < max_revisions:
                        - Call writer again with feedback
                        - Go back to step c
                4. Return final step output to user
                5. Include full trace for transparency

                call_llm_robust():
                1. Initialize attempt=0, delay=5
                2. Loop:
                   a. Try LLM call
                   b. If success: return response
                   c. If failure and attempt < max_retries:
                      - Log error with attempt number
                      - Sleep for delay seconds
                      - Double delay for next retry
                      - Increment attempt
                   d. If max retries exceeded: raise exception
            sources:
              - "B12 Ch2: Multi-Agent Orchestration"
              - "B12 Ch3: Resilience Patterns"
              - "B04 Ch8: Agent Coordination"
            real_world_analogies:
              - "Orchestrator as project manager: assigns tasks, tracks progress, ensures quality"
              - "Agent registry like team directory: lookup by expertise"
              - "ExecutionTrace like project log: audit trail of decisions"
              - "call_llm_robust like database transaction: retries, backoff, isolation"

          - name: "mcp_error_handling_patterns"
            definition: "MCP-based systems require robust error handling across multiple failure modes: transient API failures (retryable), validation errors (require reformulation), semantic errors (need clarification), and infrastructure failures (need fallback). Error handling follows patterns: retry with exponential backoff for transient failures, graceful degradation for unavailable services, validation before processing, empty content detection, cascading error prevention, and detailed error logging for observability."
            how_it_works: |
              Retry Mechanism:
              1. LLM call attempted
              2. If transient error (rate limit, timeout, temporary unavailable):
                 - Calculate backoff: delay * (2 ^ attempt)
                 - Sleep for backoff duration
                 - Retry request
              3. If max retries exceeded: raise exception with context

              Validation Errors:
              1. Message received and validated
              2. If required fields missing: return specific error
              3. If JSON malformed: return parse error
              4. If schema violation: return schema validation error
              5. Client informed of exactly what failed

              Semantic Errors:
              1. LLM produces invalid JSON (expected valid JSON response)
              2. Parser catches JSONDecodeError
              3. Log error with context and raw response
              4. Retry with clearer instructions
              5. If persistent: fallback to default value

              Empty Content Detection:
              1. After successful LLM call, validate output not empty
              2. If empty: may indicate internal error
              3. Retry with prompt augmentation
              4. If still empty: fallback or raise

              Graceful Fallback:
              1. Librarian unable to find pattern match
              2. Return default blueprint instead of error
              3. User can work with default
              4. Async task queued to improve patterns

              Cascading Error Prevention:
              1. Error in step N: don't propagate to step N+1
              2. Step N+1 gracefully handles missing N output
              3. Final output still usable (partial results)
            design_decisions:
              - "Retry logic only for transient errors: API rate limits, timeouts"
              - "No retry for semantic errors: invalid JSON, schema violation"
              - "Exponential backoff prevents server overload during outages"
              - "Graceful fallback maintains service availability"
              - "Detailed error logging enables debugging without user impact"
              - "Cascading prevention ensures partial results over complete failure"
            implementation:
              code_scaffold: |
                import asyncio
                import json
                import logging
                from typing import Any, Callable, Optional

                logger = logging.getLogger(__name__)

                class MCPError(Exception):
                    """Base exception for MCP errors"""
                    pass

                class TransientError(MCPError):
                    """Retryable error (rate limit, timeout)"""
                    pass

                class ValidationError(MCPError):
                    """Non-retryable validation error"""
                    pass

                class SemanticError(MCPError):
                    """Invalid format/schema error"""
                    pass

                async def call_llm_robust(llm_client, prompt: str,
                                        max_retries: int = 3,
                                        initial_delay: float = 5,
                                        validate_json: bool = False,
                                        fallback: Optional[Any] = None) -> str:
                    """Call LLM with comprehensive error handling"""
                    attempt = 0
                    delay = initial_delay

                    while attempt < max_retries:
                        try:
                            response = await llm_client.call(prompt)

                            # Validate response not empty
                            if not response or not response.strip():
                                raise SemanticError("Empty response from LLM")

                            # Optionally validate JSON
                            if validate_json:
                                try:
                                    json.loads(response)
                                except json.JSONDecodeError as e:
                                    raise SemanticError(f"Invalid JSON: {e}")

                            return response

                        except TransientError as e:
                            if attempt < max_retries - 1:
                                logger.warning(
                                    f"Transient error (attempt {attempt+1}): {e}. "
                                    f"Retrying in {delay}s..."
                                )
                                await asyncio.sleep(delay)
                                delay *= 2
                                attempt += 1
                            else:
                                logger.error(f"Max retries exceeded: {e}")
                                if fallback is not None:
                                    logger.info(f"Using fallback: {fallback}")
                                    return fallback
                                raise

                        except (ValidationError, SemanticError) as e:
                            logger.error(f"Non-retryable error: {e}")
                            if fallback is not None:
                                logger.info(f"Using fallback: {fallback}")
                                return fallback
                            raise

                        except Exception as e:
                            logger.error(f"Unexpected error: {type(e).__name__}: {e}")
                            raise

                class Librarian:
                    """Pattern matcher with graceful fallback"""

                    def __init__(self, llm_client, pattern_db):
                        self.llm = llm_client
                        self.pattern_db = pattern_db

                    async def find_pattern(self, query: str) -> Dict[str, Any]:
                        """Find matching pattern with fallback"""
                        try:
                            # Try to find pattern in database
                            matches = self.pattern_db.search(query)

                            if not matches:
                                # No direct match, try semantic matching
                                prompt = f"Find pattern matching: {query}"
                                response = await call_llm_robust(
                                    self.llm,
                                    prompt,
                                    max_retries=2,
                                    fallback=None
                                )

                                if response:
                                    return json.loads(response)

                            return matches[0] if matches else None

                        except Exception as e:
                            logger.warning(f"Pattern lookup failed: {e}")
                            # Return default blueprint instead of error
                            return self._get_default_blueprint()

                    def _get_default_blueprint(self) -> Dict[str, Any]:
                        """Fallback default blueprint"""
                        return {
                            "name": "default",
                            "type": "generic",
                            "template": "# Default Blueprint\n[User to fill in details]"
                        }

                def validate_mcp_message(msg: Dict) -> bool:
                    """Validate MCP message structure"""
                    required_keys = {"protocol_version", "sender", "content"}

                    if not isinstance(msg, dict):
                        raise ValidationError("Message must be JSON object")

                    missing_keys = required_keys - set(msg.keys())
                    if missing_keys:
                        raise ValidationError(f"Missing required keys: {missing_keys}")

                    if msg.get("protocol_version") != "1.0":
                        raise ValidationError(f"Unsupported protocol version: {msg.get('protocol_version')}")

                    return True

                async def execute_with_cascade_prevention(steps: List[Dict]):
                    """Execute steps with cascade error prevention"""
                    results = {}

                    for step in steps:
                        step_id = step["id"]

                        try:
                            # If step depends on previous step, use result or default
                            dependency = step.get("depends_on")
                            if dependency:
                                if dependency not in results:
                                    logger.warning(f"Step {dependency} failed, using default for {step_id}")
                                    results[step_id] = step.get("default_output", "")
                                    continue

                            # Execute step
                            output = await execute_step(step, results)
                            results[step_id] = output

                        except Exception as e:
                            logger.error(f"Step {step_id} failed: {e}")
                            # Use default output instead of propagating error
                            results[step_id] = step.get("default_output", "")

                    return results
              pseudocode: |
                call_llm_robust():
                1. attempt=0, delay=5
                2. Loop while attempt < max_retries:
                   a. Try: response = llm.call(prompt)
                   b. If empty response: raise SemanticError
                   c. If validate_json and invalid JSON: raise SemanticError
                   d. If success: return response
                   e. Except TransientError:
                      - If attempt < max_retries-1: sleep(delay), delay*=2, attempt++
                      - Else: if fallback: return fallback; else: raise
                   f. Except (Validation|Semantic)Error:
                      - If fallback: return fallback
                      - Else: raise
                3. Log all attempts and decisions

                Cascading Error Prevention:
                1. Execute step by step
                2. Track results map
                3. If step depends on prior step:
                   a. If prior failed: use step's default_output
                   b. Continue to next step
                4. Step failure doesn't halt subsequent steps
                5. Final output is partial results (some steps succeeded)
            sources:
              - "B12 Ch3: Error Handling Patterns"
              - "B04 Ch8: Resilience in Multi-Agent Systems"
            real_world_analogies:
              - "Retry with backoff like circuit breaker: prevents cascading failure"
              - "Graceful fallback like backup generator: maintains operation"
              - "Cascade prevention like fault isolation: contains damage"


    agent_memory_deep:
        description: "Deep implementation details of agent memory systems including episodic, semantic, procedural memory, importance scoring, caching strategies, and frameworks"
        nodes:

          - name: "episodic_memory_implementation"
            definition: "Episodic memory stores specific past experiences, events, and interactions with timestamps and context. In agent systems, episodic memory captures conversational history, agent actions, and outcomes indexed by time. Implementation uses time-series databases or RAG-based storage with structured logging. Each episodic record contains timestamp, agent identifier, action taken, user context, outcome, and relevance tags. Temporal reasoning enables agents to understand cause-effect sequences and learn from historical patterns."
            how_it_works: |
              Storage Structure:
              1. Episodic entry: {timestamp, agent_id, action, context, outcome, tags}
              2. Store in time-series database indexed by timestamp
              3. Enable efficient range queries (last N hours, specific date range)

              Retrieval:
              1. Query for relevant episodes based on context similarity
              2. Retrieve N most recent episodes
              3. Retrieve episodes matching specific criteria (agent, outcome, tags)
              4. Use for few-shot prompting or context augmentation

              Temporal Reasoning:
              1. Identify sequences of related episodes
              2. Extract causal chains: action_A -> outcome_A -> action_B -> outcome_B
              3. Use for learning patterns and avoiding repeated mistakes
            design_decisions:
              - "Timestamp required: enables temporal ordering and decay functions"
              - "Agent_id tracking: enables agent-specific history and cross-agent learning"
              - "Tags system: enables fast filtering without semantic search"
              - "Full context storage: enables retrospective analysis"
            implementation:
              code_scaffold: |
                from dataclasses import dataclass
                from datetime import datetime, timedelta
                from typing import List, Dict, Any
                import json

                @dataclass
                class EpisodicEntry:
                    timestamp: datetime
                    agent_id: str
                    action: str
                    context: Dict[str, Any]
                    outcome: str
                    tags: List[str]
                    success: bool

                class EpisodicMemory:
                    def __init__(self, storage_backend):
                        self.backend = storage_backend  # e.g., InfluxDB, TimescaleDB

                    def record_episode(self, entry: EpisodicEntry):
                        """Store episode in time-series database"""
                        document = {
                            "timestamp": entry.timestamp.isoformat(),
                            "agent_id": entry.agent_id,
                            "action": entry.action,
                            "context": json.dumps(entry.context),
                            "outcome": entry.outcome,
                            "tags": entry.tags,
                            "success": entry.success
                        }
                        self.backend.write(document)

                    def get_recent_episodes(self, agent_id: str,
                                           hours: int = 24,
                                           limit: int = 10) -> List[EpisodicEntry]:
                        """Retrieve recent episodes for agent"""
                        since = datetime.utcnow() - timedelta(hours=hours)
                        query = f"""
                        SELECT * FROM episodes
                        WHERE timestamp > {since.isoformat()}
                        AND agent_id = '{agent_id}'
                        ORDER BY timestamp DESC
                        LIMIT {limit}
                        """
                        results = self.backend.query(query)
                        return [self._deserialize_entry(r) for r in results]

                    def get_episodes_by_tag(self, tag: str,
                                          agent_id: str = None) -> List[EpisodicEntry]:
                        """Retrieve episodes matching tag"""
                        where_clause = f"'{tag}' IN tags"
                        if agent_id:
                            where_clause += f" AND agent_id = '{agent_id}'"

                        query = f"""
                        SELECT * FROM episodes
                        WHERE {where_clause}
                        ORDER BY timestamp DESC
                        """
                        results = self.backend.query(query)
                        return [self._deserialize_entry(r) for r in results]

                    def extract_causal_chain(self,
                                            start_timestamp: datetime,
                                            duration_hours: int = 1) -> List[Dict]:
                        """Extract sequence of related episodes"""
                        end = start_timestamp + timedelta(hours=duration_hours)
                        query = f"""
                        SELECT * FROM episodes
                        WHERE timestamp BETWEEN {start_timestamp.isoformat()}
                        AND {end.isoformat()}
                        ORDER BY timestamp ASC
                        """
                        results = self.backend.query(query)

                        # Build causal chain
                        chain = []
                        for i, result in enumerate(results):
                            entry = self._deserialize_entry(result)
                            chain.append({
                                "step": i + 1,
                                "action": entry.action,
                                "outcome": entry.outcome,
                                "success": entry.success,
                                "next_action": results[i+1]["action"] if i+1 < len(results) else None
                            })

                        return chain

                class ContextAugmenter:
                    """Use episodic memory for few-shot prompting"""

                    def __init__(self, episodic_memory: EpisodicMemory):
                        self.memory = episodic_memory

                    def augment_prompt(self, agent_id: str, base_prompt: str) -> str:
                        """Add recent episodes to prompt for context"""
                        recent = self.memory.get_recent_episodes(
                            agent_id,
                            hours=24,
                            limit=3
                        )

                        if not recent:
                            return base_prompt

                        examples = "\n".join([
                            f"- Agent action: {e.action}\n  Outcome: {e.outcome}\n  Success: {e.success}"
                            for e in recent
                        ])

                        return f"""{base_prompt}

                Recent similar experiences:
                {examples}

                Use these examples to inform your response."""
              pseudocode: |
                record_episode():
                1. Create entry: {timestamp, agent_id, action, context, outcome, tags}
                2. Serialize context to JSON
                3. Write to time-series database

                get_recent_episodes():
                1. Calculate time window: now - N hours
                2. Query: timestamp > window AND agent_id = X
                3. Order by timestamp DESC
                4. Limit to N results
                5. Deserialize and return

                extract_causal_chain():
                1. Query episodes in time window (start, start+duration)
                2. Order by timestamp ASC
                3. For each episode: action -> outcome -> next_action
                4. Build chain showing cause-effect sequence
            sources:
              - "B04 Ch4: Agent Memory Architecture"
              - "B16 Ch1: Memory Systems"
            real_world_analogies:
              - "Like diary entries: date-stamped, contextual, retrievable by time"

          - name: "semantic_memory_implementation"
            definition: "Semantic memory stores structured factual knowledge: entity profiles, relationship graphs, rules, and definitions. Unlike episodic memory (when something happened), semantic memory stores what is true. Implementation uses knowledge bases, knowledge graphs, symbolic representations, and vector embeddings. User and entity profiles extracted from conversations get integrated into system prompts. Knowledge graphs enable traversal of relationships and inference."
            how_it_works: |
              Knowledge Graph Storage:
              1. Entities as nodes: {id, type, attributes}
              2. Relationships as edges: {source, target, relationship_type, confidence}
              3. Enable graph queries: "Find all people John has worked with"

              Entity Profile Extraction:
              1. From conversations: extract entity mentions
              2. Track attributes: occupation, location, preferences, etc.
              3. Update profile with each new information
              4. Maintain confidence scores for uncertain facts

              Integration into Prompts:
              1. At inference time, retrieve relevant entity profiles
              2. Inject into system prompt with format: "User information: name=X, location=Y..."
              3. Ground agent responses in known facts

              Rule Representation:
              1. Store conditional rules: IF condition THEN consequence
              2. Enable automated inference: given facts, derive new facts
              3. Support defeasible reasoning: rules with exceptions
            design_decisions:
              - "Knowledge graphs enable traversal and inference"
              - "Confidence scores handle uncertain facts"
              - "Entity profile caching reduces lookup time"
              - "Symbolic representation enables explainability"
            implementation:
              code_scaffold: |
                from typing import Dict, List, Set, Tuple

                class SemanticMemory:
                    def __init__(self):
                        self.entities: Dict[str, Dict] = {}
                        self.relationships: List[Dict] = []
                        self.rules: List[Dict] = []

                    def add_entity(self, entity_id: str, entity_type: str,
                                  attributes: Dict[str, any]):
                        """Add entity to knowledge base"""
                        self.entities[entity_id] = {
                            "id": entity_id,
                            "type": entity_type,
                            "attributes": attributes,
                            "created_at": datetime.utcnow().isoformat(),
                            "updated_at": datetime.utcnow().isoformat()
                        }

                    def add_relationship(self, source_id: str, target_id: str,
                                       relationship_type: str,
                                       confidence: float = 1.0):
                        """Add relationship between entities"""
                        self.relationships.append({
                            "source": source_id,
                            "target": target_id,
                            "type": relationship_type,
                            "confidence": confidence,
                            "created_at": datetime.utcnow().isoformat()
                        })

                    def get_entity_profile(self, entity_id: str) -> Dict:
                        """Retrieve entity for prompt injection"""
                        if entity_id not in self.entities:
                            return None

                        entity = self.entities[entity_id]
                        related = self._get_related_entities(entity_id)

                        return {
                            "id": entity_id,
                            "type": entity["type"],
                            "attributes": entity["attributes"],
                            "relationships": related
                        }

                    def _get_related_entities(self, entity_id: str) -> List[Dict]:
                        """Find entities connected to given entity"""
                        related = []
                        for rel in self.relationships:
                            if rel["source"] == entity_id:
                                related.append({
                                    "target_id": rel["target"],
                                    "relationship": rel["type"],
                                    "confidence": rel["confidence"]
                                })
                        return related

                    def extract_and_update(self, entity_id: str,
                                          conversation: str):
                        """Extract facts from conversation and update profile"""
                        # Pseudo-implementation: in reality, use NER + relation extraction
                        mention_count = conversation.count(entity_id)

                        # Extract new attributes via LLM
                        extraction_prompt = f"""
