  governance_frameworks:
    definition: Organizational, industry, and government frameworks for governing AI development and deployment. Includes
      internal governance (ethics committees, AI policies, incident response), industry self-regulation (Partnership on AI,
      Asilomar principles, shared safety standards), and government regulation (EU AI Act risk-based approach, NIST AI Risk
      Management Framework, AI Bill of Rights, sector-specific rules).
    core_concepts:
    - concept_name: AI Governance Policies
      explanation: 'Internal organizational governance for AI ethics. B04 identifies key initiatives: (1) AI Ethics Committees/Offices
        — dedicated internal teams (e.g., Microsoft''s Office of Responsible AI) that review sensitive use cases, formulate
        policies, and have advisory/veto power. (2) AI Policy and Principles Publication — public transparency reports (Google
        AI principles, Microsoft Responsible AI Standard). (3) Product Design Changes — moratoriums on risky products (facial
        recognition sales to police). (4) Incident Response Plans — processes analogous to cybersecurity incident response
        for AI failures. (5) Ethics Training and Culture — making every practitioner "think like an ethicist."'
    - concept_name: Agent Lifecycle Management
      explanation: ''
    - concept_name: Audit Trails
      explanation: ''
    - concept_name: Regulatory Compliance (EU AI Act, etc.)
      explanation: 'Major AI regulations: (1) EU AI Act — risk-based approach with 4 tiers: unacceptable (banned, e.g., social
        scoring), high-risk (strict requirements: conformity assessments, transparency, human oversight), limited risk (disclosure
        obligations), minimal risk (mostly unregulated). Includes AI Liability Directive for damages. (2) US — NIST AI Risk
        Management Framework (2023, voluntary), AI Bill of Rights blueprint (2022), sectoral approach (FDA, NHTSA, FAA), state
        laws (Illinois video interviews, California deepfakes, NYC Bias Audit). (3) China — recommendation algorithm transparency
        regulations (2022), deepfake/synthetic media labeling. (4) International — OECD AI Principles (2019), UNESCO recommendation
        on Ethics of AI (2021). (5) Sector-specific — FDA for AI medical devices, EU Medical Device Regulation, financial
        regulators (Federal Reserve, ECB model risk guidelines).'
    - concept_name: Risk Assessment Frameworks
      explanation: 'Frameworks for identifying and mitigating AI risks: (1) NIST AI RMF — voluntary playbook covering bias,
        explainability, safety, cybersecurity. (2) Algorithmic Impact Assessments (AIAs) — structured pre-deployment ethics
        analysis. (3) Asilomar AI Principles (2017) — high-level guidelines from AI researchers covering research goals, ethics,
        and long-term issues. (4) Algorithmic Auditing Framework — emerging standards for independent third-party AI audits.'
    - concept_name: Industry Self-Regulation (B04)
      explanation: 'Multi-stakeholder collaborations for AI ethics: (1) Partnership on AI (PAI) — founded 2016 by Google,
        Amazon, Facebook, IBM, Microsoft, Apple + non-profits/academics. Created AI incident database framework. (2) Shared
        Safety Standards — industry coalitions publishing measurement standards (e.g., autonomous vehicle safety metrics).
        (3) Asilomar AI Principles (2017) — non-binding consensus on AI alignment with human values. (4) Technology Sharing
        — companies open-sourcing ethics tools (OpenAI content moderation endpoint, Microsoft Responsible AI Toolbox with
        InterpretML and Fairlearn). (5) Open Source/Non-Profit Initiatives — AI Now Institute (NYU), Algorithmic Justice League.'
    - concept_name: Weighted Capability Governance (B17)
      explanation: 'Governance paradigm that moves beyond compute-centric restrictions (limiting model size, training compute).
        Instead, assess HOW EFFICIENTLY the AI system uses available resources and capabilities. Key dimensions: (1) Algorithmic
        Efficiency — sophisticated algorithms that achieve more from less compute. (2) Novel Architectures — alternative approaches
        (mixture-of-experts, sparse models) that scale differently. (3) Specialized Substrates — domain-specific hardware
        that concentrates compute on specific tasks. (4) Frontier Capabilities Detection — monitoring for unexpected emergent
        behaviors as systems scale. (5) Alignment-Efficiency Trade-Off — assessing whether efficiency gains degrade safety.
        Addresses the "AI Overhang" phenomenon: capability advancement that occurs independent of computational resource increases.
        Policy evaluation and adaptive risk thresholds adjust governance based on continuous monitoring.'
    - concept_name: AI Overhang Phenomenon (B17)
      explanation: 'The observation that AI capabilities can advance rapidly through algorithmic improvements independent
        of increased computational resources. Traditional governance assuming that capability growth scales with compute investment
        fails to capture these jumps. Example: small models fine-tuned with novel RL approaches may surpass larger models
        trained with traditional SFT. Governance must monitor not just computational budget but algorithmic efficiency and
        architectural innovations. Weighted Capability Governance addresses this by assessing capability realization, not
        just compute allocation.'
    - concept_name: Governance Judge Framework (B17)
      explanation: 'Modular LLM-based evaluator agent for assessing agentic workflow actions against organizational policies
        in real time. Three-step process: (1) Action Review — Governance Judge evaluates planned agent actions against policy
        directives. (2) Policy Matching — determines if action aligns with governance requirements, domain constraints, and
        risk thresholds. (3) Decision — Allow, Block, or Escalate to human reviewer. Governance Judge is itself an agent,
        enabling sophisticated policy reasoning without hard-coded rule engines. Can handle context-aware, nuanced policy
        decisions (not just binary rule matching). Integrates with Superego architecture and inference-time alignment strategies.'
    - concept_name: Tiered Governance Oversight (B17)
      explanation: 'Multi-level governance structure with clear escalation pathways: (1) Operational Tier — day-to-day monitoring
        and routine policy enforcement via automated systems. (2) Supervisory Tier — human review of escalated cases, policy
        exceptions, incident investigation. (3) Strategic Tier — organizational leadership setting governance direction, risk
        tolerance, long-term policy. (4) External Stakeholder Engagement — diverse external review boards ensuring accountability
        beyond organizational boundaries. Each tier has defined decision authority, clear escalation criteria, and documented
        rationale. Continuous monitoring feeds data up through tiers for policy refinement.'
    - concept_name: Adaptive Risk Thresholds (B17)
      explanation: 'Dynamic governance approach where risk tolerance adjusts based on context and empirical agent performance
        data. Rather than fixed policies, thresholds adapt: (1) Context-Aware — risk tolerance differs by domain (medical
        domains require stricter thresholds than entertainment). (2) Performance-Driven — agents demonstrating consistent
        safe behavior earn access to higher-capability actions (graduated autonomy). (3) Continuous Monitoring — real-time
        data from safety monitors informs threshold adjustment. (4) Weighted Policy — different actions carry different risk
        weights, assessed against agent capability maturity. Enables governance that is both structured (policy-driven) and
        adaptive (responsive to empirical data).'
    - concept_name: Documentation and Traceability Standards (B17)
      explanation: 'Governance requirement that all significant agent decisions and policy changes are documented with: (1)
        Rationale — why this decision/policy was made. (2) Stakeholders Consulted — who was involved in the decision. (3)
        Risk Assessment — what could go wrong, and mitigation strategies. (4) Review Schedule — when the decision/policy will
        be revisited. (5) Rollback Plan — how to revert if the decision proves problematic. Enables accountability, facilitates
        policy learning across teams, and creates institutional memory of governance decisions and their rationales.'
    - concept_name: Agentic-Specific Governance Challenges
      definition: 'Traditional AI governance assumes supervised learning outputs. Agentic systems introduce new challenges:
        tool selection rationale, multi-step decision trails, dynamic policy application, real-time exception handling. Governance
        frameworks must adapt.'
      source_book: B07
    - concept_name: Accountability in Autonomous Agent Decision-Making
      definition: 'As agents gain autonomy, accountability chains become complex: who is responsible when an agent makes harmful
        decisions? Solution: clear escalation protocols, decision audit trails, human review at critical junctures, explicit
        agent accountability framework.'
      source_book: B07
    - concept_name: Agent Governance
      definition: Formal structures defining authority, oversight, policy evolution, exception management, and dispute resolution
        for agent behavior.
      source_book: B08
    - concept_name: Agent Certification Process
      definition: Multi-phase validation workflow ensuring agents meet compliance standards before deployment, covering design,
        testing, and baseline conformance.
      source_book: B08
    - concept_name: Trust Framework
      definition: Layered approach (7 layers) to making trust explicit and verifiable across identity, authentication, authorization,
        purpose, policies, monitoring, and lifecycle.
      source_book: B08
    - concept_name: Agent Lifecycle Governance
      definition: Compliance discipline across agent's entire lifecycle from definition through decommissioning, including
        testing, deployment, monitoring, adaptation, and archival.
      source_book: B08
    - concept_name: Systemic Risk Management
      definition: Governance processes for detecting emerging risks such as adversarial use, edge-case failures, and bias
        in training data.
      source_book: B08
    - concept_name: Central vs. Delegated Governance
      definition: Balancing centralized policy enforcement with delegated agent ownership to maintain control while enabling
        autonomy.
      source_book: B08
    - concept_name: Governance by Default
      definition: Embedding governance checks and constraints directly into agent factory templates to enforce compliance
        automatically.
      source_book: B08
    - concept_name: Regulatory Alignment
      definition: Alignment of agent behavior with external regulatory boundaries and industry compliance requirements.
      source_book: B08
    - concept_name: Federated Agent Ecosystems
      definition: Cross-organizational agent collaboration requiring shared governance agreements, certification recognition,
        and compliance mutual recognition.
      source_book: B08
