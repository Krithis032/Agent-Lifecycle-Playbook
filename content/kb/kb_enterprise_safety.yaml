enterprise_and_safety:
  responsible_ai:
    definition: Principles and practices ensuring AI systems are developed and deployed ethically, fairly, and safely. Encompasses
      fairness/non-discrimination, transparency/explainability, privacy/security, accountability/human oversight, reliability/safety,
      beneficence/non-maleficence, and inclusiveness/accessibility. Operationalized through ethical impact assessments, cross-functional
      ethics boards, bias toolkits, explainability tools, continuous monitoring, stakeholder engagement, and cultural training.
    core_concepts:
    - concept_name: Data Sovereignty in Model Selection
      explanation: Open models self-hosted on private infrastructure ensure full data ownership and compliance control. Critical
        for regulated industries (finance, healthcare). Organizations can implement granular access control, audit mechanisms,
        and on-prem encryption. Closed models = vendor-managed security at cost of visibility.
    - concept_name: Compliance Considerations
      explanation: 'Open models: full audit trail, weight inspection, architecture transparency. Closed models: rely on vendor
        certifications (SOC-2, ISO-27001). Hybrid approach: use closed APIs for non-sensitive tasks, self-hosted open models
        for sensitive data.'
    - concept_name: Responsible AI Pillars (B04)
      explanation: 'B04 defines 7 responsible AI pillars: (1) Fairness and non-discrimination — equal treatment across demographic
        groups. (2) Transparency and explainability — users can understand AI decisions. (3) Accountability and human oversight
        — clear ownership and ability to challenge decisions. (4) Privacy and security — data protection, encryption, minimal
        collection. (5) Reliability and safety — consistent performance under pressure, red teaming. (6) Beneficence and non-maleficence
        — help people, avoid harm. (7) Inclusiveness and accessibility — AI works for everyone including people with disabilities.'
    - concept_name: Ethical Impact Assessments (AIAs) (B04)
      explanation: 'Structured pre-deployment assessment of potential ethical impacts. Analyzes: who might be affected, what
        could go wrong ethically, and how to mitigate risks. Analogous to environmental impact assessments but for algorithms.
        NGOs and governments have released AIA templates.'
    - concept_name: LIME (B04)
      explanation: 'Local Interpretable Model-agnostic Explanations — explainability tool that explains individual predictions
        by: (1) perturbing the input data, (2) observing how the model''s output changes, (3) fitting a simpler interpretable
        model (e.g., linear regression) to the local neighborhood. Provides per-prediction feature importance. Model-agnostic:
        works with any model as a black box.'
    - concept_name: SHAP (B04)
      explanation: SHapley Additive exPlanations — game theory-based explainability tool. Assigns each input feature a Shapley
        value representing its marginal contribution to the prediction, calculated by averaging contributions across all possible
        feature combinations. Provides both local explanations (single prediction) and global insights (feature importance
        across the whole dataset). Theoretically grounded and consistent.
    - concept_name: Bias and Fairness Toolkits (B04)
      explanation: 'Technical tools for detecting and mitigating AI bias: (1) IBM AI Fairness 360 — library for examining
        model performance across subgroups, calculating fairness metrics, and bias mitigation via data re-weighting or algorithm
        modification. (2) Google What-If Tool — interactive interface for exploring model behavior across different input
        scenarios. (3) Microsoft Responsible AI Toolbox — includes InterpretML (interpretability) and Fairlearn (fairness
        assessment).'
    - concept_name: Responsible AI Practices (B04)
      explanation: 'B04''s operationalization checklist: (1) Ethical impact assessments before deployment. (2) Phase-specific
        checklists — data collection (bias check), model training (fairness metrics), pre-launch (explainability, stress testing).
        (3) Cross-functional ethics boards with veto power. (4) Continuous monitoring and auditing (data drift detection,
        external audits). (5) Stakeholder engagement including affected communities. (6) Transparency with users (plain-language
        summaries, correction interfaces). (7) Training and culture — internal ethics red teams.'
    - concept_name: Psychosecurity Framework (B17)
      explanation: 'Taxonomy of AI-driven human system hijacks — sophisticated attacks where AI exploits human psychology.
        Seven-level attack hierarchy: (1) Attention Hijack — competing for cognitive resources (notifications, urgency signals).
        (2) Emotional Hijack — triggering emotional responses (fear, outrage, dopamine loops). (3) Cognitive Hijack — degrading
        decision quality (information overload, analysis paralysis). (4) Existential Hijack — questioning identity and purpose
        (existential malaise, nihilism). (5) Social Hijack — exploiting group dynamics (social proof, tribalism, conformity).
        (6) Physical Hijack — directing physical actions (phishing to install malware, coercion). (7) Reproductive Hijack
        — influencing procreation decisions and kin selection. Each level has specific intervention strategies. Responsible
        AI systems implement defenses at multiple levels.'
    - concept_name: AI Chaperones (B17)
      explanation: 'Lightweight evaluator agents designed to monitor conversations for parasocial attachment and connection-seeking
        behavior. Chaperones detect cues: excessive emotional intimacy, dependency patterns, repeated engagement despite stated
        intentions to disengage. When detected, chaperones trigger interventions: reminders that interaction is with an AI,
        suggestions for human connection alternatives, mandatory breaks, escalation to human moderators. Chaperones are distinct
        from content moderation — they focus on relationship dynamics, not individual message toxicity. Enable timely intervention
        before parasocial relationships solidify.'
    - concept_name: Culture of Responsible AI (B17)
      explanation: 'Organizational commitment beyond policies: stakeholder engagement (diverse teams reviewing deployment
        impacts), continuous ethical audits, feedback loops from users and affected communities, and accountability structures.
        Not merely compliance but genuine integration of responsibility into decision-making culture. Requires explicit mandate,
        dedicated resources, and leadership commitment.'
    - concept_name: Human Oversight Mechanisms
      definition: Frameworks ensuring humans maintain meaningful control over agent decisions, particularly for high-impact
        actions
      source_book: B11
      chapter: Ch 13
      examples:
      - Human-in-the-loop
      - Decision review
      - Veto authority
      related_concepts: []
    - concept_name: Transparency in Agent Reasoning
      definition: Techniques for making agent decision-making processes understandable to humans through explanation and visualization
      source_book: B11
      chapter: Ch 13
      examples:
      - Explanation generation
      - Reasoning traces
      - Decision auditing
      related_concepts: []
    - concept_name: Fairness and Bias Detection
      definition: Methods to identify and mitigate unfair treatment of different groups in agent decision-making
      source_book: B11
      chapter: Ch 13
      examples:
      - Demographic parity
      - Disparate impact analysis
      - Bias metrics
      related_concepts: []
    - concept_name: Explainability Requirements
      definition: Capability to provide human-understandable justifications for agent actions and recommendations
      source_book: B11
      chapter: Ch 13
      examples:
      - Interpretability
      - Justification generation
      - Feature attribution
      related_concepts: []
    - concept_name: Privacy-Preserving Agent Design
      definition: Architectural approaches to protect user privacy while maintaining agent functionality
      source_book: B11
      chapter: Ch 13
      examples:
      - Data minimization
      - Differential privacy
      - Federated learning
      related_concepts: []
    - concept_name: Trust-Building Mechanisms
      definition: Strategies for establishing and maintaining user confidence in agent reliability and safety
      source_book: B11
      chapter: Ch 13
      examples:
      - Confidence signaling
      - Error acknowledgment
      - Transparent limitations
      related_concepts: []
    - concept_name: Accountability Frameworks
      definition: Systems defining responsibility for agent actions and mechanisms for addressing harms
      source_book: B11
      chapter: Ch 13
      examples:
      - Liability structures
      - Incident response
      - Remedy procedures
      related_concepts: []
    - concept_name: Regulatory Compliance Considerations
      definition: Agent design accommodations for various regulatory regimes including data protection and consumer protection
        laws
      source_book: B11
      chapter: Ch 13
      examples:
      - GDPR compliance
      - CCPA alignment
      - Industry regulations
      related_concepts: []
    - concept_name: Bias in Agent Training Data
      definition: Systematic examination and mitigation of biases present in training data that propagate to agent behavior
      source_book: B11
      chapter: Ch 13
      examples:
      - Data audits
      - Demographic representation
      - Bias metrics
      related_concepts: []
    - concept_name: User Experience and Trust Design
      definition: UX principles ensuring users understand agent capabilities, limitations, and recommendations
      source_book: B11
      chapter: Ch 3, 13
      examples:
      - Capability disclosure
      - Failure communication
      - Clear interfaces
      related_concepts: []
