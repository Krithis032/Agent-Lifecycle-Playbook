  agent_oriented_systems_engineering:
    acronym: AOSE/AOSM (Agent-Oriented Systems Modeling)
    purpose: Meta-model and design approach for human-AI teams using Model-Based Systems Engineering (MBSE)
    tools_and_methods:
    - Block Definition Diagrams (system structure and agents)
    - Use Case Diagrams (human-agent team operations)
    - Goal Hierarchies (system goals and subgoals)
    - Goal-Responsibility Diagrams ("As-Is" and "To-Be" systems)
    - Concept Maps (domain knowledge structures)
    - Responsibility-Capability Diagrams (trade-space for allocation)
    - Agent Capability Assessment Tables (agent capabilities vs responsibilities)
    - Agent Diagrams (team composition and structure)
    - RASCI Allocation Tables (responsibility assignment)
    - Decision-Information-Data Diagrams (decision support design)
    - Typical/Atypical Scenario Tables (exception handling)
    - Coactive Design Process Tables (observability, predictability, directability)
    design_phases:
    - Define system (as-is)
    - Identify goals and responsibilities
    - Understand human teaming
    - Plan redesign and automation purposes
    - Select AI methods and agent architectures
    - Allocate responsibilities to human and AI agents
    - Design team architectural patterns
    - Design decision support
    - Design for exceptions
    - Validate through coactive design
    - Complete system specifications
    modeling_benefits: Provides logical design of human-agent teams, AI components, training requirements, interfaces
    sources:
    - 'B15: Integrating Artificial and Human Intelligence (Wiley, 2025)'
    - 'B15: Integrating Artificial and Human Intelligence through Agent Oriented Systems Design (Miller & Rusnock, 2025)'
    core_concepts:
    - concept_name: Cognitive Task Analysis (CTA)
      definition: A prerequisite methodology for understanding human work and cognition before automating tasks; extracts
        cognitive knowledge, mental models, and decision-making processes from domain experts.
      source_book: B15
      chapter: 2.6, How to Use This Book
      key_aspects:
      - human factors analysis
      - knowledge extraction
      - mental models
      - prerequisite methodology
    - concept_name: Stakeholder Narrative
      definition: A textual description of system stakeholders, their goals, concerns, and constraints; a foundational artifact
        for system boundary definition and understanding.
      source_book: B15
      chapter: '2.4'
      key_aspects:
      - stakeholder description
      - requirements gathering
      - goal alignment
      - system context
    - concept_name: System Boundary Definition
      definition: The process of explicitly specifying what is inside versus outside a system, which is critical for avoiding
        confusion in design teams and clearly communicating system scope.
      source_book: B15
      chapter: 2.3, 2.4
      key_aspects:
      - scope definition
      - interface specification
      - system demarcation
    - concept_name: Domain Modeling
      definition: The creation of abstract models describing the domain, system context, and problem space without implementation
        details; essential for understanding before design.
      source_book: B15
      chapter: 2.1, 2.3
      key_aspects:
      - domain description
      - context modeling
      - problem space
      - abstraction
    - concept_name: Block Definition Diagram (BDD)
      definition: A SysML modeling artifact that depicts system structure and composition, showing how system components relate
        to and interact with the environment.
      source_book: B15
      chapter: '2.5'
      key_aspects:
      - system structure
      - component relationships
      - composition
      - SysML diagram
    - concept_name: Use Case Diagram
      definition: A UML/SysML modeling artifact that documents system interactions from the actor perspective, showing what
        the system does from external viewpoints.
      source_book: B15
      chapter: '2.7'
      key_aspects:
      - user interaction
      - system behavior
      - functional scope
      - actor perspective
    - concept_name: Responsibility-Capability Diagram
      definition: A modeling artifact showing which agents have the capabilities needed to fulfill specific responsibilities,
        linking agent abilities to assigned tasks.
      source_book: B15
      chapter: '6.4'
      key_aspects:
      - capability mapping
      - responsibility assignment
      - agent evaluation
    definition: A systems engineering methodology specifically adapted for agent-based systems — covering requirements capture,
      agent identification, interaction design, and formal verification of agent behaviors.
  sociotechnical_systems:
    perspective: Design of human-AI teams requires understanding interaction between social (human) and technical (AI) systems
    key_elements:
    - Team structure and roles
    - Communication and coordination mechanisms
    - Shared mental models and common ground
    - Training and skill development
    - Interface and interaction design
    - Work practices and procedures
    - Trust and reliance calibration
    team_adaptation: High-performing human-AI teams modify hardware/software to extend designed capabilities; create domain-specific
      vocabulary and gestures to reduce communication effort
    sources:
    - 'B15: Integrating Artificial and Human Intelligence (Wiley, 2025)'
    core_concepts:
    - concept_name: Perspective
      definition: Design of human-AI teams requires understanding interaction between social (human) and technical (AI) systems
      source_book: B15
    - concept_name: Key Elements
      definition: Team structure and roles; Communication and coordination mechanisms; Shared mental models and common ground;
        Training and skill development; Interface and interaction design
      source_book: B15
    - concept_name: Team Adaptation
      definition: High-performing human-AI teams modify hardware/software to extend designed capabilities; create domain-specific
        vocabulary and gestures to reduce communication effort
      source_book: B15
    definition: Viewing AI agent deployments as sociotechnical systems where technology, people, processes, and organizational
      structures interact — emphasizing that agent success depends on the entire system, not just the technology.
  organizational_roles_and_structures:
    core_concepts:
    - concept_name: Agent Owner
      definition: Designated human accountable for an agent's business value, purpose alignment, and compliance with enterprise
        policies.
      source_book: B08
    - concept_name: Fleet Manager
      definition: Organizational role responsible for overseeing groups (fleets) of related agents, managing their coordination
        and lifecycle.
      source_book: B08
    - concept_name: Governance Lead
      definition: Executive responsible for defining, updating, and enforcing operating standards across the agent ecosystem.
      source_book: B08
    - concept_name: Digital Employee Model
      definition: Organizational structure treating agents as digital employees with role descriptions, reporting lines, escalation
        paths, and permission management.
      source_book: B08
    - concept_name: Hybrid Human-Agent Organization
      definition: Organizational structure combining human teams and autonomous agents with defined roles, workflows, and
        accountability models.
      source_book: B08
    sources:
    - Agentic Mesh (O'Reilly Early Release)
    definition: Organizational design patterns for enterprises deploying AI agents — including the AI Center of Excellence,
      agent governance board, prompt engineering teams, and the emerging Chief AI Officer role.
  agent_factory_pattern:
    core_concepts:
    - concept_name: Agent Factory
      definition: Industrialized infrastructure automating creation, configuration, certification, and deployment of agents
        at scale.
      source_book: B08
    - concept_name: Agent Template
      definition: Reusable blueprint with standard tools, approaches, and configuration elements allowing rapid agent creation
        with minimal variation.
      source_book: B08
    - concept_name: Agent Development Cycle
      definition: 'Standardized SDLC adapted for agents: conceptualization, requirements, design, construction, acceptance,
        deployment, maintenance, decommissioning.'
      source_book: B08
    - concept_name: Template Certification
      definition: One-time certification process for agent templates that auto-certifies agents created from them when changes
        stay within scope.
      source_book: B08
    - concept_name: Production Gates
      definition: Quality control checkpoints in the agent factory pipeline ensuring agents meet enterprise standards before
        production deployment.
      source_book: B08
    - concept_name: Agent Standardization
      definition: Ensuring consistency, auditability, and enterprise-readiness through templates, pipelines, and governance-embedded
        design.
      source_book: B08
    - concept_name: Connector Standardization
      definition: Standardizing how agents access external tools and services to ensure compatibility and compliance across
        the ecosystem.
      source_book: B08
    - concept_name: Configuration as Code
      definition: Treating agent configurations as reproducible code artifacts enabling version control, testing, and deployment
        automation.
      source_book: B08
    - concept_name: Agent SDK
      definition: Development kit providing standardized libraries, patterns, and tools for building agents within the factory
        framework.
      source_book: B08
    sources:
    - Agentic Mesh (O'Reilly Early Release)
    definition: An enterprise pattern for standardized, repeatable agent creation — providing templates, guardrails, testing
      pipelines, and deployment automation that enable teams to build production agents safely and efficiently.
  design_objectives_and_automation_strategy:
    definition: Strategic frameworks for deciding what to automate with agents, to what degree, and in what sequence — balancing
      business value, technical feasibility, risk tolerance, and organizational readiness.
    core_concepts:
    - concept_name: Cost Reduction Objective
      definition: A design objective for automation and AI integration aiming to reduce operational costs through labor efficiency
        or resource optimization, while recognizing that true cost savings must account for AI maintenance and oversight labor.
      source_book: B15
      chapter: 5.2.1
      key_aspects:
      - economic objective
      - labor efficiency
      - ROI consideration
      - automation motivation
    - concept_name: System Safety Objective
      definition: A design objective for automation aiming to improve system safety through reduced human error, accident
        prevention, or enhanced risk management.
      source_book: B15
      chapter: 5.2.2
      key_aspects:
      - safety improvement
      - error reduction
      - risk management
      - system reliability
    - concept_name: Decision-Making and Resilience Objective
      definition: A design objective for AI integration aiming to improve decision quality, enable faster decisions, or enhance
        system resilience in face of disruptions or anomalies.
      source_book: B15
      chapter: 5.2.2
      key_aspects:
      - decision support
      - system resilience
      - problem-solving
      - disturbance handling
    - concept_name: Knowledge Acquisition Objective
      definition: A design objective for AI automation aiming to capture, encode, and preserve organizational expertise before
        it is lost due to personnel turnover or retirement.
      source_book: B15
      chapter: 5.2.3
      key_aspects:
      - knowledge preservation
      - expertise capture
      - organizational learning
      - institutional memory
    - concept_name: Performance Improvement Objective
      definition: A design objective for automation aiming to increase productivity, throughput, or quality of work, enabling
        humans to accomplish more or higher-quality tasks.
      source_book: B15
      chapter: 5.2.4
      key_aspects:
      - productivity
      - quality enhancement
      - efficiency
      - capability augmentation
    - concept_name: Purpose of Redesign
      definition: The primary motivation or objective driving system redesign with AI integration, which must be clearly identified
        and aligned with stakeholder goals before implementation.
      source_book: B15
      chapter: 5.3, 5.4
      key_aspects:
      - design motivation
      - goal alignment
      - redesign driver
      - objective clarity
    - concept_name: Asynchronous Communication Support
      definition: A redesign purpose where automation enables communication and coordination across time zones or asynchronous
        work patterns, improving team coordination.
      source_book: B15
      chapter: 5.3.1
      key_aspects:
      - distributed teams
      - time zone coordination
      - async workflows
    - concept_name: Accident Avoidance
      definition: A redesign purpose where automation prevents accidents or critical failures through real-time monitoring,
        early warning, or intervention.
      source_book: B15
      chapter: 5.3.2
      key_aspects:
      - accident prevention
      - early warning
      - safety intervention
    - concept_name: Human Error Reduction
      definition: A redesign purpose where automation reduces human mistakes through assistance, monitoring, or by assuming
        error-prone tasks.
      source_book: B15
      chapter: 5.3.3
      key_aspects:
      - error prevention
      - task assistance
      - oversight automation
    - concept_name: Directed Attention
      definition: A redesign purpose where automation handles routine tasks, freeing human attention for higher-level strategic
        thinking and critical decision-making.
      source_book: B15
      chapter: 5.3.4
      key_aspects:
      - cognitive load reduction
      - attention management
      - focus allocation
    - concept_name: Understanding Complex Information Spaces
      definition: A redesign purpose where automation helps humans comprehend large, complex, or multidimensional data through
        visualization, synthesis, or intelligent summarization.
      source_book: B15
      chapter: 5.3.5
      key_aspects:
      - data comprehension
      - information synthesis
      - complexity management
      - visualization
    - concept_name: Option Generator
      definition: A redesign purpose where automation generates alternative solutions or courses of action, expanding the
        solution space for human decision-makers.
      source_book: B15
      chapter: 5.3.6
      key_aspects:
      - solution generation
      - decision support
      - alternative exploration
