  human_capabilities_limitations:
    unique_human_strengths:
    - Analogy and analogical reasoning (apply knowledge from familiar situations to novel ones)
    - Handling unpredictable/out-of-distribution scenarios
    - Adaptation to unforeseen conditions
    - Creative problem-solving
    - Understanding context and nuance
    - Learning from single example (vs AI needing thousands)
    - Abstract reasoning across domains
    attention_and_situation_awareness:
      mental_model_role: Constant prediction and simulation of environment behavior guides attention to maximize information
        gain
      attention_direction: Humans anticipate expected changes; unexpected changes cause attention focus if anticipated change
        fails to occur
      implication_for_teams: Humans may miss conditions they don't anticipate; shared mental models critical
    vigilance:
      definition: Sustained attention during passive monitoring
      challenge: Humans show performance degradation during extended monitoring of uneventful situation
      design_implication: AI agents can support vigilance by active monitoring and alerting
    workload:
      definition: Cognitive, perceptual, and motor demands on human
      dimensions:
      - Mental load
      - Time pressure
      - Performance requirements
      management: AI can reduce workload through information synthesis, decision support, and automation of routine tasks
    fatigue:
      effects: Degraded attention, slower response times, impaired decision-making
      design_implication: Human-AI teams enable continuous operation with human relief periods
    response_time_and_accountability:
      human_response_time: Humans require time to perceive, understand, decide, and act
      ai_response_speed: AI agents execute loops much faster than humans
      design_challenge: Interface must not allow AI to respond faster than human can complete their loop (human becomes reactive
        rather than thoughtful)
      accountability: Humans ultimately accountable for system outcomes; must maintain understanding and ability to intervene
    over_reliance_and_under_reliance:
      over_reliance: Humans distracted by smartphone while semiautonomous car on "autopilot" (ignores automation limitations)
      under_reliance: Assumes control when automation fully capable of managing circumstances
      root_cause: Poor mental model of AI capabilities and current situation
      solution: Observability and transparency of AI behavior; training on AI capabilities
    sources:
    - 'B15: Integrating Artificial and Human Intelligence (Wiley, 2025)'
