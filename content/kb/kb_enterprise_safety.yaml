  exception_handling:
    definition: Three-stage process for managing anomalies and exceptions in human-AI systems
    stages:
    - stage: Anomaly Detection
      description: Identifying deviation from expected behavior
      agent_responsibility: AI agents can monitor continuously for deviations; humans provide context-aware detection
    - stage: Anomaly Diagnosis
      description: Understanding root cause of anomaly
      agent_responsibility: AI can narrow diagnostic space; humans provide causal reasoning and analogical thinking
    - stage: Anomaly Response
      description: Selecting and executing corrective action
      agent_responsibility: AI can execute routine responses; humans handle novel/critical responses
    design_consideration: Model typical and atypical scenarios; define anomalies specific to system context
    sources:
    - 'B15: Integrating Artificial and Human Intelligence (Wiley, 2025)'
    core_concepts:
    - concept_name: Anomaly Detection
      definition: Identifying deviation from expected behavior
      source_book: B15
    - concept_name: Anomaly Diagnosis
      definition: Understanding root cause of anomaly
      source_book: B15
    - concept_name: Anomaly Response
      definition: Selecting and executing corrective action
      source_book: B15
    - concept_name: Design Consideration
      definition: Model typical and atypical scenarios; define anomalies specific to system context
      source_book: B15
  human_factors_automation:
    fundamental_principle: Adding AI to human system without considering impact on human work produces undesirable outcomes
    design_approach: Design AI into human systems to augment work structure; allow humans to vet inputs and outputs
    automation_impacts_on_work:
      loss_of_accomplishment: Automation simplifying work removes difficulty as source of motivation and enjoyment; humans
        lose challenge and excellence opportunities
      loss_of_skill_acquisition: Automation replacing/simplifying activity prevents skill and knowledge acquisition
      loss_of_pride_in_craftsmanship: Society emphasizes automation speed/productivity over quality; craftwork satisfaction
        diminished
    design_goal: AI should augment abilities and enhance life, providing more time for memorable experiences; should challenge
      humans to enable personal/organizational learning and growth
    sources:
    - 'B15: Integrating Artificial and Human Intelligence (Wiley, 2025)'
