      definition: AI should augment human intelligence, not replace cognitive processing; Maximal advantage achieved when
        AI designed to augment human capabilities; Automation changes structure of human work, does not simply replace activity;
        Designers must design AI into human systems rather than replacing humans; Humans required to vet inputs and outputs
        (even of generative AI)
      source_book: B15
