  human_agent_teaming:
    definition: At least one human and one AI agent employ diversified knowledge, skills, abilities to accomplish work complex/critical
      enough requiring greater knowledge, skill, ability, capacity, or redundancy than single agent can provide in available
      timeframe. Agents perform interdependently where actions depend on each other.
    foundational_philosophy:
    - AI should augment human intelligence, not replace cognitive processing
    - Maximal advantage achieved when AI designed to augment human capabilities
    - Automation changes structure of human work, does not simply replace activity
    - Designers must design AI into human systems rather than replacing humans
    - Humans required to vet inputs and outputs (even of generative AI)
    team_superiority: 'Well-coordinated human-AI teams can surpass best human or AI agent alone (demonstrated in freestyle
      chess: amateur players with 3 computers beat grand masters with supercomputers)'
    key_success_factor: Interaction process between humans and AI determines team effectiveness (teams with better processes
      win even with less capable individual members)
    sources:
    - 'B15: Integrating Artificial and Human Intelligence (Wiley, 2025)'
    core_concepts:
