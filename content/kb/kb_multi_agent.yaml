  team_coordination:
    definition: Cyclical communication process enabling synchronized actions of teammates working on interdependent tasks.
    timing_phases:
    - 'Preparation phase: Planning and practicing coordination'
    - 'Action phase: Actual coordination during execution'
    - 'After-action phase: Review and learning'
    explicit_coordination:
      definition: Coordination requiring direct communication focused on managing dependencies and synchronizing actions
      requirements: Explicit communication about synchronization
    implicit_coordination:
      definition: Dependency management without dedicated/purposeful communication regarding synchronization
      mechanisms:
      - 'Implicit communication: Handoff of artifact implies previous tasks completed'
      - 'Explicit communication with implicit content: Coach saying "on-deck" implies readiness and upcoming turn'
      enabled_by: Shared mental models and transactive memory structures
    temporal_synchronization:
      concept: 'OODA loop (Observe-Orient-Decide-Act) and John Boyd''s insight: agent executing loop faster than adversary
        gains decisive advantage'
      application_to_teams: Each cognitive agent must complete loop in synchronized fashion; timing of AI agent responses
        significantly influences human behavior
      design_implication: Interface design must not allow AI to respond faster than human can complete their loop (avoids
        human becoming reactive responder rather than thoughtful contributor)
    current_limitation: AI agents typically lack insight into operator's understanding; require explicit communication for
      coordination
