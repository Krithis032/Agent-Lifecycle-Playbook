  team_interdependence:
    definition: Two or more team members depend on one another to complete goal; neither member completes all tasks alone.
    interdependence_types:
      hard_dependence: Single team member unable to complete goal without aid from teammates
      soft_dependence: 'Team member can accomplish goal alone but team achieves greater effect (speed, accuracy, safety) with
        teammate contribution. Example: car navigator.'
    work_organization:
      sharing: Team members extend each others' capabilities (perform work single individual could not) or relieve teammates
        from tasks
      trading: Teammate backs up or replaces individual, enabling attendance to other duties or diversification to reduce
        monotony/errors
    coupling_types:
      pooled: Entities perform separate non-time-dependent functions (minimal communication required)
      sequential: One individual performs activity before another; time dependence requires communication; can rely on cues
        like elapsed time
      reciprocal: Team members perform multiple interleaved tasks; must communicate order, timing, and issues for back-and-forth
        exchange
    sources:
    - 'B15: Integrating Artificial and Human Intelligence (Wiley, 2025)'
    core_concepts:
