  evaluator_optimizer:
    definition: One agent generates output while another evaluates quality using rubrics, scoring criteria, or comparative
      judgment. The evaluation drives iterative improvement — the generator refines based on evaluator feedback. B03 formalizes
      this through rubric-based evaluation (8-step process), grounding (rubric alignment), and LLM-as-Judge (automated evaluation
      with a second model). The pattern extends to self-evaluation within a single agent through feedback generation.
    core_concepts:
    - concept_name: Critic-Generator Loop
      explanation: ''
    - concept_name: Quality Scoring
      explanation: ''
    - concept_name: Iterative Improvement
      explanation: ''
    - concept_name: Feedback Generation for Future Improvement (B03)
      explanation: 'After an agent produces an incorrect result, provide the correct answer and ask the model to generate
        self-feedback: "the correct answer is X, please review what you did wrong and suggest feedback for solving similar
        future problems." This feedback is then extracted and added to future system instructions or prompts, creating a persistent
        learning loop.'
    how_it_works: []
    design_decisions:
