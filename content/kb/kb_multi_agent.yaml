  transactive_memory_systems:
    definition: Collective knowledge structures mapping where knowledge resides among team members, credibility of knowledge
      holders, and who can acquire essential information.
    purpose: Particularly useful in Action Teams and Project Teams with specialized expertise in unpredictable environments
    characteristics:
    - Does not reside with any individual (especially in larger groups)
    - Constructed as communication occurs within group
    - Not robust in short-lived groups
    - Can differ or be shared across team members
