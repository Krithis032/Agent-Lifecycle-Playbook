    - Dyadic teams (human-AI pairs)
    - Larger multi-agent teams with humans and multiple AI agents
    allocation_principles:
      leftover_principle: Assign to human what AI cannot do
      compensatory_principle: Team members' capabilities compensate for each others' limitations; avoids "best agent fallacy"
        (myth that best individual determines best allocation), "single agent fallacy" (myth that each responsibility requires
        only one agent), and "single performer fallacy" (myth that best individual performer determines team needs)
      complementarity_principle: Select team members whose capabilities complement each other
    allocation_modeling: Agent Capability Assessment Table and RASCI Allocation Table document responsibilities and allocated
      capabilities
    sources:
    - 'B15: Integrating Artificial and Human Intelligence (Wiley, 2025)'
    - 'B15: Integrating Artificial and Human Intelligence through Agent Oriented Systems Design (Miller & Rusnock, 2025)'
    core_concepts:
    - concept_name: Best Agent Fallacy
      definition: An erroneous design principle assuming that assigning a task to the best individual agent (human or AI)
        will optimize system performance; in reality, team interaction and coordination often produce better outcomes.
      source_book: B15
      chapter: 7.3.1
      key_aspects:
      - allocation principle
      - team synergy
      - interaction effects
      - design principle
    - concept_name: Single Agent Fallacy
      definition: An assumption that a single agent can accomplish complex tasks better than a team; fails to account for
        distributed knowledge, skill diversity, and synergistic effects of teamwork.
      source_book: B15
      chapter: 7.3.2
      key_aspects:
      - team composition
      - skill distribution
      - collective intelligence
      - complexity handling
    - concept_name: Single Performer Fallacy
      definition: A misunderstanding that assumes a single performer (role) is optimal when actually multiple performers are
        needed to fulfill all responsibilities associated with a role, or when redundancy is required.
      source_book: B15
      chapter: 7.3.3
      key_aspects:
      - role allocation
      - performance redundancy
      - capability distribution
    - concept_name: Compensatory Principle
      definition: An allocation principle stating that when one agent cannot fulfill a responsibility due to limitations,
        another agent should be allocated to compensate, ensuring robust system operation.
      source_book: B15
      chapter: 7.3, 7.4
      key_aspects:
      - backup allocation
      - redundancy
      - failure mitigation
      - system robustness
    - concept_name: Leftover Principle
      definition: An allocation principle requiring that tasks not specifically allocated to agents are explicitly recognized,
        assigned, or managed to prevent essential work from being overlooked.
      source_book: B15
      chapter: '7.2'
      key_aspects:
      - complete allocation
      - task coverage
      - responsibility assignment
    - concept_name: Complementarity Principle
      definition: An allocation principle stating that human-AI teams are most effective when agents' strengths and weaknesses
        complement each other, creating synergistic performance.
      source_book: B15
      chapter: '7.4'
      key_aspects:
      - team synergy
      - complementary skills
      - effectiveness optimization
      - agent diversity
    - concept_name: Agent Capability Assessment Table
      definition: A modeling artifact that documents the capabilities (knowledge, skills, abilities) that agents possess,
        used to evaluate whether agents can fulfill their assigned responsibilities.
      source_book: B15
      chapter: '8.4'
      key_aspects:
      - capability inventory
      - agent evaluation
      - responsibility matching
      - competency assessment
    - concept_name: RASCI Allocation Table
      definition: A responsibility assignment matrix specifying whether each agent is Responsible, Accountable, Supportive,
        Consulted, or Informed for each task or responsibility.
      source_book: B15
      chapter: '8.5'
      key_aspects:
      - responsibility matrix
      - role assignment
      - accountability
      - task allocation
      - RACI variant
    definition: Collaboration patterns that integrate human team members with AI agents — including human-in-the-loop, human-on-the-loop,
      and human-out-of-the-loop configurations with appropriate escalation triggers.
  multiagent_coordination:
    sources:
    - B11
    core_concepts:
    - concept_name: Democratic Coordination
      definition: All agents have equal decision-making power; consensus-driven approach
      strengths:
      - Robust (no single point of failure)
      - Flexible (agents adapt to environment changes)
      challenges:
      - High communication overhead
      - Slow consensus process
      - Complex protocol
      best_for:
      - Distributed sensor networks
      - Collaborative robotics
      - systems prioritizing fairness
    - concept_name: Manager Coordination
      definition: Centralized approach; one or more manager agents oversee and direct subordinate agents
      strengths:
      - Streamlined decision making
      - Clear task assignment
      - Simplified communication
      challenges:
      - Single point of failure
      - Scalability bottleneck
      - Reduced adaptability
      best_for:
      - Manufacturing systems
      - customer support centers
      - hierarchical workflows
    - concept_name: Hierarchical Coordination
      definition: Multitired approach combining centralized and decentralized elements; agents organized in levels
      strengths:
      - Scalability (responsibilities distributed across levels)
      - Redundancy (fault tolerance)
      - Strategic vs tactical separation
      challenges:
      - Complex design
      - Communication delays through levels
      - Potential latency
      best_for:
      - Supply chain management
      - military operations
      - large complex systems
    - concept_name: Actor-Critic Coordination
      definition: Lightweight evaluation-driven iteration; actor generates outputs, critic evaluates and approves/rejects
      mechanism: Actor keeps producing until critic quality threshold met (test-time compute)
      best_when:
      - Evaluation easier than generation
      - Cost of additional outputs acceptable
      - Task fuzzy/generative
      example: 'Supply chain: actor generates plans, critic evaluates feasibility (cost/risk); repeat until approval'
    - concept_name: Swarm Coordination
      definition: Decentralized system; agents operate with minimal intelligence but collectively exhibit intelligent behavior
      mechanism: Local policies and interactions; emergent group-level behavior from local actions
      strengths:
      - Scalability
      - Robustness (no single point of failure)
      - Flexibility
      - Distributed problem-solving
      best_for:
      - Edge computing
      - sensor networks
      - real-time collaborative systems
      limitation: Not suitable for every domain; works best where decentralization and flexibility > precision
    definition: Strategies for coordinating multiple agents toward shared goals — including task decomposition, role assignment,
      conflict resolution, resource allocation, and synchronization mechanisms.
  scaling_principles:
    sources:
    - B11
    core_concepts:
    - concept_name: Task Decomposition
      principle: Break complex tasks into smaller, manageable subtasks for specialized agents
      benefit: Enhances individual performance, simplifies system coordination and scaling
    - concept_name: Specialization
      principle: Assign agents roles matching their strengths; maximize collective capabilities
      benefit: Improved precision and efficiency; leverages diverse expertise
    - concept_name: Parsimony
      principle: Add only minimum agents necessary for desired functionality
      rationale: Each agent increases communication overhead, complexity, resource demands
      practice: Evaluate if responsibilities can be fulfilled by existing agents before adding new ones
    - concept_name: Coordination
      requirement: Robust communication protocols, conflict resolution, seamless information sharing
      goal: System resilience and adaptability to dynamic scenarios
    - concept_name: Robustness
      strategy: Redundancy and fault-tolerant design; withstand disruptions (network failures, agent downtime)
      benefit: Maintains stability and reliability even in adverse conditions
    - concept_name: Efficiency
      consideration: Trade-off between adding agents and incurring complexity/resource costs
      decision: Carefully weigh advantages of expanded functionality vs resource/coordination overhead
    definition: Principles governing how multi-agent systems scale — including communication overhead growth, coordination
      complexity, optimal team sizing, and strategies for maintaining coherence at scale.
  fleet_management_patterns:
    core_concepts:
    - concept_name: Fleet
      definition: Logical grouping of related agents that operate together with shared purpose, governance, and lifecycle
        management.
      source_book: B08
    - concept_name: Hierarchical Fleet Structure
      definition: Fleet organization with manager agent at top directing messages through hierarchy to employee agents below.
      source_book: B08
    - concept_name: Swarm Fleet Structure
      definition: Peer-to-peer agent fleet with no manager, enabling flexibility and speed through distributed decision-making.
      source_book: B08
    - concept_name: Federation Fleet Structure
      definition: Multi-level fleet organization balancing hierarchy and swarm with sub-managers maintaining both flexibility
        and control.
      source_book: B08
    - concept_name: Fleet Input/Output Channels
      definition: Well-defined communication channels for user requests to fleets and responses back, abstracting internal
        agent complexity.
      source_book: B08
    - concept_name: Fleet Purpose Definition
      definition: Clear statement of what a fleet does enabling it to function as an organizational unit independent of internal
        agent details.
      source_book: B08
    - concept_name: Fleet Observability
      definition: Aggregation of metrics, logs, and monitoring across fleet members enabling operational visibility at the
        fleet level.
      source_book: B08
    sources:
    - Agentic Mesh (O'Reilly Early Release)
    definition: Patterns for managing large populations of agents including agent lifecycle management, health monitoring,
      version management, configuration propagation, and graceful degradation.
  goal_and_responsibility_modeling:
    definition: Frameworks for formally specifying agent goals, responsibilities, and accountability boundaries — ensuring
      each agent has clear objectives and measurable success criteria within a multi-agent system.
    core_concepts:
    - concept_name: Goal Hierarchy
      definition: A structured decomposition of system goals into subgoals that can be assigned to agents or sub-teams, enabling
        clear traceability from high-level objectives to actionable tasks.
      source_book: B15
      chapter: '3.4'
      key_aspects:
      - goal decomposition
      - hierarchical structure
      - subgoals
      - goal-responsibility mapping
    - concept_name: Goal-Responsibility Diagram
      definition: A modeling artifact that depicts the relationships between goals and the responsibilities agents must fulfill
        to achieve those goals, showing how agent responsibilities link to system objectives.
      source_book: B15
      chapter: 3.6, 4.9
      key_aspects:
      - modeling technique
      - goal mapping
      - responsibility assignment
      - agent tasks
    - concept_name: As-Is vs To-Be System Modeling
      definition: A comparison methodology where As-Is represents the current system state and To-Be represents the desired
        future state with automation, enabling designers to identify redesign opportunities and design objectives.
      source_book: B15
      chapter: 2.5, 3.1, 5.1
      key_aspects:
      - current state
      - future state
      - gap analysis
      - design objectives
    - concept_name: Concept Map
      definition: A visual representation showing relationships between different concepts and their dependencies, useful
        for understanding system architecture and how goals, roles, and responsibilities interconnect.
      source_book: B15
      chapter: '3.5'
      key_aspects:
      - concept relationships
      - visual modeling
      - architecture understanding
    - concept_name: Responsibility
      definition: A functionally-oriented abstract item that an agent playing a role must accomplish, without implying temporal
        sequence or specific implementation details.
      source_book: B15
      chapter: 2.1, 3.6
      key_aspects:
      - functional requirement
      - role basis
      - agent obligation
      - abstract specification
