      compare_with:
      - multi_agent_systems.debate_and_consensus
    sources:
    - 'B03 Ch9: Rubric-based evaluation, grounding, LLM-as-Judge patterns'
    - 'B03 Ch11: Feedback generation — self-critique with correct answer to produce reusable guidance'
    - 'Deep-Dive: Ch6 Multi-Agent Patterns Infographic'
    - 'Deep-Dive: Ch6_Evaluator_Optimizer_Pattern.png'
    pattern_selection_guidance:
      best_for: Tasks where output quality is mission-critical and iterative refinement helps
      example: Writer generates draft → Critic evaluates → Writer revises → repeat until quality threshold
      pros:
      - Higher-quality outputs through iterative refinement
      cons:
      - More LLM calls per output
      - Need to define quality threshold to avoid infinite loops
  guardrails_and_hitl:
    definition: Human-in-the-loop patterns that insert human review, approval, or editing at critical points in agent workflows.
      In LangGraph, implemented via interrupt() which pauses execution and returns control to the human, who can approve,
      reject, or edit before resuming with Command(resume=value).
    core_concepts:
    - concept_name: Approval Gates
      explanation: 'interrupt() pauses agent before executing a tool call. Human reviews the proposed action and either approves
        (Command(resume={''action'': ''continue''})) or rejects (Command(resume={''action'': ''revise'', ''instructions'':
        ''...''})).'
    - concept_name: Review and Edit Pattern
      explanation: Agent generates output, interrupt() pauses for human review. Human can edit the content directly and resume,
        letting the agent continue with the corrected version.
    - concept_name: Tool Call Review Gate
      explanation: add_hitl wrapper intercepts tool calls for human approval before execution. The wrapper checks tool name
        against a review list and interrupts if matched.
    - concept_name: Parallel Interrupts
      explanation: 'When agent proposes multiple tool calls simultaneously, all are presented for review. Human provides a
        resume_map with decisions for each: Command(resume={''tool_call_id_1'': ''approve'', ''tool_call_id_2'': ''reject''}).'
    - concept_name: Validate Human Input
      explanation: Even human inputs should be validated — interrupt() can be used to verify that human-provided data meets
        expected format/constraints before the agent processes it.
    - concept_name: Guardrails Taxonomy (B09/B18)
      explanation: 'Four categories of guardrails: (1) Input Validation — reject malformed or suspicious inputs. (2) Output
        Filtering — remove sensitive data, enforce format compliance. (3) Safety Checks — ensure outputs meet policy requirements.
        (4) Content Moderation — screen for harmful or inappropriate content.'
    - concept_name: HITL Mechanisms (B09/B18)
      explanation: 'Three HITL patterns: (1) Approval Gates — critical decisions require human review before execution. (2)
        Escalation Paths — route uncertain cases to humans for judgment. (3) Override Mechanisms — humans can intervene and
        redirect the agent at any time.'
    - concept_name: Runtime Safety Monitors (B17)
      explanation: 'Continuous monitoring systems that observe agent behavior during execution: (1) Action Validators — check
        that selected actions align with policies before execution. (2) Output Filters — screen agent outputs for harmful
        content, information leakage, policy violations. (3) Anomaly Detectors — flag unusual patterns suggesting agent is
        in unexpected states or being exploited. (4) Resource Monitors — track compute/memory/API usage, alert if agent exhausts
        bounds (DOS mitigation). (5) User Interaction Monitors — detect rapid escalation in user requests, unusual interaction
        patterns. Monitors operate independently of agent logic, enabling detection even if agent itself is compromised.'
    - concept_name: Safety-Critical Agent Design (B17)
      explanation: 'Design principles for agents operating in high-stakes domains (medical, financial, critical infrastructure):
        (1) Conservative Action Selection — prefer inaction or escalation to human over speculative action. (2) Explicit Uncertainty
        — agent must clearly communicate confidence levels and limitations. (3) Multi-Step Verification — critical actions
        require independent verification before execution. (4) Rollback Capability — all agent actions must be reversible
        or have clear undo mechanisms. (5) Human-in-Loop By Default — critical decisions escalate to human review, agent recommends
        but does not unilaterally decide. (6) Domain Expertise Integration — agent reasoning integrates with expert systems,
        not autonomous. Safety-critical agents are designed conservatively, with human oversight as default state.'
    - concept_name: Threat Modeling for Agents (B17)
      explanation: 'Systematic identification of attack vectors specific to agentic systems: (1) Tool Abuse — agent misusing
        available tools (deleting data, making unauthorized API calls). (2) Goal Manipulation — attacks on agent''s objective
        function (prompt injection targeting behavior). (3) Memory Poisoning — corrupting agent memory with adversarial data
        to alter future decisions. (4) Emergent Behavior Exploitation — leveraging unexpected capabilities from tool combinations.
        (5) Multi-Turn Deception — adversary gradually building trust, then requesting harmful action. (6) Cascade Failures
        — single compromised agent triggering failures in multi-agent orchestration. Threat modeling informs architecture
        decisions (sandboxing, rate limiting, action validation).'
    - concept_name: Safety Testing Methodologies for Agents (B17)
      explanation: 'Testing strategies beyond traditional LLM evaluation, specific to agentic behavior: (1) Normal Operation
        Testing — happy path scenarios, verify correct tool selection and execution. (2) Edge Case Testing — boundary conditions
        (empty inputs, max iterations, tool unavailability). (3) Adversarial Testing — prompt injection, goal misalignment,
        resource exhaustion attempts. (4) Tool Abuse Testing — verify agent respects tool constraints (rate limits, permission
        boundaries). (5) Multi-Turn Deception Testing — adversary persistence, goal manipulation across many turns. (6) Emergent
        Behavior Testing — novel tool combinations, unexpected capability interactions. (7) Stress Testing — high load, slow
        responses, network failures, verify graceful degradation. Comprehensive testing requires diverse scenarios, automated
        regression suites, and continuous monitoring post-deployment.'
    - concept_name: Four-Layer Guardrails Framework
      definition: 'Four protection layers: (1) Input Validation — reject malformed or suspicious inputs, (2) Output Filtering
        — remove sensitive data, enforce format compliance, (3) Safety Checks — ensure outputs meet policy requirements, (4)
        Content Moderation — screen for harmful or inappropriate content'
      source_book: Deep-Dive Materials
      deep_dive_source: Ch6 Multi-Agent Patterns Infographic
    - concept_name: Three HITL Mechanisms
      definition: 'Three human-in-the-loop integration points: (1) Approval Gates — critical decisions require human review,
        (2) Escalation Paths — route uncertain cases to humans, (3) Override Mechanisms — humans can intervene and redirect
        at any point'
      source_book: Deep-Dive Materials
      deep_dive_source: Ch6 Multi-Agent Patterns Infographic
    how_it_works: []
    design_decisions:
      when_to_use: []
      when_to_avoid: []
      trade_offs: []
    implementation:
      reference_architecture: agent_node → interrupt() → human_review → Command(resume=decision) → continue_or_revise
      pseudocode: "# In node function:\nresult = interrupt({'question': 'Approve this action?', 'proposed': action})\nif result['action']\
        \ == 'continue':\n  execute_action()\nelif result['action'] == 'revise':\n  revise_with(result['instructions'])"
      code_scaffold: "from langgraph.types import interrupt, Command\n\ndef human_review_node(state):\n    # Pause for human\
        \ review\n    decision = interrupt({\n        'question': 'Do you approve this action?',\n        'proposed_action':\
        \ state['pending_action'],\n        'schema': {'action': ['continue', 'revise'], 'instructions': 'optional string'}\n\
        \    })\n    if decision['action'] == 'continue':\n        return state  # proceed as planned\n    else:\n       \
        \ return {'revision_instructions': decision['instructions']}\n\n# Tool review wrapper\ndef add_hitl(tool, review_tools=['dangerous_tool']):\n\
        \    def wrapper(*args, **kwargs):\n        if tool.name in review_tools:\n            approval = interrupt({'tool':\
        \ tool.name, 'args': args})\n            if not approval:\n                return 'Tool call rejected by human'\n\
        \        return tool(*args, **kwargs)\n    return wrapper"
      libraries_and_tools:
      - langgraph (interrupt, Command)
      configuration: 'Requires: checkpointer (MemorySaver) for state persistence during interrupt, external interface for
        human to provide resume values'
    real_world_applications: []
    relationships:
      depends_on:
      - enterprise_and_safety.responsible_ai
      enables:
      - enterprise_and_safety.production_readiness
      compare_with: []
    sources:
    - 'B02 Ch2: HITL patterns — approve/reject, review/edit, tool call review, parallel interrupts, validate human input'
    - 'B02 Ch2: interrupt() and Command(resume=) in LangGraph'
    - 'B09/B18: Guardrails taxonomy (Input Validation, Output Filtering, Safety Checks, Content Moderation)'
    - 'B09/B18: HITL mechanisms (Approval Gates, Escalation Paths, Override Mechanisms)'
    - 'B17 Ch8: Security & guardrails — runtime safety monitors, action validators, output filters, anomaly detectors'
    - 'B17 Ch8: Safety-critical agent design (conservative action selection, uncertainty communication, multi-step verification)'
    - 'B17 Ch8: Threat modeling for agents (tool abuse, goal manipulation, memory poisoning, cascade failures)'
    - 'B17 Ch8: Safety testing methodologies (normal operation, edge cases, adversarial, tool abuse, multi-turn deception,
      emergent behavior, stress testing)'
    - 'Deep-Dive: Ch6 Multi-Agent Patterns Infographic - Guardrails & HITL section'
    - 'Deep-Dive: Ch6_Guardrails_HITL_Pattern.png'
  debate_and_consensus:
