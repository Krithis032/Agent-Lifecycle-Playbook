multi_agent_systems:
  orchestrator_worker:
    definition: 'A central supervisor agent routes tasks to specialized worker agents and decides when the job is done. In
      LangGraph: make_supervisor_node creates a node with Router structured output that emits Command(goto=worker_name). Workers
      are create_react_agent instances that always return to supervisor. Extends to hierarchical architecture: supervisors
      of supervisors, where each team is a subgraph.'
    core_concepts:
    - concept_name: Supervisor with Structured Routing
      explanation: 'Supervisor uses with_structured_output(Router) where Router is TypedDict with ''next'' field. LLM decides
        which worker to invoke next. Returns Command(goto=goto, update={''next'': goto}). Members list defines available workers.'
    - concept_name: Worker Specialization
      explanation: Each worker is a create_react_agent with its own tools, prompt, and LLM. make_react_worker_node wraps agent
        with goto='supervisor' so control always returns. Workers are named and tool-scoped for specific capabilities.
    - concept_name: Hierarchical Extension
      explanation: Supervisors of supervisors. Each team (e.g., research team, writing team) is a subgraph with its own internal
        supervisor and workers. Top-level supervisor routes between teams. LangGraph subgraphs provide natural encapsulation.
    - concept_name: Result Aggregation
      explanation: 'Worker results flow back through supervisor via HumanMessage(content=result, name=worker_name). Supervisor
        sees all worker outputs in message history and decides: route to another worker or finish.'
    - concept_name: Multi-Agent Pattern Selection Guide
      definition: 'Decision framework: Sequential for pipelines, Parallel for independent tasks, Orchestrator-Worker for complex
        dynamic tasks requiring coordination, Evaluator-Optimizer when output quality is mission-critical. Always include
        guardrails and human oversight in production. Start simple — scale to multi-agent only when single agent is insufficient.'
      source_book: Deep-Dive Materials
      deep_dive_source: Ch6 Pattern Selection Guide + Ch6 Multi-Agent Patterns Infographic
    how_it_works: []
    design_decisions:
      when_to_use: []
      when_to_avoid: []
      trade_offs: []
    implementation:
      reference_architecture: START → supervisor → conditional(worker1 | worker2 | ... | END) → supervisor (loop)
      pseudocode: 'supervisor_result = supervisor_llm.with_structured_output(Router).invoke(state)

        goto = supervisor_result[''next'']

        return Command(goto=goto, update={''next'': goto})'
      code_scaffold: "from langgraph_supervisor import create_supervisor\nfrom langgraph.prebuilt import create_react_agent\n\
        \n# Or manual supervisor:\nclass Router(TypedDict):\n    next: Literal['worker1', 'worker2', '__end__']\n\ndef make_supervisor_node(llm,\
        \ members):\n    options = members + ['__end__']\n    system_prompt = f'Route to one of: {options}. Respond __end__\
        \ when done.'\n    def supervisor_node(state):\n        messages = [{'role': 'system', 'content': system_prompt}]\
        \ + state['messages']\n        response = llm.with_structured_output(Router).invoke(messages)\n        goto = response['next']\n\
        \        return Command(goto=goto, update={'next': goto})\n    return supervisor_node\n\ndef make_react_worker_node(*,\
        \ llm, name, tools, prompt, goto='supervisor'):\n    agent = create_react_agent(llm, tools=tools, prompt=prompt)\n\
        \    def node(state) -> Command[Literal['supervisor']]:\n        result = agent.invoke(state)\n        msgs = result.get('messages',\
        \ [])\n        content = getattr(msgs[-1], 'content', '') if msgs else ''\n        return Command(\n            update={'messages':\
        \ [HumanMessage(content=content, name=name)]},\n            goto=goto)\n    return node"
      libraries_and_tools:
      - langgraph
      - langgraph-supervisor
      - langchain-openai
      configuration: 'Supervisor needs: structured output support, member list. Workers need: tools, prompt, goto=supervisor.'
    real_world_applications: []
    relationships:
      depends_on:
      - architecture_and_patterns.plan_and_execute
      - architecture_and_patterns.routing_and_dispatch
      enables:
      - implementation_blueprints
      compare_with:
      - multi_agent_systems.parallel
      - multi_agent_systems.sequential
    sources:
    - 'B02 Ch2: Supervisor pattern — make_supervisor_node, Router TypedDict, Command routing'
    - 'B02 Ch2: Hierarchical pattern — supervisors of supervisors, subgraphs as team units'
    - 'B02 Ch4: Multi-model team — different LLMs for different agent roles'
    - 'Deep-Dive: Ch6 Multi-Agent Patterns Infographic'
    - 'Deep-Dive: Ch6_Orchestrator_Worker_Pattern.png'
    pattern_selection_guidance:
      best_for: Complex dynamic tasks requiring coordination and adaptive planning
      example: Project Manager orchestrating Code, Test, and Deploy agents
      pros:
      - Dynamic — can spawn new workers or reassign tasks on the fly
      - Scalable — easy to add worker types
      - Resilient — orchestrator detects and recovers from worker failures
      cons:
      - More complex to implement
      - Orchestrator can become bottleneck
