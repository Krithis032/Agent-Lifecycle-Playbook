  agent_roles_and_specialization:
    definition: 'Designing specialized agent roles where each agent has a distinct capability, model, tools, and prompt. The
      ''team of experts'' metaphor: decoder-only = generators/planners, encoder-only = analysts/investigators, MoE = specialists,
      reasoning models = deliberate thinkers. Role design determines system capability.'
    core_concepts:
    - concept_name: Role Definition Patterns
      explanation: 'Each agent defined by: name, system prompt (role description), tools (capabilities), LLM (model matched
        to role complexity). Research team example from B02 Ch4: semantic_search (fast), patent_research (fast), analyst (thinker+encoder
        hybrid), note_taker (fast), writer (fast), supervisor (deliberate GPT-4.1).'
    - concept_name: Model-Role Matching
      explanation: 'Fast decoder (Qwen3-32B, thinking off) for routine tasks: search, drafting, note-taking. Reasoning model
        (Qwen3-235B, thinking on) for analysis requiring deliberation. Encoder model (ModernBERT) for relevance scoring and
        semantic filtering. Deliberate LLM (GPT-4.1) for routing decisions that need precision.'
    - concept_name: Dynamic Role Assignment
      explanation: Supervisor dynamically assigns work to the best-fit agent based on task requirements. Not static pipelines
        — the supervisor evaluates what's needed at each step.
    - concept_name: Self-Auditing Agent Teams
      explanation: Analyst agent with encoder model cross-checks research results for relevance and hallucination. ModernBERT
        assigns relevance scores (e.g., 0.956) to each piece of content, creating a built-in quality assurance layer.
    - concept_name: CrewAI Agent-Task-Crew Pattern (B03)
      explanation: 'CrewAI structures multi-agent systems as Agents + Tasks + Crew: Agent config: role, goal, backstory (persona),
        verbose, memory, allow_delegation. Task config: description, expected_output, agent, async_execution, output_file.
        Crew config: agents, tasks, process (Sequential or Hierarchical), memory, cache, max_rpm, share_crew. Execution: crew.kickoff(inputs={...}).
        Hierarchical mode uses a manager_llm to coordinate.'
    - concept_name: CrewAI Coding Crew Pattern (B03)
      explanation: 'Multi-agent coding pattern with delegation: Senior Engineer (writes code) → QA Engineer (reviews code
        quality) → Chief QA Engineer (final approval). Each agent has allow_delegation=True, enabling escalation and feedback
        loops. Demonstrates role specialization with sequential quality gates.'
    - concept_name: Generative Agent
      definition: Agent responsible for generating candidate solutions, designs, or behaviors
      application: Creates initial design proposals or solution candidates in multi-agent design systems
      b13_reference: Pages 120-139
    - concept_name: Specialist Agent
      definition: Agent focused on specific domain expertise (e.g., environmental analysis, structural validation, aesthetic
        evaluation)
      application: Analyzes generated solutions from domain-specific perspective and provides feedback to coordinator
      b13_reference: Pages 120-139
    - concept_name: Coordinator Agent
      definition: Higher-level agent that orchestrates communication and negotiation between generative and specialist agents
      application: Establishes priorities, manages utility-based trade-offs, and synthesizes specialist feedback into coherent
        design direction
      b13_reference: Pages 120-139
