    implementation:
      reference_architecture: supervisor → {search, exa_search, patent_research, analyst, note_taker, doc_writer, __end__}
      pseudocode: "specs = [\n  dict(name='search', tools=[tavily], prompt=SEARCH_PROMPT, llm=fast_llm),\n  dict(name='analyst',\
        \ tools=[semantic_filter], prompt=ANALYST_PROMPT, llm=thinker_llm),\n  dict(name='writer', tools=[write_doc, edit_doc],\
        \ prompt=WRITER_PROMPT, llm=fast_llm)\n]\nnodes = {s['name']: make_react_worker_node(**s) for s in specs}"
      code_scaffold: "# Agent team spec pattern (from B02 Ch4)\nEXA_PROMPT = 'Role: Research assistant. Search for recent\
        \ info on Exa Search.'\nANALYST_PROMPT = '''You are the Analyst. Call semantic_filter_tool exactly once.\nInputs:\
        \ query, documents (raw strings from teammates).\nRules: don't answer user, don't do free form writing, only return\
        \ tool result.'''\n\nspecs = [\n    dict(name='search', tools=[tavily_search, tavily_extract],\n         prompt=SEARCH_PROMPT,\
        \ llm=fast_llm),\n    dict(name='analyst', tools=[semantic_filter_tool],\n         prompt=ANALYST_PROMPT, llm=thinker_llm),\n\
        \    dict(name='doc_writer', tools=[write_document, edit_document, read_document],\n         prompt=WRITER_PROMPT,\
        \ llm=fast_llm),\n]\nnodes = {\n    s['name']: make_react_worker_node(\n        llm=s['llm'], name=s['name'],\n  \
        \      tools=s['tools'], prompt=s['prompt'])\n    for s in specs\n}"
      libraries_and_tools:
      - langgraph
