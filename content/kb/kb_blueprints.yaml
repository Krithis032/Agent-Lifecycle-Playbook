  data_analysis_agent:
    definition: A blueprint for building a data analysis agent that interprets natural language questions, writes and executes
      SQL/Python queries, generates visualizations, and narrates insights.
    core_concepts:
    - concept_name: Natural Language to Query Translation
      description: Converting user questions in natural language into SQL, pandas operations, or API calls appropriate for
        the data source — handling ambiguity through clarification.
    - concept_name: Schema Discovery
      description: Autonomously exploring database schemas, table relationships, column types, and data distributions to understand
        what data is available before querying.
    - concept_name: Visualization Generation
      description: Selecting appropriate chart types (bar, line, scatter, heatmap) based on data characteristics and generating
        publication-quality visualizations using matplotlib, plotly, or similar.
    - concept_name: Insight Narration
      description: Going beyond raw numbers to produce human-readable narratives explaining trends, anomalies, correlations,
        and actionable takeaways from the analysis.
    - concept_name: Iterative Analysis Loop
      description: Following up initial findings with deeper drill-downs — the agent notices something interesting in results
        and autonomously explores it further.
