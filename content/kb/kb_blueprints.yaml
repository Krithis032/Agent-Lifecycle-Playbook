  email_agent:
    definition: A blueprint for building an email agent that reads, classifies, prioritizes, drafts responses, schedules follow-ups,
      and manages inbox workflows with appropriate human oversight.
    core_concepts:
    - concept_name: Email Classification
      description: Categorizing incoming emails by type (inquiry, action required, FYI, spam), urgency, and topic — enabling
        automated triage and prioritization.
    - concept_name: Context-Aware Draft Generation
      description: Generating email replies that incorporate conversation history, relevant documents, calendar context, and
        the recipient relationship for appropriate tone and content.
    - concept_name: Action Item Extraction
      description: Identifying actionable items from email threads — deadlines, requests, commitments — and creating structured
        tasks or calendar entries.
    - concept_name: Follow-Up Scheduling
      description: Tracking sent emails awaiting response and automatically generating follow-up reminders or draft follow-up
        messages at configurable intervals.
    - concept_name: Human Review Gate
      description: Presenting draft emails for human review before sending — critical for maintaining control over external
        communications and preventing errors.
