  coding_agent:
    definition: A blueprint for building a code-generation agent that understands requirements, writes code across languages,
      runs tests, debugs failures, and iterates toward working implementations.
    core_concepts:
    - concept_name: Requirement Understanding
      description: Parsing natural language requirements into structured specifications — identifying inputs, outputs, constraints,
        edge cases, and acceptance criteria before writing code.
    - concept_name: Code Generation with Context
      description: Generating code that fits the existing codebase context — matching style conventions, using existing utilities,
        and respecting architectural patterns already in place.
    - concept_name: Test-Driven Development Loop
      description: Writing tests first (or alongside code), then executing them in a sandbox, analyzing failures, and iterating
        until all tests pass — the core agent loop for coding agents.
    - concept_name: Error Diagnosis and Self-Repair
      description: When code fails tests or raises exceptions, the agent reads error traces, diagnoses root causes, and applies
        targeted fixes rather than regenerating from scratch.
    - concept_name: Multi-File Awareness
      description: Understanding how changes in one file affect imports, tests, and dependencies across the project — maintaining
        coherence across the full codebase.
    - concept_name: Sandboxed Execution
      description: Running generated code in isolated containers or sandboxes to prevent unintended side effects while allowing
        the agent to observe outputs and iterate.
