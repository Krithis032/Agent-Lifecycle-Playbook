implementation_blueprints:
  research_agent:
    definition: A blueprint for building an autonomous research agent that can formulate search queries, retrieve information
      from multiple sources, synthesize findings, verify facts, and produce structured research reports.
    core_concepts:
    - concept_name: Query Formulation
      description: The agent decomposes a research question into multiple targeted search queries, varying keywords, perspectives,
        and specificity to maximize coverage across sources.
    - concept_name: Multi-Source Retrieval
      description: Parallel retrieval from diverse sources (web search, academic APIs, knowledge bases, databases) with source-appropriate
        query formatting and result normalization.
    - concept_name: Source Evaluation and Ranking
      description: Assessing retrieved sources for credibility, recency, relevance, and bias using heuristics and LLM-based
        evaluation before incorporating into synthesis.
    - concept_name: Iterative Deepening
      description: The agent identifies gaps in its findings and autonomously generates follow-up queries, drilling deeper
        into specific subtopics until coverage thresholds are met.
    - concept_name: Synthesis and Report Generation
      description: Combining findings from multiple sources into coherent, structured reports with citations, cross-references,
        and confidence indicators for each claim.
    - concept_name: Fact Verification Loop
      description: A self-checking mechanism where the agent cross-references key claims against independent sources and flags
        contradictions or unverifiable statements.
    how_it_works: []
    design_decisions:
      when_to_use: []
      when_to_avoid: []
      trade_offs: []
