  retrieval_agent:
    definition: A blueprint for building a retrieval agent that autonomously decides when to search, formulates queries, evaluates
      relevance, and synthesizes retrieved information into contextually appropriate responses.
    core_concepts:
    - concept_name: Autonomous Retrieval Decision
      description: The agent decides whether to retrieve (vs. use parametric knowledge) based on query complexity, confidence
        level, and knowledge recency requirements.
    - concept_name: Query Rewriting
      description: Transforming user questions into optimized retrieval queries — expanding acronyms, adding synonyms, decomposing
        compound questions, and adjusting specificity.
    - concept_name: Multi-Index Search
      description: Searching across multiple retrieval indices (vector stores, keyword indices, knowledge graphs, SQL databases)
        and merging results using reciprocal rank fusion or learned re-ranking.
    - concept_name: Relevance Filtering and Re-Ranking
      description: Post-retrieval evaluation of candidate documents for relevance, recency, and authority — filtering noise
        and ranking the most useful results for the current context.
    - concept_name: Adaptive Retrieval Strategy
      description: Adjusting retrieval parameters (top-k, chunk size, similarity threshold) based on result quality — if initial
        results are poor, the agent broadens search or reformulates.
