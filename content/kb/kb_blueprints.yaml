    - 'B07 Ch8: Finance case studies (JPMorgan, Virgin Money) — regulatory compliance, client engagement'
    - 'B07 Ch8: Energy case study (Eneco) — customer service agents, platform-based deployment'
    - 'B07 Ch8: Agriculture case study — autonomous intelligence in precision farming'
    - 'B07 Ch8: Supply chain case study (Dow) — freight billing, logistics optimization'
