    bdi_architecture:
      name: Belief-Desire-Intention (BDI) Architecture
      description: Combines deliberation with means-ends reasoning. Agent acquires sensor input, forms beliefs about world
        state, generates options/desires based on current beliefs and intentions, filters options through deliberation to
        form intentions, selects actions consistent with intentions.
      key_properties:
      - 'Deliberative: Agent decides what to achieve (goal selection/formation)'
      - 'Means-ends reasoning: Agent decides how to pursue goals'
      - 'Intentional commitment: Selected alternatives become intentions that persist and constrain future reasoning'
      - 'Proactive: Agent sets and works toward goals (vs reactive agents)'
      - Supports intent projection and capability to reconsider intentions
      process_cycle:
      - Sense environment via sensors
      - Form/revise beliefs about current and future states
      - Generate options (desires) based on beliefs and current intentions
      - Filter options through deliberation process
      - Commit to selected options (become intentions)
      - Select and execute actions consistent with intentions
      agent_types:
      - 'Cautious agents: Frequently reconsider intentions'
      - 'Bold agents: Charge ahead without reconsidering intentions'
      - 'Proactive social agents: More like teammates in human-agent teams'
      implementation_considerations: Intuitive to understand but can be difficult to implement
      advantages_over_alternatives:
      - More human-like reasoning than purely reactive agents
      - Enables complex goal-seeking behavior
      - Supports explicit representation of goals and intentions
      - Can be combined with reactive components in layered architectures
    logic_based_architecture:
      name: Logic-Based Architecture
      description: AI agent designer symbolically codes world properties in database where property value combinations map
        to actions.
      example: If (water on windshield AND wipers off) → activate wipers at slow speed
      advantages:
      - Straightforward to implement
      - System behavior predictable (designer can review logic for accuracy)
      - Known information can be verified
      limitations:
      - Requires sensors to provide correct symbolic information
      - Must anticipate all important conditions in database
      - Processing time increases with logic statements (staleness problem)
      - Difficult to represent procedural knowledge for complex systems
      - Hard to handle all edge cases and unexpected conditions
    reactive_architecture:
      name: Reactive Architecture (Subsumption)
      description: Intelligent behavior emerges as property of simple behaviors interacting with environment. Hierarchical
        goal structure where lower-level goals prioritized over higher-level.
      key_concept: Subsumption architecture
      example: Robot collision avoidance (low-level) overrides navigation to destination (high-level)
      mechanism: Agent executes behavioral rules upon environmental feedback
      advantages:
      - Simple and economical to implement
      - Relatively robust
      - Suitable for a few layers of goals
      limitations:
      - Requires accurate sensing of relevant information
      - Decisions based on local information may not be optimal
      - Behavior emerges unpredictably (difficult to predict under all circumstances)
      - Scaling to many goal layers becomes difficult
      - No explicit decision-making prior to implementation
    layered_architecture:
      name: Layered Architecture
      description: Combines attributes of other architectures by implementing processes in layers that execute simultaneously.
      mechanism: 'Example: reactive components in one layer, proactive components in another layer, executed together for
        agent response'
      advantages:
      - Flexibility to combine different architectural approaches
      - Can implement specialized functions in different layers
      - Supports both reactive and proactive behavior
  llm_as_agent_backbone:
    definition: LLMs serve as the reasoning engine (brain) of AI agents. The choice of model architecture — decoder-only (generators),
      encoder-only (analysts), MoE (specialists), or reasoning models (deliberate thinkers) — determines agent capabilities,
      cost, and latency. Model selection is an architectural decision as important as pattern selection.
    core_concepts:
    - concept_name: Prompt as Programming
      explanation: 'System prompts define agent behavior, role, tool access, and output format. The prompt IS the agent''s
        instruction set. Different scenarios need different CoT prompts: step-by-step for math, pro/con for decisions, checklist
        for QA.'
    - concept_name: In-Context Learning for Agents
      explanation: Agents leverage few-shot examples in prompts to learn task patterns without fine-tuning. Critical for tool
        use demonstrations and output format compliance.
    - concept_name: Model Architecture Taxonomy for Agents
      explanation: Decoder-only (GPT, Qwen, Llama) = generators and planners. Encoder-only (BERT, ModernBERT, NeoBERT) = retrievers
        and analysts (no generation, bidirectional). MoE (Mixtral, DBRX) = specialists with conditional computation (top-k
        routing, gating networks). Reasoning models (DeepSeek-R1, Qwen3, o1) = deliberate thinkers with internal search. Encoder-decoder
        (T5, BART) = structured transformation tasks.
    - concept_name: Model Selection for Agents
      explanation: 'Match model type to agent role: fast decoder for drafting/searching, reasoning model for planning/analysis,
        encoder for retrieval/scoring. Multi-model teams outperform single-model agents — assign model by role, not one-size-fits-all.
        Consider: task complexity, latency budget, cost per token, thinking budget allocation.'
    - concept_name: KV Caching and Inference Optimization
      explanation: 'KV cache stores previously computed key-value pairs to avoid recomputation during autoregressive generation.
        Grows linearly with sequence length. Management via: Paged Attention (vLLM), prefix caching, chunked prefill, continuous
        batching, hash-based verification. GQA reduces cache size by sharing key-value heads across query groups. Context
        engineering directly affects cache integrity — any token modification invalidates cached positions.'
    - concept_name: Thinking Modes and Budgets
      explanation: Reasoning models support enable_thinking toggle and thinking_budget (token cap for internal trace). Enable
        thinking for planning, decomposition, tool selection, verification. Disable for short, low-risk turns or validated
        plan steps. Budget >= 1024 tokens for non-trivial reasoning. Each reasoning token costs money — allocate thinking
        where it pays off.
    - concept_name: Small Language Models (SLMs)
      explanation: 'Compact models (typically <10B parameters) like Phi, Gemma, Mistral that offer faster inference, lower
        cost, and easier deployment while maintaining strong performance on focused tasks. Key advantage for agentic use:
        can be fine-tuned for specific tool-calling or domain tasks, deployed on-device or edge, and used as specialized workers
        in multi-agent systems.'
    - concept_name: Fine-Tuning Taxonomy (B04)
      explanation: 'B04 catalogs 4 parameter-efficient fine-tuning (PEFT) methods: (1) LoRA (Low-Rank Adaptation) — injects
        trainable low-rank matrices into attention layers, most popular PEFT method. (2) Adapter Tuning — inserts small trainable
        adapter modules between transformer layers. (3) Prefix Tuning — prepends trainable continuous vectors to the input
        of each transformer layer. (4) Prompt Tuning — learns soft prompt tokens prepended to input, lightest-weight approach.
        Trade-off: LoRA offers best performance-to-parameter ratio; Prompt Tuning is cheapest but least expressive.'
    - concept_name: Model Distillation Pipeline (B04)
      explanation: 'B04 defines a 4-step knowledge distillation pipeline: (1) Train the teacher model (large, high-capability).
        (2) Generate soft labels — teacher produces probability distributions over outputs (not just hard labels). (3) Train
        the student model to match teacher''s soft label distributions. (4) Deploy the student — smaller, faster model with
        teacher-like capabilities. Key insight: soft labels transfer "dark knowledge" — the teacher''s understanding of relationships
        between classes.'
    - concept_name: Reasoning Language Models (RLMs)
      explanation: 'Models trained to "think before answering" using test-time compute. Key examples: OpenAI o1 (internal
        chain-of-thought before response), o3 (improved reasoning), DeepSeek R1 multi-stage training pipeline: Stage 1 — cold
        start with curated CoT data, Stage 2 — RL with GRPO (Group Relative Policy Optimization) on reasoning tasks, Stage
        3 — rejection sampling + SFT for refinement, Stage 4 — final RL for helpfulness/safety alignment. RLMs represent test-time
        compute paradigm: spending more inference time for better reasoning quality.'
    how_it_works: []
    design_decisions:
      when_to_use: []
      when_to_avoid: []
      trade_offs: []
    implementation:
      reference_architecture: 'Multi-model team: fast_llm (Qwen3-32B, thinking disabled) for search/drafting, thinker_llm
        (Qwen3-235B-A22B, thinking enabled, budget 1536) for analysis/planning, supervisor_llm (GPT-4.1) for routing. Encoder
        (ModernBERT) for relevance scoring.'
      pseudocode: 'fast_llm = ChatOpenAI(model=''Qwen3-32B'', extra_body={''enable_thinking'': False})

        thinker_llm = ChatOpenAI(model=''Qwen3-235B-A22B'', extra_body={''enable_thinking'': True, ''budget'': 1536})

        supervisor_llm = ChatOpenAI(model=''gpt-4.1'', temperature=0)'
      code_scaffold: "# Multi-model team setup (from B02 Ch4)\nfrom langchain_openai import ChatOpenAI\n\nfast_llm = ChatOpenAI(\n\
        \    model='Qwen/Qwen3-32B-fast', temperature=0,\n    extra_body={'top_k': 20, 'chat_template_kwargs': {'enable_thinking':\
        \ False}}\n)\nthinker_llm = ChatOpenAI(\n    model='Qwen/Qwen3-235B-A22B-Thinking-2507', temperature=0,\n    extra_body={'chat_template_kwargs':\
        \ {'enable_thinking': True},\n               'thinking': {'type': 'token', 'budget': 1536}}\n)\nsupervisor_llm = ChatOpenAI(model='gpt-4.1',\
        \ temperature=0)\n\n# RoPE scaling for extended context\nfrom vllm import LLM, SamplingParams\nllm = LLM(model='answerdotai/ModernBERT-base',\
        \ trust_remote_code=True,\n          rope_scaling={'type': 'linear', 'factor': 4.0})"
      libraries_and_tools:
      - langchain-openai (ChatOpenAI wrapper)
      - vLLM (inference serving with paged attention, prefix caching)
      - transformers (HuggingFace, chat templates, thinking modes)
      - bitsandbytes (quantization)
      - unsloth (LoRA training optimization)
      - LoRAX (multi-adapter serving on shared GPU)
      configuration: 'vLLM features: paged_attention, prefix_caching, chunked_prefill, continuous_batching, hash_based_verification,
        dynamic_cache_reclamation, disaggregated_kv_transfer'
    real_world_applications: []
    relationships:
      depends_on: []
      enables:
      - architecture_and_patterns
      - tools_and_integration
      compare_with: []
