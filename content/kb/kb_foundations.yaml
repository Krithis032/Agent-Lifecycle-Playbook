    three_waves_of_ai:
      wave_1_first_principles:
        era: 1950s-1970s
        technology: Symbolic AI, neural networks (first generation)
        approach: Capture symbolic representations and logical constructs
        outcome: Initial interest faded as general intelligence goal proved elusive
        application: Highly constrained manufacturing/production with predictable responses
      wave_2_expert_systems:
        era: 1980s
        technology: Expert systems
        approach: Encapsulate expert human knowledge into systems for less predictable environments
        outcome: Significant investment then faded; extended AI beyond constrained processes
        application: Commercial aviation and other less-predictable domains
      wave_3_deep_learning:
        era: 2010s-present
        technology: Deep learning, multilayer neural networks, LLMs
        approach: Statistical machine learning with large datasets and specialized GPUs
        breakthrough: Object recognition and similar tasks matching/exceeding human performance
        limitation: Requires thousands of labeled images (vs humans learning from single example)
        key_insight: Current systems excel at consistent, predictable responses but fail catastrophically in unpredictable
          environments
