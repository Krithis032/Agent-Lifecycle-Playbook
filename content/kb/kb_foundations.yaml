    real_world_analogies:
    - analogy: Thermostat as simplest agent
      explanation: A thermostat perceives (temperature sensor), reasons (compare to target), and acts (turn heating on/off)
        — the same perceive-reason-act loop as LLM agents, just simpler
      source: Illustrated Guide Ch1 Deep Dive
    - analogy: Employee vs Consultant
      explanation: A regular LLM is like a consultant you ask questions — an agent is like an employee who executes projects.
        The consultant waits for your next prompt; the employee decides their own next action
      source: AI Agents Learning Guide
    - analogy: Self-driving car architecture
      explanation: Cameras (sensors) → AI brain (reasoning) → Steering/braking (actuators) — maps directly to the agent architecture
        pattern
      source: AI Agents Learning Guide Ch1
    common_misconceptions:
    - misconception: Any AI that uses tools is an agent
      reality: Using a tool once does not make something an agent. A calculator app uses a tool (math operations) but is not
        an agent. Agents use tools as part of autonomous, goal-directed behavior in LOOPS.
      source: Illustrated Guide Ch1 Deep Dive
    - misconception: Agents are just chatbots with extra features
      reality: The fundamental difference is autonomy. A chatbot responds to prompts; an agent pursues goals. Chatbots are
        reactive; agents are proactive.
      source: Illustrated Guide Ch1 Deep Dive
    - misconception: Agents need to be super intelligent
      reality: A thermostat is technically an agent. It perceives, reasons, and acts. LLM agents are just more capable versions
        of a pattern that has existed for decades.
      source: Illustrated Guide Ch1 Deep Dive
    - misconception: If it is called an agent it must be one
      reality: Marketing has muddied the waters. Many AI agents are just LLMs with fancy wrappers. True agents have the perception-reasoning-action
        loop with genuine autonomy.
      source: Illustrated Guide Ch1 Deep Dive
    complexity_examples:
    - level: simple
      scenario: Siri weather reminder
      not_agent: Asking Siri "What is the weather?" — single response, done
      agent: Siri, remind me to bring an umbrella if it rains tomorrow — monitors weather, checks automatically, sends reminder
        if needed, multiple autonomous steps
    - level: intermediate
      scenario: Email assistant
      not_agent: Using ChatGPT to write an email for you — single task, manual prompt
      agent: AI assistant that monitors inbox, drafts responses to routine queries, flags items needing attention, schedules
        follow-ups — all without asking each time
    - level: advanced
      scenario: Claude Code bug fix
      not_agent: Copilot autocompleting a line of code — single prediction
      agent: Claude Code reads codebase (perception) → understands bug (reasoning) → searches files (action) → proposes fix
        → runs tests → sees failure (feedback) → adjusts fix → tests pass → commits — all from one request
