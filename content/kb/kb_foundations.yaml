foundations:
  what_is_an_agent:
    definition: An AI agent is an autonomous software entity powered by a language model that perceives its environment, reasons
      about goals, takes actions (including tool use), and iterates until a task is complete. Unlike chatbots (stateless Q&A)
      or assistants (guided by user at each step), agents operate with sustained autonomy across multi-step tasks, maintaining
      state and adapting plans dynamically. The core loop is Perceive → Reason → Act → Observe, implemented as a finite state
      machine where LLM calls serve as transition functions between states.
    core_concepts:
    - concept_name: Agent vs Chatbot vs Assistant
      explanation: Chatbots are stateless single-turn responders. Assistants follow user-directed steps. Agents operate autonomously
        across multi-step tasks with self-directed planning, tool use, and iterative refinement. The key differentiator is
        sustained autonomy — agents decide what to do next.
    - concept_name: Autonomy Spectrum
      explanation: Ranges from fully human-directed (assistant) to fully autonomous (agent). Most production systems sit in
        between, with HITL checkpoints at critical decision points. The level of autonomy should match the risk profile of
        the task domain.
    - concept_name: Agency as Emergent Property
      explanation: Agency emerges from the combination of an LLM backbone + tool access + memory + control flow. No single
        component creates agency; it is the orchestrated interplay of reasoning, action, and state management.
    - concept_name: FSM as Base Paradigm
      explanation: Every agent framework (LangGraph, CrewAI, AutoGen) is fundamentally a finite state machine. States represent
        agent processing phases, edges represent transitions (conditional or fixed), and the LLM acts as the transition function
        deciding next state. LangGraph makes this explicit with StateGraph, nodes, edges, and conditional_edges.
    - concept_name: Four Pillars of Agents (B09)
      explanation: 'B09 frames agents through four essential pillars: (1) Memory — remembering context and past experiences,
        (2) Tools — taking actions beyond text generation, (3) Planning — breaking down complex tasks into subtasks, (4) Reasoning
        LLM — the brain that reads context, plans approach, selects tools, and interprets results. All four must work together
        for true agency.'
    - concept_name: Train-Time vs Test-Time Compute
      explanation: 'Two paradigms for making AI smarter: train-time compute (bigger models during training) vs test-time compute
        (letting the model think longer when answering). Modern reasoning LLMs (o1, o3, Claude) use test-time compute. Analogy:
        studying for months vs taking extra time on a hard exam question. This is foundational to understanding why reasoning
        models can use tools mid-thought (TIR).'
    - concept_name: Five Agent Components (B03)
      explanation: 'B03 identifies 5 essential agent components: (1) Profile/Persona — defines who the agent is, (2) Actions/Tool
        Use — what the agent can do, (3) Memory/Knowledge — what the agent knows/remembers, (4) Reasoning/Evaluation — how
        the agent thinks and assesses output quality, (5) Planning/Feedback — how the agent decomposes goals and improves
        from results. All 5 must work together for a complete agentic system.'
    - concept_name: Agent Profile Generation Methods (B03)
      explanation: 'Three methods to create agent personas: (1) Handcrafted — manually authored profiles, most control but
        least scalable. (2) LLM-Generated — use an LLM to generate diverse agent profiles from seed descriptions. (3) Data-Generated
        — use evolutionary algorithms to evolve agent profiles through selection/mutation, enabling automated discovery of
        effective persona configurations.'
    - concept_name: Six Agent Components (B04)
      explanation: 'B04 identifies 6 essential components of an AI agent: (1) LLM — the reasoning engine. (2) System Message
        — defines persona, instructions, and constraints. (3) Knowledge Base — external data the agent can access (documents,
        databases). (4) Memory — conversation history and learned context. (5) Tools — functions the agent can invoke (APIs,
        code execution). (6) Orchestrator — the control layer that manages agent execution flow, tool routing, and decision-making.'
    - concept_name: Agent Type Taxonomy (B04)
      explanation: 'B04 classifies agents into 3 types by autonomy level: (1) Retrieval Agents — focus on information retrieval
        and RAG, lowest autonomy, retrieve-then-generate pattern. (2) Task Agents — execute specific tasks using tools, moderate
        autonomy, follow defined workflows. (3) Autonomous Agents — highest autonomy, self-directed goal pursuit with dynamic
        planning, can create and modify their own sub-goals. Each type maps to different orchestration patterns and safety
        requirements.'
    - concept_name: Orchestrator as Agent Component (B04)
      explanation: 'B04 elevates the orchestrator from mere infrastructure to a core agent component. The orchestrator manages:
        autonomy (how independently the agent acts), abstraction (hiding complexity from the user), and modularity (composing
        capabilities from interchangeable parts). It is the "control center" that coordinates LLM calls, tool routing, memory
        access, and workflow execution.'
    - concept_name: Agent vs Traditional Program vs Simple LLM Comparison
      definition: 'Five-dimension comparison: Decisions (pre-coded vs single-inference vs dynamic multi-step), Memory (database
        vs context-window vs short+long-term), Tools (hard-coded vs none vs dynamic selection), Adaptability (fixed vs prompt-dependent
        vs self-correcting), Autonomy (none vs minimal vs high goal-driven)'
      source_book: Deep-Dive Materials
      deep_dive_source: Ch1 Infographic - Comparison Table
    - concept_name: Four Pillars of Agents Framework
      definition: 'The four components that transform an LLM into an agent: Memory (remembering context), Tools (taking actions),
        Planning (breaking down tasks), and Reasoning LLM (the brain). These combine to create autonomous systems.'
      source_book: Deep-Dive Materials
      deep_dive_source: AI Agents Learning Guide - Ch1 Key Concepts
    how_it_works:
    - step: 1
      description: 'PERCEIVE: Agent receives input (user query, environment observation, tool result) into its state.'
    - step: 2
      description: 'REASON: LLM processes current state (messages, memory, context) to decide next action — this is the core
        ''thinking'' step, potentially using CoT, ReAct, or planning patterns.'
    - step: 3
      description: 'ACT: Agent executes chosen action — tool call, API request, code execution, or generating a response.'
    - step: 4
      description: 'OBSERVE: Agent receives action result, updates state, and evaluates whether to continue or terminate.'
    - step: 5
      description: 'ITERATE: If goal not met, loop back to REASON. Halting condition checks prevent infinite loops (max iterations,
        tool-call absence, explicit ''FINAL ANSWER'' token).'
    design_decisions:
      when_to_use:
      - Multi-step tasks requiring dynamic planning
      - Tasks requiring tool use (search, code execution, API calls)
      - Workflows where the path isn't fully predictable upfront
      - Tasks needing iterative refinement based on intermediate results
      when_to_avoid:
      - Simple single-turn Q&A (use direct LLM call)
      - Deterministic workflows with no branching (use a pipeline)
      - When latency/cost constraints are extremely tight
      - When full auditability of every decision is required and non-negotiable
      trade_offs:
      - 'Autonomy vs Control: More autonomy = harder to predict/audit, but more flexible'
      - 'Cost vs Capability: Each reasoning loop = additional LLM calls = higher cost'
      - 'Latency vs Quality: More iterations = better results but slower response'
      - 'Complexity vs Reliability: Richer agent architecture = more failure modes'
    implementation:
      reference_architecture: 'LangGraph StateGraph with TypedDict state, conditional edges for tool routing, MemorySaver
        for checkpointing. Pattern: START → call_model → should_continue → (tool_node | END)'
      pseudocode: "state = {messages: [user_input]}\nwhile not halting_condition(state):\n  action = llm(state)\n  if action.tool_calls:\n\
        \    result = execute_tool(action.tool_calls)\n    state.messages.append(result)\n  else:\n    return action.content"
      code_scaffold: "from langgraph.graph import StateGraph, START, END\nfrom langgraph.prebuilt import create_react_agent\n\
        from typing import TypedDict, Annotated, Sequence\nfrom langchain_core.messages import BaseMessage\nfrom langgraph.graph.message\
        \ import add_messages\n\nclass AgentState(TypedDict):\n    messages: Annotated[Sequence[BaseMessage], add_messages]\n\
        \ndef call_model(state: AgentState):\n    response = model.invoke(state['messages'])\n    return {'messages': [response]}\n\
        \ndef should_continue(state: AgentState):\n    last = state['messages'][-1]\n    return 'tools' if last.tool_calls\
        \ else 'end'\n\nworkflow = StateGraph(AgentState)\nworkflow.add_node('agent', call_model)\nworkflow.add_node('tools',\
        \ tool_node)\nworkflow.add_edge(START, 'agent')\nworkflow.add_conditional_edges('agent', should_continue, {'tools':\
        \ 'tools', 'end': END})\nworkflow.add_edge('tools', 'agent')\ngraph = workflow.compile(checkpointer=MemorySaver())"
      libraries_and_tools:
      - langgraph>=0.3
      - langchain-core
      - langchain-openai
      - langsmith (observability)
      configuration: 'LangGraph: StateGraph with TypedDict state, MemorySaver checkpointer, conditional_edges for routing'
    real_world_applications:
    - Research agents that search, synthesize, and write reports
    - Coding agents that read specs, write code, run tests, and iterate
    - Customer support agents with tool access to databases and ticketing systems
    - Data analysis agents that write SQL, execute queries, interpret results
