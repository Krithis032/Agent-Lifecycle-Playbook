  cognitive_architectures:
    definition: The internal reasoning structure that determines how an agent thinks, plans, and decides. Modern LLM-agent
      cognitive architectures center on the Perceive-Reason-Act loop, implemented through patterns like ReAct (interleaved
      reasoning+action), CoT (structured thinking), and Plan-and-Execute (upfront planning with adaptive execution). Each
      maps to a distinct state machine topology in frameworks like LangGraph.
    core_concepts:
    - concept_name: Perception-Reasoning-Action Loop
      explanation: The fundamental cognitive cycle. Perception = processing inputs and tool results. Reasoning = LLM inference
        with context. Action = tool calls or response generation. The quality of each phase determines overall agent capability.
    - concept_name: Inner Monologue / Chain of Thought
      explanation: 'CoT serves as control flow for agents, not just a prompting trick. The chain of thought IS the agent''s
        reasoning trace. Different CoT prompts optimize for different scenarios: step-by-step for math, pro/con for decisions,
        checklist for validation, explain-then-answer for analysis.'
    - concept_name: World Models
      explanation: Agent's internal representation of its environment state. In LangGraph, this is the TypedDict state object
        that accumulates messages, tool results, and intermediate computations. State design IS world model design.
    - concept_name: Goal Decomposition
      explanation: Breaking complex objectives into sub-goals. Can be upfront (plan-and-execute) or dynamic (ReAct discovers
        subtasks during execution). Tree of Thought extends this with branching search over multiple decomposition paths.
    - concept_name: Self-Reflection and Metacognition
      explanation: Agent ability to evaluate its own outputs and reasoning quality. Implemented via separate reflection nodes,
        evaluator agents, or RULER-style LLM-as-judge scoring. Critical for reducing hallucination and improving reliability.
    - concept_name: Autoregressive Generation as Reasoning Basis
      explanation: LLMs generate text one token at a time, each token depending on all previous tokens. This sequential, autoregressive
        process enables step-by-step reasoning and extended thinking — each reasoning step builds on what came before. This
        is the mechanistic foundation for CoT, ReAct, and all agent reasoning patterns.
    - concept_name: Skeleton of Thought (B03)
      explanation: A parallel reasoning approach where the LLM first generates a skeleton (outline) of the answer, then fills
        in each section in parallel. Reduces sequential bottlenecks in complex reasoning tasks. Useful for long-form generation
        where sections are relatively independent.
    - concept_name: Agent Development Lifecycle (ADL)
      definition: 'description: Structured iterative framework for developing autonomous agents, fundamentally diverging from
        traditional software engineering. Emphasizes continuous learning and adaptation. | phases: {''phase'': ''1. Conceptualization
        & Requirements'', ''focus'': ''Define problem space, agent goals, and success metrics'', ''key_activities'': [''Define
        high-level agent goals'', ''Map goals to achievable sub-goals'', ''Set measurable success metrics (performance, alignment,
        user trust)'', ''Determine operating environment and ethical/technical constraints'']}; {''phase'': ''2. Architecture
        & Design'', ''focus'': ''Design internal architecture supporting agent goals'', ''key_activities'': [''Choose cognitive
        models (ReAct, plan-and-execute, hierarchical)'', ''Design memory strategies (short-term, long-term, episodic)'',
        ''Define communication flows and protocols'', ''Create Architectural Decision Records (ADRs)'']}; {''phase'': ''3.
        Implementation & Integration'', ''focus'': ''Bring architecture to life using development frameworks'', ''key_activities'':
        [''Select and integrate frameworks (LangChain, CrewAI, LangGraph)'', ''Implement cognitive components (reasoning,
        perception, memory)'', ''Stitch modules via orchestration layers'', ''Validate through integration testing and behavior
        validation'']}; {''phase'': ''4. Evaluation & Optimization'', ''focus'': ''Rigorous assessment and iterative improvement'',
        ''key_activities'': [''Measure against success metrics'', ''Evaluate robustness under ambiguity'', ''Test in production
        shadows'', ''Optimize planning depth, context usage, token efficiency''], ''metrics'': [''Task completion rate'',
        ''Mean response time'', ''User satisfaction'', ''Tool invocation accuracy'', ''Feedback frequency'']}; {''phase'':
        ''5. Governance & Lifecycle Management'', ''focus'': ''Ensure reliability, transparency, and compliance long-term'',
        ''key_activities'': [''Proactive monitoring and log auditing'', ''Model versioning and rollback capabilities'', ''Security
        patching and compliance auditing'', ''Ethical oversight and behavioral monitoring'']} | iteration_model: Continuous
        loop from monitoring back to conceptualization for improvement | key_principle: Unlike static software, agent systems
        must operate in dynamic, uncertain environments requiring continuous refinement'
      source_book: B01
      original_sources:
      - 'B01: Chapter 1 - Agent Development Lifecycle'
    - concept_name: Agentic AI Progression Framework
      definition: 'description: Maturity model categorizing agent capabilities across autonomy, reasoning, and adaptability
