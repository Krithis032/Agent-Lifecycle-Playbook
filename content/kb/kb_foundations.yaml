      encoder-only models, MoE, reasoning models, thinking modes/budgets, RoPE, open vs closed models, LoRA/adapters, quantization,
      multi-model team design'
    - 'B04 Ch1: SLMs — Phi, Gemma, Mistral, edge deployment advantages for agents'
    - 'B04 Ch1: Fine-tuning taxonomy — LoRA, Adapter, Prefix, Prompt tuning (PEFT methods)'
    - 'B04 Ch1: Model distillation 4-step pipeline — teacher, soft labels, student training, deployment'
    - 'B04 Ch1: RLMs — o1, o3, DeepSeek R1 multi-stage training (cold start→GRPO RL→SFT→alignment RL)'
  architectural_patterns:
    core_concepts:
    - concept_name: Reactive agents
      definition: 'description: Simplest agent class using reflexive response mechanisms without internal state or deliberation.
        Direct stimulus-response coupling, minimal reasoning. | key_characteristics: Stateless; Reflexive; Condition-based
        rules; No memory/learning | use_cases: Thermostat-like automation; Bump sensors; Fire alarms; IoT simple automation
        | implementation_notes: Cost-effective and fast but cannot adapt to novel situations'
      source_book: B01
    - concept_name: Deliberative agents
      definition: 'description: Agents using Sense-Model-Plan-Act (SMPA) paradigm with internal state, planning, and structured
        reasoning. Maintains world model and reasons about future. | key_characteristics: Internal state model; Forward/backward
        reasoning; Planning; Goal decomposition | use_cases: Travel planning; Autonomous vehicle navigation; Healthcare diagnostics;
        Business process automation | implementation_notes: More computationally intensive but enables complex multi-step
        tasks'
      source_book: B01
    - concept_name: Hybrid agents
      definition: 'description: Layered architecture integrating rapid reactive behavior with deliberative reasoning. Routes
        urgent inputs to reactive layer, complex reasoning to deliberative layer. | key_characteristics: Dual-layer processing;
        Priority-based routing; Dynamic synchronization; Fallback mechanisms | use_cases: Warehouse robots; Autonomous vehicles;
        Intelligent assistants; Cybersecurity agents | implementation_notes: Balances speed with strategic planning; requires
        careful coordination between layers'
      source_book: B01
    sources:
    - 'B01: 30 Agents Every AI Engineer Must Build (Packt, 2025)'
    definition: Foundational design patterns for structuring AI agent internals including the perception-reasoning-action
      loop, sense-plan-act cycle, and layered architectures that separate reactive behaviors from deliberative planning.
  agent_interaction_paradigms:
    core_concepts:
    - concept_name: Direct LLM Interaction
      definition: 'operational_autonomy: Stateless / None | contextual_awareness: None | decision_making_authority: Human-led
        | description: Stateless conversational interaction where each prompt is treated in isolation with no memory. User
        inputs query, LLM responds with one-time output. | key_components: User input; LLM model; Single response output |
        typical_use_cases: Chat-based QA; Creative writing tools; Educational flashcard assistants'
      source_book: B01
      original_sources:
      - 'B01: Chapter 1 - Evolution of agent interaction paradigms'
    - concept_name: Proxy Agent
      definition: 'operational_autonomy: Low | contextual_awareness: Light contextualization | decision_making_authority:
        Instruction-based | description: Acts as intelligent intermediary translating natural language into structured formats.
        Transforms ambiguous user input through prompt templates and structured data pipelines. | key_components: User intent
        interpretation; Prompt templating; Structured output transformation; System interface | architectural_decisions: Input
        sanitization; Response reformatting; Latency monitoring; Schema validation'
      source_book: B01
      original_sources:
      - 'B01: Chapter 1 - Proxy agent pattern'
    - concept_name: Assistant System
      definition: 'operational_autonomy: Medium | contextual_awareness: Session-based | decision_making_authority: User-guided
        | description: Maintains session state and tool invocation across turns. Acts as task orchestrator coordinating with
        external services while preserving user context. | key_components: Session state management; Tool invocation interface;
        Multi-turn dialogue; Task coordination | architectural_decisions: Context persistence; State schema design; Tool abstraction;
        Error handling across tool calls'
      source_book: B01
