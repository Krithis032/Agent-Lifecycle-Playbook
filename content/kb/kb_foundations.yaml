  autoregression:
    description: How LLMs generate text one token at a time, where each new token depends on all previous tokens. Enables
      step-by-step reasoning and extended thinking.
    core_concepts:
    - concept_name: Token-by-token generation
      definition: LLMs generate output sequentially, with each new token predicted based on all previously generated tokens
      example: Like writing a sentence word by word, where each word depends on what you have already written
    - concept_name: Extended thinking via autoregression
      definition: More tokens generated = more thinking and reasoning capability; enables step-by-step reasoning traces
      example: Chain-of-thought works because autoregression allows reasoning steps to inform subsequent steps
    - concept_name: Self-correction through autoregression
      definition: Later tokens can correct or verify earlier predictions within the same generation sequence
      example: 'Agent planning: "I need to understand the failing test" -> reads file -> "The test expects X but gets Y" ->
        searches source'
    - concept_name: Autoregression Enables Agent Reasoning
      definition: 'Autoregression matters for agents because: (1) Extended thinking is possible — more tokens = more thinking,
        (2) Chain-of-thought works — each step informs the next, (3) Agents can think aloud — reasoning traces help plan actions,
        (4) Self-correction happens — later tokens can course-correct earlier ones'
      source_book: Deep-Dive Materials
      deep_dive_source: Illustrated Guide Ch1 Concept 3
    sources:
    - 'B05: AI Agents Learning Guide - Chapter 1'
    - 'Deep-Dive: An Illustrated Guide to AI Agents - Chapter 1 Concept 3'
    - 'Deep-Dive: AI Agents Learning Guide - Part 3 Concept 3'
    real_world_analogies:
    - analogy: Writing a sentence word by word
      explanation: Like writing a sentence where each word depends on what you have already written — you cannot go back and
        change earlier words
      source: AI Agents Learning Guide
    common_misconceptions:
    - misconception: LLMs understand and then respond
      reality: There is no separate understanding phase. The LLM is always just predicting the next token. Understanding emerges
        from the prediction process itself.
      source: Illustrated Guide Ch1 Deep Dive
    - misconception: Generating more tokens is wasteful
      reality: For complex tasks, more tokens = more computation = better answers. This is the core insight behind test-time
        compute and reasoning models.
      source: Illustrated Guide Ch1 Deep Dive
    - misconception: The LLM plans everything before writing
      reality: The LLM commits to each token before seeing what comes next. It cannot go back and change earlier tokens. This
        is why prompting techniques like CoT help — they structure the generation process.
      source: Illustrated Guide Ch1 Deep Dive
    definition: The autoregressive generation mechanism underlying modern LLMs where each token is predicted conditioned on
      all previous tokens, creating the sequential reasoning capability that powers agent thought processes.
  train_time_vs_test_time_compute:
    description: Distinction between computational investment during model training (building capability) vs during inference
      (using capability). Critical for agent performance.
    core_concepts:
    - concept_name: Train-time compute
      definition: Extra processing during model training phase to build stronger foundational capabilities
      analogy: Studying for months before taking an exam
    - concept_name: Test-time compute
      definition: Extra processing during inference/answering to solve specific problems better
      analogy: Taking extra time on each individual exam question
    - concept_name: Why agents need test-time compute
      definition: Agents face novel situations training cannot cover; planning requires extended reasoning; verification/checking
        requires extra compute; iterations accumulate test-time cost
      importance: CRUCIAL for agent performance - agents cannot rely solely on training; they must think longer when answering
    - concept_name: Modern reasoning LLMs use test-time compute
      definition: Models like o1/o3 use extended generation to think through problems before answering, trading latency for
        quality
      example: 'o1 model: takes extra time "thinking" before answering complex code/math questions'
    - concept_name: Test-Time Compute Importance for Agents
      definition: 'Test-time compute is crucial for agents because: agents face novel situations (training cannot cover everything),
        agents need to plan (planning requires extended reasoning), agents must verify (checking work takes compute), agents
        iterate (each loop cycle is more test-time compute)'
      source_book: Deep-Dive Materials
      deep_dive_source: Illustrated Guide Ch1 Concept 4
    - concept_name: Test-Time Training (TTRL)
      definition: Cutting-edge technique that actually updates the model weights during use, not just using more compute for
        inference. Enables agents to learn from real interaction feedback, becoming measurably better over time.
      source_book: Deep-Dive Materials
      deep_dive_source: AI Agents Learning Guide Ch6
    sources:
    - 'B05: AI Agents Learning Guide - Chapter 1 (Deep Dive)'
    - 'Deep-Dive: An Illustrated Guide to AI Agents - Chapter 1 Concept 4'
    - 'Deep-Dive: AI Agents Learning Guide - Part 3 Concept 4'
    real_world_analogies:
    - analogy: Studying vs exam time
      explanation: Train-time = studying for years before an exam (builds knowledge). Test-time = taking extra time on each
        exam question (better answers per query). Both help you get a better score.
      source: AI Agents Learning Guide
    definition: The distinction between compute invested during model training (parameter learning) versus compute spent at
      inference time (chain-of-thought, search, tool use), and how test-time compute scaling enables more capable agents without
      retraining.
  reasoning_llms:
    description: New paradigm of LLMs trained to "think" before answering. Produce explicit reasoning traces (often hidden)
      before final answer. Enable extended thinking and self-verification.
    core_concepts:
    - concept_name: Reasoning LLM definition
      definition: Models trained to generate extended thinking steps before answering. Create explicit reasoning traces (often
        hidden from user).
      key_characteristics:
      - 'Extended generation: many more tokens for thinking'
      - Trained on reasoning tasks (step-by-step problem solving)
      - 'Self-verification: check own work'
      - 'Adjustable compute: can control thinking time'
    - concept_name: o1 (OpenAI reasoning model)
      definition: Reasoning LLM that thinks extensively before answering. Produces hidden reasoning traces before final answer.
      use_case: 'Complex domains: code, math, logic, scientific reasoning'
      tradeoff: Much slower than traditional LLMs due to extended thinking
    - concept_name: DeepSeek-R1 (open-source reasoning model)
      definition: Open-source reasoning LLM trained similarly to o1 with explicit reasoning chains
      advantage: Open-source alternative to proprietary reasoning models
    - concept_name: Reasoning trace structure
      definition: 'Reasoning LLMs break down problems: Planning -> Analysis -> Verification -> Answer'
      example: 'What is 17x24? -> [hidden: break down, 17x20=340, 17x4=68, sum 408, verify 408/17=24] -> 408'
    - concept_name: Why agents benefit from reasoning LLMs
      definition: Planning is reasoning (break tasks into steps); tool selection is reasoning (choosing right action); error
        recovery is reasoning (understanding failures); complex domains require thought
      agent_use: Agents that plan, verify, and iterate benefit significantly from reasoning model capability
    - concept_name: Why Agents Need Reasoning LLMs
      definition: Planning is reasoning (breaking tasks into steps), tool selection is reasoning (choosing the right action),
        error recovery is reasoning (understanding failures), complex domains require thought (code, math, logic). Without
        reasoning, agents make random fixes; with reasoning, they make targeted corrections.
      source_book: Deep-Dive Materials
      deep_dive_source: Illustrated Guide Ch1 Concept 5
    sources:
    - 'B05: AI Agents Learning Guide - Chapter 1 (Deep Dive)'
    - 'Deep-Dive: An Illustrated Guide to AI Agents - Chapter 1 Concept 5'
    - 'Deep-Dive: Ch1 Infographic - Reasoning LLMs section'
    common_misconceptions:
    - misconception: Reasoning LLMs are just slower versions of regular LLMs
      reality: They are fundamentally different — trained specifically for step-by-step reasoning with self-verification.
        The extra time produces qualitatively better results on complex tasks.
      source: Illustrated Guide Ch1 Deep Dive
    definition: Large language models specifically designed or fine-tuned for multi-step reasoning tasks, including chain-of-thought
      models (o1, o3, DeepSeek-R1) that allocate additional test-time compute to produce structured reasoning traces.
  common_agent_misconceptions:
    description: Four critical misconceptions about what makes something an agent. Clarifications to distinguish true agents
      from false positives.
    core_concepts:
    - misconception: Any AI that uses tools is an agent
      reality: Using a tool once does not make something an agent. Agents use tools as part of autonomous, goal-directed LOOPS.
      example: ChatGPT plugin calling tool once != Agent. Claude Code reading files and acting autonomously = Agent.
    - misconception: Agents are just chatbots with extra features
      reality: The fundamental difference is AUTONOMY. Chatbots respond to prompts; agents pursue goals. Chatbots are reactive;
        agents are proactive.
      distinction: 'Chatbot: "User asks question -> I respond". Agent: "I have a goal -> I decide next steps -> I act -> I
        observe -> I improve".'
    - misconception: Agents need to be super intelligent
      reality: An agent is technically an autonomous entity. A thermostat perceives (temperature), reasons (compare to target),
        acts (heat on/off). It is technically an agent.
      nuance: Even simple systems with perception-reasoning-action loops are agents. Intelligence level is separate from agency.
    - misconception: If called an agent it must be one
      reality: Marketing has muddied terminology. Many products called "AI agents" are just LLMs with wrappers. True agents
        have perception-reasoning-action LOOPS with autonomy.
      test: Does it perceive, reason, and act in loops? Does it pursue goals without human input per step? Then it is an agent.
    sources:
    - 'B05: AI Agents Learning Guide - Chapter 1 (Deep Dive)'
    definition: Frequently encountered misunderstandings about what constitutes an AI agent, including conflating tool use
      with agency, equating chatbots with agents, and assuming agents require superintelligence.
  agent_ecosystem_evolution:
    core_concepts:
    - concept_name: Service Mesh
      definition: Infrastructure pattern enabling APIs to discover, communicate, and collaborate reliably - predecessor concept
        to agentic mesh.
      source_book: B08
    - concept_name: Data Mesh
      definition: Decentralized data architecture providing standardized, trustworthy units of data for teams - parallel ecosystem
        model for agents.
      source_book: B08
    - concept_name: API Ecosystem
      definition: Historical foundation for agent ecosystems showing evolution from static APIs to collaborative autonomous
        systems.
      source_book: B08
    - concept_name: Lessons Learned
      definition: Patterns and practices from API and microservices evolution applicable to agent ecosystem design and governance.
      source_book: B08
    sources:
    - Agentic Mesh (O'Reilly Early Release)
    definition: The trajectory of the agentic AI ecosystem from single-agent prototypes to multi-agent platforms, framework
      proliferation, and the emergence of standards like MCP and A2A for agent interoperability.
  systems_engineering_methodology:
    definition: Applying systems engineering principles — requirements analysis, architecture decomposition, interface specification,
      verification and validation — to the design and deployment of AI agent systems.
    core_concepts:
    - concept_name: Model-Based Systems Engineering (MBSE)
      definition: A methodology that uses system models to describe system structure, behavior, and requirements comprehensively,
        enabling design of complex systems including human-AI teams with AOSM as an extension for agent-oriented modeling.
      source_book: B15
      chapter: '1.4'
      key_aspects:
      - SysML
      - AOSM meta-model
      - system modeling
      - holistic design
    - concept_name: Agent-Oriented Systems Modeling (AOSM)
      definition: A systems engineering language and methodology that extends SysML to support the design and modeling of
        systems with multiple cognitive entities (humans and AI agents), enabling requirements specification and interaction
        design for human-AI teams.
      source_book: B15
      chapter: 1.4, 1.5
      key_aspects:
      - meta-model
      - human-AI teams
      - cognitive entities
      - partition of work
    - concept_name: Controlled Autonomy
      definition: An agent design principle where the agent acts autonomously only to the extent that it is beneficial to
        the human responsible for controlling it, balancing autonomy with human accountability.
      source_book: B15
      chapter: 1.3.3
      key_aspects:
      - autonomy limits
      - human responsibility
      - agent behavior
      - accountability
    - concept_name: System Interdependence
      definition: The property where system components depend upon one another to achieve the system's primary purpose or
        goal, requiring that parts interact effectively for the holistic system to function.
      source_book: B15
      chapter: 1.3.1
      key_aspects:
      - coupled systems
      - part integration
      - goal achievement
      - system structure
    - concept_name: System Emergence
      definition: A phenomenon where interactions among system components generate new phenomena not present in individual
        components, such as thought emerging from neuronal interactions.
      source_book: B15
      chapter: 1.3.1
      key_aspects:
      - emergent properties
      - component interaction
      - holistic behavior
    - concept_name: Logical View of System
      definition: The conceptual representation of a system that describes component relationships independently of physical
        implementation, providing design flexibility by separating 'what' from 'how'.
      source_book: B15
      chapter: 1.3.1
      key_aspects:
      - design abstraction
      - component relationships
      - implementation independence
      - flexibility
    how_it_works: ''
    design_decisions: ''
    implementation: ''
    real_world_applications: ''
    relationships: ''
    sources:
    - 'B15: Integrating Artificial and Human Intelligence through Agent Oriented Systems Design (Miller & Rusnock, 2025)'
