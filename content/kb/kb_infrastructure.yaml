  evaluation_and_testing:
    definition: 'Methods for evaluating agent quality: deterministic judges (exact match), LLM-as-judge (RULER), trajectory-level
      scoring, and hybrid reward systems. Critical for RL-based agent training.'
    core_concepts:
    - concept_name: RULER (LLM-as-Judge)
      explanation: Ranks complete agent trajectories using relative evaluation — compares pairs/groups of trajectories rather
        than scoring individually. No handcrafted metrics needed. art.TrajectoryGroup bundles rollouts, ruler_score_group(group,
        model_id) returns ranked scores. Works for open-ended tasks where deterministic scoring is impossible.
    - concept_name: Deterministic Judges
      explanation: 'Exact-match validation for tasks with known correct answers. Example: judge_countdown_expression checks
        if agent''s math expression evaluates to target. Fast, reliable, but limited to verifiable tasks.'
    - concept_name: Hybrid Reward Systems
      explanation: 'Combine deterministic correctness (did it get the right answer?) with RULER quality (was the reasoning
        path good?). Formula: _combine(groups, alpha, beta) weights both signals. Enables training agents that are both correct
        AND well-reasoned.'
    - concept_name: Trajectory-Level Evaluation
      explanation: Evaluate complete agent execution traces (all steps, tool calls, reasoning) not just final output. art.Trajectory
        captures full rollout. Groups enable comparative ranking of different approaches to the same problem.
    - concept_name: Rubric-Based Evaluation (B03)
      explanation: 'Systematic 8-step evaluation process: identify purpose → define criteria → create 1-5 scale → provide
        scale descriptions → apply rubric → calculate score (average/weighted) → ensure consistency → review/revise/iterate.
        Complementary to RULER trajectory evaluation (B02) — rubrics evaluate output quality, RULER evaluates trajectory quality.'
    - concept_name: LLM-as-Judge for Agent Evaluation (B03)
      explanation: 'Using a second LLM to evaluate agent output against rubric criteria. Best practice: use a different model
        for evaluation than for generation to avoid self-bias. Implementation via evaluation prompt template (Jinja2) that
        scores output dimensions. Complements RULER (B02): RULER ranks trajectories relatively; LLM-as-Judge scores against
        absolute criteria.'
    - concept_name: BLEU Score (B04)
      explanation: 'Bilingual Evaluation Understudy — measures n-gram overlap between generated text and reference text. Originally
        for machine translation. Counts matching n-grams (unigrams through 4-grams) between candidate and reference, applies
        brevity penalty for short outputs. Score 0-1, higher is better. Limitation: measures surface-level word overlap, not
        semantic quality.'
    - concept_name: ROUGE Score (B04)
      explanation: 'Recall-Oriented Understudy for Gisting Evaluation — measures recall-based overlap between generated text
        and reference. Variants: ROUGE-N (n-gram recall), ROUGE-L (longest common subsequence). Complementary to BLEU: BLEU
        measures precision (how much of the output matches reference), ROUGE measures recall (how much of the reference is
        captured in output).'
    - concept_name: Agent Trajectory Evaluation (B04)
      explanation: 'Evaluating agents not just on final output but on the sequence of intermediate actions, tool calls, and
        reasoning steps (the "trajectory"). Captures: (1) Were the right tools selected? (2) Were tool calls made in an efficient
        order? (3) Were unnecessary steps avoided? (4) Did the agent recover from errors appropriately? Trajectory evaluation
        is essential because two agents can reach the same correct answer via very different (and differently efficient/safe)
        paths.'
    - concept_name: Agent Evaluation Components (B04)
      explanation: 'B04 defines 3 components of a rigorous agent evaluation: (1) Dataset — curated input/output pairs representing
        expected agent behavior. (2) Target Function — the agent or system being evaluated. (3) Evaluator — the judge (human,
        LLM-as-judge, or automated metric) that scores the target''s outputs against the dataset. All three must be designed
        together for meaningful evaluation.'
    - concept_name: OpenEvals Framework (B04)
      explanation: 'LangChain''s open-source evaluation framework providing reusable evaluators for agent systems. Includes
        pre-built evaluators for: correctness, helpfulness, harmlessness, tool use accuracy, and custom criteria. Integrates
        with LangSmith for automated evaluation runs against datasets.'
    - concept_name: Key Evaluation Objectives
      definition: Primary metrics for agent assessment including accuracy, robustness, efficiency, latency, cost, and task
        completion rate
      source_book: B11
      chapter: Ch 9
      examples:
      - Performance measurement
      - Multi-dimensional assessment
      - Goal alignment
      related_concepts: []
    - concept_name: Evaluation Dataset Design
      definition: Systematic creation of representative test sets that cover typical use cases, edge cases, and failure modes
      source_book: B11
      chapter: Ch 9
      examples:
      - Representative sampling
      - Edge case coverage
      - Diversity of scenarios
      related_concepts: []
    - concept_name: Unit Testing for Agents
      definition: Testing individual agent components (tools, memory, reasoning steps) in isolation to verify correctness
      source_book: B11
      chapter: Ch 9
      examples:
      - Component testing
      - Tool verification
      - Logic validation
      related_concepts: []
    - concept_name: Integration Testing for Agents
      definition: Testing complete agent workflows end-to-end to verify proper coordination of components and external systems
      source_book: B11
      chapter: Ch 9
      examples:
      - End-to-end workflows
      - Component interaction
      - System validation
      related_concepts: []
    - concept_name: Hallucination Testing
      definition: Specific evaluation focusing on detection and quantification of agent false claims and factually incorrect
        outputs
      source_book: B11
      chapter: Ch 9
      examples:
      - Factuality assessment
      - False claim detection
      - Confidence calibration
      related_concepts: []
    - concept_name: Consistency Testing
      definition: Evaluation to ensure agents produce consistent outputs for the same inputs across multiple runs
      source_book: B11
      chapter: Ch 9
      examples:
      - Determinism verification
      - Repeatability
      - Output stability
      related_concepts: []
    - concept_name: Robustness Testing
      definition: Assessment of agent behavior under adversarial inputs, malformed data, and edge cases
      source_book: B11
      chapter: Ch 9
      examples:
      - Adversarial inputs
      - Error handling
      - Graceful degradation
      related_concepts: []
    - concept_name: Deployment Preparation
      definition: Pre-production activities including final validation, performance baseline establishment, and rollout planning
      source_book: B11
      chapter: Ch 9
      examples:
      - Production readiness
      - SLA definition
      - Rollout strategy
      related_concepts: []
    - concept_name: Scenario Development
      definition: The systematic creation of realistic scenarios (typical and atypical) that test system behavior under various
        conditions, supporting design validation and exception handling.
      source_book: B15
      chapter: 2.8, 10.5
      key_aspects:
      - scenario creation
      - test case generation
      - system validation
      - edge cases
    - concept_name: Typical Scenario
      definition: A scenario representing normal, expected system operations under standard conditions; used to validate baseline
        system functionality.
      source_book: B15
      chapter: 2.8, 10.5
      key_aspects:
      - normal operation
      - baseline testing
      - expected behavior
    - concept_name: Atypical Scenario
      definition: A scenario representing unusual, exceptional, or edge-case conditions that test system resilience and exception
        handling capabilities.
      source_book: B15
      chapter: 2.8, 10.5
      key_aspects:
      - exception handling
      - edge cases
      - anomaly response
      - robustness testing
    - concept_name: Scenario Table
      definition: A structured artifact documenting scenarios with their conditions, expected outcomes, and validation criteria;
        supports systematic scenario-based testing.
      source_book: B15
      chapter: 2.8, 10.5
      key_aspects:
      - scenario documentation
      - test specification
      - validation criteria
    - concept_name: Anomaly Detection
      definition: The first stage of exception handling where system or environment anomalies are identified and recognized
        as requiring special response.
      source_book: B15
      chapter: 10.3.1
      key_aspects:
      - exception identification
      - anomaly recognition
      - monitoring
      - alert triggers
    - concept_name: Anomaly Diagnosis
      definition: The second stage of exception handling where the nature and cause of detected anomalies are determined and
        analyzed.
      source_book: B15
      chapter: 10.3.2
      key_aspects:
      - root cause analysis
      - anomaly understanding
      - problem characterization
    - concept_name: Anomaly Response
      definition: The third stage of exception handling where the system takes action to address identified anomalies and
        return to normal operation.
      source_book: B15
      chapter: 10.3.3
      key_aspects:
      - corrective action
      - recovery
      - exception management
      - remediation
    - concept_name: Three Stages of Exception Handling
      definition: A framework for exception management consisting of anomaly detection, anomaly diagnosis, and anomaly response,
        enabling systematic handling of unexpected conditions.
      source_book: B15
      chapter: '10.3'
      key_aspects:
      - exception framework
      - structured handling
      - staged response
