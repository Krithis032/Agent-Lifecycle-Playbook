infrastructure:
  agent_frameworks:
    definition: 'Software frameworks that provide the building blocks for constructing AI agents: state management, graph-based
      control flow, tool integration, memory, and multi-agent coordination. All agent frameworks are fundamentally finite
      state machines (FSMs) — LangGraph makes this explicit.'
    core_concepts:
    - concept_name: LangGraph as FSM
      explanation: 'LangGraph directly implements FSM semantics: StateGraph = FSM, nodes = states, edges = transitions, conditional_edges
        = dynamic transitions, State (TypedDict) = FSM context. MemorySaver provides checkpointing. Subgraphs enable hierarchical
        state machines (HSM). This is the most architecturally transparent framework — what you build IS what runs.'
    - concept_name: Framework Selection Criteria
      explanation: 'Choose based on: (1) Control granularity needed (LangGraph = fine, CrewAI = coarse), (2) Multi-agent support
        (LangGraph supervisor/swarm, AutoGen conversations), (3) Observability (LangSmith integration), (4) State management
        sophistication, (5) Production readiness and deployment options.'
    - concept_name: create_react_agent Prebuilt
      explanation: 'LangGraph''s prebuilt convenience function that creates a complete ReAct agent with tool calling. Wraps
        StateGraph with agent_node and tool_node wired correctly. Accepts: model, tools, prompt, checkpointer. Good for workers
        in multi-agent systems.'
    - concept_name: langgraph-supervisor and langgraph-swarm
      explanation: 'Higher-level packages: langgraph-supervisor provides create_supervisor() for quick supervisor setup. langgraph-swarm
        provides create_swarm() and create_handoff_tool() for peer-to-peer architectures.'
    - concept_name: AutoGen (Microsoft) (B03)
      explanation: 'Conversational multi-agent platform built on agent conversations. Core agents: UserProxy (human proxy),
        ConversableAgent (base class), AssistantAgent (LLM-powered). Conversation patterns: Proxy (1-to-1), Joint chat (GroupChat
        + GroupChatManager), Hierarchical (register_nested_chats for delegation). Features: TERMINATE stop word, human_input_mode
        ("ALWAYS"/"NEVER"), Cache.disk(cache_seed=N) for deterministic replay via SQLite.'
    - concept_name: CrewAI (B03)
      explanation: 'Enterprise-focused multi-agent framework with role-based agent definition. Three core abstractions: Agent
        (role, goal, backstory, memory, allow_delegation), Task (description, expected_output, agent, async_execution, output_file),
        Crew (agents, tasks, process, memory, cache, max_rpm, share_crew). Two process modes: Sequential (ordered execution)
        and Hierarchical (manager_llm coordinates). Execution: crew.kickoff(inputs={...}). Built for enterprise with rate
        limiting (max_rpm) and caching.'
    - concept_name: Semantic Kernel (Microsoft) (B03)
      explanation: 'Open-source plugin orchestrator that unifies semantic (LLM) and native (code) functions. Two function
        types: Semantic functions (prompt templates via kernel.create_function_from_prompt() with PromptTemplateConfig + InputVariable)
        and Native functions (Python/Java/C# code with @kernel_function decorator on class methods). Plugin registration:
        import_plugin_from_prompt_directory (semantic) or import_plugin_from_object (native). Embedding native in semantic:
        {{ClassName.FunctionName}} templating. Plugin file structure: folder/config.json + skprompt.txt. Cross-language plugin
        consumption.'
    - concept_name: AutoGen 3-Layer Architecture (B04)
      explanation: 'B04 details Microsoft AutoGen''s 3-layer architecture: (1) Core API — low-level primitives for agent creation
        and message passing. (2) AgentChat API — high-level abstractions for multi-agent conversations (GroupChat, round-robin,
        selector). (3) Extensions API — plugins for external integrations (tools, models, storage). Plus companion tools:
        AutoGen Studio (visual agent builder) and AutoGen Bench (benchmarking suite). This layered approach allows developers
        to work at the right abstraction level.'
    - concept_name: TaskWeaver (Microsoft) (B04)
      explanation: 'Code-first data analytics agent framework by Microsoft. Specializes in converting natural language requests
        into executable code (primarily Python) for data analysis tasks. Key feature: the agent generates, executes, and iterates
        on code to fulfill analytical requests. Designed for data professionals who need agents to write and run data processing/analysis
        code.'
    - concept_name: OpenAI Agents SDK (B04)
      explanation: 'OpenAI''s framework for building multi-agent systems. Key features: (1) Hand-offs — explicit control transfer
        between agents with context passing. (2) Guardrails — built-in safety checks on agent inputs/outputs. (3) Tracing
        — observability for agent execution. (4) Multi-Provider Support — not locked to OpenAI models, can use various LLM
        providers. Positioned as OpenAI''s answer to LangGraph/AutoGen for production agent development.'
    - concept_name: LangGraph Graph Model (B04)
      explanation: 'B04 details LangGraph''s core abstractions: (1) Nodes — Python functions that process state (agents, tools,
        routers). (2) Edges — connections between nodes (fixed or conditional). (3) State — TypedDict shared across all nodes,
        the "memory" of the workflow. (4) Conditional Logic — functions that inspect state and route to different nodes. (5)
        Workflow Compilation — graph.compile() produces a runnable workflow. This explicit graph model makes agent workflows
        transparent and debuggable.'
    - concept_name: LangGraph StateGraph and TypedDict State Management
      definition: LangGraph uses StateGraph class with TypedDict for defining strongly-typed state schemas passed and modified
        across nodes. State persists across the entire workflow, enabling context-aware agent behavior. Supports cyclic graphs
        (loops) unlike LangChain DAGs.
      source_book: Course Materials
      course_source: Agentic AI with LangChain and LangGraph - Core Components / LangGraph 101
    - concept_name: LangGraph Cyclic Graphs vs DAGs
      definition: LangGraph supports cyclic graphs where tasks can loop back to previous nodes, unlike LangChain DAG-only
        architecture. Enables iterative refinement, feedback loops, and dynamic re-evaluation in workflows.
      source_book: Course Materials
      course_source: Agentic AI with LangChain and LangGraph - Core Components
    - concept_name: LangGraph Conditional Edges with Router Functions
      definition: Graph transitions between nodes are controlled by router functions that evaluate state and return the next
        node name. Enables dynamic decision-making at runtime where execution path depends on evolving state conditions.
      source_book: Course Materials
      course_source: Agentic AI with LangGraph - Design Patterns
    - concept_name: LangGraph Checkpointing and Time Travel
      definition: LangGraph supports checkpointing to persist workflow state at key points, enabling resumption after failures.
        Time Travel feature allows rewinding to previous states for debugging without re-execution.
      source_book: Course Materials
      course_source: Agentic AI with LangChain and LangGraph - Core Components
    - concept_name: LangGraph Node Partial State Updates
      definition: LangGraph nodes can return partial dictionary updates using unpacking operator rather than full state returns.
        Some nodes modify state (computation) while others perform side effects. LangGraph handles merging automatically.
      source_book: Course Materials
      course_source: Agentic AI with LangChain and LangGraph - LangGraph 101
    - concept_name: LangGraph Mermaid Diagram Visualization
      definition: LangGraph workflows can be visualized as Mermaid diagrams showing nodes and edges, enabling intuitive understanding
        of graph structure and debugging of complex workflows. Built-in to framework.
      source_book: Course Materials
      course_source: Agentic AI with LangChain and LangGraph - Core Components
    - concept_name: CrewAI Agent Role/Goal/Backstory Structure
      definition: 'CrewAI agents are defined with three narrative elements: role (expertise/perspective), goal (objective
        guiding behavior), and backstory (behavioral context). These replace traditional system prompts with structured personality
        definitions.'
      source_book: Course Materials
      course_source: Agentic AI with LangGraph, CrewAI, AutoGen and BeeAI - CrewAI Fundamentals
    - concept_name: CrewAI Task and Crew Composition
      definition: 'Tasks define what an agent should do (description) and expected output format. Crew combines agents and
        tasks with process type: Sequential (tasks chain linearly) or Hierarchical (manager agent dynamically assigns tasks).'
      source_book: Course Materials
      course_source: Agentic AI with LangGraph, CrewAI, AutoGen and BeeAI - CrewAI Fundamentals
    - concept_name: AG2 ConversableAgent Base Class
      definition: AG2 (AutoGen) fundamental building block where agents send, receive, and respond to messages. All agent
        types inherit from ConversableAgent. Supports initiate_chat() with max_turns for controlled multi-turn interactions.
      source_book: Course Materials
      course_source: Agentic AI with LangGraph, CrewAI, AutoGen and BeeAI - AG2 Key Elements
    - concept_name: AG2 AssistantAgent + UserProxyAgent Pattern
      definition: Specialized agent separation where AssistantAgent reasons and generates solutions (e.g., code) while UserProxyAgent
        executes and provides feedback. Keeps reasoning separate from execution for security and debugging clarity.
      source_book: Course Materials
      course_source: Agentic AI with LangGraph, CrewAI, AutoGen and BeeAI - AG2
    - concept_name: AG2 Group Chat with Speaker Selection Modes
      definition: 'AG2 multi-agent orchestration via GroupChatManager with configurable speaker selection: auto (LLM chooses),
        round_robin (fixed sequence), manual (human selects), random. Enables flexible multi-perspective problem solving.'
      source_book: Course Materials
      course_source: Agentic AI with LangGraph, CrewAI, AutoGen and BeeAI - AG2
    - concept_name: AG2 Human Input Mode Settings
      definition: 'AG2 supports three human_input_mode options: "always" (pause at each step), "never" (full automation),
        "terminate" (only input to end). Controls human oversight level in agent workflows.'
      source_book: Course Materials
      course_source: Agentic AI with LangGraph, CrewAI, AutoGen and BeeAI - AG2
    - concept_name: AG2 Register Function for Tool Linking
      definition: AG2 uses register_function decorator to link Python functions as tools between agents. Enables clean separation
        of reasoning and execution, with automatic tool registration in the agent conversation loop.
      source_book: Course Materials
      course_source: Agentic AI with LangGraph, CrewAI, AutoGen and BeeAI - Extending AG2
    - concept_name: AG2 Pydantic Response Format
      definition: AG2 agents enforce structured output by defining Pydantic models with typed fields and descriptions, set
        as response_format in llm_config. Automatic validation and parsing prevent malformed responses.
      source_book: Course Materials
      course_source: Agentic AI with LangGraph, CrewAI, AutoGen and BeeAI - Extending AG2
    - concept_name: AG2 Provider-Agnostic LLMConfig
      definition: AG2 LLMConfig enables flexible LLM provider selection (OpenAI, Anthropic, etc.) with model, connection settings,
        and temperature tuning. Can be shared across agents or customized per agent for heterogeneous teams.
      source_book: Course Materials
      course_source: Agentic AI with LangGraph, CrewAI, AutoGen and BeeAI - AG2
    - concept_name: AG2 Summary Method with Reflection
      definition: AG2 summary_method parameter set to "reflection_with_llm" generates final summaries based on full conversation
        history. Enables synthesis of multi-agent discussions into actionable conclusions.
      source_book: Course Materials
      course_source: Agentic AI with LangGraph, CrewAI, AutoGen and BeeAI - AG2
    - concept_name: BeeAI RequirementAgent and Constraints
      definition: BeeAI RequirementAgent class allows fine-grained behavioral control through a Requirements system. AskPermissionRequirement
        enables human-in-the-loop by requiring explicit approval before certain actions.
      source_book: Course Materials
      course_source: Agentic AI with LangGraph, CrewAI, AutoGen and BeeAI - BeeAI Framework
    - concept_name: BeeAI ThinkTool for Explicit Reasoning
      definition: BeeAI ThinkTool enables agents to explicitly reason through problems before answering, supporting internal
        monologue patterns. Distinct from direct Q&A, supports deliberative problem-solving.
      source_book: Course Materials
      course_source: Agentic AI with LangGraph, CrewAI, AutoGen and BeeAI - BeeAI Framework
    - concept_name: BeeAI HandoffTool for Multi-Agent Delegation
      definition: HandoffTool enables agents to delegate tasks to other specialized agents. A Coordinator agent routes queries
        to appropriate workers based on their capabilities, enabling task-specific delegation.
      source_book: Course Materials
      course_source: Agentic AI with LangGraph, CrewAI, AutoGen and BeeAI - BeeAI Framework
    - concept_name: BeeAI Custom Tool Pattern
      definition: BeeAI enables custom tools by extending Tool class with BaseModel input schema (with field descriptions)
        and implementing _run method. Tool integrates seamlessly with agent toolset for domain-specific capabilities.
      source_book: Course Materials
      course_source: Agentic AI with LangGraph, CrewAI, AutoGen and BeeAI - BeeAI Framework
    - concept_name: Framework Comparison Matrix
      definition: 'LangChain: sequential chains, limited state. LangGraph: stateful DAGs + cyclic graphs for complex workflows.
        CrewAI: role-based team collaboration with narrative agent definitions. AG2: conversational multi-agent orchestration.
        BeeAI: enterprise-grade deployment with tool integration and memory management.'
      source_book: Course Materials
      course_source: Agentic AI with LangGraph, CrewAI, AutoGen and BeeAI - Overview
